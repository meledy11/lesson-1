<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔥 Урок: 127 частотных слов | Весёлый китайский</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #FFF0E0 0%, #FFE0C0 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', sans-serif;
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            background: linear-gradient(135deg, #FF6B35, #FF8C42, #FFB347);
            border-radius: 80px;
            padding: 1.5rem 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 15px 0 #C16F1A;
            color: white;
        }

        .hero h1 {
            font-size: 1.8rem;
            background: rgba(255,255,255,0.95);
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 60px;
            color: #E67E22;
        }

        .hero p {
            margin-top: 0.5rem;
        }

        .back-buttons {
            margin-top: 1rem;
        }

        .back-home {
            display: inline-block;
            background: rgba(255,255,255,0.9);
            color: #E67E22;
            text-decoration: none;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-weight: bold;
            margin: 0 0.3rem;
            font-size: 0.85rem;
            box-shadow: 0 3px 0 #C16F1A;
        }

        .back-home:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #C16F1A;
        }

        .progress-section {
            background: white;
            border-radius: 60px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 0 #FFB347;
        }

        .progress-bar-bg {
            background: #FFE0C0;
            border-radius: 30px;
            height: 20px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #FF6B35, #FFB347);
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.2s;
        }

        .stats-info {
            font-size: 0.8rem;
            color: #A64B2A;
            margin-top: 0.5rem;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .ctrl-btn {
            background: white;
            border: 2px solid #FFB347;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #D98F33;
            transition: 0.05s;
        }

        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #D98F33;
        }

        .ctrl-btn.primary {
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            color: white;
            border: none;
        }

        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 1.2rem;
        }

        .word-card {
            background: white;
            border-radius: 36px;
            padding: 1.2rem;
            border: 3px solid #FFD699;
            transition: 0.1s;
            box-shadow: 0 8px 0 #FFD699;
        }

        .word-card.completed {
            background: #E8F5E9;
            border-color: #4CAF50;
            box-shadow: 0 8px 0 #4CAF50;
        }

        .word-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .char-large {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: 'Noto Sans SC', monospace;
            background: #FFF3E0;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.05s;
        }

        .char-large:active {
            background: #FFD699;
            transform: scale(0.96);
        }

        .pinyin-badge {
            font-size: 1rem;
            color: #FF8C42;
            font-weight: bold;
            background: #FFF0E0;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }

        .meaning {
            color: #A64B2A;
            font-size: 1rem;
            margin: 0.5rem 0;
        }

        .analysis {
            background: #FFFBF5;
            border-radius: 24px;
            padding: 0.8rem;
            margin: 0.8rem 0;
            font-size: 0.85rem;
            border-left: 4px solid #FFB347;
        }

        .analysis-title {
            font-weight: bold;
            color: #E67E22;
            margin-bottom: 0.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .analysis-content {
            display: none;
        }

        .analysis-content.show {
            display: block;
        }

        .parts-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }

        .part-item {
            background: #FFE8CC;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-family: 'Noto Sans SC', monospace;
        }

        .input-area {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }

        .pinyin-input {
            flex: 2;
            padding: 0.6rem 1rem;
            border-radius: 50px;
            border: 2px solid #FFD699;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
        }

        .check-btn {
            background: #FF8C42;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .check-result {
            font-size: 0.85rem;
            margin-top: 0.4rem;
        }

        /* ВСТРОЕННАЯ ТЕТРАДЬ */
        .practice-area {
            margin-top: 1rem;
            background: #FFF8F0;
            border-radius: 24px;
            padding: 0.8rem;
            border: 2px solid #FFD699;
        }
        
        .practice-title {
            font-size: 0.8rem;
            color: #8B5A2B;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .mini-canvas {
            background: white;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 200px;
            height: auto;
            aspect-ratio: 1 / 1;
            cursor: crosshair;
            border-radius: 16px;
            border: 2px solid #D9B48B;
            touch-action: none;
        }
        
        .practice-tools {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        
        .practice-btn {
            background: #E8D5B0;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .practice-btn:active {
            transform: scale(0.95);
            background: #DDC79E;
        }
        
        .practice-accuracy {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 0.4rem;
            color: #A64B2A;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            background: #FFD699;
            border-radius: 50px;
            font-weight: bold;
            color: #A64B2A;
        }

        @media (max-width: 800px) {
            .words-grid {
                grid-template-columns: 1fr;
            }
            .char-large {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>🔥 127 самых частотных слов</h1>
        <p>🎯 Слушай → пиши пиньинь → рисуй иероглиф → запоминай!</p>
        <div class="back-buttons">
            <a href="index.html" class="back-home">🏠 На главную</a>
            <a href="lesson0.html" class="back-home">🎵 Таблица пиньиня</a>
        </div>
    </div>

    <div class="progress-section">
        <div style="display: flex; justify-content: space-between;">
            <span>📊 Прогресс урока</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
        <div class="stats-info">💡 Подсказка: пиньинь можно писать <strong>без тонов</strong> (например, "ni" вместо "nǐ")</div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="speakAllBtn">🔊 Произнести всё</button>
        <button class="ctrl-btn primary" id="resetProgressBtn">🔄 Сбросить прогресс</button>
        <button class="ctrl-btn" id="hideCompletedBtn">✅ Скрыть выученные</button>
        <button class="ctrl-btn" id="showAllBtn">👁️ Показать все</button>
    </div>

    <div id="wordsGrid" class="words-grid"></div>
    <footer>🔊 Нажми на иероглиф → услышь произношение. ✏️ Рисуй прямо в уроке!</footer>
</div>

<script src="frequency-db.js"></script>
<script>
    let wordsData = [];
    let completedIds = new Set();
    let hideCompleted = false;
    
    // Хранилище для canvas и их состояния
    let canvasInstances = new Map();

    function loadData() {
        if (typeof frequencyDB !== 'undefined' && frequencyDB.length) {
            wordsData = JSON.parse(JSON.stringify(frequencyDB));
            console.log('✅ Загружено слов:', wordsData.length);
        } else {
            console.error('❌ frequencyDB не загружена');
            wordsData = [];
        }
        
        const saved = localStorage.getItem('frequencyProgress');
        if (saved) {
            try {
                completedIds = new Set(JSON.parse(saved));
                console.log('📊 Загружен прогресс:', completedIds.size, 'слов выучено');
            } catch(e) {}
        }
        
        renderWords();
        updateProgress();
    }

    function playChinese(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.7;
        setTimeout(() => window.speechSynthesis.speak(utterance), 10);
    }

    function saveProgress() {
        localStorage.setItem('frequencyProgress', JSON.stringify([...completedIds]));
        updateProgress();
        if (hideCompleted) renderWords();
    }

    function updateProgress() {
        const total = wordsData.length;
        const completed = completedIds.size;
        const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('progressPercent').innerText = percent + '%';
        document.getElementById('progressFill').style.width = percent + '%';
    }

    // Убираем тоны из пиньиня для сравнения
    function normalizePinyin(pinyin) {
        if (!pinyin) return '';
        return pinyin
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[0-5]/g, '')
            .replace(/[^a-z]/g, '');
    }

    function checkPinyin(wordId, userInput, correctPinyin) {
        const normalizedUser = normalizePinyin(userInput);
        const normalizedCorrect = normalizePinyin(correctPinyin);
        
        const isCorrect = (normalizedUser === normalizedCorrect);
        
        if (isCorrect) {
            if (!completedIds.has(wordId)) {
                completedIds.add(wordId);
                saveProgress();
            }
            return { correct: true, message: `✅ Правильно! ${correctPinyin}` };
        } else {
            return { correct: false, message: `❌ Неправильно. Правильно: ${correctPinyin}` };
        }
    }
    
    // ========== ФУНКЦИИ ДЛЯ ВСТРОЕННОЙ ТЕТРАДИ ==========
    
    function initMiniCanvas(canvasId, char) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return null;
        
        canvas.width = 200;
        canvas.height = 200;
        const ctx = canvas.getContext('2d');
        
        let painting = false;
        let undoStack = [];
        
        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = '#D9C2A7';
            ctx.lineWidth = 1;
            let cellSize = canvas.width / 4;
            for (let i = 1; i <= 3; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(canvas.width, 0);
            ctx.lineTo(0, canvas.height);
            ctx.stroke();
            ctx.restore();
        }
        
        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            saveState();
            updateAccuracyDisplay(canvasId, 0);
        }
        
        function saveState() {
            undoStack.push(canvas.toDataURL());
            if (undoStack.length > 10) undoStack.shift();
        }
        
        function startDrawing(e) {
            e.preventDefault();
            painting = true;
            const coords = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        }
        
        function draw(e) {
            if (!painting) return;
            e.preventDefault();
            const coords = getCoords(e);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 8;
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
        }
        
        function stopDrawing() {
            painting = false;
            ctx.beginPath();
            saveState();
        }
        
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            x = Math.min(Math.max(0, x), canvas.width);
            y = Math.min(Math.max(0, y), canvas.height);
            return { x, y };
        }
        
        function showTemplate() {
            ctx.save();
            ctx.globalAlpha = 0.4;
            ctx.font = `bold ${canvas.width * 0.65}px 'Noto Sans SC'`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#999999';
            ctx.fillText(char, canvas.width / 2, canvas.height / 2);
            ctx.globalAlpha = 1;
            drawGrid();
            ctx.restore();
            saveState();
        }
        
        function checkAccuracy() {
            const idealCanvas = document.createElement('canvas');
            idealCanvas.width = canvas.width;
            idealCanvas.height = canvas.height;
            const idealCtx = idealCanvas.getContext('2d');
            idealCtx.fillStyle = 'white';
            idealCtx.fillRect(0, 0, idealCanvas.width, idealCanvas.height);
            idealCtx.font = `bold ${idealCanvas.width * 0.65}px 'Noto Sans SC'`;
            idealCtx.textAlign = 'center';
            idealCtx.textBaseline = 'middle';
            idealCtx.fillStyle = 'black';
            idealCtx.fillText(char, idealCanvas.width / 2, idealCanvas.height / 2);
            
            const idealData = idealCtx.getImageData(0, 0, idealCanvas.width, idealCanvas.height);
            const currentData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            let matchCount = 0;
            let totalImportant = 0;
            
            for (let y = 2; y < canvas.height - 2; y++) {
                for (let x = 2; x < canvas.width - 2; x++) {
                    const idx = (y * canvas.width + x) * 4;
                    const idealR = idealData.data[idx];
                    const idealG = idealData.data[idx+1];
                    const idealB = idealData.data[idx+2];
                    const isIdealImportant = (idealR + idealG + idealB) / 3 < 150;
                    
                    if (isIdealImportant) {
                        totalImportant++;
                        let foundMatch = false;
                        for (let dy = -2; dy <= 2; dy++) {
                            for (let dx = -2; dx <= 2; dx++) {
                                const ny = y + dy;
                                const nx = x + dx;
                                if (ny >= 0 && ny < canvas.height && nx >= 0 && nx < canvas.width) {
                                    const nidx = (ny * canvas.width + nx) * 4;
                                    const currentR = currentData.data[nidx];
                                    const currentG = currentData.data[nidx+1];
                                    const currentB = currentData.data[nidx+2];
                                    const isCurrentImportant = (currentR + currentG + currentB) / 3 < 150;
                                    if (isCurrentImportant) {
                                        foundMatch = true;
                                        break;
                                    }
                                }
                            }
                            if (foundMatch) break;
                        }
                        if (foundMatch) matchCount++;
                    }
                }
            }
            
            let accuracy = totalImportant > 0 ? (matchCount / totalImportant) * 100 : 0;
            accuracy = Math.min(100, Math.max(0, Math.floor(accuracy)));
            
            updateAccuracyDisplay(canvasId, accuracy);
            return accuracy;
        }
        
        function updateAccuracyDisplay(canvasId, accuracy) {
            const accuracySpan = document.getElementById(`accuracy-${canvasId}`);
            if (accuracySpan) {
                accuracySpan.innerText = accuracy + '%';
                if (accuracy > 80) {
                    accuracySpan.style.color = '#4CAF50';
                } else if (accuracy > 50) {
                    accuracySpan.style.color = '#FF8C42';
                } else {
                    accuracySpan.style.color = '#A64B2A';
                }
            }
        }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);
        
        clearCanvas();
        
        return {
            clear: clearCanvas,
            template: showTemplate,
            check: checkAccuracy
        };
    }
    
    function renderWords() {
        const container = document.getElementById('wordsGrid');
        if (!container) return;
        
        let filtered = [...wordsData];
        if (hideCompleted) {
            filtered = filtered.filter(w => !completedIds.has(w.id));
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:3rem; background:white; border-radius:50px;">🎉 Поздравляю! Все слова выучены! 🎉</div>';
            return;
        }
        
        container.innerHTML = '';
        canvasInstances.clear();
        
        filtered.forEach(word => {
            const isCompleted = completedIds.has(word.id);
            const card = document.createElement('div');
            card.className = 'word-card' + (isCompleted ? ' completed' : '');
            card.dataset.id = word.id;
            const canvasId = `canvas-${word.id}`;
            
            const partsHtml = word.parts ? word.parts.map(p => `<span class="part-item">${p.char} (${p.meaning})</span>`).join('') : '<span class="part-item">—</span>';
            const phoneticHtml = word.phonetic ? `✅ Есть фонетик: ${word.phonetic.char} (${word.phonetic.reading})<br>📝 ${word.phonetic.note || ''}` : '❌ НЕТ фонетика — это ' + (word.type || 'идеограмма/пиктограмма');
            
            const safeChar = word.char.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const safePinyin = word.pinyin.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            
            card.innerHTML = `
                <div class="word-header">
                    <span class="char-large" onclick="playChinese('${safeChar}')">${word.char}</span>
                    <span class="pinyin-badge">${word.pinyin}</span>
                </div>
                <div class="meaning">📖 ${word.meaning}</div>
                
                <div class="analysis">
                    <div class="analysis-title" onclick="toggleAnalysis(this)">
                        🔍 Разбор иероглифа <span>▼</span>
                    </div>
                    <div class="analysis-content">
                        <div><strong>🧩 Составные части:</strong></div>
                        <div class="parts-list">${partsHtml}</div>
                        <div style="margin-top: 0.5rem;">
                            <strong>🎵 Фонетик:</strong> ${phoneticHtml}
                        </div>
                        <div style="margin-top: 0.3rem;">
                            <strong>📖 Объяснение:</strong> ${word.explanation || '—'}
                        </div>
                        ${word.examples ? `<div style="margin-top: 0.5rem;"><strong>📚 Примеры:</strong><br>${word.examples.map((ex, i) => `${ex} — ${word.exampleMeanings?.[i] || ''}`).join('<br>')}</div>` : ''}
                    </div>
                </div>
                
                <div class="input-area">
                    <input type="text" class="pinyin-input" placeholder="Введи пиньинь (можно без тонов)" data-id="${word.id}" data-correct="${word.pinyin}">
                    <button class="check-btn" data-id="${word.id}">✅ Проверить</button>
                </div>
                <div class="check-result" id="result-${word.id}"></div>
                
                <div class="practice-area">
                    <div class="practice-title">
                        <span>✍️ Пропись: ${word.char}</span>
                        <span>Точность: <span id="accuracy-${canvasId}">0%</span></span>
                    </div>
                    <canvas id="${canvasId}" class="mini-canvas"></canvas>
                    <div class="practice-tools">
                        <button class="practice-btn" data-canvas="${canvasId}" data-action="clear">🧽 Очистить</button>
                        <button class="practice-btn" data-canvas="${canvasId}" data-action="template">🖼 Образец</button>
                        <button class="practice-btn" data-canvas="${canvasId}" data-action="check">🔍 Проверить</button>
                    </div>
                </div>
            `;
            
            container.appendChild(card);
            
            // Инициализируем canvas
            setTimeout(() => {
                const canvasControl = initMiniCanvas(canvasId, word.char);
                if (canvasControl) {
                    canvasInstances.set(canvasId, canvasControl);
                }
            }, 10);
        });
        
        // Обработчики для кнопок проверки пиньиня
        document.querySelectorAll('.check-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const input = btn.parentElement.querySelector('.pinyin-input');
                const userValue = input.value;
                const word = wordsData.find(w => w.id === id);
                const resultDiv = document.getElementById(`result-${id}`);
                
                if (!word) return;
                
                const result = checkPinyin(id, userValue, word.pinyin);
                resultDiv.innerHTML = result.message;
                resultDiv.style.color = result.correct ? 'green' : 'red';
                
                if (result.correct) {
                    const card = btn.closest('.word-card');
                    if (card) card.classList.add('completed');
                    updateProgress();
                    if (hideCompleted) renderWords();
                }
            });
        });
        
        // Обработчики для Enter в поле ввода
        document.querySelectorAll('.pinyin-input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const btn = input.parentElement.querySelector('.check-btn');
                    if (btn) btn.click();
                }
            });
        });
        
        // Обработчики для кнопок тетради (делегирование)
        document.querySelectorAll('.practice-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const canvasId = btn.dataset.canvas;
                const action = btn.dataset.action;
                const canvasControl = canvasInstances.get(canvasId);
                if (canvasControl) {
                    if (action === 'clear') canvasControl.clear();
                    if (action === 'template') canvasControl.template();
                    if (action === 'check') canvasControl.check();
                }
            });
        });
    }
    
    function toggleAnalysis(titleEl) {
        const content = titleEl.parentElement.querySelector('.analysis-content');
        const arrow = titleEl.querySelector('span');
        content.classList.toggle('show');
        arrow.innerHTML = content.classList.contains('show') ? '▲' : '▼';
    }
    
    // Кнопки управления
    document.getElementById('speakAllBtn')?.addEventListener('click', () => {
        const allChars = wordsData.map(w => w.char).join('');
        playChinese(allChars);
    });
    
    document.getElementById('resetProgressBtn')?.addEventListener('click', () => {
        if (confirm('Сбросить весь прогресс изучения слов?')) {
            completedIds.clear();
            saveProgress();
            renderWords();
        }
    });
    
    document.getElementById('hideCompletedBtn')?.addEventListener('click', () => {
        hideCompleted = true;
        renderWords();
    });
    
    document.getElementById('showAllBtn')?.addEventListener('click', () => {
        hideCompleted = false;
        renderWords();
    });
    
    // Запуск загрузки
    loadData();
</script>
</body>
</html>
