<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎯 Диктант пиньиня | Весёлый китайский</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(145deg, #1a472a 0%, #2d6a4f 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 1rem;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .hero {
            text-align: center;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            border-radius: 60px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 0 #C16F1A;
            color: #5a2e0e;
        }
        
        .hero h1 { font-size: 1.5rem; }
        .hero p { font-size: 0.8rem; margin-top: 0.3rem; }
        
        .back-btn {
            display: inline-block;
            background: white;
            color: #e67e22;
            text-decoration: none;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 #ccc;
            cursor: pointer;
        }
        
        .back-btn:active { transform: translateY(2px); }
        
        .level-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .level-btn {
            background: #2b4f3a;
            color: #FFE0A3;
            border: 2px solid #FFB347;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.1s ease;
        }
        
        .level-btn.active {
            background: #FFB347;
            color: #1a472a;
            border-color: #fff;
        }
        
        .score-bar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .score-card {
            background: #2b4f3a;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #FFE0A3;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .score-card span {
            color: #FFD966;
            font-size: 1.3rem;
            margin-left: 0.3rem;
            font-weight: bold;
        }
        
        .game-area {
            background: #3d2a1a;
            border-radius: 40px;
            padding: 1.5rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 10px 0 #2a1a0e;
        }
        
        .question-box {
            text-align: center;
        }
        
        .question-char {
            font-size: 5rem;
            font-family: 'Noto Sans SC', monospace;
            background: white;
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            color: #A64B2A;
            margin: 0.5rem 0;
            box-shadow: 0 6px 0 #D98F33;
            cursor: pointer;
            transition: 0.05s linear;
        }
        
        .question-char:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #D98F33;
        }
        
        .question-meaning {
            font-size: 1.2rem;
            background: #FFE0C0;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            margin: 0.5rem 0;
            color: #A64B2A;
        }
        
        .input-wrapper {
            position: relative;
            margin: 1rem auto;
            max-width: 350px;
        }
        
        .dictant-input {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 60px;
            border: 3px solid #FFB347;
            background: white;
            outline: none;
            font-family: monospace;
            transition: all 0.1s ease;
        }
        
        .dictant-input:focus {
            border-color: #4CAF50;
            transform: scale(1.02);
        }
        
        .dictant-input.correct {
            border-color: #4CAF50;
            background: #e8f5e9;
        }
        
        .dictant-input.wrong {
            border-color: #e94560;
            background: #ffebee;
        }
        
        .dictant-input:disabled {
            opacity: 0.8;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        
        .check-btn {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #1B5E20;
            transition: 0.05s linear;
            font-size: 1rem;
        }
        
        .check-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1B5E20;
        }
        
        .result-box {
            background: #2b4f3a;
            border-radius: 30px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-correct {
            font-size: 1.2rem;
            color: #FFD966;
            margin-bottom: 0.5rem;
        }
        
        .result-pinyin {
            font-size: 1.4rem;
            font-weight: bold;
            color: #FFB347;
            font-family: monospace;
            margin: 0.5rem 0;
        }
        
        .user-answer {
            font-size: 1.2rem;
            color: #FFE0A3;
            margin-top: 0.5rem;
        }
        
        .speak-btn {
            background: #5D9B4B;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            margin: 0.3rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 3px 0 #3A6B2E;
            transition: 0.05s linear;
        }
        
        .speak-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3A6B2E;
        }
        
        .bottom-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .btn {
            background: linear-gradient(135deg, #FF8C42, #FF6B35);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #B45F1B;
            transition: 0.05s linear;
            font-size: 1rem;
        }
        
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #B45F1B;
        }
        
        .btn.secondary {
            background: #4CAF50;
            box-shadow: 0 4px 0 #2E7D32;
        }
        
        .btn.dont-know {
            background: linear-gradient(135deg, #888, #666);
            box-shadow: 0 4px 0 #444;
        }
        
        .message {
            text-align: center;
            margin-top: 0.8rem;
            font-weight: bold;
            font-size: 0.9rem;
            min-height: 2.5rem;
        }
        
        @media (max-width: 550px) {
            .question-char { font-size: 3.5rem; }
            .result-pinyin { font-size: 1.2rem; }
            .dictant-input { font-size: 1rem; padding: 0.8rem 1rem; }
            .check-btn { padding: 0.5rem 1.2rem; font-size: 0.9rem; }
            .btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
            .speak-btn { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🎯 Диктант пиньиня</h1>
        <p>Напиши пиньинь без тонов → нажми ✅ Проверить</p>
        <div class="back-btn" onclick="window.location.href='index.html'">🏠 На главную</div>
    </div>
    
    <div class="level-selector" id="levelSelector">
        <button class="level-btn active" data-level="1">🍃 6 слов</button>
        <button class="level-btn" data-level="2">🌿 12 слов</button>
        <button class="level-btn" data-level="3">🔥 20 слов</button>
        <button class="level-btn" data-level="0">🏆 ВСЕ слова</button>
    </div>
    
    <div class="score-bar">
        <div class="score-card">🏆 Счёт: <span id="scoreValue">0</span></div>
        <div class="score-card">✅ Верно: <span id="correctValue">0</span></div>
        <div class="score-card">❌ Ошибок: <span id="wrongValue">0</span></div>
        <div class="score-card">🔥 Серия: <span id="streakValue">0</span></div>
    </div>
    
    <div class="game-area" id="gameArea"></div>
    
    <div class="bottom-buttons">
        <button class="btn dont-know" id="dontKnowBtn">🤷 Не знаю</button>
        <button class="btn" id="nextBtn">▶ Следующее</button>
        <button class="btn secondary" id="resetBtn">🔄 Сброс</button>
    </div>
    <div class="message" id="message"></div>
</div>

<script src="frequency-db.js"></script>
<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let gameWords = [];
    let currentWord = null;
    let answered = false;
    let currentLevel = 1;
    let lastUserAnswer = ''; // запоминаем последний ответ пользователя
    
    let totalScore = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let streak = 0;
    
    // DOM элементы
    let gameArea, scoreValue, correctValue, wrongValue, streakValue, nextBtn, resetBtn, dontKnowBtn, messageDiv;
    
    // ========== ОЗВУЧКА ПОСЛОГОВАЯ ==========
    function speakChinese(text) {
        if (!text || text.trim() === '') return;
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        
        const syllables = text.trim().split(/\s+/);
        
        if (syllables.length === 1) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.7;
            window.speechSynthesis.speak(utterance);
        } else {
            let index = 0;
            function speakNext() {
                if (index >= syllables.length) return;
                const utterance = new SpeechSynthesisUtterance(syllables[index]);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.7;
                utterance.onend = () => {
                    index++;
                    setTimeout(speakNext, 100);
                };
                window.speechSynthesis.speak(utterance);
            }
            speakNext();
        }
    }
    
    // ========== ОЗВУЧКА ИЕРОГЛИФА ==========
    function speakChar(char) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(char);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.7;
        window.speechSynthesis.speak(utterance);
    }
    
    // ========== ФУНКЦИЯ УДАЛЕНИЯ ТОНОВ ==========
    function removeTones(pinyin) {
        if (!pinyin) return '';
        return pinyin
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase()
            .replace(/ü/g, 'u');
    }
    
    // ========== ПОЛУЧЕНИЕ СЛОВ ИЗ БАЗЫ ==========
    function getAllWordsFromDB() {
        const words = [];
        if (typeof frequencyDB !== 'undefined' && frequencyDB.length) {
            for (const word of frequencyDB) {
                if (word.char && word.pinyin && word.meaning) {
                    words.push({
                        char: word.char,
                        pinyin: word.pinyin,
                        meaning: word.meaning,
                        pinyinNoTones: removeTones(word.pinyin)
                    });
                }
            }
        }
        return words;
    }
    
    function getWordsForLevel(level) {
        const allWords = getAllWordsFromDB();
        if (allWords.length === 0) return [];
        
        if (level === 0) return allWords;
        const limits = { 1: 6, 2: 12, 3: 20 };
        const limit = limits[level] || 6;
        const shuffled = [...allWords];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, Math.min(limit, shuffled.length));
    }
    
    // ========== ОБНОВЛЕНИЕ СТАТИСТИКИ ==========
    function updateStats() {
        if (scoreValue) scoreValue.textContent = totalScore;
        if (correctValue) correctValue.textContent = correctCount;
        if (wrongValue) wrongValue.textContent = wrongCount;
        if (streakValue) streakValue.textContent = streak;
    }
    
    // ========== ПОКАЗАТЬ РЕЗУЛЬТАТ ==========
    function showResult(isCorrect, userAnswer, correctAnswer) {
        answered = true;
        lastUserAnswer = userAnswer;
        
        const input = document.getElementById('pinyinInput');
        if (input) {
            input.disabled = true;
            if (isCorrect) {
                input.classList.add('correct');
            } else {
                input.classList.add('wrong');
            }
        }
        
        const checkBtn = document.getElementById('checkBtn');
        if (checkBtn) checkBtn.disabled = true;
        
        if (isCorrect) {
            const points = 10 + Math.min(streak, 15);
            totalScore += points;
            correctCount++;
            streak++;
            if (messageDiv) {
                messageDiv.textContent = `✅ Правильно! +${points} очков!`;
                messageDiv.style.color = '#4CAF50';
            }
        } else {
            wrongCount++;
            streak = 0;
            if (messageDiv) {
                messageDiv.textContent = `❌ Неправильно`;
                messageDiv.style.color = '#e94560';
            }
        }
        
        updateStats();
        
        const resultBox = document.getElementById('resultBox');
        if (resultBox) {
            resultBox.style.display = 'block';
            resultBox.innerHTML = `
                <div class="result-correct">${isCorrect ? '🎉 Верно!' : '📖 Правильный ответ:'}</div>
                <div class="result-pinyin">${currentWord.pinyin}</div>
                ${!isCorrect ? `<div class="user-answer">📝 Ваш ответ: ${userAnswer || '(пусто)'}</div>` : ''}
                <div style="margin-top: 0.8rem; display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap;">
                    <button class="speak-btn" id="speakMyAnswerBtn">🔊 Мой ответ</button>
                    <button class="speak-btn" id="speakCorrectBtn" style="background:#FF8C42;">🔊 Правильный</button>
                    <button class="speak-btn" id="speakCharBtn" style="background:#5D9B4B;">🔊 Иероглиф</button>
                </div>
            `;
            
            const speakMyAnswerBtn = document.getElementById('speakMyAnswerBtn');
            const speakCorrectBtn = document.getElementById('speakCorrectBtn');
            const speakCharBtn = document.getElementById('speakCharBtn');
            
            if (speakMyAnswerBtn) {
                speakMyAnswerBtn.onclick = () => speakChinese(userAnswer);
            }
            if (speakCorrectBtn) {
                speakCorrectBtn.onclick = () => speakChinese(currentWord.pinyin);
            }
            if (speakCharBtn) {
                speakCharBtn.onclick = () => speakChar(currentWord.char);
            }
        }
    }
    
    // ========== ПРОВЕРКА ОТВЕТА ==========
    function checkAnswer() {
        if (answered || !currentWord) return;
        
        const input = document.getElementById('pinyinInput');
        if (!input) return;
        
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = currentWord.pinyinNoTones;
        const isCorrect = (userAnswer === correctAnswer);
        
        showResult(isCorrect, userAnswer, correctAnswer);
    }
    
    // ========== НЕ ЗНАЮ ==========
    function dontKnow() {
        if (answered || !currentWord) return;
        
        const input = document.getElementById('pinyinInput');
        const userAnswer = input ? input.value.trim().toLowerCase() : '';
        
        if (input) {
            input.disabled = true;
            input.classList.add('wrong');
        }
        
        const checkBtn = document.getElementById('checkBtn');
        if (checkBtn) checkBtn.disabled = true;
        
        wrongCount++;
        streak = 0;
        updateStats();
        
        if (messageDiv) {
            messageDiv.textContent = `📖 Правильный ответ: ${currentWord.pinyinNoTones}`;
            messageDiv.style.color = '#FFD966';
        }
        
        const resultBox = document.getElementById('resultBox');
        if (resultBox) {
            resultBox.style.display = 'block';
            resultBox.innerHTML = `
                <div class="result-correct">📖 Правильный ответ:</div>
                <div class="result-pinyin">${currentWord.pinyin}</div>
                ${userAnswer ? `<div class="user-answer">📝 Ваш ответ: ${userAnswer}</div>` : ''}
                <div style="margin-top: 0.8rem; display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap;">
                    ${userAnswer ? `<button class="speak-btn" id="speakMyAnswerBtn">🔊 Мой ответ</button>` : ''}
                    <button class="speak-btn" id="speakCorrectBtn" style="background:#FF8C42;">🔊 Правильный</button>
                    <button class="speak-btn" id="speakCharBtn" style="background:#5D9B4B;">🔊 Иероглиф</button>
                </div>
            `;
            
            if (userAnswer) {
                const speakMyAnswerBtn = document.getElementById('speakMyAnswerBtn');
                if (speakMyAnswerBtn) speakMyAnswerBtn.onclick = () => speakChinese(userAnswer);
            }
            const speakCorrectBtn = document.getElementById('speakCorrectBtn');
            const speakCharBtn = document.getElementById('speakCharBtn');
            
            if (speakCorrectBtn) speakCorrectBtn.onclick = () => speakChinese(currentWord.pinyin);
            if (speakCharBtn) speakCharBtn.onclick = () => speakChar(currentWord.char);
        }
        
        answered = true;
    }
    
    // ========== ПОКАЗ СЛЕДУЮЩЕГО СЛОВА ==========
    function nextWord() {
        if (!gameWords.length) {
            if (gameArea) {
                gameArea.innerHTML = '<div class="question-box"><p style="color:#FFD966; text-align:center;">⚠️ Нет слов в базе! Проверьте frequency-db.js</p></div>';
            }
            return;
        }
        
        const randomIndex = Math.floor(Math.random() * gameWords.length);
        currentWord = { ...gameWords[randomIndex] };
        answered = false;
        lastUserAnswer = '';
        
        if (gameArea) {
            gameArea.innerHTML = `
                <div class="question-box">
                    <div class="question-char" onclick="speakChar('${currentWord.char.replace(/'/g, "\\'")}')">${currentWord.char}</div>
                    <div class="question-meaning">${currentWord.meaning}</div>
                    <div class="input-wrapper">
                        <input type="text" class="dictant-input" id="pinyinInput" 
                               placeholder="введите пиньинь..." autocomplete="off">
                    </div>
                    <div class="action-buttons">
                        <button class="check-btn" id="checkBtn">✅ Проверить</button>
                    </div>
                    <div class="result-box" id="resultBox" style="display:none;"></div>
                </div>
            `;
            
            const input = document.getElementById('pinyinInput');
            const checkBtn = document.getElementById('checkBtn');
            
            if (input) {
                input.focus();
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !answered) {
                        e.preventDefault();
                        checkAnswer();
                    }
                });
            }
            
            if (checkBtn) {
                checkBtn.onclick = () => checkAnswer();
            }
        }
        
        if (messageDiv) messageDiv.textContent = '';
    }
    
    // ========== СБРОС ИГРЫ ==========
    function resetGame() {
        totalScore = 0;
        correctCount = 0;
        wrongCount = 0;
        streak = 0;
        answered = false;
        
        updateStats();
        gameWords = getWordsForLevel(currentLevel);
        if (gameWords.length === 0) {
            if (gameArea) {
                gameArea.innerHTML = '<div class="question-box"><p style="color:#FFD966;">⚠️ База данных не загружена. Проверьте файл frequency-db.js</p></div>';
            }
            return;
        }
        nextWord();
    }
    
    // ========== СМЕНА УРОВНЯ ==========
    function setLevel(level) {
        currentLevel = level;
        document.querySelectorAll('.level-btn').forEach(btn => {
            const btnLevel = parseInt(btn.dataset.level);
            if (btnLevel === level) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        resetGame();
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function initGame() {
        gameArea = document.getElementById('gameArea');
        scoreValue = document.getElementById('scoreValue');
        correctValue = document.getElementById('correctValue');
        wrongValue = document.getElementById('wrongValue');
        streakValue = document.getElementById('streakValue');
        nextBtn = document.getElementById('nextBtn');
        resetBtn = document.getElementById('resetBtn');
        dontKnowBtn = document.getElementById('dontKnowBtn');
        messageDiv = document.getElementById('message');
        
        if (typeof frequencyDB === 'undefined') {
            if (gameArea) {
                gameArea.innerHTML = '<div class="question-box"><p style="color:#FFD966;">❌ Ошибка: frequency-db.js не загружен!</p></div>';
            }
            return;
        }
        
        gameWords = getWordsForLevel(currentLevel);
        if (gameWords.length === 0) {
            if (gameArea) {
                gameArea.innerHTML = '<div class="question-box"><p style="color:#FFD966;">⚠️ Нет слов в базе данных</p></div>';
            }
            return;
        }
        
        if (nextBtn) nextBtn.onclick = () => {
            if (!answered) {
                if (messageDiv) {
                    messageDiv.textContent = '⚠️ Сначала проверьте ответ или нажмите "Не знаю"';
                    messageDiv.style.color = '#FFD966';
                    setTimeout(() => { if (messageDiv) messageDiv.textContent = ''; }, 1500);
                }
                return;
            }
            nextWord();
        };
        
        if (resetBtn) resetBtn.onclick = () => resetGame();
        if (dontKnowBtn) dontKnowBtn.onclick = () => dontKnow();
        
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = () => setLevel(parseInt(btn.dataset.level));
        });
        
        nextWord();
    }
    
    // Запускаем игру
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initGame);
    } else {
        initGame();
    }
</script>
</body>
</html>
