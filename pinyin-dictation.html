<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎯 Диктант пиньиня | Весёлый китайский</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #2d6a4f 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
            padding: 1rem; min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .hero {
            text-align: center;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            border-radius: 60px; padding: 1.2rem; margin-bottom: 1rem;
            box-shadow: 0 15px 0 #C16F1A; color: #5a2e0e;
        }
        .hero h1 { font-size: 1.5rem; }
        .hero p { font-size: 0.8rem; margin-top: 0.3rem; }
        .back-btn {
            display: inline-block; background: white; color: #e67e22;
            text-decoration: none; padding: 0.4rem 1.2rem; border-radius: 40px;
            font-weight: bold; margin-top: 0.5rem; font-size: 0.85rem;
            box-shadow: 0 4px 0 #ccc; transition: 0.05s;
        }
        .back-btn:active { transform: translateY(2px); }
        
        .level-selector {
            display: flex; gap: 0.5rem; justify-content: center;
            margin-bottom: 1rem; flex-wrap: wrap;
        }
        .level-btn {
            background: #2b4f3a; color: #FFE0A3; border: 2px solid #FFB347;
            padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer;
            font-weight: bold; font-size: 0.8rem;
        }
        .level-btn.active {
            background: #FFB347; color: #1a472a;
        }
        
        .score-bar {
            display: flex; justify-content: center; gap: 1rem;
            margin-bottom: 1rem; flex-wrap: wrap;
        }
        .score-card {
            background: #2b4f3a; padding: 0.4rem 1rem; border-radius: 30px;
            color: #FFE0A3; font-weight: bold;
        }
        .score-card span { color: #FFD966; font-size: 1.3rem; margin-left: 0.3rem; }
        
        .game-area {
            background: #3d2a1a; border-radius: 40px; padding: 1.5rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 10px 0 #2a1a0e;
            min-height: 350px;
        }
        
        .question-box {
            text-align: center; padding: 1rem;
        }
        .question-char {
            font-size: 5rem; font-family: 'Noto Sans SC', monospace;
            background: white; display: inline-block; padding: 0.5rem 1.5rem;
            border-radius: 60px; color: #A64B2A; margin: 0.5rem 0;
            box-shadow: 0 6px 0 #D98F33; cursor: pointer;
        }
        .question-meaning {
            font-size: 1.2rem; background: #FFE0C0; display: inline-block;
            padding: 0.3rem 1.2rem; border-radius: 40px; margin: 0.5rem 0;
            color: #A64B2A;
        }
        
        .dictant-input {
            width: 100%; max-width: 300px; padding: 0.8rem 1rem;
            font-size: 1.2rem; text-align: center; border-radius: 50px;
            border: 3px solid #FFB347; background: white; outline: none;
            margin: 1rem auto; display: block; font-family: monospace;
        }
        .dictant-input:focus { border-color: #4CAF50; }
        .dictant-input.correct { border-color: #4CAF50; background: #e8f5e9; }
        .dictant-input.wrong { border-color: #e94560; background: #ffebee; }
        
        .result-box {
            background: #2b4f3a; border-radius: 30px; padding: 1rem;
            margin: 1rem 0; text-align: center;
        }
        .result-correct {
            font-size: 1.3rem; color: #FFD966; margin-bottom: 0.5rem;
        }
        .result-pinyin {
            font-size: 1.8rem; font-weight: bold; color: #FFB347;
            font-family: monospace;
        }
        .buttons {
            display: flex; justify-content: center; gap: 1rem;
            flex-wrap: wrap; margin-top: 1rem;
        }
        .btn {
            background: linear-gradient(135deg, #FF8C42, #FF6B35);
            border: none; padding: 0.7rem 1.5rem; border-radius: 40px;
            font-weight: bold; color: white; cursor: pointer;
            box-shadow: 0 4px 0 #B45F1B; transition: 0.05s;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #B45F1B; }
        .btn.secondary { background: #4CAF50; box-shadow: 0 4px 0 #2E7D32; }
        
        .speak-btn {
            background: #5D9B4B; border: none; padding: 0.5rem 1rem;
            border-radius: 40px; cursor: pointer; font-size: 1rem;
            box-shadow: 0 3px 0 #3A6B2E; margin-left: 0.5rem;
        }
        .message { text-align: center; margin-top: 0.5rem; color: #FFD966; }
        
        @media (max-width: 550px) {
            .question-char { font-size: 3.5rem; }
            .result-pinyin { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🎯 Диктант пиньиня</h1>
        <p>Напиши пиньинь без тонов → узнай правильный с тонами + озвучка</p>
        <a href="index.html" class="back-btn">🏠 На главную</a>
    </div>
    
    <div class="level-selector" id="levelSelector">
        <button class="level-btn active" data-level="1">🍃 6 слов</button>
        <button class="level-btn" data-level="2">🌿 12 слов</button>
        <button class="level-btn" data-level="3">🔥 20 слов</button>
        <button class="level-btn" data-level="0">🏆 ВСЕ слова</button>
    </div>
    
    <div class="score-bar">
        <div class="score-card">🏆 Счёт: <span id="scoreValue">0</span></div>
        <div class="score-card">✅ Верно: <span id="correctValue">0</span></div>
        <div class="score-card">❌ Ошибок: <span id="wrongValue">0</span></div>
        <div class="score-card">🔥 Серия: <span id="streakValue">0</span></div>
    </div>
    
    <div class="game-area" id="gameArea">
        <div class="question-box" id="questionBox"></div>
    </div>
    
    <div class="buttons">
        <button class="btn" id="nextBtn">▶ Следующее</button>
        <button class="btn secondary" id="resetBtn">🔄 Сброс</button>
    </div>
    <div class="message" id="message"></div>
</div>

<script src="frequency-db.js"></script>
<script>
    // ========== ДАННЫЕ ДЛЯ ИГРЫ ==========
    let gameWords = [];        // массив слов для текущего уровня
    let currentWord = null;    // текущее слово
    let answered = false;       // отвечено ли на текущий вопрос
    let currentLevel = 1;       // текущий уровень (1,2,3,0 - все)
    
    // Статистика
    let totalScore = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let streak = 0;
    
    // DOM элементы
    const gameArea = document.getElementById('gameArea');
    const scoreValue = document.getElementById('scoreValue');
    const correctValue = document.getElementById('correctValue');
    const wrongValue = document.getElementById('wrongValue');
    const streakValue = document.getElementById('streakValue');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const messageDiv = document.getElementById('message');
    
    // ========== ФУНКЦИЯ УДАЛЕНИЯ ТОНОВ ==========
    function removeTones(pinyin) {
        if (!pinyin) return '';
        return pinyin
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase()
            .replace(/ü/g, 'u');
    }
    
    // ========== ПОЛУЧЕНИЕ СЛОВ ИЗ БАЗЫ ==========
    function getAllWordsFromDB() {
        const words = [];
        if (typeof frequencyDB !== 'undefined' && frequencyDB.length) {
            for (const word of frequencyDB) {
                if (word.char && word.pinyin && word.meaning) {
                    words.push({
                        char: word.char,
                        pinyin: word.pinyin,
                        meaning: word.meaning,
                        pinyinNoTones: removeTones(word.pinyin)
                    });
                }
            }
        }
        return words;
    }
    
    function getWordsForLevel(level) {
        const allWords = getAllWordsFromDB();
        if (level === 0) return allWords;
        const limits = { 1: 6, 2: 12, 3: 20 };
        const limit = limits[level] || 6;
        // Перемешиваем и берём первые limit слов
        const shuffled = [...allWords];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, limit);
    }
    
    // ========== ОЗВУЧКА ==========
    function speakChinese(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.7;
        window.speechSynthesis.speak(utterance);
    }
    
    // ========== ОБНОВЛЕНИЕ СТАТИСТИКИ ==========
    function updateStats() {
        scoreValue.textContent = totalScore;
        correctValue.textContent = correctCount;
        wrongValue.textContent = wrongCount;
        streakValue.textContent = streak;
    }
    
    // ========== ПОКАЗ СЛЕДУЮЩЕГО СЛОВА ==========
    function nextWord() {
        if (!gameWords.length) {
            gameArea.innerHTML = '<div class="question-box"><p style="color:#FFD966; text-align:center;">⚠️ Нет слов в базе! Проверьте frequency-db.js</p></div>';
            return;
        }
        
        // Выбираем случайное слово из списка
        const randomIndex = Math.floor(Math.random() * gameWords.length);
        currentWord = { ...gameWords[randomIndex] };
        answered = false;
        
        // Отрисовываем вопрос
        gameArea.innerHTML = `
            <div class="question-box">
                <div class="question-char" onclick="speakChinese('${currentWord.char}')">${currentWord.char}</div>
                <div class="question-meaning">${currentWord.meaning}</div>
                <input type="text" class="dictant-input" id="pinyinInput" 
                       placeholder="введите пиньинь без тонов..." autocomplete="off">
                <div class="result-box" id="resultBox" style="display:none;"></div>
                <div class="buttons" style="margin-top:0.5rem;">
                    <button class="btn" id="checkBtn">✅ Проверить</button>
                </div>
            </div>
        `;
        
        const input = document.getElementById('pinyinInput');
        const checkBtn = document.getElementById('checkBtn');
        
        if (input) {
            input.focus();
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !answered) checkAnswer();
            });
        }
        if (checkBtn) checkBtn.onclick = () => checkAnswer();
        
        // Скрываем сообщение
        messageDiv.textContent = '';
    }
    
    // ========== ПРОВЕРКА ОТВЕТА ==========
    function checkAnswer() {
        if (answered || !currentWord) return;
        
        const input = document.getElementById('pinyinInput');
        if (!input) return;
        
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = currentWord.pinyinNoTones;
        const isCorrect = (userAnswer === correctAnswer);
        
        answered = true;
        input.disabled = true;
        
        // Подсвечиваем поле ввода
        if (isCorrect) {
            input.classList.add('correct');
            // Начисляем очки
            const points = 10 + Math.min(streak, 15);
            totalScore += points;
            correctCount++;
            streak++;
            messageDiv.textContent = `✅ Правильно! +${points} очков!`;
            messageDiv.style.color = '#4CAF50';
        } else {
            input.classList.add('wrong');
            wrongCount++;
            streak = 0;
            messageDiv.textContent = `❌ Неправильно. Правильный ответ: ${correctAnswer}`;
            messageDiv.style.color = '#e94560';
        }
        
        updateStats();
        
        // Показываем результат с тонами и озвучкой
        const resultBox = document.getElementById('resultBox');
        if (resultBox) {
            resultBox.style.display = 'block';
            resultBox.innerHTML = `
                <div class="result-correct">${isCorrect ? '🎉 Верно!' : '📖 Правильный ответ:'}</div>
                <div class="result-pinyin">${currentWord.pinyin}</div>
                <div style="margin-top: 0.5rem;">
                    <button class="speak-btn" id="speakResultBtn">🔊 Слушать</button>
                    <button class="speak-btn" id="speakCharBtn" style="background:#FF8C42;">🔊 Иероглиф</button>
                </div>
            `;
            const speakResultBtn = document.getElementById('speakResultBtn');
            const speakCharBtn = document.getElementById('speakCharBtn');
            if (speakResultBtn) speakResultBtn.onclick = () => speakChinese(currentWord.pinyin);
            if (speakCharBtn) speakCharBtn.onclick = () => speakChinese(currentWord.char);
        }
    }
    
    // ========== СБРОС ИГРЫ ==========
    function resetGame() {
        totalScore = 0;
        correctCount = 0;
        wrongCount = 0;
        streak = 0;
        answered = false;
        updateStats();
        gameWords = getWordsForLevel(currentLevel);
        if (gameWords.length === 0) {
            gameArea.innerHTML = '<div class="question-box"><p style="color:#FFD966;">⚠️ База данных не загружена. Проверьте файл frequency-db.js</p></div>';
            return;
        }
        nextWord();
    }
    
    // ========== СМЕНА УРОВНЯ ==========
    function setLevel(level) {
        currentLevel = level;
        // Обновляем активную кнопку
        document.querySelectorAll('.level-btn').forEach(btn => {
            if (parseInt(btn.dataset.level) === level) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        resetGame();
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function initGame() {
        // Проверяем загрузку базы
        if (typeof frequencyDB === 'undefined') {
            gameArea.innerHTML = '<div class="question-box"><p style="color:#FFD966;">❌ Ошибка: frequency-db.js не загружен!</p></div>';
            return;
        }
        
        gameWords = getWordsForLevel(currentLevel);
        if (gameWords.length === 0) {
            gameArea.innerHTML = '<div class="question-box"><p style="color:#FFD966;">⚠️ Нет слов в базе данных</p></div>';
            return;
        }
        
        nextWord();
    }
    
    // ========== ПОДКЛЮЧЕНИЕ ОБРАБОТЧИКОВ ==========
    nextBtn.onclick = () => {
        if (!answered) {
            messageDiv.textContent = '⚠️ Сначала проверьте текущий ответ!';
            setTimeout(() => { if (messageDiv) messageDiv.textContent = ''; }, 1500);
            return;
        }
        nextWord();
    };
    resetBtn.onclick = () => resetGame();
    
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.onclick = () => setLevel(parseInt(btn.dataset.level));
    });
    
    // Запускаем игру
    const waitForDB = setInterval(() => {
        if (typeof frequencyDB !== 'undefined' || performance.now() > 2500) {
            clearInterval(waitForDB);
            initGame();
        }
    }, 150);
</script>
</body>
</html>
