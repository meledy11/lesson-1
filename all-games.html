<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮 ДИКТАНТ + СОБЕРИ ФРАЗУ | Весёлый китайский</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
            padding: 1rem;
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        .hero {
            text-align: center;
            background: linear-gradient(135deg, #e94560, #c23152);
            border-radius: 60px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: 0 15px 0 #8b1e3f;
        }
        .hero h1 { font-size: 1.5rem; }
        .back-btn {
            display: inline-block;
            background: white;
            color: #e94560;
            text-decoration: none;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 #ccc;
        }
        .back-btn:active { transform: translateY(2px); }
        
        .game-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .game-card {
            background: #2a2a4a;
            border-radius: 30px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            border: 3px solid #5a5a8a;
        }
        .game-card:hover { background: #3a3a6a; }
        .game-card:active { transform: scale(0.97); }
        .game-card .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .game-card h3 { font-size: 1.1rem; margin-bottom: 0.3rem; }
        .game-card p { font-size: 0.8rem; color: #aaa; }
        
        .game-section { display: none; }
        .game-section.active { display: block; }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .game-header button {
            background: #2a2a4a;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .score-bar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        .score-bar span {
            background: #1a1a3e;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
        }
        
        .game-area {
            background: #2a2a4a;
            border-radius: 40px;
            padding: 1.5rem;
            min-height: 300px;
            box-shadow: 0 10px 0 #1a1a3e;
            text-align: center;
        }
        
        .phrase-display {
            font-size: 2rem;
            font-family: 'Noto Sans SC', monospace;
            margin: 1rem 0;
            background: #1a1a3e;
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            letter-spacing: 0.1rem;
        }
        
        .dictant-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.3rem;
            border-radius: 20px;
            border: 3px solid #5a5a8a;
            background: #1a1a3e;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', monospace;
            margin: 1rem 0;
            outline: none;
        }
        .dictant-input:focus { border-color: #ffb347; }
        .dictant-input.correct { border-color: #4CAF50; background: #1a3e1a; }
        .dictant-input.wrong { border-color: #e94560; background: #3e1a1a; }
        
        /* Стили для Собери фразу */
        .builder-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            min-height: 60px;
            padding: 0.5rem;
            background: #1a1a3e;
            border-radius: 20px;
            margin: 1rem 0;
            border: 2px dashed #5a5a8a;
        }
        .builder-slot {
            background: #3a3a6a;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 15px;
            font-size: 1.2rem;
            font-family: 'Noto Sans SC', monospace;
            cursor: pointer;
        }
        .builder-slot.filled { background: #ffb347; color: #1a1a2e; }
        .builder-slot.empty { background: #2a2a4a; border: 2px dashed #5a5a8a; color: #aaa; }
        
        .builder-words {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .builder-word {
            background: #3a3a6a;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Noto Sans SC', monospace;
            border: 2px solid #5a5a8a;
            transition: 0.1s;
        }
        .builder-word:hover { background: #4a4a8a; }
        .builder-word.used { opacity: 0.3; cursor: default; }
        
        .level-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .level-btn {
            background: #2a2a4a;
            color: white;
            border: 2px solid #5a5a8a;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .level-btn.active {
            background: #ffb347;
            color: #1a1a2e;
            border-color: #ffb347;
        }
        
        .btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 0.7rem 1.3rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 #8b1e3f;
            margin: 0.3rem;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8b1e3f; }
        .btn.secondary { background: #ffb347; box-shadow: 0 4px 0 #b87a2b; }
        .btn.small { padding: 0.4rem 1rem; font-size: 0.75rem; }
        
        .play-btn {
            background: #ffb347;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin: 0.3rem;
        }
        .play-btn:active { transform: scale(0.95); }
        
        .result-msg {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0.5rem 0;
            min-height: 1.8rem;
        }
        .result-msg.ok { color: #4CAF50; }
        .result-msg.fail { color: #ff6b6b; }
        
        .loading-msg {
            text-align: center;
            padding: 2rem;
            color: #ffb347;
            font-size: 1.2rem;
        }
        
        @media (max-width: 600px) {
            .game-menu { grid-template-columns: 1fr; }
            .phrase-display { font-size: 1.5rem; }
            .builder-word { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>✍️🧩 ДИКТАНТ + СОБЕРИ ФРАЗУ</h1>
        <a href="index.html" class="back-btn">🏠 На главную</a>
    </div>
    
    <div id="loadingMsg" class="loading-msg">⏳ Загружаю базу фраз...</div>
    
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div class="game-menu" id="mainMenu" style="display:none;">
        <div class="game-card" onclick="openGame('dictant')">
            <div class="icon">✍️</div>
            <h3>Пиньинь-диктант</h3>
            <p>Слушай фразу → пиши пиньинь</p>
        </div>
        <div class="game-card" onclick="openGame('builder')">
            <div class="icon">🧩</div>
            <h3>Собери фразу</h3>
            <p>Расставь слова в правильном порядке</p>
        </div>
    </div>
    
    <!-- ИГРА 1: ПИНЬИНЬ-ДИКТАНТ -->
    <div class="game-section" id="section-dictant">
        <div class="game-header">
            <strong>✍️ Пиньинь-диктант</strong>
            <button onclick="openGame('menu')">↩ Назад</button>
        </div>
        
        <div class="level-selector" id="dcLevelSelector">
            <button class="level-btn active" data-level="1">⭐ Ур.1</button>
            <button class="level-btn" data-level="2">⭐⭐ Ур.2</button>
            <button class="level-btn" data-level="3">⭐⭐⭐ Ур.3</button>
            <button class="level-btn" data-level="0">🎯 Все</button>
        </div>
        
        <div class="score-bar">
            <span>🏆 <strong id="dcScore">0</strong></span>
            <span>✅ <strong id="dcCorrect">0</strong></span>
            <span>❌ <strong id="dcWrong">0</strong></span>
            <span>🔥 <strong id="dcStreak">0</strong></span>
        </div>
        
        <div class="game-area" id="dcGameArea">
            <p style="padding:2rem; color:#ffb347;">Готово!</p>
        </div>
        
        <div style="text-align:center; margin-top:1rem;">
            <button class="btn" onclick="dcNext()">▶ Следующая</button>
            <button class="btn secondary" onclick="dcReset()">🔄 Сбросить</button>
        </div>
    </div>
    
    <!-- ИГРА 2: СОБЕРИ ФРАЗУ -->
    <div class="game-section" id="section-builder">
        <div class="game-header">
            <strong>🧩 Собери фразу</strong>
            <button onclick="openGame('menu')">↩ Назад</button>
        </div>
        
        <div class="level-selector" id="pbLevelSelector">
            <button class="level-btn active" data-level="1">⭐ Ур.1</button>
            <button class="level-btn" data-level="2">⭐⭐ Ур.2</button>
            <button class="level-btn" data-level="3">⭐⭐⭐ Ур.3</button>
            <button class="level-btn" data-level="0">🎯 Все</button>
        </div>
        
        <div class="score-bar">
            <span>🏆 <strong id="pbScore">0</strong></span>
            <span>✅ <strong id="pbCorrect">0</strong></span>
            <span>❌ <strong id="pbWrong">0</strong></span>
            <span>🔥 <strong id="pbStreak">0</strong></span>
        </div>
        
        <div class="game-area" id="pbGameArea">
            <p style="padding:2rem; color:#ffb347;">Готово!</p>
        </div>
        
        <div style="text-align:center; margin-top:1rem;">
            <button class="btn" onclick="pbNext()">▶ Следующая</button>
            <button class="btn secondary" onclick="pbReset()">🔄 Сбросить</button>
        </div>
    </div>
</div>

<script src="phrases-db.js"></script>
<script>
    // ========== ОЖИДАНИЕ ЗАГРУЗКИ БАЗЫ ==========
    function waitForBase(callback) {
        var attempts = 0;
        var checker = setInterval(function() {
            attempts++;
            if (typeof phrasesDB !== 'undefined') {
                clearInterval(checker);
                callback();
                return;
            }
            if (attempts >= 50) {
                clearInterval(checker);
                document.getElementById('loadingMsg').innerHTML = 
                    '<p style="color:#e94560;">❌ phrases-db.js не загружен!</p>';
            }
        }, 200);
    }
    
    waitForBase(function() {
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'grid';
    });
    
    // ========== НАВИГАЦИЯ ==========
    function openGame(game) {
        document.querySelectorAll('.game-section').forEach(function(s) { s.classList.remove('active'); });
        if (game === 'menu') {
            document.getElementById('mainMenu').style.display = 'grid';
        } else {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('section-' + game).classList.add('active');
            if (game === 'dictant') initDictant();
            if (game === 'builder') initBuilder();
        }
    }
    
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN';
        u.rate = 0.7;
        setTimeout(function() { window.speechSynthesis.speak(u); }, 100);
    }
    
    function getPhrases(level) {
        if (level === 0) return phrasesDB.slice();
        return phrasesDB.filter(function(p) { return p.level === level; });
    }
    
    // ==================== ИГРА 1: ПИНЬИНЬ-ДИКТАНТ ====================
    var dcLevel = 1;
    var dcScore = 0, dcCorrect = 0, dcWrong = 0, dcStreak = 0;
    var dcCurrent = null, dcAnswered = false;
    var dcPhrases = [];
    
    function initDictant() {
        dcPhrases = getPhrases(dcLevel);
        dcUpdateScore();
        dcNext();
        
        document.querySelectorAll('#dcLevelSelector .level-btn').forEach(function(btn) {
            btn.onclick = function() {
                document.querySelectorAll('#dcLevelSelector .level-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                dcLevel = parseInt(this.dataset.level);
                dcPhrases = getPhrases(dcLevel);
                dcReset();
            };
        });
    }
    
    function dcNext() {
        if (dcPhrases.length === 0) {
            document.getElementById('dcGameArea').innerHTML = '<p style="padding:2rem; color:#ffb347;">⚠️ Нет фраз</p>';
            return;
        }
        dcCurrent = dcPhrases[Math.floor(Math.random() * dcPhrases.length)];
        dcAnswered = false;
        
        var html = '<p style="color:#ffb347;">Напишите пиньинь:</p>';
        html += '<div class="phrase-display">' + dcCurrent.chinese + '</div>';
        html += '<p style="color:#aaa;">' + dcCurrent.russian + '</p>';
        html += '<input type="text" class="dictant-input" id="dcInput" placeholder="пиньинь..." autocomplete="off">';
        html += '<div class="result-msg" id="dcMsg"></div>';
        html += '<button class="btn" onclick="dcCheck()">✅ Проверить</button> ';
        html += '<button class="play-btn" onclick="speak(\'' + dcCurrent.chinese + '\')">🔊 Слушать</button>';
        
        document.getElementById('dcGameArea').innerHTML = html;
        
        var input = document.getElementById('dcInput');
        if (input) {
            input.addEventListener('keydown', function(e) { if (e.key === 'Enter') dcCheck(); });
            setTimeout(function() { input.focus(); }, 100);
        }
        setTimeout(function() { speak(dcCurrent.chinese); }, 500);
    }
    
    function dcCheck() {
        if (dcAnswered || !dcCurrent) return;
        var input = document.getElementById('dcInput');
        var msgEl = document.getElementById('dcMsg');
        if (!input) return;
        
        var userAnswer = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
        var correctAnswer = dcCurrent.pinyin.toLowerCase().replace(/\s+/g, ' ');
        
        dcAnswered = true;
        input.disabled = true;
        
        var userNoTone = userAnswer.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        var correctNoTone = correctAnswer.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        
        if (userNoTone === correctNoTone || userAnswer === correctAnswer) {
            input.classList.add('correct');
            dcScore += 20 + Math.min(dcStreak, 15);
            dcCorrect++; dcStreak++;
            if (msgEl) { msgEl.textContent = '✅ ' + correctAnswer; msgEl.className = 'result-msg ok'; }
        } else {
            input.classList.add('wrong');
            dcWrong++; dcStreak = 0;
            if (msgEl) { msgEl.textContent = '❌ ' + dcCurrent.pinyin; msgEl.className = 'result-msg fail'; }
        }
        dcUpdateScore();
    }
    
    function dcUpdateScore() {
        document.getElementById('dcScore').textContent = dcScore;
        document.getElementById('dcCorrect').textContent = dcCorrect;
        document.getElementById('dcWrong').textContent = dcWrong;
        document.getElementById('dcStreak').textContent = dcStreak;
    }
    
    function dcReset() { dcScore = 0; dcCorrect = 0; dcWrong = 0; dcStreak = 0; dcUpdateScore(); dcNext(); }
    
    // ==================== ИГРА 2: СОБЕРИ ФРАЗУ ====================
    var pbLevel = 1;
    var pbScore = 0, pbCorrect = 0, pbWrong = 0, pbStreak = 0;
    var pbCurrent = null, pbAnswered = false;
    var pbPhrases = [];
    var pbSlots = [];
    
    function initBuilder() {
        pbPhrases = getPhrases(pbLevel);
        pbUpdateScore();
        pbNext();
        
        document.querySelectorAll('#pbLevelSelector .level-btn').forEach(function(btn) {
            btn.onclick = function() {
                document.querySelectorAll('#pbLevelSelector .level-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                pbLevel = parseInt(this.dataset.level);
                pbPhrases = getPhrases(pbLevel);
                pbReset();
            };
        });
    }
    
    function pbNext() {
        if (pbPhrases.length === 0) {
            document.getElementById('pbGameArea').innerHTML = '<p style="padding:2rem; color:#ffb347;">⚠️ Нет фраз</p>';
            return;
        }
        pbCurrent = pbPhrases[Math.floor(Math.random() * pbPhrases.length)];
        pbAnswered = false;
        pbSlots = new Array(pbCurrent.words.length).fill(null);
        
        var shuffledWords = pbCurrent.words.slice().sort(function() { return Math.random() - 0.5; });
        
        var html = '<p style="color:#ffb347;">Соберите фразу:</p>';
        html += '<p style="font-size:1.3rem; color:white;">' + pbCurrent.russian + '</p>';
        html += '<div class="builder-slots" id="pbSlots">';
        for (var i = 0; i < pbCurrent.words.length; i++) {
            html += '<div class="builder-slot empty" onclick="pbRemoveSlot(' + i + ')" id="pbSlot' + i + '">_</div>';
        }
        html += '</div>';
        html += '<div class="result-msg" id="pbMsg"></div>';
        html += '<div class="builder-words" id="pbWords">';
        for (var j = 0; j < shuffledWords.length; j++) {
            html += '<div class="builder-word" onclick="pbPlaceWord(\'' + shuffledWords[j] + '\', this)" id="pbWord' + j + '">' + shuffledWords[j] + '</div>';
        }
        html += '</div>';
        html += '<button class="btn" onclick="pbCheck()">✅ Проверить</button> ';
        html += '<button class="btn secondary" onclick="pbClear()">🔄 Очистить</button> ';
        html += '<button class="play-btn" onclick="speak(\'' + pbCurrent.chinese + '\')">🔊 Слушать</button>';
        
        document.getElementById('pbGameArea').innerHTML = html;
    }
    
    function pbPlaceWord(word, btn) {
        if (pbAnswered) return;
        var emptySlot = -1;
        for (var i = 0; i < pbSlots.length; i++) {
            if (pbSlots[i] === null) { emptySlot = i; break; }
        }
        if (emptySlot === -1) return;
        
        pbSlots[emptySlot] = word;
        btn.classList.add('used');
        document.getElementById('pbSlot' + emptySlot).textContent = word;
        document.getElementById('pbSlot' + emptySlot).classList.remove('empty');
        document.getElementById('pbSlot' + emptySlot).classList.add('filled');
    }
    
    function pbRemoveSlot(index) {
        if (pbAnswered) return;
        if (pbSlots[index] === null) return;
        var word = pbSlots[index];
        pbSlots[index] = null;
        document.getElementById('pbSlot' + index).textContent = '_';
        document.getElementById('pbSlot' + index).classList.add('empty');
        document.getElementById('pbSlot' + index).classList.remove('filled');
        
        var wordBtns = document.querySelectorAll('#pbWords .builder-word');
        for (var i = 0; i < wordBtns.length; i++) {
            if (wordBtns[i].textContent === word && wordBtns[i].classList.contains('used')) {
                wordBtns[i].classList.remove('used');
                break;
            }
        }
    }
    
    function pbClear() {
        if (pbAnswered) return;
        for (var i = 0; i < pbSlots.length; i++) {
            if (pbSlots[i] !== null) {
                var word = pbSlots[i];
                pbSlots[i] = null;
                document.getElementById('pbSlot' + i).textContent = '_';
                document.getElementById('pbSlot' + i).classList.add('empty');
                document.getElementById('pbSlot' + i).classList.remove('filled');
                
                var wordBtns = document.querySelectorAll('#pbWords .builder-word');
                for (var j = 0; j < wordBtns.length; j++) {
                    if (wordBtns[j].textContent === word) { wordBtns[j].classList.remove('used'); break; }
                }
            }
        }
    }
    
    function pbCheck() {
        if (pbAnswered || !pbCurrent) return;
        
        var allFilled = true;
        for (var i = 0; i < pbSlots.length; i++) {
            if (pbSlots[i] === null) { allFilled = false; break; }
        }
        if (!allFilled) { alert('Заполните все слоты!'); return; }
        
        pbAnswered = true;
        var userAnswer = pbSlots.join('');
        var correctAnswer = pbCurrent.chinese;
        var msgEl = document.getElementById('pbMsg');
        
        var wordBtns = document.querySelectorAll('#pbWords .builder-word');
        for (var k = 0; k < wordBtns.length; k++) { wordBtns[k].style.pointerEvents = 'none'; }
        
        for (var j = 0; j < pbSlots.length; j++) {
            var slot = document.getElementById('pbSlot' + j);
            if (pbSlots[j] === pbCurrent.words[j]) {
                slot.style.background = '#4CAF50';
            } else {
                slot.style.background = '#e94560';
            }
        }
        
        if (userAnswer === correctAnswer) {
            pbScore += 20 + Math.min(pbStreak, 15);
            pbCorrect++; pbStreak++;
            if (msgEl) { msgEl.textContent = '✅ Правильно! ' + correctAnswer; msgEl.className = 'result-msg ok'; }
        } else {
            pbWrong++; pbStreak = 0;
            if (msgEl) { msgEl.textContent = '❌ Правильно: ' + correctAnswer; msgEl.className = 'result-msg fail'; }
        }
        pbUpdateScore();
    }
    
    function pbUpdateScore() {
        document.getElementById('pbScore').textContent = pbScore;
        document.getElementById('pbCorrect').textContent = pbCorrect;
        document.getElementById('pbWrong').textContent = pbWrong;
        document.getElementById('pbStreak').textContent = pbStreak;
    }
    
    function pbReset() { pbScore = 0; pbCorrect = 0; pbWrong = 0; pbStreak = 0; pbUpdateScore(); pbNext(); }
</script>
</body>
</html>
