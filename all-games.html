<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮 ДИКТАНТ + СОБЕРИ ФРАЗУ | Весёлый китайский</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
            padding: 1rem; min-height: 100vh; color: white;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .hero {
            text-align: center;
            background: linear-gradient(135deg, #e94560, #c23152);
            border-radius: 60px; padding: 1.2rem; margin-bottom: 1rem;
            box-shadow: 0 15px 0 #8b1e3f;
        }
        .hero h1 { font-size: 1.5rem; }
        .back-btn {
            display: inline-block; background: white; color: #e94560;
            text-decoration: none; padding: 0.4rem 1.2rem; border-radius: 40px;
            font-weight: bold; margin-top: 0.5rem; font-size: 0.85rem;
            box-shadow: 0 4px 0 #ccc;
        }
        .back-btn:active { transform: translateY(2px); }
        .game-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .game-card {
            background: #2a2a4a; border-radius: 30px; padding: 1.5rem;
            text-align: center; cursor: pointer; border: 3px solid #5a5a8a;
        }
        .game-card:hover { background: #3a3a6a; }
        .game-card:active { transform: scale(0.97); }
        .game-card .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .game-card h3 { font-size: 1.1rem; margin-bottom: 0.3rem; }
        .game-card p { font-size: 0.8rem; color: #aaa; }
        .game-section { display: none; }
        .game-section.active { display: block; }
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .game-header button {
            background: #2a2a4a; color: white; border: none;
            padding: 0.5rem 1rem; border-radius: 30px; cursor: pointer; font-size: 0.8rem;
        }
        .score-bar { display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1rem; font-size: 0.8rem; }
        .score-bar span { background: #1a1a3e; padding: 0.3rem 0.8rem; border-radius: 30px; }
        .game-area {
            background: #2a2a4a; border-radius: 40px; padding: 1.5rem;
            min-height: 300px; box-shadow: 0 10px 0 #1a1a3e; text-align: center;
        }
        .phrase-display {
            font-size: 3rem; font-family: 'Noto Sans SC', monospace; margin: 1.5rem 0;
            background: #1a1a3e; display: inline-block; padding: 1rem 2rem;
            border-radius: 30px; letter-spacing: 0.3rem; font-weight: bold;
        }
        .dictant-input {
            width: 100%; padding: 1rem; font-size: 1.5rem; border-radius: 20px;
            border: 3px solid #5a5a8a; background: #1a1a3e; color: white;
            text-align: center; font-family: 'Segoe UI', monospace; margin: 1rem 0; outline: none;
        }
        .dictant-input:focus { border-color: #ffb347; }
        .dictant-input.correct { border-color: #4CAF50; background: #1a3e1a; }
        .dictant-input.wrong { border-color: #e94560; background: #3e1a1a; }
        .builder-slots {
            display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center;
            min-height: 70px; padding: 1rem; background: #1a1a3e;
            border-radius: 20px; margin: 1rem 0; border: 2px dashed #5a5a8a;
        }
        .builder-slot {
            background: #3a3a6a; color: white; padding: 0.8rem 1.2rem;
            border-radius: 15px; font-size: 1.8rem; font-family: 'Noto Sans SC', monospace;
            cursor: pointer; font-weight: bold; min-width: 55px; text-align: center;
        }
        .builder-slot.filled { background: #ffb347; color: #1a1a2e; }
        .builder-slot.empty { background: #2a2a4a; border: 2px dashed #5a5a8a; color: #aaa; }
        .builder-words { display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; margin: 1rem 0; }
        .builder-word {
            background: #3a3a6a; color: white; padding: 0.8rem 1.2rem;
            border-radius: 15px; font-size: 1.8rem; cursor: pointer;
            font-family: 'Noto Sans SC', monospace; border: 2px solid #5a5a8a;
            font-weight: bold; min-width: 55px; text-align: center;
        }
        .builder-word:hover { background: #4a4a8a; }
        .builder-word.used { opacity: 0.3; cursor: default; }
        .level-selector { display: flex; gap: 0.4rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
        .level-btn {
            background: #2a2a4a; color: white; border: 2px solid #5a5a8a;
            padding: 0.4rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.75rem;
        }
        .level-btn.active { background: #ffb347; color: #1a1a2e; border-color: #ffb347; }
        .btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b); color: white;
            border: none; padding: 0.7rem 1.3rem; border-radius: 40px;
            font-weight: bold; cursor: pointer; font-size: 0.85rem;
            box-shadow: 0 4px 0 #8b1e3f; margin: 0.3rem;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8b1e3f; }
        .btn.secondary { background: #ffb347; box-shadow: 0 4px 0 #b87a2b; }
        .play-btn {
            background: #ffb347; border: none; padding: 0.5rem 1.5rem;
            border-radius: 25px; cursor: pointer; font-size: 1rem; font-weight: bold; margin: 0.3rem;
        }
        .play-btn:active { transform: scale(0.95); }
        .result-msg { font-size: 1.2rem; font-weight: bold; margin: 0.5rem 0; min-height: 2rem; }
        .result-msg.ok { color: #4CAF50; }
        .result-msg.fail { color: #ff6b6b; }
        @media (max-width: 600px) {
            .game-menu { grid-template-columns: 1fr; }
            .phrase-display { font-size: 2rem; }
            .builder-word, .builder-slot { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>✍️🧩 ДИКТАНТ + СОБЕРИ ФРАЗУ</h1>
        <a href="index.html" class="back-btn">🏠 На главную</a>
    </div>
    
    <div class="game-menu" id="mainMenu">
        <div class="game-card" onclick="openGame('dictant')">
            <div class="icon">✍️</div>
            <h3>Пиньинь-диктант</h3>
            <p>Слушай фразу → пиши пиньинь</p>
        </div>
        <div class="game-card" onclick="openGame('builder')">
            <div class="icon">🧩</div>
            <h3>Собери фразу</h3>
            <p>Расставь слова в правильном порядке</p>
        </div>
    </div>
    
    <!-- ДИКТАНТ -->
    <div class="game-section" id="section-dictant">
        <div class="game-header">
            <strong>✍️ Пиньинь-диктант</strong>
            <button onclick="openGame('menu')">↩ Назад</button>
        </div>
        <div class="level-selector" id="dcLevelSelector">
            <button class="level-btn active" data-level="1">⭐</button>
            <button class="level-btn" data-level="2">⭐⭐</button>
            <button class="level-btn" data-level="3">⭐⭐⭐</button>
            <button class="level-btn" data-level="4">⭐⭐⭐⭐</button>
            <button class="level-btn" data-level="5">⭐⭐⭐⭐⭐</button>
            <button class="level-btn" data-level="0">🎯</button>
        </div>
        <div class="score-bar">
            <span>🏆 <strong id="dcScore">0</strong></span>
            <span>✅ <strong id="dcCorrect">0</strong></span>
            <span>❌ <strong id="dcWrong">0</strong></span>
            <span>🔥 <strong id="dcStreak">0</strong></span>
        </div>
        <div class="game-area" id="dcGameArea"><p style="padding:2rem;">Готово!</p></div>
        <div style="text-align:center;margin-top:1rem;">
            <button class="btn" onclick="dcNext()">▶</button>
            <button class="btn secondary" onclick="dcReset()">🔄</button>
        </div>
    </div>
    
    <!-- СОБЕРИ ФРАЗУ -->
    <div class="game-section" id="section-builder">
        <div class="game-header">
            <strong>🧩 Собери фразу</strong>
            <button onclick="openGame('menu')">↩ Назад</button>
        </div>
        <div class="level-selector" id="pbLevelSelector">
            <button class="level-btn active" data-level="1">⭐</button>
            <button class="level-btn" data-level="2">⭐⭐</button>
            <button class="level-btn" data-level="3">⭐⭐⭐</button>
            <button class="level-btn" data-level="4">⭐⭐⭐⭐</button>
            <button class="level-btn" data-level="5">⭐⭐⭐⭐⭐</button>
            <button class="level-btn" data-level="0">🎯</button>
        </div>
        <div class="score-bar">
            <span>🏆 <strong id="pbScore">0</strong></span>
            <span>✅ <strong id="pbCorrect">0</strong></span>
            <span>❌ <strong id="pbWrong">0</strong></span>
            <span>🔥 <strong id="pbStreak">0</strong></span>
        </div>
        <div class="game-area" id="pbGameArea"><p style="padding:2rem;">Готово!</p></div>
        <div style="text-align:center;margin-top:1rem;">
            <button class="btn" onclick="pbNext()">▶</button>
            <button class="btn secondary" onclick="pbReset()">🔄</button>
        </div>
    </div>
</div>

<script src="phrases-db.js"></script>
<script>
    if (typeof phrasesDB === 'undefined') {
        document.body.innerHTML = '<div style="text-align:center;padding:3rem;color:#e94560;"><h2>❌ Ошибка!</h2><p>Файл <b>phrases-db.js</b> не найден или не загрузился.</p><a href="index.html" style="color:#ffb347;">На главную</a></div>';
    } else {

    function openGame(game) {
        document.querySelectorAll('.game-section').forEach(function(s) { s.classList.remove('active'); });
        if (game === 'menu') {
            document.getElementById('mainMenu').style.display = 'grid';
        } else {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('section-' + game).classList.add('active');
            if (game === 'dictant') initDictant();
            if (game === 'builder') initBuilder();
        }
    }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; u.rate = 0.7;
        setTimeout(function() { window.speechSynthesis.speak(u); }, 100);
    }

    function getPhrases(level) {
        if (level === 0) return phrasesDB.slice();
        return phrasesDB.filter(function(p) { return p.level === level; });
    }

    // ===== ДИКТАНТ =====
    var dcLevel = 1, dcScore = 0, dcCorrect = 0, dcWrong = 0, dcStreak = 0;
    var dcCurrent = null, dcAnswered = false, dcPhrases = [];

    function initDictant() {
        dcPhrases = getPhrases(dcLevel); dcUpdateScore(); dcNext();
        document.querySelectorAll('#dcLevelSelector .level-btn').forEach(function(btn) {
            btn.onclick = function() {
                document.querySelectorAll('#dcLevelSelector .level-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                dcLevel = parseInt(this.dataset.level);
                dcPhrases = getPhrases(dcLevel); dcReset();
            };
        });
    }

    function dcNext() {
        if (dcPhrases.length === 0) { document.getElementById('dcGameArea').innerHTML = '<p style="padding:2rem;">⚠️ Нет фраз</p>'; return; }
        dcCurrent = dcPhrases[Math.floor(Math.random() * dcPhrases.length)];
        dcAnswered = false;
        document.getElementById('dcGameArea').innerHTML = 
            '<p style="color:#ffb347;">Напишите пиньинь:</p>' +
            '<div class="phrase-display">' + dcCurrent.chinese + '</div>' +
            '<p style="color:#aaa;">' + dcCurrent.russian + '</p>' +
            '<input type="text" class="dictant-input" id="dcInput" placeholder="пиньинь..." autocomplete="off">' +
            '<div class="result-msg" id="dcMsg"></div>' +
            '<button class="btn" onclick="dcCheck()">✅</button> ' +
            '<button class="play-btn" onclick="speak(\'' + dcCurrent.chinese + '\')">🔊</button>';
        var inp = document.getElementById('dcInput');
        if (inp) { inp.focus(); inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') dcCheck(); }); }
        setTimeout(function() { speak(dcCurrent.chinese); }, 400);
    }

    function dcCheck() {
        if (dcAnswered || !dcCurrent) return;
        var inp = document.getElementById('dcInput'); if (!inp) return;
        var ua = inp.value.trim().toLowerCase().replace(/\s+/g, ' ');
        var ca = dcCurrent.pinyin.toLowerCase().replace(/\s+/g, ' ');
        dcAnswered = true; inp.disabled = true;
        var unt = ua.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        var cnt = ca.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        var ok = (unt === cnt || ua === ca);
        inp.classList.add(ok ? 'correct' : 'wrong');
        if (ok) { dcScore += 20 + Math.min(dcStreak, 15); dcCorrect++; dcStreak++; }
        else { dcWrong++; dcStreak = 0; }
        document.getElementById('dcMsg').textContent = ok ? '✅ ' + ca : '❌ ' + dcCurrent.pinyin;
        document.getElementById('dcMsg').className = 'result-msg ' + (ok ? 'ok' : 'fail');
        dcUpdateScore();
    }

    function dcUpdateScore() {
        document.getElementById('dcScore').textContent = dcScore;
        document.getElementById('dcCorrect').textContent = dcCorrect;
        document.getElementById('dcWrong').textContent = dcWrong;
        document.getElementById('dcStreak').textContent = dcStreak;
    }

    function dcReset() { dcScore = dcCorrect = dcWrong = dcStreak = 0; dcUpdateScore(); dcNext(); }

    // ===== СОБЕРИ ФРАЗУ =====
    var pbLevel = 1, pbScore = 0, pbCorrect = 0, pbWrong = 0, pbStreak = 0;
    var pbCurrent = null, pbAnswered = false, pbPhrases = [], pbSlots = [];

    function initBuilder() {
        pbPhrases = getPhrases(pbLevel); pbUpdateScore(); pbNext();
        document.querySelectorAll('#pbLevelSelector .level-btn').forEach(function(btn) {
            btn.onclick = function() {
                document.querySelectorAll('#pbLevelSelector .level-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                pbLevel = parseInt(this.dataset.level);
                pbPhrases = getPhrases(pbLevel); pbReset();
            };
        });
    }

    function pbNext() {
        if (pbPhrases.length === 0) { document.getElementById('pbGameArea').innerHTML = '<p style="padding:2rem;">⚠️ Нет фраз</p>'; return; }
        pbCurrent = pbPhrases[Math.floor(Math.random() * pbPhrases.length)];
        pbAnswered = false;
        pbSlots = new Array(pbCurrent.words.length).fill(null);
        var words = pbCurrent.words.slice().sort(function() { return Math.random() - 0.5; });
        var h = '<p style="color:#ffb347;">Соберите: ' + pbCurrent.russian + '</p>';
        h += '<div class="builder-slots" id="pbSlots">';
        for (var i = 0; i < pbCurrent.words.length; i++) {
            h += '<div class="builder-slot empty" onclick="pbRemoveSlot(' + i + ')" id="pbSlot' + i + '">_</div>';
        }
        h += '</div><div class="result-msg" id="pbMsg"></div><div class="builder-words" id="pbWords">';
        for (var j = 0; j < words.length; j++) {
            h += '<div class="builder-word" onclick="pbPlaceWord(\'' + words[j] + '\',this)" id="pbWord' + j + '">' + words[j] + '</div>';
        }
        h += '</div><button class="btn" onclick="pbCheck()">✅</button> ';
        h += '<button class="btn secondary" onclick="pbClear()">🔄</button> ';
        h += '<button class="play-btn" onclick="speak(\'' + pbCurrent.chinese + '\')">🔊</button>';
        document.getElementById('pbGameArea').innerHTML = h;
    }

    function pbPlaceWord(word, btn) {
        if (pbAnswered) return;
        for (var i = 0; i < pbSlots.length; i++) {
            if (pbSlots[i] === null) {
                pbSlots[i] = word; btn.classList.add('used');
                var s = document.getElementById('pbSlot' + i);
                s.textContent = word; s.classList.remove('empty'); s.classList.add('filled');
                return;
            }
        }
    }

    function pbRemoveSlot(idx) {
        if (pbAnswered || pbSlots[idx] === null) return;
        var w = pbSlots[idx]; pbSlots[idx] = null;
        var s = document.getElementById('pbSlot' + idx);
        s.textContent = '_'; s.classList.add('empty'); s.classList.remove('filled');
        document.querySelectorAll('#pbWords .builder-word').forEach(function(b) {
            if (b.textContent === w) b.classList.remove('used');
        });
    }

    function pbClear() {
        if (pbAnswered) return;
        for (var i = 0; i < pbSlots.length; i++) {
            if (pbSlots[i] !== null) { var w = pbSlots[i]; pbSlots[i] = null;
                var s = document.getElementById('pbSlot' + i);
                s.textContent = '_'; s.classList.add('empty'); s.classList.remove('filled');
                document.querySelectorAll('#pbWords .builder-word').forEach(function(b) {
                    if (b.textContent === w) b.classList.remove('used');
                });
            }
        }
    }

    function pbCheck() {
        if (pbAnswered || !pbCurrent) return;
        for (var i = 0; i < pbSlots.length; i++) { if (pbSlots[i] === null) { alert('Заполните все слоты!'); return; } }
        pbAnswered = true;
        var ua = pbSlots.join(''), ca = pbCurrent.chinese;
        document.querySelectorAll('#pbWords .builder-word').forEach(function(b) { b.style.pointerEvents = 'none'; });
        for (var j = 0; j < pbSlots.length; j++) {
            document.getElementById('pbSlot' + j).style.background = (pbSlots[j] === pbCurrent.words[j]) ? '#4CAF50' : '#e94560';
        }
        var ok = (ua === ca);
        if (ok) { pbScore += 20 + Math.min(pbStreak, 15); pbCorrect++; pbStreak++; }
        else { pbWrong++; pbStreak = 0; }
        var m = document.getElementById('pbMsg');
        m.textContent = ok ? '✅ ' + ca : '❌ ' + ca;
        m.className = 'result-msg ' + (ok ? 'ok' : 'fail');
        pbUpdateScore();
    }

    function pbUpdateScore() {
        document.getElementById('pbScore').textContent = pbScore;
        document.getElementById('pbCorrect').textContent = pbCorrect;
        document.getElementById('pbWrong').textContent = pbWrong;
        document.getElementById('pbStreak').textContent = pbStreak;
    }

    function pbReset() { pbScore = pbCorrect = pbWrong = pbStreak = 0; pbUpdateScore(); pbNext(); }

    } // КОНЕЦ ПРОВЕРКИ БАЗЫ
</script>
</body>
</html>
