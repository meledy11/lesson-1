<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪄 Волшебная тетрадь</title>
    <style>

            font-family: 'Segoe UI', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            color: #f5e6d3;
            overflow-x: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
            background: radial-gradient(ellipse at 30% 20%, #2d1b0e, #0d0805);
            padding: 0.5rem;
            align-items: center;
            justify-content: flex-start;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            flex: 1;
        }

            color: white;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.15);
        }
