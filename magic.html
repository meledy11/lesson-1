<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪄 Волшебная тетрадь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            color: #e0d6cc;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            padding: 0.5rem;
            align-items: center;
            justify-content: flex-start;
        }

        .container {
            width: 100%;
            max-width: 840px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
        }

        .header {
            text-align: center;
            padding: 0.3rem 1rem;
            background: linear-gradient(135deg, #1a100a, #2d1b0e);
            border-radius: 60px;
            box-shadow: 0 4px 0 #0a0505, 0 0 40px rgba(255, 107, 53, 0.05);
            color: #f0d5b0;
            flex-shrink: 0;
            border: 1px solid #3d2b1e;
        }
        .header h1 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
        }

        .top-bar {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }
        .back-link {
            display: inline-block;
            background: #1a100a;
            color: #f0d5b0;
            padding: 0.25rem 1rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            border: 2px solid #3d2b1e;
            box-shadow: 0 3px 0 #0a0505;
            transition: 0.08s;
            flex-shrink: 0;
        }
        .back-link:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0a0505;
        }

        .search-box {
            display: flex;
            gap: 0.3rem;
            flex: 1;
            min-width: 130px;
            background: #1a100a;
            border-radius: 50px;
            padding: 0.1rem 0.1rem 0.1rem 0.6rem;
            border: 2px solid #3d2b1e;
            align-items: center;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0d5b0;
            font-size: 0.75rem;
            padding: 0.2rem 0;
            outline: none;
            min-width: 50px;
        }
        .search-box input::placeholder {
            color: #5a4a3a;
        }
        .search-box button {
            background: linear-gradient(135deg, #3d2b1e, #2d1b0e);
            border: none;
            color: #f0d5b0;
            padding: 0.15rem 0.6rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
            transition: 0.08s;
            white-space: nowrap;
        }
        .search-box button:active {
            transform: scale(0.95);
        }

        .magic-container {
            background: linear-gradient(135deg, #0f0a07, #1a100a);
            border-radius: 24px;
            padding: 0.6rem 0.6rem 0.8rem;
            border: 2px solid #2d1b0e;
            box-shadow: 0 8px 0 #050303, inset 0 0 60px rgba(255, 107, 53, 0.02);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            min-height: 0;
        }

        /* ===== ИНФО-СТРОКА ===== */
        .magic-info {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.4rem 0.6rem;
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            flex-shrink: 0;
        }
        .magic-char {
            font-size: 2.8rem;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.08);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif;
            min-width: 44px;
            text-align: center;
        }
        .magic-info-text {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 0.02rem;
        }
        .magic-pinyin {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4FC3F7;
            letter-spacing: 1px;
            text-shadow: 0 0 30px rgba(79, 195, 247, 0.12);
        }
        .magic-translation {
            font-size: 1.2rem;
            font-weight: 600;
            color: #81C784;
            text-shadow: 0 0 30px rgba(129, 199, 132, 0.08);
        }
        .magic-key {
            font-size: 0.55rem;
            color: #5a4a3a;
            margin-top: 0.05rem;
        }
        .magic-emoji-big {
            font-size: 2rem;
            animation: fireEmoji 1.2s ease-in-out infinite alternate;
            margin-left: auto;
        }
        .magic-sound-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #3d2b1e;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f0d5b0;
            flex-shrink: 0;
        }
        .magic-sound-btn:active {
            transform: scale(0.9);
            background: rgba(255, 215, 0, 0.1);
        }

        .magic-buttons {
            display: flex;
            gap: 0.2rem;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }
        .magic-buttons button {
            padding: 0.25rem 0.6rem;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.5);
            font-size: 0.75rem;
            transition: 0.08s;
            color: white;
        }
        .magic-buttons button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
        }
        .btn-prev {
            background: linear-gradient(135deg, #1a3a5a, #0d2a4a);
            box-shadow: 0 3px 0 #0a1a2a;
        }
        .btn-next {
            background: linear-gradient(135deg, #1a4a2a, #0d3a1a);
            box-shadow: 0 3px 0 #0a2a1a;
        }
        .btn-random {
            background: linear-gradient(135deg, #3a1a4a, #2a0d3a);
            box-shadow: 0 3px 0 #1a0a2a;
        }
        .btn-show {
            background: linear-gradient(135deg, #5a3a1a, #4a2a0d);
            box-shadow: 0 3px 0 #3a1a0a;
            padding: 0.25rem 0.9rem;
        }
        .btn-clear {
            background: linear-gradient(135deg, #4a1a1a, #3a0d0d);
            box-shadow: 0 3px 0 #2a0a0a;
        }
        .btn-repeat {
            background: linear-gradient(135deg, #1a4a5a, #0d3a4a);
            box-shadow: 0 3px 0 #0a2a3a;
        }
        .btn-practice {
            background: linear-gradient(135deg, #4a2a5a, #3a1a4a);
            box-shadow: 0 3px 0 #2a0a3a;
        }

        /* ===== КАНВАС ===== */
        .canvas-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 0.3rem;
            border: 1px solid rgba(255, 215, 0, 0.03);
            flex: 0 0 auto;
            min-height: 35vh;
            max-height: 55vh;
        }

        #magicCanvas {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 600px;
            background: #080808;
            border-radius: 14px;
            touch-action: none;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"32\" height=\"32\" viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"3\" fill=\"%23FF6B35\" opacity=\"0.9\"/><path d=\"M16 16 L28 4 M16 16 L4 28 M16 16 L28 28 M16 16 L4 4\" stroke=\"%23FF6B35\" stroke-width=\"1.5\" opacity=\"0.4\"/></svg>') 16 16, crosshair;
            box-shadow: inset 0 0 60px rgba(255, 215, 0, 0.01);
            overflow: visible;
            align-self: center;
            flex-shrink: 0;
        }

        #hanziContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3%;
            z-index: 1;
            pointer-events: none;
        }
        #hanziContainer svg {
            width: 100% !important;
            height: 100% !important;
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            border-radius: 14px;
        }

        .magic-twinkle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            border-radius: 14px;
            z-index: 0;
        }
        .twinkle-dot {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 107, 53, 0.08);
            animation: twinklePulse 3-6s ease-in-out infinite alternate;
        }
        @keyframes twinklePulse {
            0% {
                opacity: 0.02;
                transform: scale(0.5);
            }
            100% {
                opacity: 0.15;
                transform: scale(1.2);
            }
        }

        .magic-floating {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            border-radius: 14px;
            z-index: 3;
        }
        .assoc-emoji {
            position: absolute;
            pointer-events: none;
            z-index: 4;
            font-size: 1.6rem;
            opacity: 0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.03);
            animation: fallDown 6-9s linear forwards;
        }
        @keyframes fallDown {
            0% {
                opacity: 0;
                transform: translateY(-20px) scale(0.5) rotate(0deg);
            }
            10% {
                opacity: 0.8;
                transform: translateY(0px) scale(1) rotate(5deg);
            }
            90% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translateY(calc(100vh)) scale(0.7) rotate(15deg);
            }
        }

        .magic-status {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            color: #6a5a4a;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        .magic-status span {
            color: #FFD700;
            font-weight: 600;
        }
        .magic-status .status-text {
            color: #FFB347;
            font-weight: 600;
        }

        .btn-check {
            padding: 0.25rem 1.5rem;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #5a3a1a, #4a2a0d);
            color: #f0d5b0;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 #2a1a0a, 0 0 30px rgba(255, 215, 0, 0.03);
            transition: 0.15s;
            align-self: center;
            flex-shrink: 0;
            border: 1px solid #3d2b1e;
        }
        .btn-check:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2a1a0a;
        }

        .magic-result {
            padding: 0.4rem;
            border-radius: 14px;
            display: none;
            animation: fadeIn 0.4s ease;
            flex-shrink: 0;
        }

        /* ===== РАСШИФРОВКА + ПРИМЕРЫ + РАЗБОР ===== */
        .magic-details {
            margin-top: 0.2rem;
            padding: 0.4rem 0.6rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.04);
            flex-shrink: 0;
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3d2b1e transparent;
        }
        .magic-details::-webkit-scrollbar {
            width: 4px;
        }
        .magic-details::-webkit-scrollbar-track {
            background: transparent;
        }
        .magic-details::-webkit-scrollbar-thumb {
            background: #3d2b1e;
            border-radius: 4px;
        }

        .magic-details-title {
            font-size: 0.85rem;
            color: #8a7a6a;
            margin-bottom: 0.3rem;
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }
        .magic-details-title span {
            color: #FFD700;
            font-weight: 600;
        }

        /* ===== РАЗБОР ПО СОСТАВУ ===== */
        .etymology-parts {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
            padding: 0.3rem 0.5rem;
            background: rgba(255, 215, 0, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.05);
            margin-bottom: 0.3rem;
        }
        .etymology-parts .part-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.02rem;
            padding: 0.1rem 0.5rem;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 6px;
            min-width: 34px;
        }
        .etymology-parts .part-char {
            font-size: 1.8rem;
            color: #FFD700;
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif;
        }
        .etymology-parts .part-meaning {
            font-size: 0.55rem;
            color: #8a7a6a;
            text-align: center;
        }
        .etymology-parts .part-plus {
            font-size: 1rem;
            color: #5a4a3a;
        }
        .etymology-parts .part-equals {
            font-size: 1rem;
            color: #4FC3F7;
        }
        .etymology-explanation {
            padding: 0.3rem 0.5rem;
            background: rgba(76, 175, 80, 0.05);
            border-radius: 8px;
            border-left: 3px solid #4CAF50;
            font-size: 0.95rem;
            color: #b8956a;
            line-height: 1.5;
            margin-bottom: 0.3rem;
        }
        .etymology-explanation strong {
            color: #FFD700;
        }
        .no-etymology {
            color: #5a4a3a;
            font-size: 0.9rem;
            font-style: italic;
            padding: 0.3rem 0;
        }

        /* ===== ПРИМЕРЫ ===== */
        .examples-grid {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .example-item {
            background: rgba(255, 215, 0, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.06);
            border-radius: 10px;
            padding: 0.4rem 0.8rem;
            font-size: 1.1rem;
            color: #b8956a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.15s;
            user-select: none;
        }
        .example-item:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: rgba(255, 215, 0, 0.15);
            transform: scale(1.02);
        }
        .example-item:active {
            transform: scale(0.95);
        }
        .example-item .ex-char {
            color: #FFD700;
            font-weight: 700;
            font-size: 1.5rem;
        }
        .example-item .ex-pinyin {
            color: #4FC3F7;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .example-item .ex-trans {
            color: #81C784;
            font-size: 0.95rem;
        }
        .example-item .ex-emoji {
            font-size: 1.2rem;
        }
        .example-item .ex-sound {
            font-size: 0.8rem;
            color: #5a4a3a;
            margin-left: 0.2rem;
        }
        .no-examples {
            color: #5a4a3a;
            font-size: 0.9rem;
            font-style: italic;
        }

        footer {
            text-align: center;
            padding: 0.25rem 0.8rem;
            background: #1a100a;
            border-radius: 50px;
            font-weight: bold;
            color: #8a7a6a;
            font-size: 0.75rem;
            box-shadow: 0 3px 0 #0a0505;
            flex-shrink: 0;
            border: 1px solid #2d1b0e;
        }

        /* ===== ПОЛНОЭКРАННАЯ ТЕТРАДЬ ===== */
        .practice-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }
        .practice-overlay.active {
            display: flex;
        }

        .practice-overlay .practice-header {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            color: #f0d5b0;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .practice-overlay .practice-header span {
            color: #FFD700;
            font-weight: 700;
            font-size: 1.6rem;
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif;
        }
        .practice-overlay .practice-close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #3d2b1e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #f0d5b0;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .practice-overlay .practice-close-btn:active {
            transform: scale(0.9);
            background: rgba(255, 215, 0, 0.1);
        }

        .practice-overlay .practice-canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            aspect-ratio: 1 / 1;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            border: 2px solid rgba(255, 107, 53, 0.1);
            touch-action: none;
            box-shadow: 0 0 60px rgba(255, 107, 53, 0.03);
        }
        #practiceCanvas {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            touch-action: none;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"32\" height=\"32\" viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"3\" fill=\"%23FF6B35\" opacity=\"0.9\"/><path d=\"M16 16 L28 4 M16 16 L4 28 M16 16 L28 28 M16 16 L4 4\" stroke=\"%23FF6B35\" stroke-width=\"1.5\" opacity=\"0.4\"/></svg>') 16 16, crosshair;
        }

        .practice-overlay .practice-hint {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            color: #5a4a3a;
            font-size: 0.7rem;
            text-align: center;
            pointer-events: none;
            opacity: 0.5;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.2rem 1rem;
            border-radius: 20px;
        }

        .practice-overlay .practice-controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
            width: 100%;
            max-width: 700px;
        }
        .practice-overlay .practice-controls button {
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            color: white;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.5);
            transition: 0.08s;
            flex: 1;
            min-width: 80px;
            max-width: 150px;
        }
        .practice-overlay .practice-controls button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
        }
        .btn-prac-clear {
            background: linear-gradient(135deg, #4a1a1a, #3a0d0d);
            box-shadow: 0 3px 0 #2a0a0a;
        }
        .btn-prac-show {
            background: linear-gradient(135deg, #5a3a1a, #4a2a0d);
            box-shadow: 0 3px 0 #3a1a0a;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fireEmoji {
            0% {
                transform: scale(1) rotate(-3deg);
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.1));
            }
            100% {
                transform: scale(1.05) rotate(3deg);
                filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.15));
            }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.2rem;
            }
            .magic-char {
                font-size: 2.2rem;
                min-width: 36px;
            }
            .magic-pinyin {
                font-size: 1.2rem;
            }
            .magic-translation {
                font-size: 1rem;
            }
            .magic-emoji-big {
                font-size: 1.6rem;
            }
            .magic-sound-btn {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
            .magic-buttons button {
                font-size: 0.6rem;
                padding: 0.2rem 0.45rem;
            }
            .btn-show {
                padding: 0.2rem 0.7rem;
            }
            .canvas-wrapper {
                min-height: 28vh;
                max-height: 45vh;
                padding: 0.2rem;
            }
            #magicCanvas {
                max-width: 100%;
            }
            .magic-status {
                font-size: 0.65rem;
                gap: 0.5rem;
            }
            .btn-check {
                font-size: 0.75rem;
                padding: 0.2rem 1rem;
            }
            .search-box input {
                font-size: 0.65rem;
                min-width: 40px;
            }
            .search-box button {

    <!-- ===== ПОЛНОЭКРАННАЯ ТЕТРАДЬ ===== -->
    <div class="practice-overlay" id="practiceOverlay">

            <button class="btn-prac-show" onclick="showPracticeHint()">👁️ Подсказка</button>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js">
    </script>
    <script src="keys-data.js">
    </script>
    <script src="etymology-data.js">
    </script>

    <script>
        // ============================================================
        //  ПОЛНЫЙ СКРИПТ — С ОРИГИНАЛЬНОЙ ОРАНЖЕВО-КРАСНОЙ КИСТЬЮ
        // ============================================================

        console.log('🔍 Загрузка...');
        console.log('📚 KEY_NAMES загружен?', typeof KEY_NAMES !== 'undefined');
        console.log('📖 ETYMOLOGY загружен?', typeof ETYMOLOGY !== 'undefined');

        let speechSynth = window.speechSynthesis;
        let currentUtterance = null;

        // ===== ОСНОВНАЯ ФУНКЦИЯ ОЗВУЧКИ =====
        function speakChinese(text, callback) {
            if (!text || !speechSynth) {
                if (callback) callback();
                return;
            }
            if (currentUtterance) {
                speechSynth.cancel();
                currentUtterance = null;
            }
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.7;
                utterance.pitch = 1;
                utterance.volume = 1;
                const voices = speechSynth.getVoices();
                const zhVoice = voices.find(v => v.lang.startsWith('zh'));
                if (zhVoice) utterance.voice = zhVoice;
                currentUtterance = utterance;
                utterance.onend = function() {
                    currentUtterance = null;
                    if (callback) callback();
                };
                utterance.onerror = function() {
                    currentUtterance = null;
                    if (callback) callback();
                };
                speechSynth.speak(utterance);
            }, 100);
        }
        window.speakChinese = speakChinese;

        // ===== ОЗВУЧКА ТЕКУЩЕГО КЛЮЧА =====
        function playSoundForCurrent() {
            if (magicCurrentChar) speakChinese(magicCurrentChar);
        }
        window.playSoundForCurrent = playSoundForCurrent;

        // ===== ОЗВУЧКА ПРИМЕРА =====
        function speakExample(text) {
            if (!text || text.trim() === '') {
                if (magicCurrentChar) {
                    speakChinese(magicCurrentChar);
                    highlightCurrentExample();
                }
                return;
            }
            const fullText = text.trim();
            speakChinese(fullText);
            highlightExampleByText(fullText);
        }
        window.speakExample = speakExample;

        function highlightExampleByText(text) {
            const items = document.querySelectorAll('.example-item');
            items.forEach(el => {
                const charEl = el.querySelector('.ex-char');
                if (charEl && charEl.textContent.trim() === text) {
                    el.style.borderColor = '#4FC3F7';
                    el.style.background = 'rgba(79,195,247,0.15)';
                    el.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        el.style.borderColor = 'rgba(255,215,0,0.06)';
                        el.style.background = 'rgba(255,215,0,0.04)';
                        el.style.transform = 'scale(1)';
                    }, 700);
                }
            });
        }

        function highlightCurrentExample() {
            const items = document.querySelectorAll('.example-item');
            items.forEach(el => {
                const charEl = el.querySelector('.ex-char');
                if (charEl && charEl.textContent.includes(magicCurrentChar)) {
                    el.style.borderColor = '#4FC3F7';
                    el.style.background = 'rgba(79,195,247,0.15)';
                    el.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        el.style.borderColor = 'rgba(255,215,0,0.06)';
                        el.style.background = 'rgba(255,215,0,0.04)';
                        el.style.transform = 'scale(1)';
                    }, 700);
                }
            });
        }

        // ===== ДАННЫЕ =====
        let allWordsList = [];
        let magicCurrentIndex = 0;
        let magicCharData = null;
        let magicCurrentChar = '上';
        let assocInterval = null;

        function buildAllWordsList() {
            allWordsList = [];
            if (typeof KEY_NAMES !== 'undefined' && KEY_NAMES.length) {
                for (const key of KEY_NAMES) {
                    const data = WORDS_BY_KEY[key] || { meaning: 'ключ', emoji: '🔑' };
                    let pinyin = data.pinyin || key;
                    allWordsList.push({
                        key: key,
                        chinese: key,
                        pinyin: pinyin,
                        translation: data.meaning || 'ключ',
                        emoji: data.emoji || '🔑',
                        words: data.words || []
                    });
                }
            }
            if (magicCurrentIndex >= allWordsList.length) magicCurrentIndex = 0;
            console.log('📚 Загружено ключей:', allWordsList.length);
        }

        function getSingleChar(key) { return key.charAt(0); }

        // ===== ЗАГРУЗКА ИЕРОГЛИФА =====
        function loadMagicChar(data) {
            if (!data) return;
            magicCharData = data;
            const displayChar = getSingleChar(data.chinese);
            magicCurrentChar = displayChar;

            document.getElementById('magicCharDisplay').textContent = displayChar;
            document.getElementById('magicPinyinDisplay').textContent = data.pinyin || data.key;
            document.getElementById('magicTranslationDisplay').textContent = data.translation || 'ключ';
            document.getElementById('magicKeyDisplay').textContent = `🔑 Ключ: ${data.key}`;
            document.getElementById('magicEmojiDisplay').textContent = data.emoji || '🔑';

            document.getElementById('practiceCharDisplay').textContent = displayChar;

            magicClear();
            updateDetails(data);
            startFallingEmojis(data);
            document.getElementById('magicStatus').textContent = '🪄 Нажми "Показать"';
            document.getElementById('magicStatus').style.color = '#FFB347';
            document.getElementById('magicResult').style.display = 'none';

            closePractice();
            speakChinese(magicCurrentChar);
        }

        // ===== ОБНОВЛЕНИЕ ДЕТАЛЕЙ =====
        function updateDetails(data) {
            const container = document.getElementById('magicDetailsContent');
            if (!container) return;

            const key = data.key;
            let etymology = null;
            if (typeof ETYMOLOGY !== 'undefined') {
                etymology = ETYMOLOGY[key];
            }
            const words = data.words || [];

            let html = '';

            if (etymology) {
                if (etymology.parts && etymology.parts.length > 0) {
                    html += `<div class="etymology-parts">`;
                    for (let i = 0; i < etymology.parts.length; i++) {
                        const part = etymology.parts[i];
                        const pMeaning = etymology.partMeanings && etymology.partMeanings[i] ? etymology.partMeanings[
                            i] : '';
                        html += `
                                <div class="part-item">
                                    <div class="part-char">${part}</div>
                                    ${pMeaning ? `<div class="part-meaning">${pMeaning}</div>` : ''}
                                </div>
                            `;
                        if (i < etymology.parts.length - 1) {
                            html += `<span class="part-plus">+</span>`;
                        }
                    }
                    if (etymology.result) {
                        html += `<span class="part-equals">=</span>`;
                        html += `
                                <div class="part-item" style="background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);">
                                    <div class="part-char" style="font-size:2rem;">${etymology.result || key}</div>
                                    ${etymology.resultMeaning ? `<div class="part-meaning" style="font-size:0.6rem;">${etymology.resultMeaning}</div>` : ''}
                                </div>
                            `;
                    }
                    html += `</div>`;
                }

                if (etymology.explanation) {
                    html += `<div class="etymology-explanation">💡 ${etymology.explanation}</div>`;
                }
            } else {
                html += `<div class="no-etymology">📭 Разбор для "${key}" пока не добавлен</div>`;
            }

            if (words && words.length > 0) {
                html +=
                    `<div class="magic-details-title" style="font-size:0.85rem;margin-top:0.3rem;">📝 Примеры (${words.length}) <span style="font-size:0.6rem;color:#5a4a3a;">(нажми для озвучивания)</span></div>`;
                html += `<div class="examples-grid">`;
                const showWords = words.slice(0, 10);
                for (const w of showWords) {
                    const char = w.chinese || w.char || '';
                    const pinyin = w.pinyin || '';
                    const trans = w.translation || w.trans || '';
                    const emoji = w.emoji || '';
                    const fullWord = char || magicCurrentChar;

                    html += `
                            <div class="example-item" onclick="speakExample('${fullWord}')" title="Нажми для озвучивания примера">
                                ${emoji ? `<span class="ex-emoji">${emoji}</span>` : ''}
                                <span class="ex-char">${char}</span>
                                ${pinyin ? `<span class="ex-pinyin">${pinyin}</span>` : ''}
                                ${trans ? `<span class="ex-trans">— ${trans}</span>` : ''}
                                <span class="ex-sound">🔊</span>
                            </div>
                        `;
                }
                if (words.length > 10) {
                    html +=
                        `<div class="example-item" style="color:#5a4a3a;border-color:transparent;cursor:default;opacity:0.6;">+ ещё ${words.length - 10}</div>`;
                }
                html += `</div>`;
            } else {
                html += `<div class="no-examples">📭 Нет примеров</div>`;
            }

            container.innerHTML = html;
        }

        // ===== НАВИГАЦИЯ =====
        function magicNextChar() {
            if (!allWordsList.length) buildAllWordsList();
            if (!allWordsList.length) return;
            magicCurrentIndex = (magicCurrentIndex + 1) % allWordsList.length;
            loadMagicChar(allWordsList[magicCurrentIndex]);
        }

        function magicPrevChar() {
            if (!allWordsList.length) buildAllWordsList();
            if (!allWordsList.length) return;
            magicCurrentIndex = (magicCurrentIndex - 1 + allWordsList.length) % allWordsList.length;
            loadMagicChar(allWordsList[magicCurrentIndex]);
        }

        function magicRandom() {
            if (!allWordsList.length) buildAllWordsList();
            if (!allWordsList.length) return;
            magicCurrentIndex = Math.floor(Math.random() * allWordsList.length);
            loadMagicChar(allWordsList[magicCurrentIndex]);
        }

        // ===== ПОИСК =====
        function magicSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) {
                document.getElementById('magicStatus').textContent = '✏️ Введите запрос';
                document.getElementById('magicStatus').style.color = '#FFB347';
                return;
            }

            if (!allWordsList.length) buildAllWordsList();
            if (!allWordsList.length) return;

            const results = [];
            for (const item of allWordsList) {
                let score = 0;
                const key = item.key;
                const pinyin = item.pinyin || key;
                const translation = item.translation || '';
                const emoji = item.emoji || '';

                if (key.includes(query)) score += 10;
                if (pinyin.toLowerCase().includes(query)) score += 8;
                if (translation.toLowerCase().includes(query)) score += 6;
                if (emoji.includes(query)) score += 5;

                if (item.words) {
                    for (const word of item.words) {
                        const wordChinese = word.chinese || word.char || '';
                        const wordPinyin = word.pinyin || '';
                        const wordTrans = word.translation || word.trans || '';
                        const wordEmoji = word.emoji || '';

                        if (wordChinese.includes(query)) score += 7;
                        if (wordPinyin.toLowerCase().includes(query)) score += 7;
                        if (wordTrans.toLowerCase().includes(query)) score += 5;
                        if (wordEmoji.includes(query)) score += 3;
                    }
                }

                if (score > 0) {
                    results.push({ item, score });
                }
            }

            results.sort((a, b) => b.score - a.score);

            if (results.length === 0) {
                document.getElementById('magicStatus').textContent = `❌ Не найдено "${query}"`;
                document.getElementById('magicStatus').style.color = '#FF6B6B';
                return;
            }

            const found = results[0].item;
            const idx = allWordsList.indexOf(found);
            if (idx !== -1) {
                magicCurrentIndex = idx;
                loadMagicChar(found);
                document.getElementById('magicStatus').textContent = `🔍 Найдено: ${found.chinese} (совпадений: ${results.length})`;
                document.getElementById('magicStatus').style.color = '#4CAF50';
            }
        }
        window.magicSearch = magicSearch;

        // ===== МЕРЦАНИЕ =====
        function createTwinkle() {
            const container = document.getElementById('magicTwinkle');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement('div');
                dot.className = 'twinkle-dot';
                const size = 1 + Math.random() * 2;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = 3 + Math.random() * 4;
                const delay = Math.random() * 5;
                dot.style.cssText = `
                        left: ${x}%; top: ${y}%;
                        width: ${size}px; height: ${size}px;
                        animation: twinklePulse ${duration}s ease-in-out ${delay}s infinite alternate;
                    `;
                container.appendChild(dot);
            }
        }

        // ===== ПАДАЮЩИЕ ЭМОДЗИ =====
        function startFallingEmojis(data) {
            if (assocInterval) { clearInterval(assocInterval);
                assocInterval = null; }
            const container = document.getElementById('magicFloatingEmojis');
            if (!container) return;
            container.innerHTML = '';

            const emojis = [];
            if (data && data.emoji) emojis.push(data.emoji);
            if (data && data.words) {
                const wordEmojis = data.words
                    .filter(w => w.emoji)
                    .map(w => w.emoji)
                    .slice(0, 3);
                for (const e of wordEmojis) {
                    if (!emojis.includes(e)) emojis.push(e);
                }
            }
            if (emojis.length < 2) {
                const fallback = ['✨', '⭐'];
                for (const e of fallback) {
                    if (!emojis.includes(e) && emojis.length < 3) emojis.push(e);
                }
            }

            const uniqueEmojis = [...new Set(emojis)].slice(0, 4);
            if (uniqueEmojis.length === 0) return;

            let index = 0;
            assocInterval = setInterval(() => {
                const emoji = uniqueEmojis[index % uniqueEmojis.length];
                createFallingEmoji(emoji, container);
                index++;
            }, 1600);

            setTimeout(() => {
                for (let i = 0; i < Math.min(2, uniqueEmojis.length); i++) {
                    createFallingEmoji(uniqueEmojis[i], container);
                }
            }, 300);
        }

        function createFallingEmoji(emoji, container) {
            const el = document.createElement('div');
            el.className = 'assoc-emoji';
            const side = Math.random() > 0.5 ? 'left' : 'right';
            const pos = 2 + Math.random() * 8;
            let style = side === 'left' ? `left: ${pos}%;` : `right: ${pos}%;`;
            const startY = -5 - Math.random() * 15;
            style += ` top: ${startY}%;`;
            const duration = 6 + Math.random() * 4;
            const delay = Math.random() * 0.5;
            const size = 1.6 + Math.random() * 1.2;
            el.style.cssText = `${style} font-size: ${size}rem; animation: fallDown ${duration}s ease-in ${delay}s forwards;`;
            el.textContent = emoji;
            const rotation = -20 + Math.random() * 40;
            el.style.transform = `rotate(${rotation}deg)`;
            container.appendChild(el);
            setTimeout(() => { if (el.parentNode) el.remove(); }, (duration + delay) * 1000 + 500);
        }

        // ===== КАНВАС =====
        let magicCanvas, magicCtx, drawCanvas;
        let magicParticles = [];
        let magicDrawPath = [];
        let magicIsDrawing = false;
        let magicLastX = 0,
            magicLastY = 0;
        let isAnimating = false;
        let currentWriter = null;
        let magicSoundCtx = null;

        // ===== ПРАКТИКА (ПОЛНОЭКРАННАЯ ТЕТРАДЬ) =====
        let practiceCtx = null;
        let practiceCanvas = null;
        let isPracticeDrawing = false;
        let practiceLastX = 0,
            practiceLastY = 0;
        let practicePath = [];
        let practiceSoundCtx = null;

        function initPracticeSound() {
            try { practiceSoundCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
        }

        function playPracticeSound() {
            try {
                if (!practiceSoundCtx) initPracticeSound();
                if (!practiceSoundCtx) return;
                const osc = practiceSoundCtx.createOscillator();
                const gain = practiceSoundCtx.createGain();
                osc.connect(gain);
                gain.connect(practiceSoundCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500 + Math.random() * 400, practiceSoundCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(700 + Math.random() * 300, practiceSoundCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.025, practiceSoundCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.003, practiceSoundCtx.currentTime + 0.12);
                osc.start(practiceSoundCtx.currentTime);
                osc.stop(practiceSoundCtx.currentTime + 0.12);
            } catch (e) {}
        }

        function openPractice() {
            const overlay = document.getElementById('practiceOverlay');
            overlay.classList.add('active');
            document.getElementById('practiceCharDisplay').textContent = magicCurrentChar;
            document.body.style.overflow = 'hidden';

            setTimeout(() => {
                initPracticeCanvas();
            }, 150);

            document.getElementById('magicStatus').textContent = '✏️ Рисуй в тетради!';
            document.getElementById('magicStatus').style.color = '#4FC3F7';
        }

        function closePractice() {
            const overlay = document.getElementById('practiceOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            if (practiceCtx) {
                practiceCtx.clearRect(0, 0, practiceCanvas.width, practiceCanvas.height);
                drawPracticeGrid();
            }
            practicePath = [];
            isPracticeDrawing = false;
        }

        function initPracticeCanvas() {
            const canvas = document.getElementById('practiceCanvas');
            const wrapper = canvas.parentElement;
            const rect = wrapper.getBoundingClientRect();
            const size = Math.min(rect.width, 700);

            const dpr = window.devicePixelRatio || 1;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';

            practiceCanvas = canvas;
            practiceCtx = canvas.getContext('2d');
            practiceCtx.scale(dpr, dpr);

            drawPracticeGrid();

            canvas.removeEventListener('mousedown', practiceStartDraw);
            canvas.removeEventListener('mousemove', practiceDraw);
            canvas.removeEventListener('mouseup', practiceEndDraw);
            canvas.removeEventListener('mouseleave', practiceEndDraw);
            canvas.removeEventListener('touchstart', practiceTouchStart);
            canvas.removeEventListener('touchmove', practiceTouchMove);
            canvas.removeEventListener('touchend', practiceTouchEnd);

            canvas.addEventListener('mousedown', practiceStartDraw);
            canvas.addEventListener('mousemove', practiceDraw);
            canvas.addEventListener('mouseup', practiceEndDraw);
            canvas.addEventListener('mouseleave', practiceEndDraw);
            canvas.addEventListener('touchstart', practiceTouchStart, { passive: false });
            canvas.addEventListener('touchmove', practiceTouchMove, { passive: false });
            canvas.addEventListener('touchend', practiceTouchEnd, { passive: false });
        }

        function drawPracticeGrid() {
            if (!practiceCtx) return;
            const ctx = practiceCtx;
            const w = practiceCanvas.width / (window.devicePixelRatio || 1);
            const h = practiceCanvas.height / (window.devicePixelRatio || 1);

            ctx.save();
            ctx.clearRect(0, 0, w, h);

            ctx.fillStyle = 'rgba(8,8,8,0.95)';
            ctx.fillRect(0, 0, w, h);

            // Сетка
            ctx.strokeStyle = 'rgba(255,107,53,0.04)';
            ctx.lineWidth = 0.8;

            const step = w / 8;
            for (let i = 0; i <= 8; i++) {
                ctx.beginPath();
                ctx.moveTo(i * step, 0);
                ctx.lineTo(i * step, h);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * step);
                ctx.lineTo(w, i * step);
                ctx.stroke();
            }

            // Центральные оси
            ctx.strokeStyle = 'rgba(255,107,53,0.06)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(w / 2, 0);
            ctx.lineTo(w / 2, h);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            ctx.lineTo(w, h / 2);
            ctx.stroke();

            // Рамка
            ctx.strokeStyle = 'rgba(255,107,53,0.08)';
            ctx.lineWidth = 2;
            ctx.strokeRect(2, 2, w - 4, h - 4);

            ctx.restore();
        }

        // ===== ОРИГИНАЛЬНАЯ ОРАНЖЕВО-КРАСНАЯ КАЛЛИГРАФИЧЕСКАЯ КИСТЬ =====
        function drawCalligraphicBrush(ctx, x1, y1, x2, y2, pressure = 0.7) {
            const distance = Math.hypot(x2 - x1, y2 - y1);
            if (distance < 0.3) return;

            const baseWidth = 3;
            const width = baseWidth + 8 * pressure;

            ctx.save();

            // ОСНОВНОЙ ОРАНЖЕВО-КРАСНЫЙ ШТРИХ
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);

            const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
            gradient.addColorStop(0, '#FF6B35'); // яркий оранжевый
            gradient.addColorStop(0.3, '#FF5722'); // огненно-оранжевый
            gradient.addColorStop(0.6, '#E64A19'); // красно-оранжевый
            gradient.addColorStop(0.85, '#D84315'); // тёмный красно-оранжевый
            gradient.addColorStop(1, '#BF360C'); // тёмно-красный

            ctx.shadowColor = 'rgba(255, 107, 53, 0.6)';
            ctx.shadowBlur = 25;
            ctx.lineWidth = width;
            ctx.strokeStyle = gradient;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            // ЗОЛОТОЕ ВНУТРЕННЕЕ СВЕЧЕНИЕ
            ctx.shadowColor = 'rgba(255, 215, 0, 0.25)';
            ctx.shadowBlur = 35;
            ctx.lineWidth = width * 0.3;
            ctx.strokeStyle = 'rgba(255, 200, 100, 0.3)';
            ctx.stroke();

            ctx.restore();

            // === КАЛЛИГРАФИЧЕСКАЯ ТОЧКА НА КОНЧИКЕ ===
            const dotSize = 2.5 + Math.random() * 3;
            ctx.save();

            ctx.shadowColor = 'rgba(255, 107, 53, 0.7)';
            ctx.shadowBlur = 30;

            const dotGrad = ctx.createRadialGradient(x2, y2, 0, x2, y2, dotSize * 2.5);
            dotGrad.addColorStop(0, '#FF6B35');
            dotGrad.addColorStop(0.3, '#FF5722');
            dotGrad.addColorStop(0.6, '#E64A19');
            dotGrad.addColorStop(1, 'rgba(191, 54, 12, 0)');

            ctx.fillStyle = dotGrad;
            ctx.beginPath();
            ctx.arc(x2, y2, dotSize * 2, 0, Math.PI * 2);
            ctx.fill();

            // Центральная яркая точка
            ctx.shadowColor = 'rgba(255, 200, 100, 0.3)';
            ctx.shadowBlur = 15;
            const centerGrad = ctx.createRadialGradient(x2, y2, 0, x2, y2, dotSize * 0.8);
            centerGrad.addColorStop(0, 'rgba(255, 255, 220, 0.8)');
            centerGrad.addColorStop(0.5, 'rgba(255, 200, 100, 0.5)');
            centerGrad.addColorStop(1, 'rgba(255, 100, 0, 0)');
            ctx.fillStyle = centerGrad;
            ctx.beginPath();
            ctx.arc(x2, y2, dotSize * 0.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Искры
            if (Math.random() > 0.5) {
                for (let i = 0; i < 2; i++) {
                    const sparkX = x2 + (Math.random() - 0.5) * 6;
                    const sparkY = y2 + (Math.random() - 0.5) * 6;
                    ctx.save();
                    ctx.globalAlpha = 0.15 + Math.random() * 0.2;
                    ctx.shadowColor = 'rgba(255, 107, 53, 0.3)';
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = '#FF6B35';
                    ctx.beginPath();
                    ctx.arc(sparkX, sparkY, 0.5 + Math.random() * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            if (Math.random() > 0.7) {
                createMagicParticle(x2 + (Math.random() - 0.5) * 4, y2 + (Math.random() - 0.5) * 4);
            }
        }

        function getPracticeCoords(e) {
            const rect = practiceCanvas.getBoundingClientRect();
            const scaleX = practiceCanvas.width / (window.devicePixelRatio || 1) / rect.width;
            const scaleY = practiceCanvas.height / (window.devicePixelRatio || 1) / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            return { x, y };
        }

        function practiceStartDraw(e) {
            if (!practiceCtx) return;
            isPracticeDrawing = true;
            const { x, y } = getPracticeCoords(e);
            practiceLastX = x;
            practiceLastY = y;
            practicePath.push({ x, y });
            playPracticeSound();
            drawCalligraphicBrush(practiceCtx, x, y, x + 1, y + 1, 0.9);
        }

        function practiceDraw(e) {
            if (!isPracticeDrawing || !practiceCtx) return;
            e.preventDefault();
            const { x, y } = getPracticeCoords(e);

            const dx = x - practiceLastX;
            const dy = y - practiceLastY;
            const speed = Math.hypot(dx, dy);
            const pressure = Math.min(1, Math.max(0.25, 1 - speed / 40));

            drawCalligraphicBrush(practiceCtx, practiceLastX, practiceLastY, x, y, pressure);
            practicePath.push({ x, y });

            if (Math.random() > 0.85) playPracticeSound();

            practiceLastX = x;
            practiceLastY = y;
        }

        function practiceEndDraw(e) {
            if (isPracticeDrawing) {
                isPracticeDrawing = false;
                playPracticeSound();
            }
        }

        function practiceTouchStart(e) {
            e.preventDefault();
            if (!practiceCtx) return;
            const touch = e.touches[0];
            const rect = practiceCanvas.getBoundingClientRect();
            const scaleX = practiceCanvas.width / (window.devicePixelRatio || 1) / rect.width;
            const scaleY = practiceCanvas.height / (window.devicePixelRatio || 1) / rect.height;
            const x = (touch.clientX - rect.left) * scaleX;
            const y = (touch.clientY - rect.top) * scaleY;
            isPracticeDrawing = true;
            practiceLastX = x;
            practiceLastY = y;
            practicePath.push({ x, y });
            playPracticeSound();
            drawCalligraphicBrush(practiceCtx, x, y, x + 1, y + 1, 0.9);
        }

        function practiceTouchMove(e) {
            e.preventDefault();
            if (!isPracticeDrawing || !practiceCtx) return;
            const touch = e.touches[0];
            const rect = practiceCanvas.getBoundingClientRect();
            const scaleX = practiceCanvas.width / (window.devicePixelRatio || 1) / rect.width;
            const scaleY = practiceCanvas.height / (window.devicePixelRatio || 1) / rect.height;
            const x = (touch.clientX - rect.left) * scaleX;
            const y = (touch.clientY - rect.top) * scaleY;

            const dx = x - practiceLastX;
            const dy = y - practiceLastY;
            const speed = Math.hypot(dx, dy);
            const pressure = Math.min(1, Math.max(0.25, 1 - speed / 40));

            drawCalligraphicBrush(practiceCtx, practiceLastX, practiceLastY, x, y, pressure);
            practicePath.push({ x, y });

            if (Math.random() > 0.85) playPracticeSound();

            practiceLastX = x;
            practiceLastY = y;
        }

        function practiceTouchEnd(e) {
            e.preventDefault();
            if (isPracticeDrawing) {
                isPracticeDrawing = false;
                playPracticeSound();
            }
        }

        function clearPractice() {
            if (practiceCtx) {
                const dpr = window.devicePixelRatio || 1;
                const w = practiceCanvas.width / dpr;
                const h = practiceCanvas.height / dpr;
                practiceCtx.clearRect(0, 0, w, h);
                drawPracticeGrid();
            }
            practicePath = [];
        }

        function showPracticeHint() {
            if (!practiceCtx) return;
            const ctx = practiceCtx;
            const dpr = window.devicePixelRatio || 1;
            const w = practiceCanvas.width / dpr;
            const h = practiceCanvas.height / dpr;

            ctx.save();
            ctx.globalAlpha = 0.12;
            ctx.fillStyle = '#FF6B35';
            const fontSize = w * 0.65;
            ctx.font = `${fontSize}px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(255,107,53,0.2)';
            ctx.shadowBlur = 30;
            ctx.fillText(magicCurrentChar, w / 2, h / 2);
            ctx.restore();

            setTimeout(() => {
                if (practiceCtx) {
                    const tempPath = [...practicePath];
                    const dpr2 = window.devicePixelRatio || 1;
                    const w2 = practiceCanvas.width / dpr2;
                    const h2 = practiceCanvas.height / dpr2;
                    practiceCtx.clearRect(0, 0, w2, h2);
                    drawPracticeGrid();
                    if (tempPath.length > 1) {
                        for (let i = 1; i < tempPath.length; i++) {
                            const p1 = tempPath[i - 1];
                            const p2 = tempPath[i];
                            const dx = p2.x - p1.x;
                            const dy = p2.y - p1.y;
                            const speed = Math.hypot(dx, dy);
                            const pressure = Math.min(1, Math.max(0.25, 1 - speed / 40));
                            drawCalligraphicBrush(practiceCtx, p1.x, p1.y, p2.x, p2.y, pressure);
                        }
                    }
                }
            }, 1500);

            document.getElementById('magicStatus').textContent = '👁️ Подсказка показана';
            document.getElementById('magicStatus').style.color = '#4FC3F7';
        }

        function initMagicSound() {
            try { magicSoundCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
        }

        function playMagicSound() {
            try {
                if (!magicSoundCtx) initMagicSound();
                if (!magicSoundCtx) return;
                const osc = magicSoundCtx.createOscillator();
                const gain = magicSoundCtx.createGain();
                osc.connect(gain);
                gain.connect(magicSoundCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600 + Math.random() * 300, magicSoundCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900 + Math.random() * 200, magicSoundCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.03, magicSoundCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.005, magicSoundCtx.currentTime + 0.15);
                osc.start(magicSoundCtx.currentTime);
                osc.stop(magicSoundCtx.currentTime + 0.15);
            } catch (e) {}
        }

        function playMagicCompleteSound() {
            try {
                if (!magicSoundCtx) initMagicSound();
                if (!magicSoundCtx) return;
                const notes = [523, 659, 784, 1047];
                notes.forEach((freq, i) => {
                    const osc = magicSoundCtx.createOscillator();
                    const gain = magicSoundCtx.createGain();
                    osc.connect(gain);
                    gain.connect(magicSoundCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, magicSoundCtx.currentTime + i * 0.1);
                    gain.gain.setValueAtTime(0.03, magicSoundCtx.currentTime + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.005, magicSoundCtx.currentTime + i * 0.1 + 0.2);
                    osc.start(magicSoundCtx.currentTime + i * 0.1);
                    osc.stop(magicSoundCtx.currentTime + i * 0.1 + 0.2);
                });
            } catch (e) {}
        }

        function magicClear() {
            const container = document.getElementById('hanziContainer');
            if (container) container.innerHTML = '';
            const oldCanvas = document.getElementById('drawCanvas');
            if (oldCanvas) oldCanvas.remove();
            magicParticles = [];
            magicDrawPath = [];
            magicIsDrawing = false;
            isAnimating = false;
            document.getElementById('magicResult').style.display = 'none';
            if (magicCtx) {
                magicCtx.clearRect(0, 0, magicCanvas.width, magicCanvas.height);
                drawMagicGrid();
            }
        }

        function initDrawingCanvas() {
            const oldCanvas = document.getElementById('drawCanvas');
            if (oldCanvas) oldCanvas.remove();

            const wrapper = document.getElementById('magicCanvas');
            const canvas = document.createElement('canvas');
            canvas.id = 'drawCanvas';
            canvas.style.cssText = `
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    pointer-events: none;
                    z-index: 2;
                    border-radius: 14px;
                `;
            wrapper.appendChild(canvas);

            drawCanvas = canvas;
            magicCanvas = canvas;
            magicCtx = canvas.getContext('2d');

            const rect = wrapper.getBoundingClientRect();
            const size = Math.min(rect.width, 650);
            canvas.width = size;
            canvas.height = size;

            drawMagicGrid();
        }

        function drawMagicGrid() {
            if (!magicCtx) return;
            const ctx = magicCtx;
            const size = magicCanvas.width;
            ctx.save();
            ctx.strokeStyle = 'rgba(255,107,53,0.03)';
            ctx.lineWidth = 0.5;
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(i * size / 4, 0);
                ctx.lineTo(i * size / 4, size);
                ctx.stroke();
            }
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * size / 4);
                ctx.lineTo(size, i * size / 4);
                ctx.stroke();
            }
            ctx.restore();
        }

        function createMagicParticle(x, y) {
            const colors = ['#9C27B0', '#7B1FA2', '#AB47BC', '#CE93D8', '#FF6B35'];
            magicParticles.push({
                x: x + (Math.random() - 0.5) * 6,
                y: y + (Math.random() - 0.5) * 6,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2 - 1,
                life: 1,
                decay: 0.015 + Math.random() * 0.015,
                size: 1.5 + Math.random() * 3,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        const UNSUPPORTED_CHARS = new Set([
            '⺮', '辶', '忄', '扌', '氵', '讠', '饣', '纟', '艹', '⺡', '⺨'
        ]);

        function isHanziSupported(char) {
            if (!char || char.length === 0) return false;
            const code = char.charCodeAt(0);
            const isCJK = code >= 0x4E00 && code <= 0x9FFF;
            return isCJK && !UNSUPPORTED_CHARS.has(char);
        }

        function showStaticChar(container, char) {
            container.innerHTML = `
                    <div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">
                        <div style="font-size:8rem;color:#FF6B35;font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei','SimSun',sans-serif;text-shadow:0 0 60px rgba(255,107,53,0.1);opacity:0.5;">
                            ${char}
                        </div>
                    </div>
                    <div style="position:absolute;bottom:8%;color:#5a4a3a;font-size:0.6rem;text-align:center;width:100%;z-index:0;">
                        ⚡ Без анимации
                    </div>
                `;
        }

        function magicAnimateDraw() {
            if (isAnimating) {
                if (currentWriter) { try { currentWriter.pauseAnimation(); } catch (e) {} }
                isAnimating = false;
            }
            magicClear();

            const char = magicCurrentChar;
            const container = document.getElementById('hanziContainer');
            container.innerHTML = '';

            const isSupported = isHanziSupported(char);

            if (isSupported && typeof HanziWriter !== 'undefined') {
                try {
                    currentWriter = HanziWriter.create(container.id, char, {
                        width: 400,
                        height: 400,
                        showOutline: false,
                        strokeColor: '#FF6B35',
                        strokeAnimationSpeed: 1.0,
                        delayBetweenStrokes: 250,
                        showCharacter: false,

                        radicalColor: '#FF6B35',
                        radicalStrokeColor: '#FF6B35',
                        padding: 15
                    });

                    document.getElementById('magicStatus').textContent = '✨ Волшебство...';
                    document.getElementById('magicStatus').style.color = '#FF6B35';
                    isAnimating = true;

                    currentWriter.animateCharacter({
                        onComplete: function() {
                            isAnimating = false;
                            document.getElementById('magicStatus').textContent = '🖌️ Обведи ключ каллиграфической кистью!';
                            document.getElementById('magicStatus').style.color = '#4CAF50';
                            playMagicCompleteSound();
                            initDrawingCanvas();
                            setupDrawingEvents();
                        }
                    });
                } catch (e) {
                    showStaticChar(container, char);
                    document.getElementById('magicStatus').textContent = '📖 Обведи ключ!';
                    document.getElementById('magicStatus').style.color = '#4CAF50';
                    playMagicCompleteSound();
                    initDrawingCanvas();
                    setupDrawingEvents();
                }
            } else {
                showStaticChar(container, char);
                document.getElementById('magicStatus').textContent = '📖 Обведи ключ!';
                document.getElementById('magicStatus').style.color = '#4CAF50';
                playMagicCompleteSound();
                initDrawingCanvas();
                setupDrawingEvents();
            }
        }

        function magicRepeat() {
            magicClear();
            const char = magicCurrentChar;
            const container = document.getElementById('hanziContainer');
            container.innerHTML = '';

            const isSupported = isHanziSupported(char);

            if (isSupported && typeof HanziWriter !== 'undefined') {
                try {
                    currentWriter = HanziWriter.create(container.id, char, {
                        width: 400,
                        height: 400,
                        showOutline: false,
                        strokeColor: '#FF6B35',
                        strokeAnimationSpeed: 1.2,
                        delayBetweenStrokes: 200,

                    });

                        onComplete: function() {

        function setupDrawingEvents() {
            const wrapper = document.getElementById('magicCanvas');
            wrapper.removeEventListener('mousedown', startDraw);
            wrapper.removeEventListener('mousemove', draw);
            wrapper.removeEventListener('mouseup', endDraw);
            wrapper.removeEventListener('mouseleave', endDraw);
            wrapper.removeEventListener('touchstart', touchStart);
            wrapper.removeEventListener('touchmove', touchMove);
            wrapper.removeEventListener('touchend', touchEnd);

            wrapper.addEventListener('mousedown', startDraw);
            wrapper.addEventListener('mousemove', draw);
            wrapper.addEventListener('mouseup', endDraw);
            wrapper.addEventListener('mouseleave', endDraw);
            wrapper.addEventListener('touchstart', touchStart, { passive: false });
            wrapper.addEventListener('touchmove', touchMove, { passive: false });
            wrapper.addEventListener('touchend', touchEnd, { passive: false });
        }

        function getCoords(e) {
            const rect = magicCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (magicCanvas.width / rect.width);
            const y = (e.clientY - rect.top) * (magicCanvas.height / rect.height);
            return { x, y };
        }

        function startDraw(e) {
            if (!magicCtx || isAnimating) return;
            magicIsDrawing = true;
            const { x, y } = getCoords(e);
            magicLastX = x;
            magicLastY = y;
            createMagicParticle(x, y);
            playMagicSound();
            drawCalligraphicBrush(magicCtx, x, y, x + 1, y + 1, 0.9);
        }

        function draw(e) {
            if (!magicIsDrawing || !magicCtx || isAnimating) return;
            e.preventDefault();
            const { x, y } = getCoords(e);

            const dx = x - magicLastX;
            const dy = y - magicLastY;
            const speed = Math.hypot(dx, dy);
            const pressure = Math.min(1, Math.max(0.25, 1 - speed / 30));

            drawCalligraphicBrush(magicCtx, magicLastX, magicLastY, x, y, pressure);
            magicDrawPath.push({ x, y });

            if (Math.random() > 0.7) createMagicParticle(x, y);
            if (Math.random() > 0.9) playMagicSound();

            magicLastX = x;
            magicLastY = y;
        }

        function endDraw(e) {
            if (magicIsDrawing) {
                magicIsDrawing = false;
                document.getElementById('magicStatus').textContent = '✨ Нажми "Проверить"!';
                document.getElementById('magicStatus').style.color = '#FFB347';
                playMagicCompleteSound();
            }
        }

        function touchStart(e) {
            e.preventDefault();
            if (!magicCtx || isAnimating) return;
            const touch = e.touches[0];
            const rect = magicCanvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) * (magicCanvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (magicCanvas.height / rect.height);
            magicIsDrawing = true;
            magicLastX = x;
            magicLastY = y;
            createMagicParticle(x, y);
            playMagicSound();
            drawCalligraphicBrush(magicCtx, x, y, x + 1, y + 1, 0.9);
        }

        function touchMove(e) {
            e.preventDefault();
            if (!magicIsDrawing || !magicCtx || isAnimating) return;
            const touch = e.touches[0];
            const rect = magicCanvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) * (magicCanvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (magicCanvas.height / rect.height);

            const dx = x - magicLastX;
            const dy = y - magicLastY;
            const speed = Math.hypot(dx, dy);
            const pressure = Math.min(1, Math.max(0.25, 1 - speed / 30));

            drawCalligraphicBrush(magicCtx, magicLastX, magicLastY, x, y, pressure);
            magicDrawPath.push({ x, y });

            if (Math.random() > 0.7) createMagicParticle(x, y);
            if (Math.random() > 0.9) playMagicSound();

            magicLastX = x;
            magicLastY = y;
        }

        function touchEnd(e) {
            e.preventDefault();
            if (magicIsDrawing) {
                magicIsDrawing = false;
                document.getElementById('magicStatus').textContent = '✨ Нажми "Проверить"!';
                document.getElementById('magicStatus').style.color = '#FFB347';
                playMagicCompleteSound();
            }
        }

        // ===== ПРОВЕРКА =====
        let magicScore = 0;
        let magicLevel = 1;

        function magicCheck() {
            const resultDiv = document.getElementById('magicResult');
            resultDiv.style.display = 'block';
            const hasDrawing = magicDrawPath.length > 0 || magicIsDrawing;

            if (hasDrawing) {
                const points = 10 + Math.floor(Math.random() * 20);
                magicScore += points;
                magicLevel++;
                document.getElementById('magicScore').textContent = magicScore;
                document.getElementById('magicLevel').textContent = magicLevel;

                resultDiv.innerHTML = `
                        <div style="background:linear-gradient(135deg,rgba(76,175,80,0.12),rgba(255,107,53,0.08));border:2px solid #FF6B35;border-radius:14px;padding:0.6rem;animation:fadeIn 0.4s ease;">
                            <div style="font-size:1.4rem;color:#FF6B35;">✨ Волшебство удалось!</div>
                            <div style="font-size:0.9rem;color:#4CAF50;margin-top:0.2rem;">⭐ +${points} очков!</div>
                            <div style="font-size:1.1rem;color:#FFB347;margin-top:0.2rem;">
                                ${magicCharData?.chinese || '—'} — ${magicCharData?.translation || 'ключ'} ${magicCharData?.emoji || '🔑'}
                            </div>
                            <div style="display:flex;gap:0.5rem;justify-content:center;margin-top:0.4rem;flex-wrap:wrap;">
                                <button onclick="magicNextChar()" style="padding:0.25rem 0.8rem;border-radius:30px;border:none;background:linear-gradient(135deg,#1a4a2a,#0d3a1a);color:white;font-weight:bold;cursor:pointer;box-shadow:0 3px 0 #0a2a1a;font-size:0.75rem;">➡️ Следующий</button>
                                <button onclick="magicRandom()" style="padding:0.25rem 0.8rem;border-radius:30px;border:none;background:linear-gradient(135deg,#3a1a4a,#2a0d3a);color:white;font-weight:bold;cursor:pointer;box-shadow:0 3px 0 #1a0a2a;font-size:0.75rem;">🎲 Случайный</button>
                            </div>
                        </div>
                    `;

                document.getElementById('magicStatus').textContent = '🌟 Отлично! Продолжай!';
                document.getElementById('magicStatus').style.color = '#4CAF50';
                playMagicCompleteSound();
                speakChinese(magicCurrentChar);
            } else {
                resultDiv.innerHTML = `
                        <div style="background:linear-gradient(135deg,rgba(255,107,107,0.1),rgba(255,107,53,0.03));border:2px solid #FF6B6B;border-radius:14px;padding:0.6rem;animation:fadeIn 0.4s ease;">
                            <div style="font-size:1.1rem;color:#FF6B6B;">😅 Нажми "Показать" и обведи ключ!</div>
                            <div style="font-size:0.9rem;color:#8a7a6a;margin-top:0.2rem;">
                                ${magicCharData?.chinese || '—'} — ${magicCharData?.translation || 'ключ'} ${magicCharData?.emoji || '🔑'}
                            </div>
                        </div>
                    `;
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function initMagic() {
            createTwinkle();
            initMagicSound();
            initPracticeSound();

            if (typeof KEY_NAMES !== 'undefined' && KEY_NAMES.length) {
                buildAllWordsList();
                if (allWordsList.length) {
                    magicCurrentIndex = 0;
                    loadMagicChar(allWordsList[0]);
                }
            } else {
                console.warn('KEY_NAMES не загружен, ждём...');
                setTimeout(() => {
                    if (typeof KEY_NAMES !== 'undefined' && KEY_NAMES.length) {
                        buildAllWordsList();
                        if (allWordsList.length) {
                            magicCurrentIndex = 0;
                            loadMagicChar(allWordsList[0]);
                        }
                    } else {
                        console.error('❌ KEY_NAMES так и не загружен!');
                        document.getElementById('magicDetailsContent').innerHTML =
                            '<div class="no-etymology">❌ Ошибка загрузки базы данных</div>';
                    }
                }, 1500);
            }

            document.getElementById('magicScore').textContent = magicScore;
            document.getElementById('magicLevel').textContent = magicLevel;

            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    magicSearch();
                }
            });

            let searchTimeout = null;
            document.getElementById('searchInput').addEventListener('input', function(e) {
                clearTimeout(searchTimeout);
                const query = this.value.trim();
                if (query.length >= 2) {
                    searchTimeout = setTimeout(magicSearch, 500);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initMagic, 300);
        });

        // ===== ЭКСПОРТ ГЛОБАЛЬНЫХ ФУНКЦИЙ =====
        window.magicNextChar = magicNextChar;
        window.magicPrevChar = magicPrevChar;
        window.magicRandom = magicRandom;
        window.magicClear = magicClear;
        window.magicAnimateDraw = magicAnimateDraw;
        window.magicRepeat = magicRepeat;
        window.magicCheck = magicCheck;
        window.magicSearch = magicSearch;
        window.openPractice = openPractice;
        window.closePractice = closePractice;
        window.clearPractice = clearPractice;
        window.showPracticeHint = showPracticeHint;
        window.speakChinese = speakChinese;
        window.speakExample = speakExample;
        window.playSoundForCurrent = playSoundForCurrent;
        window.highlightExampleByText = highlightExampleByText;
        window.highlightCurrentExample = highlightCurrentExample;
    </script>

</body>
</html>
