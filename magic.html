<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🪄 Волшебная тетрадь</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(145deg, #1a0f08, #2d1b0e);
            font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
            padding: 0.8rem;
            min-height: 100vh;
            color: #f5e6d3;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        .header {
            text-align: center;
            background: linear-gradient(135deg, #FF6B35, #FF8C42, #FFB347);
            border-radius: 60px;
            padding: 1.5rem 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 15px 0 #C16F1A, 0 0 60px rgba(255,107,53,0.2);
            color: white;
        }
        .header h1 { font-size: 2.5rem; letter-spacing: 2px; text-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .header p { font-size: 1.2rem; margin-top: 0.3rem; opacity: 0.95; }
        
        .back-link {
            display: inline-block;
            background: white;
            color: #A64B2A;
            padding: 0.6rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            border: 3px solid #FFB347;
            box-shadow: 0 6px 0 #D98F33;
            transition: 0.1s;
        }
        .back-link:active { transform: translateY(3px); box-shadow: 0 3px 0 #D98F33; }
        
        .magic-container {
            background: linear-gradient(135deg, #1a0f08, #2d1b0e);
            border-radius: 40px;
            padding: 1.5rem;
            border: 3px solid #FFB347;
            box-shadow: 0 12px 0 #8B4513, inset 0 0 60px rgba(255,107,53,0.05);
            text-align: center;
        }
        
        .magic-title {
            color: #FFD700;
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        
        .magic-subtitle {
            color: #b8956a;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }
        
        .magic-info {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.8rem;
            background: rgba(255,255,255,0.03);
            padding: 0.6rem;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.1);
        }
        
        .magic-char {
            font-size: 3.5rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 40px rgba(255,215,0,0.2);
        }
        
        .magic-info-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        
        .magic-pinyin {
            font-size: 1.4rem;
            color: #FFB347;
            font-weight: bold;
        }
        
        .magic-translation {
            font-size: 1.1rem;
            color: #b8956a;
        }
        
        .magic-key {
            font-size: 0.8rem;
            color: #8B5A2B;
        }
        
        .magic-emoji-big {
            font-size: 3rem;
            animation: fireEmoji 1s ease-in-out infinite alternate;
        }
        
        .magic-buttons {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 0.8rem;
        }
        
        .magic-buttons button {
            padding: 0.4rem 0.9rem;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            font-size: 0.85rem;
            transition: 0.1s;
            color: white;
        }
        .magic-buttons button:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        
        .btn-prev { background: linear-gradient(135deg, #2196F3, #1976D2); box-shadow: 0 4px 0 #0D47A1; }
        .btn-next { background: linear-gradient(135deg, #4CAF50, #45a049); box-shadow: 0 4px 0 #2E7D32; }
        .btn-random { background: linear-gradient(135deg, #9C27B0, #7B1FA2); box-shadow: 0 4px 0 #4A148C; }
        .btn-show { background: linear-gradient(135deg, #FF6B35, #FF8C42); box-shadow: 0 4px 0 #C16F1A; padding: 0.4rem 1.2rem; font-size: 0.9rem; }
        .btn-clear { background: linear-gradient(135deg, #FF6B6B, #e74c3c); box-shadow: 0 4px 0 #c0392b; }
        
        .canvas-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 30px;
            padding: 0.5rem;
            border: 2px solid rgba(255,215,0,0.1);
        }
        
        #magicCanvas {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
            background: radial-gradient(ellipse at center, #1a0f08 0%, #0d0805 100%);
            border-radius: 20px;
            touch-action: none;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"32\" height=\"32\" viewBox=\"0 0 32 32\"><text y=\"28\" font-size=\"28\">🪄</text></svg>') 0 28, pointer;
            box-shadow: inset 0 0 60px rgba(255,215,0,0.03);
        }
        
        .magic-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            border-radius: 20px;
        }
        
        .magic-floating {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            border-radius: 20px;
        }
        
        .magic-status {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.8rem;
            color: #b8956a;
            font-size: 0.95rem;
        }
        
        .magic-status span { color: #FFD700; font-weight: bold; }
        .magic-status .status-text { color: #FFB347; font-weight: bold; }
        
        .btn-check {
            margin-top: 0.5rem;
            padding: 0.6rem 2rem;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #FFD700, #FFA000);
            color: #2d1b0e;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #E6A100, 0 0 30px rgba(255,215,0,0.1);
            transition: 0.2s;
        }
        .btn-check:active { transform: translateY(3px); box-shadow: 0 1px 0 #E6A100; }
        
        .magic-result {
            margin-top: 0.8rem;
            padding: 1rem;
            border-radius: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        footer {
            text-align: center;
            margin-top: 1.5rem;
            padding: 0.8rem;
            background: #FFD699;
            border-radius: 50px;
            font-weight: bold;
            color: #A64B2A;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 #C16F1A;
        }
        
        /* Анимации */
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        @keyframes floatEmoji {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(0deg); }
            20% { opacity: 1; transform: translate(-50%, -60%) scale(1.2) rotate(20deg); }
            80% { opacity: 1; transform: translate(-50%, -80%) scale(1) rotate(-10deg); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(0.5) rotate(30deg); }
        }
        
        @keyframes fireEmoji {
            0% { transform: scale(1) rotate(-3deg); filter: drop-shadow(0 0 20px rgba(255,215,0,0.3)); }
            100% { transform: scale(1.1) rotate(3deg); filter: drop-shadow(0 0 50px rgba(255,215,0,0.6)); }
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .magic-char { font-size: 2.8rem; }
            .magic-pinyin { font-size: 1.2rem; }
            .magic-emoji-big { font-size: 2.5rem; }
            .magic-buttons button { font-size: 0.75rem; padding: 0.3rem 0.7rem; }
            .btn-show { padding: 0.3rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🪄 Волшебная тетрадь</h1>
            <p>✨ Смотри, как иероглиф оживает! Обводи его и запоминай.</p>
        </div>
        
        <a href="index.html" class="back-link">⬅️ На главную</a>
        
        <div class="magic-container">
            <!-- Информация об иероглифе -->
            <div class="magic-info">
                <div class="magic-char" id="magicCharDisplay">上</div>
                <div class="magic-info-text">
                    <div class="magic-pinyin" id="magicPinyinDisplay">shàng</div>
                    <div class="magic-translation" id="magicTranslationDisplay">верх, подниматься</div>
                    <div class="magic-key" id="magicKeyDisplay">🔑 Ключ: 上</div>
                </div>
                <div class="magic-emoji-big" id="magicEmojiDisplay">⬆️</div>
            </div>
            
            <!-- Кнопки -->
            <div class="magic-buttons">
                <button class="btn-prev" onclick="magicPrevChar()">⬅️</button>
                <button class="btn-next" onclick="magicNextChar()">➡️</button>
                <button class="btn-random" onclick="magicRandom()">🎲</button>
                <button class="btn-show" onclick="magicAnimateDraw()">🪄 Показать</button>
                <button class="btn-clear" onclick="magicClear()">🗑️</button>
            </div>
            
            <!-- Канвас -->
            <div class="canvas-wrapper">
                <canvas id="magicCanvas" width="500" height="500"></canvas>
                <div class="magic-stars" id="magicStars"></div>
                <div class="magic-floating" id="magicFloatingEmojis"></div>
            </div>
            
            <!-- Статус -->
            <div class="magic-status">
                <div>⭐ Очки: <span id="magicScore">0</span></div>
                <div>🎯 Уровень: <span id="magicLevel">1</span></div>
                <div class="status-text" id="magicStatus">🪄 Нажми "Показать"</div>
            </div>
            
            <!-- Кнопка проверки -->
            <button class="btn-check" onclick="magicCheck()">✨ Проверить</button>
            
            <!-- Результат -->
            <div class="magic-result" id="magicResult"></div>
        </div>
        
        <footer>
            🪄 Волшебная тетрадь — учи китайский с магией!
        </footer>
    </div>
    
    <script src="keys-data.js"></script>
    <script>
    // ============================================================
    // ===== ЧАСТЬ 2: ОЗВУЧКА =====
    // ============================================================
    
    let speechSynth = window.speechSynthesis;
    let currentUtterance = null;

    function speakChinese(text, callback) {
        if (!text || !speechSynth) {
            if (callback) callback();
            return;
        }
        if (currentUtterance) {
            speechSynth.cancel();
            currentUtterance = null;
        }
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.7;
            utterance.pitch = 1;
            utterance.volume = 1;
            const voices = speechSynth.getVoices();
            const zhVoice = voices.find(v => v.lang.startsWith('zh'));
            if (zhVoice) utterance.voice = zhVoice;
            currentUtterance = utterance;
            utterance.onend = function() {
                currentUtterance = null;
                if (callback) callback();
            };
            utterance.onerror = function() {
                currentUtterance = null;
                if (callback) callback();
            };
            speechSynth.speak(utterance);
        }, 100);
    }
    window.speakChinese = speakChinese;
    
    // ============================================================
    // ===== ЧАСТЬ 3: ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
    // ============================================================
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function createConfetti(element) {
        const rect = element.getBoundingClientRect();
        const colors = ['#FF6B35', '#FFB347', '#4CAF50', '#2196F3', '#9C27B0', '#FF6B6B', '#FFD700', '#FF1493', '#00CED1', '#FF4500'];
        for (let i = 0; i < 20; i++) {
            const confetti = document.createElement('div');
            const size = 5 + Math.random() * 8;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const angle = Math.random() * 2 * Math.PI;
            const distance = 30 + Math.random() * 80;
            const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * 30;
            const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * 30;
            const rotation = Math.random() * 360;
            confetti.style.cssText = `
                position: fixed;
                width: ${size}px;
                height: ${size * 0.4}px;
                background: ${color};
                left: ${x}px;
                top: ${y}px;
                border-radius: 2px;
                pointer-events: none;
                z-index: 9999;
                transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
                transform: rotate(${rotation}deg);
                box-shadow: 0 0 10px rgba(255,255,255,0.1);
            `;
            document.body.appendChild(confetti);
            setTimeout(() => {
                confetti.style.left = (x + Math.cos(angle) * distance) + 'px';
                confetti.style.top = (y + Math.sin(angle) * distance - 50) + 'px';
                confetti.style.opacity = '0';
                confetti.style.transform = `rotate(${rotation + Math.random() * 720}deg) scale(0.2)`;
            }, 10);
            setTimeout(() => confetti.remove(), 1000);
        }
    }
    
    // ============================================================
    // ===== ЧАСТЬ 4: ВОЛШЕБНАЯ ТЕТРАДЬ =====
    // ============================================================
    
    let magicCanvas, magicCtx;
    let magicIsDrawing = false;
    let magicLastX = 0, magicLastY = 0;
    let magicCurrentChar = '上';
    let magicCharData = null;
    let magicScore = 0;
    let magicLevel = 1;
    let magicAnimating = false;
    let magicAnimationId = null;
    let magicPoints = [];
    let magicDrawPath = [];
    let magicParticles = [];
    let magicCurrentIndex = 0;
    let magicSoundCtx = null;
    let allWordsList = [];
    
    // ---- ЗВУК ----
    function initMagicSound() {
        try {
            magicSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
    }
    
    function playMagicSound() {
        try {
            if (!magicSoundCtx) initMagicSound();
            if (!magicSoundCtx) return;
            const osc = magicSoundCtx.createOscillator();
            const gain = magicSoundCtx.createGain();
            osc.connect(gain);
            gain.connect(magicSoundCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800 + Math.random() * 400, magicSoundCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200 + Math.random() * 300, magicSoundCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.06, magicSoundCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, magicSoundCtx.currentTime + 0.15);
            osc.start(magicSoundCtx.currentTime);
            osc.stop(magicSoundCtx.currentTime + 0.15);
        } catch(e) {}
    }
    
    function playMagicCompleteSound() {
        try {
            if (!magicSoundCtx) initMagicSound();
            if (!magicSoundCtx) return;
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const osc = magicSoundCtx.createOscillator();
                const gain = magicSoundCtx.createGain();
                osc.connect(gain);
                gain.connect(magicSoundCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, magicSoundCtx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.05, magicSoundCtx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, magicSoundCtx.currentTime + i * 0.1 + 0.2);
                osc.start(magicSoundCtx.currentTime + i * 0.1);
                osc.stop(magicSoundCtx.currentTime + i * 0.1 + 0.2);
            });
        } catch(e) {}
    }
    
    // ---- ЗВЁЗДЫ ----
    function createMagicStars() {
        const container = document.getElementById('magicStars');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            const size = 1 + Math.random() * 3;
            star.style.cssText = `
                position: absolute;
                width: ${size}px;
                height: ${size}px;
                background: white;
                border-radius: 50%;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                opacity: ${0.1 + Math.random() * 0.3};
                animation: starTwinkle ${2 + Math.random() * 3}s ease-in-out ${Math.random() * 3}s infinite;
                box-shadow: 0 0 ${size * 3}px rgba(255,215,0,0.1);
            `;
            container.appendChild(star);
        }
    }
    
    // ---- ЗАГРУЗКА БАЗЫ ----
    function buildAllWordsList() {
        allWordsList = [];
        for (const key of KEY_NAMES) {
            const data = WORDS_BY_KEY[key];
            for (const word of data.words) {
                allWordsList.push({
                    key: key,
                    ...word
                });
            }
        }
    }
    
    // ---- ЗАГРУЗКА ИЕРОГЛИФА ----
    function loadMagicChar(data) {
        if (!data) return;
        magicCharData = data;
        magicCurrentChar = data.chinese;
        
        document.getElementById('magicCharDisplay').textContent = data.chinese;
        document.getElementById('magicPinyinDisplay').textContent = data.pinyin;
        document.getElementById('magicTranslationDisplay').textContent = data.translation;
        document.getElementById('magicKeyDisplay').textContent = `🔑 Ключ: ${data.key}`;
        document.getElementById('magicEmojiDisplay').textContent = data.emoji || '✨';
        
        magicClear();
        document.getElementById('magicStatus').textContent = '🪄 Нажми "Показать"';
        document.getElementById('magicStatus').style.color = '#FFB347';
        document.getElementById('magicResult').style.display = 'none';
    }
    
    // ---- НАВИГАЦИЯ ----
    function magicNextChar() {
        if (allWordsList.length === 0) return;
        magicCurrentIndex = (magicCurrentIndex + 1) % allWordsList.length;
        loadMagicChar(allWordsList[magicCurrentIndex]);
    }
    
    function magicPrevChar() {
        if (allWordsList.length === 0) return;
        magicCurrentIndex = (magicCurrentIndex - 1 + allWordsList.length) % allWordsList.length;
        loadMagicChar(allWordsList[magicCurrentIndex]);
    }
    
    function magicRandom() {
        if (allWordsList.length === 0) return;
        magicCurrentIndex = Math.floor(Math.random() * allWordsList.length);
        loadMagicChar(allWordsList[magicCurrentIndex]);
    }
    
    function magicClear() {
        if (magicAnimationId) {
            cancelAnimationFrame(magicAnimationId);
            magicAnimationId = null;
        }
        magicAnimating = false;
        magicPoints = [];
        magicDrawPath = [];
        magicParticles = [];
        
        const ctx = magicCtx;
        const canvas = magicCanvas;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawMagicGrid();
        
        document.getElementById('magicFloatingEmojis').innerHTML = '';
        document.getElementById('magicResult').style.display = 'none';
    }
    
    function drawMagicGrid() {
        const ctx = magicCtx;
        const canvas = magicCanvas;
        const size = canvas.width;
        
        ctx.save();
        ctx.strokeStyle = 'rgba(255,215,0,0.05)';
        ctx.lineWidth = 0.5;
        for (let i = 1; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(i * size / 4, 0);
            ctx.lineTo(i * size / 4, size);
            ctx.stroke();
        }
        for (let i = 1; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * size / 4);
            ctx.lineTo(size, i * size / 4);
            ctx.stroke();
        }
        ctx.restore();
    }
    
    // ---- ГЕНЕРАЦИЯ ТОЧЕК ----
    function generateCharPoints(char, size) {
        const ctx = document.createElement('canvas').getContext('2d');
        ctx.canvas.width = size;
        ctx.canvas.height = size;
        ctx.fillStyle = '#FFD700';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${size * 0.7}px "Noto Sans SC", "PingFang SC", sans-serif`;
        ctx.fillText(char, size/2, size/2 + size * 0.03);
        
        const imageData = ctx.getImageData(0, 0, size, size);
        const data = imageData.data;
        const step = Math.max(2, Math.floor(size / 25));
        const points = [];
        
        for (let y = 0; y < size; y += step) {
            for (let x = 0; x < size; x += step) {
                const i = (y * size + x) * 4;
                if (data[i] > 100) {
                    points.push({ x, y });
                }
            }
        }
        return points;
    }
    
    // ---- ПЛАВАЮЩИЕ ЭМОДЗИ ----
    function createFloatingEmoji(emoji) {
        const container = document.getElementById('magicFloatingEmojis');
        if (!container) return;
        
        const el = document.createElement('div');
        const size = 1.5 + Math.random() * 2;
        const x = 10 + Math.random() * 80;
        const y = 10 + Math.random() * 80;
        const duration = 2 + Math.random() * 2;
        const delay = Math.random() * 0.5;
        
        el.style.cssText = `
            position: absolute;
            left: ${x}%;
            top: ${y}%;
            font-size: ${size}rem;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.3) rotate(${Math.random() * 360}deg);
            animation: floatEmoji ${duration}s ease-in-out ${delay}s forwards;
            z-index: 5;
            text-shadow: 0 0 30px rgba(255,215,0,0.2);
        `;
        el.textContent = emoji;
        container.appendChild(el);
        
        setTimeout(() => el.remove(), (duration + delay) * 1000 + 500);
    }
    
    function showFloatingText(text, x, y, color) {
        const container = document.getElementById('magicFloatingEmojis');
        if (!container) return;
        
        const canvas = magicCanvas;
        const rect = canvas.getBoundingClientRect();
        const scaleX = rect.width / canvas.width;
        const scaleY = rect.height / canvas.height;
        
        const el = document.createElement('div');
        el.style.cssText = `
            position: absolute;
            left: ${x * scaleX}px;
            top: ${y * scaleY}px;
            color: ${color};
            font-size: 1.1rem;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
            z-index: 10;
        `;
        el.textContent = text;
        container.appendChild(el);
        
        setTimeout(() => {
            el.style.opacity = '1';
            el.style.transform = 'translate(-50%, -80%) scale(1)';
        }, 50);
        setTimeout(() => {
            el.style.opacity = '0';
            el.style.transform = 'translate(-50%, -120%) scale(0.8)';
            setTimeout(() => el.remove(), 1000);
        }, 1500);
    }
    
    function updateFloatingEmojis() {
        const container = document.getElementById('magicFloatingEmojis');
        if (container && container.children.length > 20) {
            for (let i = 0; i < 5; i++) {
                if (container.children[0]) container.children[0].remove();
            }
        }
    }
    
    // ---- ЧАСТИЦЫ ----
    function createMagicParticle(x, y) {
        const colors = ['#FFD700', '#FFA500', '#FF6B35', '#FFB347', '#FF8C42', '#FF6B6B', '#4CAF50', '#2196F3'];
        magicParticles.push({
            x: x + (Math.random() - 0.5) * 10,
            y: y + (Math.random() - 0.5) * 10,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4 - 2,
            life: 1,
            decay: 0.008 + Math.random() * 0.015,
            size: 2 + Math.random() * 5,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }
    
    function drawMagicParticles(ctx) {
        for (let i = magicParticles.length - 1; i >= 0; i--) {
            const p = magicParticles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.04;
            p.life -= p.decay;
            if (p.life <= 0) { magicParticles.splice(i, 1); continue; }
            
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 20;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 40;
            ctx.globalAlpha = p.life * 0.3;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life * 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }
    
    // ---- РИСОВАНИЕ ПУТИ ----
    function drawMagicPath(ctx) {
        if (magicDrawPath.length < 2) return;
        ctx.save();
        for (let i = 0; i < magicDrawPath.length - 1; i++) {
            const p1 = magicDrawPath[i];
            const p2 = magicDrawPath[i + 1];
            const progress = i / magicDrawPath.length;
            const r = 255;
            const g = Math.floor(215 - progress * 80);
            const b = Math.floor(0 + progress * 30);
            const alpha = 0.5 + progress * 0.5;
            
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
            ctx.lineWidth = 2 + progress * 4;
            ctx.shadowColor = `rgba(255, 215, 0, ${0.3 + progress * 0.5})`;
            ctx.shadowBlur = 10 + progress * 20;
            ctx.stroke();
        }
        for (let i = 0; i < magicDrawPath.length - 1; i++) {
            const p1 = magicDrawPath[i];
            const p2 = magicDrawPath[i + 1];
            const progress = i / magicDrawPath.length;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(255, 215, 0, ${0.05 + progress * 0.1})`;
            ctx.lineWidth = 8 + progress * 12;
            ctx.shadowColor = 'rgba(255, 215, 0, 0.05)';
            ctx.shadowBlur = 30;
            ctx.stroke();
        }
        ctx.restore();
    }
    
    // ---- ВОЛШЕБНАЯ АНИМАЦИЯ ----
    function magicAnimateDraw() {
        if (magicAnimating) {
            if (magicAnimationId) {
                cancelAnimationFrame(magicAnimationId);
                magicAnimationId = null;
            }
            magicAnimating = false;
        }
        magicClear();
        
        const char = magicCurrentChar;
        const ctx = magicCtx;
        const canvas = magicCanvas;
        const size = canvas.width;
        
        const points = generateCharPoints(char, size);
        if (points.length === 0) {
            document.getElementById('magicStatus').textContent = '❌ Ошибка';
            document.getElementById('magicStatus').style.color = '#FF6B6B';
            return;
        }
        
        magicPoints = points;
        magicDrawPath = [];
        magicParticles = [];
        magicAnimating = true;
        document.getElementById('magicStatus').textContent = '✨ Волшебство...';
        document.getElementById('magicStatus').style.color = '#FFD700';
        
        const emoji = magicCharData?.emoji || '✨';
        let emojiInterval = setInterval(() => {
            if (!magicAnimating) { clearInterval(emojiInterval); return; }
            createFloatingEmoji(emoji);
        }, 300);
        
        let index = 0;
        const totalPoints = points.length;
        const pinyin = magicCharData?.pinyin || '';
        const translation = magicCharData?.translation || '';
        
        function animateStep() {
            if (!magicAnimating || index >= totalPoints) {
                magicAnimating = false;
                clearInterval(emojiInterval);
                document.getElementById('magicStatus').textContent = '✨ Готово! Обведи иероглиф!';
                document.getElementById('magicStatus').style.color = '#4CAF50';
                playMagicCompleteSound();
                return;
            }
            const count = Math.min(3, totalPoints - index);
            for (let i = 0; i < count && index < totalPoints; i++) {
                magicDrawPath.push(points[index]);
                if (index % 2 === 0) {
                    createMagicParticle(points[index].x, points[index].y);
                    if (index % 15 === 0 && pinyin) {
                        showFloatingText(pinyin, points[index].x, points[index].y - 30, '#FFB347');
                    }
                    if (index % 20 === 0 && translation) {
                        showFloatingText(translation, points[index].x, points[index].y + 30, '#b8956a');
                    }
                    if (index % 5 === 0) playMagicSound();
                }
                index++;
            }
            drawMagicPath(ctx);
            drawMagicParticles(ctx);
            updateFloatingEmojis();
            magicAnimationId = requestAnimationFrame(animateStep);
        }
        animateStep();
    }
    
    // ---- РИСОВАНИЕ ПАЛОЧКОЙ ----
    function magicStartDraw(e) {
        if (magicAnimating) {
            if (magicAnimationId) {
                cancelAnimationFrame(magicAnimationId);
                magicAnimationId = null;
            }
            magicAnimating = false;
        }
        magicIsDrawing = true;
        const rect = magicCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (magicCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (magicCanvas.height / rect.height);
        magicLastX = x;
        magicLastY = y;
        for (let i = 0; i < 5; i++) {
            createMagicParticle(x + (Math.random() - 0.5) * 15, y + (Math.random() - 0.5) * 15);
        }
        playMagicSound();
    }
    
    function magicDraw(e) {
        if (!magicIsDrawing) return;
        e.preventDefault();
        const rect = magicCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (magicCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (magicCanvas.height / rect.height);
        
        const ctx = magicCtx;
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
        ctx.lineWidth = 3;
        ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
        ctx.shadowBlur = 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(magicLastX, magicLastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.restore();
        
        for (let i = 0; i < 3; i++) {
            createMagicParticle(x + (Math.random() - 0.5) * 8, y + (Math.random() - 0.5) * 8);
        }
        if (Math.random() > 0.7) playMagicSound();
        magicLastX = x;
        magicLastY = y;
    }
    
    function magicEndDraw(e) {
        if (magicIsDrawing) {
            magicIsDrawing = false;
            document.getElementById('magicStatus').textContent = '✨ Нажми "Проверить"!';
            document.getElementById('magicStatus').style.color = '#FFB347';
            playMagicCompleteSound();
        }
    }
    
    // ---- TOUCH ----
    function magicTouchStart(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = magicCanvas.getBoundingClientRect();
        const x = (touch.clientX - rect.left) * (magicCanvas.width / rect.width);
        const y = (touch.clientY - rect.top) * (magicCanvas.height / rect.height);
        if (magicAnimating) {
            if (magicAnimationId) {
                cancelAnimationFrame(magicAnimationId);
                magicAnimationId = null;
            }
            magicAnimating = false;
        }
        magicIsDrawing = true;
        magicLastX = x;
        magicLastY = y;
        for (let i = 0; i < 5; i++) {
            createMagicParticle(x + (Math.random() - 0.5) * 15, y + (Math.random() - 0.5) * 15);
        }
        playMagicSound();
    }
    
    function magicTouchMove(e) {
        e.preventDefault();
        if (!magicIsDrawing) return;
        const touch = e.touches[0];
        const rect = magicCanvas.getBoundingClientRect();
        const x = (touch.clientX - rect.left) * (magicCanvas.width / rect.width);
        const y = (touch.clientY - rect.top) * (magicCanvas.height / rect.height);
        const ctx = magicCtx;
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
        ctx.lineWidth = 4;
        ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
        ctx.shadowBlur = 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(magicLastX, magicLastY);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.restore();
        for (let i = 0; i < 3; i++) {
            createMagicParticle(x + (Math.random() - 0.5) * 8, y + (Math.random() - 0.5) * 8);
        }
        if (Math.random() > 0.7) playMagicSound();
        magicLastX = x;
        magicLastY = y;
    }
    
    function magicTouchEnd(e) {
        e.preventDefault();
        magicIsDrawing = false;
        document.getElementById('magicStatus').textContent = '✨ Нажми "Проверить"!';
        document.getElementById('magicStatus').style.color = '#FFB347';
        playMagicCompleteSound();
    }
    
    // ---- ПРОВЕРКА ----
    function magicCheck() {
        const resultDiv = document.getElementById('magicResult');
        resultDiv.style.display = 'block';
        
        const hasDrawing = magicDrawPath.length > 0 || magicIsDrawing;
        
        if (hasDrawing) {
            const points = 10 + Math.floor(Math.random() * 20);
            magicScore += points;
            magicLevel++;
            document.getElementById('magicScore').textContent = magicScore;
            document.getElementById('magicLevel').textContent = magicLevel;
            
            resultDiv.innerHTML = `
                <div style="background: linear-gradient(135deg, rgba(76,175,80,0.15), rgba(255,215,0,0.15)); border: 3px solid #FFD700; border-radius: 20px; padding: 1.5rem; animation: fadeIn 0.5s ease;">
                    <div style="font-size:2rem; color:#FFD700;">✨ Волшебство удалось!</div>
                    <div style="font-size:1.2rem; color:#4CAF50; margin-top:0.5rem;">⭐ +${points} очков магии!</div>
                    <div style="font-size:1.2rem; color:#FFB347; margin-top:0.3rem;">
                        ${magicCharData?.chinese} ${magicCharData?.pinyin} — ${magicCharData?.translation} ${magicCharData?.emoji || ''}
                    </div>
                    <div style="display:flex; gap:1rem; justify-content:center; margin-top:1rem; flex-wrap:wrap;">
                        <button onclick="magicNextChar()" style="padding:0.5rem 1.5rem; border-radius:30px; border:none; background:linear-gradient(135deg,#4CAF50,#45a049); color:white; font-weight:bold; cursor:pointer; box-shadow:0 4px 0 #2E7D32;">➡️ Следующий</button>
                        <button onclick="magicRandom()" style="padding:0.5rem 1.5rem; border-radius:30px; border:none; background:linear-gradient(135deg,#9C27B0,#7B1FA2); color:white; font-weight:bold; cursor:pointer; box-shadow:0 4px 0 #4A148C;">🎲 Случайный</button>
                    </div>
                </div>
            `;
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const fakeEl = document.createElement('div');
                    fakeEl.getBoundingClientRect = () => ({
                        left: window.innerWidth / 2 - 150 + Math.random() * 300,
                        top: window.innerHeight / 2 - 150 + Math.random() * 300,
                        width: 50,
                        height: 50
                    });
                    createConfetti(fakeEl);
                }, i * 80);
            }
            document.getElementById('magicStatus').textContent = '🌟 Отлично! Продолжай!';
            document.getElementById('magicStatus').style.color = '#4CAF50';
            playMagicCompleteSound();
            speakChinese(magicCurrentChar);
        } else {
            resultDiv.innerHTML = `
                <div style="background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(255,215,0,0.05)); border: 3px solid #FF6B6B; border-radius: 20px; padding: 1.5rem; animation: fadeIn 0.5s ease;">
                    <div style="font-size:1.5rem; color:#FF6B6B;">😅 Нажми "Показать" и обведи иероглиф!</div>
                    <div style="font-size:1rem; color:#b8956a; margin-top:0.5rem;">
                        ${magicCharData?.chinese} ${magicCharData?.pinyin} — ${magicCharData?.translation} ${magicCharData?.emoji || ''}
                    </div>
                </div>
            `;
        }
    }
    
    // ---- ИНИЦИАЛИЗАЦИЯ ----
    function initMagic() {
        magicCanvas = document.getElementById('magicCanvas');
        magicCtx = magicCanvas.getContext('2d');
        
        const rect = magicCanvas.getBoundingClientRect();
        const size = Math.min(rect.width, 500);
        magicCanvas.width = size;
        magicCanvas.height = size;
        
        magicCanvas.removeEventListener('mousedown', magicStartDraw);
        magicCanvas.removeEventListener('mousemove', magicDraw);
        magicCanvas.removeEventListener('mouseup', magicEndDraw);
        magicCanvas.removeEventListener('mouseleave', magicEndDraw);
        magicCanvas.addEventListener('mousedown', magicStartDraw);
        magicCanvas.addEventListener('mousemove', magicDraw);
        magicCanvas.addEventListener('mouseup', magicEndDraw);
        magicCanvas.addEventListener('mouseleave', magicEndDraw);
        
        magicCanvas.removeEventListener('touchstart', magicTouchStart);
        magicCanvas.removeEventListener('touchmove', magicTouchMove);
        magicCanvas.removeEventListener('touchend', magicTouchEnd);
        magicCanvas.addEventListener('touchstart', magicTouchStart, { passive: false });
        magicCanvas.addEventListener('touchmove', magicTouchMove, { passive: false });
        magicCanvas.addEventListener('touchend', magicTouchEnd, { passive: false });
        
        initMagicSound();
        createMagicStars();
        
        if (typeof KEY_NAMES !== 'undefined' && KEY_NAMES.length > 0) {
            buildAllWordsList();
            if (allWordsList.length > 0) {
                magicCurrentIndex = 0;
                loadMagicChar(allWordsList[0]);
            }
        } else {
            setTimeout(() => {
                if (typeof KEY_NAMES !== 'undefined' && KEY_NAMES.length > 0) {
                    buildAllWordsList();
                    if (allWordsList.length > 0) {
                        magicCurrentIndex = 0;
                        loadMagicChar(allWordsList[0]);
                    }
                }
            }, 500);
        }
        
        document.getElementById('magicScore').textContent = magicScore;
        document.getElementById('magicLevel').textContent = magicLevel;
    }
    
    // Ждём загрузку базы
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(initMagic, 300);
    });
    
    // Делаем функции глобальными
    window.magicNextChar = magicNextChar;
    window.magicPrevChar = magicPrevChar;
    window.magicRandom = magicRandom;
    window.magicClear = magicClear;
    window.magicAnimateDraw = magicAnimateDraw;
    window.magicCheck = magicCheck;
    window.speakChinese = speakChinese;
    </script>
</body>
</html>
