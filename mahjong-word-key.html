<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🀄 Маджонг: все части слов | Весёлый китайский</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #2d6a4f 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', sans-serif;
            padding: 0.8rem;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            border-radius: 40px;
            padding: 0.8rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 0 #C16F1A;
            color: #5a2e0e;
        }

        .hero h1 {
            font-size: 1.2rem;
        }

        .hero p {
            font-size: 0.65rem;
        }

        .back-home {
            display: inline-block;
            background: rgba(255,255,255,0.9);
            color: #A64B2A;
            text-decoration: none;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.7rem;
            margin-top: 0.4rem;
        }

        .game-status {
            background: #2b4f3a;
            border-radius: 30px;
            padding: 0.7rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            color: #FFE0A3;
        }

        .score-box {
            background: #1e3a2f;
            padding: 0.2rem 0.7rem;
            border-radius: 25px;
            text-align: center;
        }

        .score-box span:first-child {
            font-size: 0.6rem;
        }

        .score-box span:last-child {
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFD966;
        }

        .progress-bar {
            flex: 2;
            background: #1e3a2f;
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: #FFD966;
            width: 0%;
            height: 100%;
            transition: width 0.2s;
        }

        .message-box {
            background: #1e3a2f;
            padding: 0.3rem 0.8rem;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.65rem;
        }

        .new-game-btn {
            background: #FFB347;
            border: none;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
            box-shadow: 0 3px 0 #C16F1A;
        }

        .new-game-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #C16F1A;
        }

        .game-board {
            background: #3d2a1a;
            border-radius: 35px;
            padding: 1rem;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 10px 0 #2a1a0e;
        }

        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.7rem;
        }

        @media (min-width: 500px) {
            .tiles-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 700px) {
            .tiles-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .tile {
            background: linear-gradient(145deg, #FFF8E7, #FFE8C8);
            border-radius: 18px;
            padding: 0.8rem 0.2rem;
            text-align: center;
            font-size: 1.5rem;
            font-family: 'Noto Sans SC', monospace;
            font-weight: bold;
            color: #A64B2A;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 0 #B87C2E;
            border: 1px solid #FFD699;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tile.selected {
            background: linear-gradient(145deg, #FFE0A3, #FFD580);
            box-shadow: 0 2px 0 #B87C2E;
            transform: translateY(3px);
            border: 2px solid #FF8C42;
        }

        .tile.removed {
            visibility: hidden;
            pointer-events: none;
            box-shadow: none;
            background: transparent;
        }

        .tile:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #B87C2E;
        }

        .tile-label {
            font-size: 0.5rem;
            color: #8B5A2B;
            margin-top: 0.2rem;
        }

        .level-selector {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .level-btn {
            background: #FFE0C0;
            border: 2px solid #FFB347;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .level-btn.active {
            background: #FFB347;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 1rem;
            padding: 0.5rem;
            background: #2b4f3a;
            border-radius: 40px;
            font-weight: bold;
            color: #FFD966;
            font-size: 0.6rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>🀄 Маджонг: найди часть слова 🀄</h1>
        <p>Сопоставь иероглиф с любой его составной частью (ключом, радикалом)</p>
        <a href="index.html" class="back-home">🏠 На главную</a>
        <a href="frequency-lesson.html" class="back-home">📖 Урок 50 слов</a>
        <a href="copybook.html" class="back-home">✍️ Прописи</a>
    </div>

    <div class="level-selector">
        <button class="level-btn active" data-level="easy">🍃 6 слов</button>
        <button class="level-btn" data-level="medium">🌿 12 слов</button>
        <button class="level-btn" data-level="hard">🔥 20 слов</button>
        <button class="level-btn" data-level="all">🏆 ВСЕ 50 слов</button>
    </div>

    <div class="game-status">
        <div class="score-box">
            <span>✅ Найдено</span><br>
            <span id="scoreCount">0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="message-box" id="messageBox">🎲 Нажми на плитку</div>
        <button class="new-game-btn" id="newGameBtn">🔄 Новая</button>
    </div>

    <div class="game-board">
        <div class="tiles-grid" id="tilesGrid"></div>
    </div>

    <footer>
        🀄 Правило: найди для иероглифа его составную часть (ключ).<br>
        Например: <strong>你</strong> ←→ <strong>亻</strong> или <strong>尔</strong>
    </footer>
</div>

<script src="frequency-db.js"></script>
<script>
    let currentLevel = 'easy';
    let tiles = [];
    let selectedTileIndex = null;
    let score = 0;
    let totalPairs = 0;
    
    const tilesGrid = document.getElementById('tilesGrid');
    const scoreSpan = document.getElementById('scoreCount');
    const messageBox = document.getElementById('messageBox');
    const progressFill = document.getElementById('progressFill');
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    // Извлекаем из базы все пары "слово → его части"
    function getAllPartPairs() {
        const allPairs = [];
        
        if (typeof frequencyDB !== 'undefined' && frequencyDB.length) {
            for (const word of frequencyDB) {
                if (!word.parts || !word.parts.length) continue;
                
                // Для каждой части слова создаём отдельную пару
                for (const part of word.parts) {
                    const partChar = part.char;
                    if (partChar === word.char) continue; // избегаем одинаковых
                    
                    allPairs.push({
                        wordId: word.id,
                        wordChar: word.char,
                        wordMeaning: word.meaning,
                        partChar: partChar,
                        partMeaning: part.meaning,
                        type: 'part'
                    });
                }
            }
        }
        
        // Убираем дубликаты (если одна и та же часть встречается несколько раз)
        const uniquePairs = [];
        const keySet = new Set();
        for (const pair of allPairs) {
            const key = `${pair.wordChar}|${pair.partChar}`;
            if (!keySet.has(key)) {
                keySet.add(key);
                uniquePairs.push(pair);
            }
        }
        
        return uniquePairs;
    }
    
    function getPairsForGame(limit) {
        const allPairs = getAllPartPairs();
        
        // Перемешиваем и берём нужное количество
        const shuffled = shuffleArray([...allPairs]);
        let selected = shuffled.slice(0, limit);
        
        // Если запрошено "все", но лимит больше доступных — берём все
        if (limit === 'all' || limit > selected.length) {
            selected = allPairs;
        }
        
        return selected;
    }
    
    function initGame() {
        let pairLimit = 6;
        if (currentLevel === 'medium') pairLimit = 12;
        if (currentLevel === 'hard') pairLimit = 20;
        if (currentLevel === 'all') pairLimit = 'all';
        
        const pairs = getPairsForGame(pairLimit);
        
        if (!pairs.length) {
            messageBox.innerHTML = '❌ Нет данных для игры. Проверьте frequency-db.js';
            return;
        }
        
        totalPairs = pairs.length;
        score = 0;
        selectedTileIndex = null;
        
        const newTiles = [];
        let idCounter = 0;
        
        for (const pair of pairs) {
            // Плитка иероглифа
            newTiles.push({
                id: idCounter++,
                content: pair.wordChar,
                type: 'word',
                pairId: idCounter - 1,
                displayText: pair.wordChar,
                tooltip: pair.wordMeaning,
                partChar: null
            });
            // Плитка части (ключа)
            newTiles.push({
                id: idCounter++,
                content: pair.partChar,
                type: 'part',
                pairId: idCounter - 2,
                displayText: pair.partChar,
                tooltip: pair.partMeaning,
                expectedWordChar: pair.wordChar
            });
        }
        
        tiles = shuffleArray(newTiles);
        updateProgress();
        renderBoard();
        messageBox.innerHTML = `🎴 Найди ${totalPairs} пар!`;
    }
    
    function renderBoard() {
        if (!tilesGrid) return;
        
        tilesGrid.innerHTML = '';
        
        tiles.forEach((tile, idx) => {
            if (tile.removed) return;
            
            const tileDiv = document.createElement('div');
            tileDiv.className = 'tile';
            if (selectedTileIndex === idx) {
                tileDiv.classList.add('selected');
            }
            
            const labelText = tile.type === 'word' ? tile.tooltip : (tile.tooltip || 'часть');
            tileDiv.innerHTML = `
                <span style="font-size:1.8rem; line-height:1;">${tile.displayText}</span>
                <span class="tile-label">${labelText.substring(0, 12)}</span>
            `;
            tileDiv.onclick = (function(index) {
                return function() { onTileClick(index); };
            })(idx);
            tilesGrid.appendChild(tileDiv);
        });
        
        updateProgress();
    }
    
    function onTileClick(clickedIdx) {
        const clickedTile = tiles[clickedIdx];
        if (clickedTile.removed) return;
        
        if (selectedTileIndex === null) {
            selectedTileIndex = clickedIdx;
            renderBoard();
            messageBox.innerHTML = `📌 Выбрано: ${clickedTile.displayText} (${clickedTile.type === 'word' ? 'слово' : 'часть'})`;
            return;
        }
        
        if (selectedTileIndex === clickedIdx) {
            selectedTileIndex = null;
            renderBoard();
            messageBox.innerHTML = '🎲 Выбор сброшен';
            return;
        }
        
        const selectedTile = tiles[selectedTileIndex];
        let isMatch = false;
        
        // Проверяем пару в обе стороны
        if (selectedTile.type === 'word' && clickedTile.type === 'part') {
            isMatch = (selectedTile.pairId === clickedTile.pairId);
        } else if (selectedTile.type === 'part' && clickedTile.type === 'word') {
            isMatch = (selectedTile.pairId === clickedTile.pairId);
        }
        
        if (isMatch) {
            tiles[selectedTileIndex].removed = true;
            tiles[clickedIdx].removed = true;
            score++;
            selectedTileIndex = null;
            
            const remainingPairs = tiles.filter(t => !t.removed && t.type === 'word').length;
            
            if (remainingPairs === 0) {
                messageBox.innerHTML = '🎉 ПОБЕДА! 🎉 Ты выучил все пары!';
                renderBoard();
            } else {
                messageBox.innerHTML = `✅ Правильно! +1 (осталось ${remainingPairs})`;
                renderBoard();
            }
        } else {
            messageBox.innerHTML = `❌ ${selectedTile.displayText} ≠ ${clickedTile.displayText}. Попробуй ещё!`;
            selectedTileIndex = null;
            renderBoard();
        }
    }
    
    function updateProgress() {
        const completedPairs = score;
        const percent = totalPairs > 0 ? (completedPairs / totalPairs) * 100 : 0;
        progressFill.style.width = percent + '%';
        scoreSpan.innerText = score;
    }
    
    function newGame() {
        initGame();
    }
    
    function setLevel(level) {
        currentLevel = level;
        document.querySelectorAll('.level-btn').forEach(btn => {
            if (btn.dataset.level === level) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        newGame();
    }
    
    document.getElementById('newGameBtn')?.addEventListener('click', () => newGame());
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => setLevel(btn.dataset.level));
    });
    
    // Ждём загрузки базы
    const waitForDB = setInterval(() => {
        if (typeof frequencyDB !== 'undefined' || performance.now() > 2500) {
            clearInterval(waitForDB);
            initGame();
            console.log('✅ Маджонг загружен, доступно пар:', getAllPartPairs().length);
        }
    }, 150);
</script>
</body>
</html>
