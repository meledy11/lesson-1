<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🀄 Маджонг: все части слов | Весёлый китайский</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #2d6a4f 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', sans-serif;
            padding: 0.8rem;
            min-height: 100vh;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            border-radius: 40px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 0 #C16F1A;
            color: #5a2e0e;
        }

        .hero h1 {
            font-size: 1.4rem;
        }

        .hero p {
            font-size: 0.75rem;
        }

        .back-home {
            display: inline-block;
            background: rgba(255,255,255,0.9);
            color: #A64B2A;
            text-decoration: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            margin-left: 0.3rem;
        }

        .game-status {
            background: #2b4f3a;
            border-radius: 30px;
            padding: 0.8rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            color: #FFE0A3;
        }

        .score-box {
            background: #1e3a2f;
            padding: 0.3rem 0.9rem;
            border-radius: 25px;
            text-align: center;
        }

        .score-box span:first-child {
            font-size: 0.7rem;
        }

        .score-box span:last-child {
            font-size: 1.4rem;
            font-weight: bold;
            color: #FFD966;
        }

        .progress-bar {
            flex: 2;
            background: #1e3a2f;
            border-radius: 20px;
            height: 14px;
            overflow: hidden;
        }

        .progress-fill {
            background: #FFD966;
            width: 0%;
            height: 100%;
            transition: width 0.2s;
        }

        .message-box {
            background: #1e3a2f;
            padding: 0.4rem 1rem;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
        }

        .new-game-btn {
            background: #FFB347;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 3px 0 #C16F1A;
        }

        .new-game-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #C16F1A;
        }

        .game-board {
            background: #3d2a1a;
            border-radius: 35px;
            padding: 1rem;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 10px 0 #2a1a0e;
        }

        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }

        @media (min-width: 500px) {
            .tiles-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 700px) {
            .tiles-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .tile {
            background: linear-gradient(145deg, #FFF8E7, #FFE8C8);
            border-radius: 20px;
            padding: 0.8rem 0.3rem;
            text-align: center;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 0 #B87C2E;
            border: 1px solid #FFD699;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .tile.selected {
            background: linear-gradient(145deg, #FFE0A3, #FFD580);
            box-shadow: 0 2px 0 #B87C2E;
            transform: translateY(3px);
            border: 2px solid #FF8C42;
        }

        .tile.removed {
            visibility: hidden;
            pointer-events: none;
            box-shadow: none;
            background: transparent;
        }

        .tile:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #B87C2E;
        }

        .tile-char {
            font-size: 2.2rem;
            font-family: 'Noto Sans SC', monospace;
            font-weight: bold;
            color: #A64B2A;
            line-height: 1.2;
        }

        .tile-pinyin {
            font-size: 0.8rem;
            color: #E67E22;
            font-weight: 600;
            background: rgba(255,255,255,0.7);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
        }

        .tile-label {
            font-size: 0.75rem;
            color: #6B3A1A;
            font-weight: 500;
            margin-top: 0.2rem;
            background: rgba(255,245,220,0.8);
            padding: 0.2rem 0.4rem;
            border-radius: 15px;
            max-width: 95%;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
        }

        /* Для очень маленьких экранов уменьшаем текст, но сохраняем читаемость */
        @media (max-width: 450px) {
            .tile-char { font-size: 1.8rem; }
            .tile-pinyin { font-size: 0.7rem; }
            .tile-label { font-size: 0.65rem; white-space: normal; }
            .tile { min-height: 110px; padding: 0.5rem 0.2rem; }
        }

        .level-selector {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .level-btn {
            background: #FFE0C0;
            border: 2px solid #FFB347;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .level-btn.active {
            background: #FFB347;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 1rem;
            padding: 0.6rem;
            background: #2b4f3a;
            border-radius: 40px;
            font-weight: bold;
            color: #FFD966;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>🀄 Маджонг: найди часть слова 🀄</h1>
        <p>Сопоставь иероглиф с любой его составной частью (ключом, радикалом)</p>
        <div>
            <a href="index.html" class="back-home">🏠 На главную</a>
            <a href="frequency-lesson.html" class="back-home">📖 Урок 50 слов</a>
            <a href="copybook.html" class="back-home">✍️ Прописи</a>
        </div>
    </div>

    <div class="level-selector">
        <button class="level-btn active" data-level="easy">🍃 6 слов</button>
        <button class="level-btn" data-level="medium">🌿 12 слов</button>
        <button class="level-btn" data-level="hard">🔥 20 слов</button>
        <button class="level-btn" data-level="all">🏆 ВСЕ слова</button>
    </div>

    <div class="game-status">
        <div class="score-box">
            <span>✅ Найдено</span><br>
            <span id="scoreCount">0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="message-box" id="messageBox">🎲 Нажми на плитку</div>
        <button class="new-game-btn" id="newGameBtn">🔄 Новая</button>
    </div>

    <div class="game-board">
        <div class="tiles-grid" id="tilesGrid"></div>
    </div>

    <footer>
        🀄 Найди для иероглифа его составную часть (ключ).<br>
        Пример: <strong>你 (nǐ)</strong> ←→ <strong>亻 (rén)</strong> или <strong>尔 (ěr)</strong>
    </footer>
</div>

<script src="frequency-db.js"></script>
<script>
    let currentLevel = 'easy';
    let tiles = [];
    let selectedTileIndex = null;
    let score = 0;
    let totalPairs = 0;
    
    const tilesGrid = document.getElementById('tilesGrid');
    const scoreSpan = document.getElementById('scoreCount');
    const messageBox = document.getElementById('messageBox');
    const progressFill = document.getElementById('progressFill');
    
    // Словарь пиньиней и переводов для частей
    const partDataMap = {
        "亻": { pinyin: "rén", meaning: "человек" },
        "女": { pinyin: "nǚ", meaning: "женщина" },
        "口": { pinyin: "kǒu", meaning: "рот" },
        "日": { pinyin: "rì", meaning: "солнце" },
        "月": { pinyin: "yuè", meaning: "луна/мясо" },
        "木": { pinyin: "mù", meaning: "дерево" },
        "水": { pinyin: "shuǐ", meaning: "вода" },
        "火": { pinyin: "huǒ", meaning: "огонь" },
        "土": { pinyin: "tǔ", meaning: "земля" },
        "金": { pinyin: "jīn", meaning: "металл" },
        "心": { pinyin: "xīn", meaning: "сердце" },
        "忄": { pinyin: "xīn", meaning: "сердце" },
        "手": { pinyin: "shǒu", meaning: "рука" },
        "扌": { pinyin: "shǒu", meaning: "рука" },
        "足": { pinyin: "zú", meaning: "нога" },
        "辶": { pinyin: "chuò", meaning: "движение" },
        "讠": { pinyin: "yán", meaning: "речь" },
        "饣": { pinyin: "shí", meaning: "еда" },
        "阝": { pinyin: "yì", meaning: "город/холм" },
        "宀": { pinyin: "mián", meaning: "крыша" },
        "广": { pinyin: "guǎng", meaning: "здание" },
        "厂": { pinyin: "hǎn", meaning: "утёс" },
        "尸": { pinyin: "shī", meaning: "тело" },
        "弓": { pinyin: "gōng", meaning: "лук" },
        "戈": { pinyin: "gē", meaning: "копьё" },
        "彳": { pinyin: "chì", meaning: "шаг" },
        "彡": { pinyin: "shān", meaning: "волосы" },
        "歹": { pinyin: "dǎi", meaning: "смерть" },
        "门": { pinyin: "mén", meaning: "дверь" },
        "马": { pinyin: "mǎ", meaning: "лошадь" },
        "鸟": { pinyin: "niǎo", meaning: "птица" },
        "鱼": { pinyin: "yú", meaning: "рыба" },
        "虫": { pinyin: "chóng", meaning: "насекомое" },
        "艹": { pinyin: "cǎo", meaning: "трава" },
        "竹": { pinyin: "zhú", meaning: "бамбук" },
        "米": { pinyin: "mǐ", meaning: "рис" },
        "糸": { pinyin: "mì", meaning: "шёлк" },
        "纟": { pinyin: "sī", meaning: "шёлк" },
        "贝": { pinyin: "bèi", meaning: "раковина" },
        "车": { pinyin: "chē", meaning: "машина" },
        "走": { pinyin: "zǒu", meaning: "идти" },
        "身": { pinyin: "shēn", meaning: "тело" },
        "一": { pinyin: "yī", meaning: "один" },
        "二": { pinyin: "èr", meaning: "два" },
        "三": { pinyin: "sān", meaning: "три" },
        "十": { pinyin: "shí", meaning: "десять" },
        "八": { pinyin: "bā", meaning: "восемь" },
        "人": { pinyin: "rén", meaning: "человек" },
        "入": { pinyin: "rù", meaning: "входить" },
        "几": { pinyin: "jǐ", meaning: "сколько" },
        "又": { pinyin: "yòu", meaning: "снова" },
        "厶": { pinyin: "sī", meaning: "частный" },
        "尔": { pinyin: "ěr", meaning: "ты (древн.)" },
        "京": { pinyin: "jīng", meaning: "столица" },
        "尤": { pinyin: "yóu", meaning: "особенно" },
        "者": { pinyin: "zhě", meaning: "тот, кто" },
        "文": { pinyin: "wén", meaning: "текст" },
        "正": { pinyin: "zhèng", meaning: "прямой" },
        "白": { pinyin: "bái", meaning: "белый" },
        "勺": { pinyin: "sháo", meaning: "ковш" },
        "子": { pinyin: "zǐ", meaning: "ребёнок" },
        "小": { pinyin: "xiǎo", meaning: "маленький" },
        "大": { pinyin: "dà", meaning: "большой" },
        "可": { pinyin: "kě", meaning: "можно" }
    };
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function getPartData(partChar) {
        return partDataMap[partChar] || { pinyin: "", meaning: "часть" };
    }
    
    function getAllPartPairs() {
        const allPairs = [];
        
        if (typeof frequencyDB !== 'undefined' && frequencyDB.length) {
            for (const word of frequencyDB) {
                if (!word.parts || !word.parts.length) continue;
                
                for (const part of word.parts) {
                    const partChar = part.char;
                    if (partChar === word.char) continue;
                    if (partChar.length > 2) continue;
                    
                    const partInfo = getPartData(partChar);
                    
                    allPairs.push({
                        wordId: word.id,
                        wordChar: word.char,
                        wordPinyin: word.pinyin,
                        wordMeaning: word.meaning,
                        partChar: partChar,
                        partMeaning: partInfo.meaning,
                        partPinyin: partInfo.pinyin
                    });
                }
            }
        }
        
        // Убираем дубликаты
        const uniquePairs = [];
        const keySet = new Set();
        for (const pair of allPairs) {
            const key = `${pair.wordChar}|${pair.partChar}`;
            if (!keySet.has(key)) {
                keySet.add(key);
                uniquePairs.push(pair);
            }
        }
        
        return uniquePairs;
    }
    
    function getPairsForGame(limit) {
        const allPairs = getAllPartPairs();
        const shuffled = shuffleArray([...allPairs]);
        
        if (limit === 'all') return allPairs;
        return shuffled.slice(0, limit);
    }
    
    function initGame() {
        let pairLimit = 6;
        if (currentLevel === 'medium') pairLimit = 12;
        if (currentLevel === 'hard') pairLimit = 20;
        if (currentLevel === 'all') pairLimit = 'all';
        
        const pairs = getPairsForGame(pairLimit);
        
        if (!pairs.length) {
            messageBox.innerHTML = '❌ Нет данных. Проверьте frequency-db.js';
            return;
        }
        
        totalPairs = pairs.length;
        score = 0;
        selectedTileIndex = null;
        
        const newTiles = [];
        let idCounter = 0;
        
        for (const pair of pairs) {
            newTiles.push({
                id: idCounter++,
                content: pair.wordChar,
                pinyin: pair.wordPinyin,
                type: 'word',
                pairId: idCounter - 1,
                displayText: pair.wordChar,
                label: pair.wordMeaning
            });
            newTiles.push({
                id: idCounter++,
                content: pair.partChar,
                pinyin: pair.partPinyin,
                type: 'part',
                pairId: idCounter - 2,
                displayText: pair.partChar,
                label: pair.partMeaning
            });
        }
        
        tiles = shuffleArray(newTiles);
        updateProgress();
        renderBoard();
        messageBox.innerHTML = `🎴 Найди ${totalPairs} пар!`;
    }
    
    function renderBoard() {
        if (!tilesGrid) return;
        tilesGrid.innerHTML = '';
        
        tiles.forEach((tile, idx) => {
            if (tile.removed) return;
            
            const tileDiv = document.createElement('div');
            tileDiv.className = 'tile';
            if (selectedTileIndex === idx) {
                tileDiv.classList.add('selected');
            }
            
            tileDiv.innerHTML = `
                <div class="tile-char">${tile.displayText}</div>
                <div class="tile-pinyin">${tile.pinyin || ''}</div>
                <div class="tile-label">${tile.label || (tile.type === 'word' ? 'слово' : 'часть')}</div>
            `;
            tileDiv.onclick = (function(index) {
                return function() { onTileClick(index); };
            })(idx);
            tilesGrid.appendChild(tileDiv);
        });
        
        updateProgress();
    }
    
    function onTileClick(clickedIdx) {
        const clickedTile = tiles[clickedIdx];
        if (clickedTile.removed) return;
        
        if (selectedTileIndex === null) {
            selectedTileIndex = clickedIdx;
            renderBoard();
            const tile = tiles[selectedTileIndex];
            messageBox.innerHTML = `📌 Выбрано: ${tile.displayText} (${tile.type === 'word' ? 'слово' : 'часть'})`;
            return;
        }
        
        if (selectedTileIndex === clickedIdx) {
            selectedTileIndex = null;
            renderBoard();
            messageBox.innerHTML = '🎲 Выбор сброшен';
            return;
        }
        
        const selectedTile = tiles[selectedTileIndex];
        let isMatch = false;
        
        if (selectedTile.type === 'word' && clickedTile.type === 'part') {
            isMatch = (selectedTile.pairId === clickedTile.pairId);
        } else if (selectedTile.type === 'part' && clickedTile.type === 'word') {
            isMatch = (selectedTile.pairId === clickedTile.pairId);
        }
        
        if (isMatch) {
            tiles[selectedTileIndex].removed = true;
            tiles[clickedIdx].removed = true;
            score++;
            selectedTileIndex = null;
            
            const remainingPairs = tiles.filter(t => !t.removed && t.type === 'word').length;
            
            if (remainingPairs === 0) {
                messageBox.innerHTML = '🎉 ПОБЕДА! 🎉 Ты выучил все пары!';
                renderBoard();
            } else {
                messageBox.innerHTML = `✅ Правильно! +1 (осталось ${remainingPairs})`;
                renderBoard();
            }
        } else {
            messageBox.innerHTML = `❌ ${selectedTile.displayText} ≠ ${clickedTile.displayText}. Попробуй ещё!`;
            selectedTileIndex = null;
            renderBoard();
        }
    }
    
    function updateProgress() {
        const percent = totalPairs > 0 ? (score / totalPairs) * 100 : 0;
        progressFill.style.width = percent + '%';
        scoreSpan.innerText = score;
    }
    
    function newGame() {
        initGame();
    }
    
    function setLevel(level) {
        currentLevel = level;
        document.querySelectorAll('.level-btn').forEach(btn => {
            if (btn.dataset.level === level) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        newGame();
    }
    
    document.getElementById('newGameBtn')?.addEventListener('click', () => newGame());
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => setLevel(btn.dataset.level));
    });
    
    const waitForDB = setInterval(() => {
        if (typeof frequencyDB !== 'undefined' || performance.now() > 2500) {
            clearInterval(waitForDB);
            initGame();
            console.log('✅ Маджонг загружен, доступно пар:', getAllPartPairs().length);
        }
    }, 150);
</script>
</body>
</html>
