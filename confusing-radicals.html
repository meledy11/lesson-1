    // Canvas и рисование
    const canvas = document.getElementById('writingCanvas');
    let ctx = canvas.getContext('2d');
    let painting = false;
    let undoStack = [];

    function initCanvas() {
        canvas.width = 400;
        canvas.height = 400;
        clearCanvas();
    }

    function drawGrid() {
        ctx.save();
        ctx.strokeStyle = '#D9C2A7';
        ctx.lineWidth = 1.5;
        let cellSize = canvas.width / 4;
        for (let i = 1; i <= 3; i++) {
            ctx.beginPath();
            ctx.moveTo(i * cellSize, 0);
            ctx.lineTo(i * cellSize, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * cellSize);
            ctx.lineTo(canvas.width, i * cellSize);
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(canvas.width, 0);
        ctx.lineTo(0, canvas.height);
        ctx.stroke();
        ctx.restore();
    }

    function saveState() {
        undoStack.push(canvas.toDataURL());
        if (undoStack.length > 20) undoStack.shift();
    }

    function restoreState(imgData) {
        let img = new Image();
        img.src = imgData;
        img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            drawGrid();
        };
    }

    function clearCanvas() {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        saveState();
        document.getElementById('accuracyPercent').innerText = '0%';
        document.getElementById('feedbackMsg').innerHTML = 'Холст очищен, напишите иероглиф';
    }

    function undo() {
        if (undoStack.length <= 1) {
            clearCanvas();
            return;
        }
        undoStack.pop();
        let prev = undoStack[undoStack.length - 1];
        restoreState(prev);
    }

    function startDrawing(e) {
        e.preventDefault();
        painting = true;
        const coords = getCanvasCoords(e);
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
    }

    function draw(e) {
        if (!painting) return;
        e.preventDefault();
        const coords = getCanvasCoords(e);
        const brushSize = parseInt(document.getElementById('brushSize').value);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = brushSize;
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
    }

    function stopDrawing() {
        painting = false;
        ctx.beginPath();
        saveState();
    }

    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        return { x, y };
    }

    function checkAccuracy() {
        const idealCanvas = document.createElement('canvas');
        idealCanvas.width = canvas.width;
        idealCanvas.height = canvas.height;
        const idealCtx = idealCanvas.getContext('2d');
        idealCtx.fillStyle = 'white';
        idealCtx.fillRect(0, 0, idealCanvas.width, idealCanvas.height);
        idealCtx.font = `bold ${idealCanvas.width * 0.65}px 'Noto Sans SC'`;
        idealCtx.textAlign = 'center';
        idealCtx.textBaseline = 'middle';
        idealCtx.fillStyle = 'black';
        idealCtx.fillText(currentRadical.char, idealCanvas.width / 2, idealCanvas.height / 2);
        
        const idealData = idealCtx.getImageData(0, 0, idealCanvas.width, idealCanvas.height);
        const currentData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        let matchCount = 0;
        let totalImportant = 0;
        
        for (let y = 2; y < canvas.height - 2; y++) {
            for (let x = 2; x < canvas.width - 2; x++) {
                const idx = (y * canvas.width + x) * 4;
                const idealR = idealData.data[idx];
                const idealG = idealData.data[idx+1];
                const idealB = idealData.data[idx+2];
                const isIdealImportant = (idealR + idealG + idealB) / 3 < 150;
                
                if (isIdealImportant) {
                    totalImportant++;
                    let foundMatch = false;
                    for (let dy = -2; dy <= 2; dy++) {
                        for (let dx = -2; dx <= 2; dx++) {
                            const ny = y + dy;
                            const nx = x + dx;
                            if (ny >= 0 && ny < canvas.height && nx >= 0 && nx < canvas.width) {
                                const nidx = (ny * canvas.width + nx) * 4;
                                const currentR = currentData.data[nidx];
                                const currentG = currentData.data[nidx+1];
                                const currentB = currentData.data[nidx+2];
                                const isCurrentImportant = (currentR + currentG + currentB) / 3 < 150;
                                if (isCurrentImportant) {
                                    foundMatch = true;
                                    break;
                                }
                            }
                        }
                        if (foundMatch) break;
                    }
                    if (foundMatch) matchCount++;
                }
            }
        }
        
        let accuracy = totalImportant > 0 ? (matchCount / totalImportant) * 100 : 0;
        accuracy = Math.min(100, Math.max(0, Math.floor(accuracy)));
        
        document.getElementById('accuracyPercent').innerText = accuracy + '%';
        let feedback = document.getElementById('feedbackMsg');
        
        if (accuracy > 85) feedback.innerHTML = '🏆 Отлично! Иероглиф написан очень точно!';
        else if (accuracy > 70) feedback.innerHTML = '👍 Хорошо! Небольшие погрешности.';
        else if (accuracy > 55) feedback.innerHTML = '📝 Неплохо, но обрати внимание на пропорции.';
        else if (accuracy > 35) feedback.innerHTML = '✍️ Попробуй обвести эталон (кнопка «Образец»)';
        else feedback.innerHTML = '🖌️ Начни с обведения образца. Пиши более уверенно.';
    }

        window.speechSynthesis.speak(utterance);

            const btn = document.createElement('div');
            btn.className = 'radical-btn';
            if (idx === currentRadicalIdx) btn.classList.add('active');
            btn.textContent = r.char;
            btn.onclick = () => setRadicalInGroup(idx);
            radicalsListDiv.appendChild(btn);
        });
        
        currentRadicalIdx = 0;
        currentRadical = allRadicals[group.indices[0]];
        updateUI();
    }

    function setRadicalInGroup(idx) {
        currentRadicalIdx = idx;
        const group = groups[currentGroup];
        currentRadical = allRadicals[group.indices[idx]];
        
        document.querySelectorAll('.radical-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === idx);
        });
        updateUI();
    }

    function initGroups() {
        const groupsListDiv = document.getElementById('groupsList');
        groups.forEach((group, idx) => {
            const btn = document.createElement('div');
            btn.className = 'group-btn';
            if (idx === 0) btn.classList.add('active');
            btn.textContent = group.name;
            btn.onclick = () => setGroup(idx);
            groupsListDiv.appendChild(btn);
        });
        
        const firstGroup = groups[0];
        const radicalsListDiv = document.getElementById('radicalsList');
        firstGroup.indices.forEach((radIdx, idx) => {
            const r = allRadicals[radIdx];
            const btn = document.createElement('div');
            btn.className = 'radical-btn';
            if (idx === 0) btn.classList.add('active');
            btn.textContent = r.char;
            btn.onclick = () => setRadicalInGroup(idx);
            radicalsListDiv.appendChild(btn);
        });
    }

    document.getElementById('templateBtn').addEventListener('click', showTemplate);
    document.getElementById('checkBtn').addEventListener('click', checkAccuracy);
    document.getElementById('speakBtn').addEventListener('click', () => {
        speakChinese(currentRadical.char);
    });
    document.getElementById('currentChar').addEventListener('click', () => {
        speakChinese(currentRadical.char);
    });

    initCanvas();
    initGroups();
    currentRadical = allRadicals[0];
    updateUI();
</script>
</body>
</html>
