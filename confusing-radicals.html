<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>📖 Тетрадь: 80+ похожих радикалов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            background: #E5D5BC;
            font-family: 'Segoe UI', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            padding: 10px;
            min-height: 100vh;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        .hero {
            background: #B85C1A;
            border-radius: 30px;
            padding: 10px;
            text-align: center;
            color: white;
            margin-bottom: 12px;
        }
        .hero h1 { font-size: 1.2rem; }
        .hero p { font-size: 0.6rem; opacity: 0.9; }

        /* Все радикалы (горизонтальный скролл) */
        .all-radicals {
            background: #FFF5E8;
            border-radius: 28px;
            padding: 8px;
            margin-bottom: 10px;
            border: 2px solid #E8954D;
        }
        .radicals-scroll {
            display: flex;
            overflow-x: auto;
            gap: 6px;
            padding-bottom: 4px;
            scrollbar-width: thin;
        }
        .radicals-scroll::-webkit-scrollbar { height: 3px; }
        .radical-chip {
            background: white;
            border: 2px solid #E8954D;
            border-radius: 35px;
            padding: 4px 10px;
            font-size: 1.3rem;
            font-family: 'Noto Sans SC', monospace;
            font-weight: bold;
            color: #A14212;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .radical-chip.active {
            background: #E8954D;
            color: white;
            border-color: #B85C1A;
        }
        .radical-chip:active { transform: scale(0.96); background: #FFD9B5; }

        /* Группы (комплекты) */
        .groups-area {
            background: #FFF5E8;
            border-radius: 28px;
            padding: 8px;
            margin-bottom: 10px;
        }
        .groups-title {
            font-size: 0.65rem;
            color: #B45A22;
            text-align: center;
            margin-bottom: 6px;
        }
        .group-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .group-btn {
            background: white;
            border: 1.5px solid #E8954D;
            border-radius: 30px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: bold;
            color: #B85C1A;
            cursor: pointer;
        }
        .group-btn:active { background: #FFD9B5; transform: scale(0.96); }

        /* Основной блок: образец + тетрадь */
        .practice-row {
            display: flex;
            flex-direction: row;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
        }

        .sample-card {
            background: #FFF8F0;
            border-radius: 35px;
            padding: 12px;
            text-align: center;
            border: 2px solid #E8954D;
            flex: 1;
            min-width: 140px;
        }
        .sample-label {
            font-size: 0.7rem;
            color: #B45A22;
        }
        .sample-radical {
            font-size: 4rem;
            font-family: 'Noto Sans SC', 'KaiTi', monospace;
            color: #A14212;
            background: #FFF0E0;
            border-radius: 30px;
            padding: 5px;
            margin: 8px 0;
            cursor: pointer;
        }
        .sample-pinyin {
            font-size: 1rem;
            font-weight: bold;
            color: #D96C2B;
        }
        .sample-meaning {
            font-size: 0.7rem;
            color: #A54F1A;
        }
        .sample-speak {
            background: #D96C2B;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
            margin-top: 8px;
            cursor: pointer;
        }

        .copybook-card {
            background: #FDF7E8;
            border-radius: 35px;
            padding: 12px;
            border: 2px solid #E8954D;
            flex: 2;
            min-width: 260px;
        }
        .canvas-wrap {
            display: flex;
            justify-content: center;
            touch-action: none;
        }
        canvas {
            background: #FFFEF5;
            border-radius: 20px;
            border: 2px solid #E8954D;
            width: 100%;
            max-width: 360px;
            height: auto;
            aspect-ratio: 1 / 1;
            touch-action: none;
        }
        .tools-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin: 10px 0 5px;
        }
        .tool-btn {
            background: #F2CCA0;
            border: none;
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #5A2E0E;
            cursor: pointer;
        }
        .model-status {
            background: #EEDDBB;
            border-radius: 20px;
            padding: 5px;
            text-align: center;
            font-size: 0.6rem;
            color: #A5521A;
        }

        .back-link {
            display: inline-block;
            margin-top: 12px;
            background: #E8CAA0;
            padding: 6px 16px;
            border-radius: 35px;
            text-decoration: none;
            color: #9B4A1A;
            font-weight: bold;
            font-size: 0.75rem;
        }
        footer {
            text-align: center;
            margin-top: 10px;
            font-size: 0.55rem;
            color: #B5672E;
        }

        @media (max-width: 550px) {
            .practice-row { flex-direction: column; align-items: center; }
            .sample-card { width: 100%; max-width: 280px; }
            .copybook-card { width: 100%; }
            .sample-radical { font-size: 3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>📖  Тетрадь: 80+ похожих радикалов</h1>
        <p>Выбери радикал → смотри образец → рисуй в тетради</p>
    </div>

    <!-- Все радикалы (горизонтально) -->
    <div class="all-radicals">
        <div class="radicals-scroll" id="radicalsScroll"></div>
    </div>

    <!-- Комплекты -->
    <div class="groups-area">
        <div class="groups-title">📌 КОМПЛЕКТЫ ПОХОЖИХ РАДИКАЛОВ:</div>
        <div class="group-buttons" id="groupContainer"></div>
    </div>

    <!-- Образец + тетрадь -->
    <div class="practice-row">
        <div class="sample-card">
            <div class="sample-label">🎯 ОБРАЗЕЦ ДЛЯ СРИСОВЫВАНИЯ</div>
            <div class="sample-radical" id="sampleRadical">白</div>
            <div class="sample-pinyin" id="samplePinyin">bái</div>
            <div class="sample-meaning" id="sampleMeaning">белый</div>
            <button class="sample-speak" id="speakSample">🔊 Озвучить</button>
        </div>

        <div class="copybook-card">
            <div class="canvas-wrap">
                <canvas id="radicalCanvas" width="400" height="400"></canvas>
            </div>
            <div class="tools-bar">
                <button class="tool-btn" id="clearBtn">🧽 Очистить</button>
                <button class="tool-btn" id="undoBtn">↩️ Отменить</button>
                <button class="tool-btn" id="showModelBtn">📌 Показать образец</button>
                <button class="tool-btn" id="hideModelBtn">👻 Скрыть</button>
            </div>
            <div class="model-status" id="modelStatus">⚪ Образец выключен. Нажми «Показать»</div>
        </div>
    </div>

    <div style="text-align: center;">
        <a href="index.html" class="back-link">← На главную</a>
    </div>
    <footer>✍️ Пиши пальцем. Сетка помогает. Нажми на большой иероглиф — услышишь произношение.</footer>
</div>

<script>
    // ========== БОЛЬШАЯ БАЗА (80+ ПОХОЖИХ РАДИКАЛОВ) ==========
    const radicalsDB = [
        // ПАРА 1
        { char: "白", pinyin: "bái", meaning: "белый" },
        { char: "自", pinyin: "zì", meaning: "сам, себя" },
        { char: "臼", pinyin: "jiù", meaning: "ступа" },
        { char: "日", pinyin: "rì", meaning: "солнце, день" },
        { char: "曰", pinyin: "yuē", meaning: "сказать" },
        // БЫК/ПОЛДЕНЬ
        { char: "午", pinyin: "wǔ", meaning: "полдень" },
        { char: "牛", pinyin: "niú", meaning: "корова, бык" },
        { char: "年", pinyin: "nián", meaning: "год" },
        { char: "半", pinyin: "bàn", meaning: "половина" },
        // ПОЛЕ/РАМКИ
        { char: "由", pinyin: "yóu", meaning: "через, из-за" },
        { char: "申", pinyin: "shēn", meaning: "объявлять" },
        { char: "甲", pinyin: "jiǎ", meaning: "первый, панцирь" },
        { char: "田", pinyin: "tián", meaning: "поле" },
        { char: "电", pinyin: "diàn", meaning: "электричество" },
        { char: "里", pinyin: "lǐ", meaning: "внутри" },
        // БОЛЬШОЙ/СОБАКА/НЕБО
        { char: "大", pinyin: "dà", meaning: "большой" },
        { char: "太", pinyin: "tài", meaning: "слишком" },
        { char: "犬", pinyin: "quǎn", meaning: "собака" },
        { char: "天", pinyin: "tiān", meaning: "небо" },
        { char: "夫", pinyin: "fū", meaning: "муж" },
        { char: "失", pinyin: "shī", meaning: "терять" },
        // КОНЕЦ/ЕЩЁ НЕ
        { char: "未", pinyin: "wèi", meaning: "ещё не" },
        { char: "末", pinyin: "mò", meaning: "конец" },
        { char: "朱", pinyin: "zhū", meaning: "алый, красный" },
        // ЧЕЛОВЕК/ВХОДИТЬ
        { char: "人", pinyin: "rén", meaning: "человек" },
        { char: "入", pinyin: "rù", meaning: "входить" },
        { char: "八", pinyin: "bā", meaning: "восемь" },
        // СЕБЯ/УЖЕ/ЗМЕЯ
        { char: "己", pinyin: "jǐ", meaning: "себя" },
        { char: "已", pinyin: "yǐ", meaning: "уже" },
        { char: "巳", pinyin: "sì", meaning: "змея" },
        // ТЫСЯЧА/СУХОЙ/В
        { char: "千", pinyin: "qiān", meaning: "тысяча" },
        { char: "干", pinyin: "gān", meaning: "сухой, делать" },
        { char: "于", pinyin: "yú", meaning: "в, на" },
        { char: "王", pinyin: "wáng", meaning: "король" },
        { char: "玉", pinyin: "yù", meaning: "нефрит" },
        { char: "主", pinyin: "zhǔ", meaning: "хозяин" },
        // ВОСТОК/ТЕЛЕГА
        { char: "东", pinyin: "dōng", meaning: "восток" },
        { char: "车", pinyin: "chē", meaning: "машина" },
        // ОТКРЫВАТЬ/КОЛОДЕЦ/ПОДНИМАТЬ
        { char: "开", pinyin: "kāi", meaning: "открывать" },
        { char: "井", pinyin: "jǐng", meaning: "колодец" },
        { char: "升", pinyin: "shēng", meaning: "подниматься" },
        // ПРИКАЗ/СЕЙЧАС
        { char: "令", pinyin: "lìng", meaning: "приказ" },
        { char: "今", pinyin: "jīn", meaning: "сейчас" },
        { char: "冷", pinyin: "lěng", meaning: "холодный" },
        // КРОЛИК/ИЗБЕГАТЬ
        { char: "兔", pinyin: "tù", meaning: "кролик" },
        { char: "免", pinyin: "miǎn", meaning: "избегать" },
        // ЗЕМЛЯ/ВОИН
        { char: "土", pinyin: "tǔ", meaning: "земля" },
        { char: "士", pinyin: "shì", meaning: "воин, учёный" },
        // Я/ИСКАТЬ
        { char: "我", pinyin: "wǒ", meaning: "я" },
        { char: "找", pinyin: "zhǎo", meaning: "искать" },
        // СТАНОВИТЬСЯ/СОЛЁНЫЙ
        { char: "成", pinyin: "chéng", meaning: "становиться" },
        { char: "咸", pinyin: "xián", meaning: "солёный" },
        { char: "戎", pinyin: "róng", meaning: "оружие" },
        { char: "戊", pinyin: "wù", meaning: "5-й ствол" },
        { char: "戍", pinyin: "shù", meaning: "охранять" },
        // ВЕЧЕР/ЗАМЕНА
        { char: "晚", pinyin: "wǎn", meaning: "вечер" },
        { char: "免", pinyin: "miǎn", meaning: "избегать" },
        // РАБОТА
        { char: "工", pinyin: "gōng", meaning: "работа" },
        // ДОПОЛНИТЕЛЬНЫЕ ЧАСТЫЕ
        { char: "贝", pinyin: "bèi", meaning: "раковина, деньги" },
        { char: "见", pinyin: "jiàn", meaning: "видеть" },
        { char: "几", pinyin: "jǐ", meaning: "несколько" },
        { char: "凡", pinyin: "fán", meaning: "обычный" },
        { char: "九", pinyin: "jiǔ", meaning: "девять" },
        { char: "力", pinyin: "lì", meaning: "сила" },
        { char: "刀", pinyin: "dāo", meaning: "нож" },
        { char: "勺", pinyin: "sháo", meaning: "ложка" },
        { char: "匀", pinyin: "yún", meaning: "ровный" },
        { char: "勿", pinyin: "wù", meaning: "не делай" },
        { char: "匆", pinyin: "cōng", meaning: "торопливый" }
    ];

    // Убираем дубликаты
    const radicals = [];
    const seen = new Set();
    for (const r of radicalsDB) {
        if (!seen.has(r.char)) {
            seen.add(r.char);
            radicals.push(r);
        }
    }

    let currentIndex = 0;
    let historyStack = [];
    let modelActive = false;
    let modelImage = null;

    // DOM
    const canvas = document.getElementById("radicalCanvas");
    const ctx = canvas.getContext("2d");
    const radicalsScroll = document.getElementById("radicalsScroll");
    const groupContainer = document.getElementById("groupContainer");
    const sampleRadical = document.getElementById("sampleRadical");
    const samplePinyin = document.getElementById("samplePinyin");
    const sampleMeaning = document.getElementById("sampleMeaning");
    const speakSample = document.getElementById("speakSample");
    const clearBtn = document.getElementById("clearBtn");
    const undoBtn = document.getElementById("undoBtn");
    const showModelBtn = document.getElementById("showModelBtn");
    const hideModelBtn = document.getElementById("hideModelBtn");
    const modelStatus = document.getElementById("modelStatus");

    // ========== СЕТКА ДЛЯ ИЕРОГЛИФОВ ==========
    function drawGrid() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.fillStyle = "#FFFEF5";
        ctx.fillRect(0, 0, w, h);
        
        const cellW = w / 8;
        const cellH = h / 8;
        ctx.beginPath();
        ctx.strokeStyle = "#D4C0A0";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 8; i++) {
            ctx.moveTo(i * cellW, 0);
            ctx.lineTo(i * cellW, h);
            ctx.moveTo(0, i * cellH);
            ctx.lineTo(w, i * cellH);
            ctx.stroke();
        }
        // центральные линии
        ctx.beginPath();
        ctx.strokeStyle = "#C8B088";
        ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
        ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
        ctx.stroke();
    }

    function saveHistory() {
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        historyStack.push(img);
        if (historyStack.length > 30) historyStack.shift();
    }

    function clearCanvas() {
        drawGrid();
        saveHistory();
        if (modelActive && modelImage) drawModel();
    }

    function undoLast() {
        if (historyStack.length <= 1) {
            clearCanvas();
            return;
        }
        historyStack.pop();
        const prev = historyStack[historyStack.length - 1];
        ctx.putImageData(prev, 0, 0);
        if (modelActive && modelImage) drawModel();
    }

    // Генерация полупрозрачного образца
    function generateModelImage(char) {
        const off = document.createElement("canvas");
        off.width = canvas.width;
        off.height = canvas.height;
        const octx = off.getContext("2d");
        octx.fillStyle = "#FFFEF5";
        octx.fillRect(0, 0, off.width, off.height);
        const fontSize = canvas.width * 0.62;
        octx.font = `500 ${fontSize}px "Noto Sans SC", "KaiTi", "Segoe UI Emoji"`;
        octx.textAlign = "center";
        octx.textBaseline = "middle";
        octx.fillStyle = "#AAAAAA";
        octx.fillText(char, off.width/2, off.height/2);
        return off.getImageData(0, 0, off.width, off.height);
    }

    function drawModel() {
        if (!modelActive || !modelImage) return;
        const current = ctx.getImageData(0, 0, canvas.width, canvas.height);
        ctx.putImageData(modelImage, 0, 0);
        const blended = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < blended.data.length; i += 4) {
            if (blended.data[i+3] > 50) blended.data[i+3] = 100;
        }
        ctx.putImageData(blended, 0, 0);
        for (let i = 0; i < current.data.length; i += 4) {
            if (current.data[i+3] > 30) {
                blended.data[i] = current.data[i];
                blended.data[i+1] = current.data[i+1];
                blended.data[i+2] = current.data[i+2];
                blended.data[i+3] = 255;
            }
        }
        ctx.putImageData(blended, 0, 0);
    }

    function updateModel() {
        if (modelActive) {
            modelImage = generateModelImage(radicals[currentIndex].char);
            drawGrid();
            saveHistory();
            drawModel();
        } else {
            drawGrid();
            saveHistory();
        }
    }

    // Выбор радикала
    function setRadical(index) {
        currentIndex = (index + radicals.length) % radicals.length;
        const r = radicals[currentIndex];
        sampleRadical.textContent = r.char;
        samplePinyin.textContent = r.pinyin;
        sampleMeaning.textContent = r.meaning;
        
        // Обновляем активный класс в списке
        document.querySelectorAll('.radical-chip').forEach((chip, i) => {
            if (i === currentIndex) chip.classList.add('active');
            else chip.classList.remove('active');
        });
        
        if (modelActive) {
            modelImage = generateModelImage(r.char);
            updateModel();
        } else {
            drawGrid();
            saveHistory();
        }
    }

    function speakCurrent() {
        const r = radicals[currentIndex];
        if (!r) return;
        const utterance = new SpeechSynthesisUtterance(r.char);
        utterance.lang = "zh-CN";
        utterance.rate = 0.7;
        window.speechSynthesis.cancel();
        setTimeout(() => window.speechSynthesis.speak(utterance), 50);
    }

    // Рисование пальцем/мышкой
    let drawing = false, lastX = 0, lastY = 0;
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if (e.touches) {
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
            e.preventDefault();
        } else {
            cx = e.clientX;
            cy = e.clientY;
        }
        let x = (cx - rect.left) * scaleX;
        let y = (cy - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        return { x, y };
    }
    function startDraw(e) {
        e.preventDefault();
        drawing = true;
        const pos = getCoords(e);
        lastX = pos.x; lastY = pos.y;
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(lastX, lastY);
        ctx.stroke();
        saveHistory();
        if (modelActive && modelImage) drawModel();
    }
    function drawMove(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getCoords(e);
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#2B1A0E";
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        lastX = pos.x; lastY = pos.y;
        if (modelActive && modelImage) drawModel();
    }
    function endDraw() { drawing = false; saveHistory(); }

    // Построение списка радикалов
    function buildRadicalsList() {
        radicalsScroll.innerHTML = "";
        radicals.forEach((r, idx) => {
            const chip = document.createElement("div");
            chip.className = "radical-chip";
            chip.textContent = r.char;
            chip.onclick = () => setRadical(idx);
            radicalsScroll.appendChild(chip);
        });
    }

    // Комплекты (группы)
    const groups = [
        { name: "白/自/臼/日/曰", indices: [0,1,2,3,4] },
        { name: "午/牛/年/半", indices: [5,6,7,8] },
        { name: "由/申/甲/田/电/里", indices: [9,10,11,12,13,14] },
        { name: "大/太/犬/天/夫/失", indices: [15,16,17,18,19,20] },
        { name: "未/末/朱", indices: [21,22,23] },
        { name: "人/入/八", indices: [24,25,26] },
        { name: "己/已/巳", indices: [27,28,29] },
        { name: "千/干/于", indices: [30,31,32] },
        { name: "王/玉/主", indices: [33,34,35] },
        { name: "东/车", indices: [36,37] },
        { name: "开/井/升", indices: [38,39,40] },
        { name: "令/今/冷", indices: [41,42,43] },
        { name: "兔/免", indices: [44,45] },
        { name: "土/士", indices: [46,47] },
        { name: "我/找", indices: [48,49] },
        { name: "成/咸/戎/戊/戍", indices: [50,51,52,53,54] },
        { name: "贝/见/几/凡", indices: [56,57,58,59] },
        { name: "力/刀/勺/匀", indices: [61,62,63,64] }
    ];

    function buildGroups() {
        groupContainer.innerHTML = "";
        groups.forEach(g => {
            const btn = document.createElement("button");
            btn.className = "group-btn";
            btn.textContent = g.name;
            btn.onclick = () => setRadical(g.indices[0]);
            groupContainer.appendChild(btn);
        });
    }

    // Инициализация
    function init() {
        canvas.width = 400;
        canvas.height = 400;
        canvas.style.width = "100%";
        canvas.style.height = "auto";
        
        canvas.addEventListener("mousedown", startDraw);
        canvas.addEventListener("mousemove", drawMove);
        canvas.addEventListener("mouseup", endDraw);
        canvas.addEventListener("mouseleave", endDraw);
        canvas.addEventListener("touchstart", startDraw);
        canvas.addEventListener("touchmove", drawMove);
        canvas.addEventListener("touchend", endDraw);
        
        clearBtn.onclick = () => clearCanvas();
        undoBtn.onclick = () => undoLast();
        showModelBtn.onclick = () => {
            modelActive = true;
            modelImage = generateModelImage(radicals[currentIndex].char);
            updateModel();
            modelStatus.textContent = "🟢 Полупрозрачный образец включён";
        };
        hideModelBtn.onclick = () => {
            modelActive = false;
            modelImage = null;
            updateModel();
            modelStatus.textContent = "⚪ Образец выключен";
        };
        speakSample.onclick = speakCurrent;
        sampleRadical.onclick = speakCurrent;
        
        buildRadicalsList();
        buildGroups();
        drawGrid();
        saveHistory();
        setRadical(0);
    }
    
    init();
</script>
</body>
</html>
