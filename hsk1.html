// ========== ФУНКЦИЯ ДЛЯ ПРОВЕРКИ РЕГУЛЯРНОСТИ ФОНЕТИКА ==========
function isPhoneticRegular(wordPinyin, phoneticReading) {
    if (!phoneticReading) return false;
    
    const normalize = (str) => str.toLowerCase()
        .replace(/[āáǎà]/g, 'a')
        .replace(/[ēéěè]/g, 'e')
        .replace(/[īíǐì]/g, 'i')
        .replace(/[ōóǒò]/g, 'o')
        .replace(/[ūúǔù]/g, 'u')
        .replace(/[ǖǘǚǜ]/g, 'ü')
        .replace(/ü/g, 'u');
    
    const normWord = normalize(wordPinyin);
    const normPhon = normalize(phoneticReading);
    
    if (normWord === normPhon) return true;
    
    const firstSyllableWord = normWord.split(/\s+/)[0] || normWord;
    const firstSyllablePhon = normPhon.split(/\s+/)[0] || normPhon;
    
    if (firstSyllableWord === firstSyllablePhon) return true;
    
    if (firstSyllableWord.length >= 1 && firstSyllablePhon.length >= 1 && 
        firstSyllableWord[0] === firstSyllablePhon[0]) {
        if (firstSyllableWord.substring(1) === firstSyllablePhon.substring(1)) return true;
    }
    
    return false;
}

const FINAL_WORDS = HSK1_DATA;

// ========== ПЕРЕМЕННЫЕ ==========
let currentIndex = 0;
let learnedWords = JSON.parse(localStorage.getItem('hsk1_learned') || '[]');
let currentWord = FINAL_WORDS[currentIndex];

// Canvas
const canvas = document.getElementById('writingCanvas');
let ctx = canvas.getContext('2d');
let painting = false;
let undoStack = [];

function initCanvas() {
    canvas.width = 400;
    canvas.height = 400;
    clearCanvas();
}

function drawGrid() {
    ctx.save();
    ctx.strokeStyle = '#D9C2A7';
    ctx.lineWidth = 1.5;
    let cellSize = canvas.width / 4;
    for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.moveTo(i * cellSize, 0);
        ctx.lineTo(i * cellSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * cellSize);
        ctx.lineTo(canvas.width, i * cellSize);
        ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(canvas.width, 0);
    ctx.lineTo(0, canvas.height);
    ctx.stroke();
    ctx.restore();
}

function saveState() {
    undoStack.push(canvas.toDataURL());
    if (undoStack.length > 20) undoStack.shift();
}

function restoreState(imgData) {
    let img = new Image();
    img.src = imgData;
    img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        drawGrid();
    };
}

function clearCanvas() {
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    saveState();
    document.getElementById('accuracyPercent').innerText = '0%';
    document.getElementById('feedbackMsg').innerHTML = 'Напишите иероглиф → Проверить';
}

function undo() {
    if (undoStack.length <= 1) {
        clearCanvas();
        return;
    }
    undoStack.pop();
    restoreState(undoStack[undoStack.length - 1]);
}

function startDrawing(e) {
    e.preventDefault();
    painting = true;
    const coords = getCanvasCoords(e);
    ctx.beginPath();
    ctx.moveTo(coords.x, coords.y);
    ctx.lineTo(coords.x, coords.y);
    ctx.stroke();
}

function draw(e) {
    if (!painting) return;
    e.preventDefault();
    const coords = getCanvasCoords(e);
    const brushSize = parseInt(document.getElementById('brushSize').value);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = brushSize;
    ctx.lineTo(coords.x, coords.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(coords.x, coords.y);
}

function stopDrawing() {
    painting = false;
    ctx.beginPath();
    saveState();
}

function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
    let x = (clientX - rect.left) * scaleX;
    let y = (clientY - rect.top) * scaleY;
    return { x: Math.min(Math.max(0, x), canvas.width), y: Math.min(Math.max(0, y), canvas.height) };
}

canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDrawing);
canvas.addEventListener('mouseleave', stopDrawing);
canvas.addEventListener('touchstart', startDrawing);
canvas.addEventListener('touchmove', draw);
canvas.addEventListener('touchend', stopDrawing);
canvas.addEventListener('touchcancel', stopDrawing);

function speakChinese(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "zh-CN";
    utterance.rate = 0.7;
    window.speechSynthesis.speak(utterance);
}

function updateUI() {
    document.getElementById('currentChar').innerText = currentWord.char;
    document.getElementById('currentPinyin').innerHTML = currentWord.pinyin;
    document.getElementById('currentMeaning').innerHTML = currentWord.meaning;
    document.getElementById('assocEmoji').innerHTML = currentWord.emoji || '📖';
    document.getElementById('assocText').innerHTML = currentWord.association || currentWord.meaning;
    
    let phoneticHtml = '';
    if (currentWord.hasPhonetic && currentWord.phonetic) {
        const isRegular = isPhoneticRegular(currentWord.pinyin, currentWord.phoneticReading);
        if (isRegular) {
            phoneticHtml = `<br><strong>🔊 Фонетик (регулярный):</strong> <span class="phonetic-regular">${currentWord.phonetic} (${currentWord.phoneticReading})</span> → читается похоже, только тон мог измениться`;
        } else {
            phoneticHtml = `<br><strong>🔊 Фонетик (нерегулярный):</strong> <span class="phonetic-irregular">${currentWord.phonetic} (${currentWord.phoneticReading})</span> → читается не по правилам, запомните особо!`;
        }
    } else {
        phoneticHtml = `<br><strong>🔊 Фонетик:</strong> нет (иероглиф не содержит звукового компонента)`;
    }
    
    let breakdownHtml = `<div style="background:#FFF3E0; padding:12px; border-radius:16px; margin-top:8px;">
        <strong>🔍 Состав (разбор):</strong> ${currentWord.breakdown || '—'}<br>
        <strong>📌 Ключ (радикал):</strong> ${currentWord.radical || '?'} ${currentWord.radicalMeaning ? '(' + currentWord.radicalMeaning + ')' : ''}
        ${phoneticHtml}
    </div>`;
    
    if (currentWord.examples && currentWord.examples.length > 0) {
        breakdownHtml += '<div style="margin-top:12px;"><strong>📖 Примеры (нажмите для озвучки):</strong><br>';
        for (let i = 0; i < currentWord.examples.length; i++) {
            const ex = currentWord.examples[i];
            breakdownHtml += `<div style="cursor:pointer; background:#FFF0E0; margin:8px 0; padding:8px; border-radius:12px; border-left:3px solid #FF8C42;" onclick="speakChinese('${ex.ch}')">
                <span style="font-weight:bold; font-size:1.1rem;">${ex.ch}</span> <span style="color:#FF8C42;">(${ex.pinyin})</span><br>
                <span style="color:#6B4E2E;">— ${ex.ru}</span>
            </div>`;
        }
        breakdownHtml += '</div>';
    }
    document.getElementById('breakdownDetails').innerHTML = breakdownHtml;
    document.getElementById('wordCounter').innerHTML = (currentIndex + 1) + ' / ' + FINAL_WORDS.length;
    clearCanvas();
    
    const learnedCount = learnedWords.length;
    document.getElementById('progressFill').style.width = (learnedCount / FINAL_WORDS.length) * 100 + '%';
    document.getElementById('learnedCount').innerHTML = learnedCount + ' / ' + FINAL_WORDS.length;
    const isLearned = learnedWords.includes(currentWord.char);
    const markBtn = document.getElementById('markLearnedBtn');
    if (markBtn) {
        markBtn.innerHTML = isLearned ? '✅ Выучено' : '📖 Выучил';
        markBtn.style.background = isLearned ? 'linear-gradient(135deg, #2E7D32, #1B5E20)' : 'linear-gradient(135deg, #4CAF50, #2E7D32)';
    }
}

function showTemplate() {
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.font = 'bold ' + (canvas.width * 0.65) + 'px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#999999';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillText(currentWord.char, canvas.width / 2, canvas.height / 2);
    ctx.globalAlpha = 1;
    drawGrid();
    ctx.restore();
    saveState();
    document.getElementById('feedbackMsg').innerHTML = '✏️ Обводите серый образец прямо поверх!';
}

function checkAccuracy() {
    const idealCanvas = document.createElement('canvas');
    idealCanvas.width = canvas.width;
    idealCanvas.height = canvas.height;
    const idealCtx = idealCanvas.getContext('2d');
    idealCtx.fillStyle = 'white';
    idealCtx.fillRect(0, 0, idealCanvas.width, idealCanvas.height);
    idealCtx.font = 'bold ' + (idealCanvas.width * 0.65) + 'px "Noto Sans SC"';
    idealCtx.textAlign = 'center';
    idealCtx.textBaseline = 'middle';
    idealCtx.fillStyle = 'black';
    idealCtx.fillText(currentWord.char, idealCanvas.width / 2, idealCanvas.height / 2);
    
    const idealData = idealCtx.getImageData(0, 0, idealCanvas.width, idealCanvas.height);
    const currentData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let matchCount = 0, totalImportant = 0;
    for (let y = 2; y < canvas.height - 2; y++) {
        for (let x = 2; x < canvas.width - 2; x++) {
            const idx = (y * canvas.width + x) * 4;
            const isIdealImportant = (idealData.data[idx] + idealData.data[idx+1] + idealData.data[idx+2]) / 3 < 150;
            if (isIdealImportant) {
                totalImportant++;
                let found = false;
                for (let dy = -2; dy <= 2; dy++) {
                    for (let dx = -2; dx <= 2; dx++) {
                        const ny = y + dy, nx = x + dx;
                        if (ny >= 0 && ny < canvas.height && nx >= 0 && nx < canvas.width) {
                            const nidx = (ny * canvas.width + nx) * 4;
                            const isCurrentImportant = (currentData.data[nidx] + currentData.data[nidx+1] + currentData.data[nidx+2]) / 3 < 150;
                            if (isCurrentImportant) { found = true; break; }
                        }
                    }
                    if (found) break;
                }
                if (found) matchCount++;
            }
        }
    }
    let accuracy = totalImportant > 0 ? Math.floor((matchCount / totalImportant) * 100) : 0;
    accuracy = Math.min(100, Math.max(0, accuracy));
    document.getElementById('accuracyPercent').innerText = accuracy + '%';
    let feedback = document.getElementById('feedbackMsg');
    if (accuracy > 85) feedback.innerHTML = '🏆 Отлично! Иероглиф узнаваем.';
    else if (accuracy > 70) feedback.innerHTML = '👍 Хорошо! Но можно точнее.';
    else if (accuracy > 55) feedback.innerHTML = '📝 Неплохо, попробуйте обвести образец.';
    else feedback.innerHTML = '✍️ Трудно узнать. Нажмите «Образец» и обведите.';
}

function nextWord() { currentIndex = (currentIndex + 1) % FINAL_WORDS.length; currentWord = FINAL_WORDS[currentIndex]; updateUI(); }
function prevWord() { currentIndex = (currentIndex - 1 + FINAL_WORDS.length) % FINAL_WORDS.length; currentWord = FINAL_WORDS[currentIndex]; updateUI(); }
function randomWord() { currentIndex = Math.floor(Math.random() * FINAL_WORDS.length); currentWord = FINAL_WORDS[currentIndex]; updateUI(); }
function markLearned() {
    const idx = learnedWords.indexOf(currentWord.char);
    if (idx === -1) learnedWords.push(currentWord.char);
    else learnedWords.splice(idx, 1);
    localStorage.setItem('hsk1_learned', JSON.stringify(learnedWords));
    updateUI();
}
function resetProgress() { if (confirm('Сбросить весь прогресс HSK 1?')) { learnedWords = []; localStorage.setItem('hsk1_learned', JSON.stringify(learnedWords)); updateUI(); } }

// ========== ПОИСК ==========
function normalizePinyin(str) {
    if (!str) return '';
    return str.toLowerCase()
        .replace(/[āáǎà]/g, 'a')
        .replace(/[ēéěè]/g, 'e')
        .replace(/[īíǐì]/g, 'i')
        .replace(/[ōóǒò]/g, 'o')
        .replace(/[ūúǔù]/g, 'u')
        .replace(/[ǖǘǚǜ]/g, 'u');
}

function renderAllWords() {
    const container = document.getElementById('searchResultsGrid');
    if (!container) return;
    container.innerHTML = `<div class="search-hint">📖 Всего слов: ${FINAL_WORDS.length}. Используйте поиск выше</div>
    <div class="search-grid">${FINAL_WORDS.map(word => `
        <div class="search-item" onclick="selectWordByChar('${word.char}')">
            <div class="search-char">${word.char}</div>
            <div class="search-pinyin">${word.pinyin}</div>
            <div class="search-meaning">${word.meaning}</div>
        </div>`).join('')}</div>`;
}

function searchWords() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (query === '') { renderAllWords(); return; }
    const results = FINAL_WORDS.filter(word => 
        word.char.toLowerCase().includes(query) || 
        normalizePinyin(word.pinyin).includes(normalizePinyin(query)) || 
        word.meaning.toLowerCase().includes(query)
    );
    const container = document.getElementById('searchResultsGrid');
    if (results.length === 0) { container.innerHTML = '<div class="search-hint">😔 Ничего не найдено</div>'; return; }
    container.innerHTML = `<div class="search-hint">🔍 Найдено ${results.length} слов</div>
    <div class="search-grid">${results.map(word => `
        <div class="search-item" onclick="selectWordByChar('${word.char}')">
            <div class="search-char">${word.char}</div>
            <div class="search-pinyin">${word.pinyin}</div>
            <div class="search-meaning">${word.meaning}</div>
        </div>`).join('')}</div>`;
}

function selectWordByChar(char) {
    const idx = FINAL_WORDS.findIndex(w => w.char === char);
    if (idx !== -1) { currentIndex = idx; currentWord = FINAL_WORDS[currentIndex]; updateUI(); document.getElementById('searchSection').style.display = 'none'; document.getElementById('searchInput').value = ''; }
}

function toggleSearch() {
    const sec = document.getElementById('searchSection');
    if (sec.style.display === 'none') { sec.style.display = 'block'; renderAllWords(); }
    else { sec.style.display = 'none'; }
}

// ========== ПОДКЛЮЧЕНИЕ КНОПОК ==========
document.getElementById('prevBtn').onclick = prevWord;
document.getElementById('nextBtn').onclick = nextWord;
document.getElementById('randomBtn').onclick = randomWord;
document.getElementById('markLearnedBtn').onclick = markLearned;
document.getElementById('checkBtn').onclick = checkAccuracy;
document.getElementById('templateBtn').onclick = showTemplate;
document.getElementById('clearBtn').onclick = clearCanvas;
document.getElementById('undoBtn').onclick = undo;
document.getElementById('speakBtn').onclick = () => speakChinese(currentWord.char);
document.getElementById('currentChar').onclick = () => speakChinese(currentWord.char);
document.getElementById('resetProgressBtn').onclick = resetProgress;

const searchToggleBtn = document.getElementById('searchToggleBtn');
const searchSection = document.getElementById('searchSection');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const searchCloseBtn = document.getElementById('searchCloseBtn');

if (searchToggleBtn) searchToggleBtn.onclick = toggleSearch;
if (searchCloseBtn) searchCloseBtn.onclick = toggleSearch;
if (searchBtn) searchBtn.onclick = searchWords;
if (searchInput) searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchWords(); });
if (searchSection) searchSection.style.display = 'none';

const brushSlider = document.getElementById('brushSize');
const brushVal = document.getElementById('brushValue');
if (brushSlider) brushSlider.oninput = () => { brushVal.innerText = brushSlider.value; };

initCanvas();
updateUI();
</script>
