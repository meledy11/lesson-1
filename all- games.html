<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮 ИГРЫ | Весёлый китайский</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
            padding: 1rem;
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        .hero {
            text-align: center;
            background: linear-gradient(135deg, #e94560, #c23152);
            border-radius: 60px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            box-shadow: 0 15px 0 #8b1e3f;
        }
        .hero h1 { font-size: 1.5rem; }
        .back-btn {
            display: inline-block;
            background: white;
            color: #e94560;
            text-decoration: none;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 #ccc;
        }
        .back-btn:active { transform: translateY(2px); }
        
        /* Главное меню */
        .game-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .game-card {
            background: #2a2a4a;
            border-radius: 30px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            border: 3px solid #5a5a8a;
        }
        .game-card:hover { background: #3a3a6a; }
        .game-card:active { transform: scale(0.97); }
        .game-card .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .game-card h3 { font-size: 1.1rem; margin-bottom: 0.3rem; }
        .game-card p { font-size: 0.8rem; color: #aaa; }
        .game-card.active-game {
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }
        
        /* Игровая зона */
        .game-section { display: none; }
        .game-section.active { display: block; }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .game-header button {
            background: #2a2a4a;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .game-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .game-tab {
            background: #2a2a4a;
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.1s;
        }
        .game-tab.active {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            box-shadow: 0 4px 0 #8b1e3f;
        }
        .game-tab:active { transform: scale(0.96); }
        
        .score-bar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        .score-bar span {
            background: #1a1a3e;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
        }
        
        .game-area {
            background: #2a2a4a;
            border-radius: 40px;
            padding: 1.5rem;
            min-height: 300px;
            box-shadow: 0 10px 0 #1a1a3e;
            text-align: center;
        }
        
        .word-display {
            font-size: 3rem;
            font-family: 'Noto Sans SC', monospace;
            margin: 1rem 0;
            background: #1a1a3e;
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 30px;
            letter-spacing: 0.2rem;
        }
        
        .phrase-display {
            font-size: 2rem;
            font-family: 'Noto Sans SC', monospace;
            margin: 1rem 0;
            background: #1a1a3e;
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            letter-spacing: 0.1rem;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .option-btn {
            background: #3a3a6a;
            color: white;
            border: 3px solid #5a5a8a;
            padding: 1rem 0.8rem;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.08s;
            font-family: 'Noto Sans SC', 'Segoe UI', sans-serif;
        }
        .option-btn:hover { background: #4a4a8a; }
        .option-btn:active { transform: scale(0.95); }
        .option-btn.correct { background: #4CAF50; border-color: #2E7D32; }
        .option-btn.wrong { background: #e94560; border-color: #8b1e3f; }
        .option-btn:disabled { cursor: default; opacity: 0.8; }
        
        /* Поле ввода для диктанта */
        .dictant-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.3rem;
            border-radius: 20px;
            border: 3px solid #5a5a8a;
            background: #1a1a3e;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', monospace;
            margin: 1rem 0;
            outline: none;
        }
        .dictant-input:focus { border-color: #ffb347; }
        .dictant-input.correct { border-color: #4CAF50; background: #1a3e1a; }
        .dictant-input.wrong { border-color: #e94560; background: #3e1a1a; }
        
        .btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 0.7rem 1.3rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 #8b1e3f;
            margin: 0.3rem;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8b1e3f; }
        .btn.secondary { background: #ffb347; box-shadow: 0 4px 0 #b87a2b; }
        
        .play-btn {
            background: #ffb347;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin: 0.3rem;
        }
        .play-btn:active { transform: scale(0.95); }
        
        .result-msg {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0.5rem 0;
            min-height: 1.8rem;
        }
        .result-msg.ok { color: #4CAF50; }
        .result-msg.fail { color: #ff6b6b; }
        
        .level-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .level-btn {
            background: #2a2a4a;
            color: white;
            border: 2px solid #5a5a8a;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .level-btn.active {
            background: #ffb347;
            color: #1a1a2e;
            border-color: #ffb347;
        }
        
        @media (max-width: 600px) {
            .game-menu { grid-template-columns: 1fr; }
            .options-grid { grid-template-columns: 1fr; }
            .word-display { font-size: 2rem; }
            .phrase-display { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🎮 ИГРОВОЙ ЦЕНТР</h1>
        <a href="index.html" class="back-btn">🏠 На главную</a>
    </div>
    
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div class="game-menu" id="mainMenu">
        <div class="game-card" onclick="openGame('word-match')">
            <div class="icon">📚</div>
            <h3>Угадай слово</h3>
            <p>Иероглиф → пиньинь, перевод, на слух</p>
        </div>
        <div class="game-card" onclick="openGame('dictant')">
            <div class="icon">✍️</div>
            <h3>Пиньинь-диктант</h3>
            <p>Слушай фразу → пиши пиньинь</p>
        </div>
    </div>
    
    <!-- ИГРА 1: УГАДАЙ СЛОВО -->
    <div class="game-section" id="section-word-match">
        <div class="game-header">
            <strong>📚 Угадай слово</strong>
            <button onclick="openGame('menu')">↩ Назад</button>
        </div>
        
        <div class="game-selector" id="wordMatchTabs">
            <button class="game-tab active" data-mode="pinyin">🇨🇳 Иероглиф → Пиньинь</button>
            <button class="game-tab" data-mode="meaning">🇷🇺 Иероглиф → Перевод</button>
            <button class="game-tab" data-mode="listen">👂 Слух → Иероглиф</button>
        </div>
        
        <div class="score-bar">
            <span>🏆 <strong id="wmScore">0</strong></span>
            <span>✅ <strong id="wmCorrect">0</strong></span>
            <span>❌ <strong id="wmWrong">0</strong></span>
            <span>🔥 <strong id="wmStreak">0</strong></span>
        </div>
        
        <div class="game-area" id="wmGameArea">
            <p style="padding:2rem; color:#ffb347;">Загружаю...</p>
        </div>
        
        <div style="text-align:center; margin-top:1rem;">
            <button class="btn" onclick="wmNext()">▶ Следующее</button>
            <button class="btn secondary" onclick="wmReset()">🔄 Сбросить</button>
        </div>
    </div>
    
    <!-- ИГРА 2: ПИНЬИНЬ-ДИКТАНТ -->
    <div class="game-section" id="section-dictant">
        <div class="game-header">
            <strong>✍️ Пиньинь-диктант</strong>
            <button onclick="openGame('menu')">↩ Назад</button>
        </div>
        
        <div class="level-selector" id="levelSelector">
            <button class="level-btn active" data-level="1">⭐ Уровень 1</button>
            <button class="level-btn" data-level="2">⭐⭐ Уровень 2</button>
            <button class="level-btn" data-level="3">⭐⭐⭐ Уровень 3</button>
            <button class="level-btn" data-level="0">🎯 Все</button>
        </div>
        
        <div class="score-bar">
            <span>🏆 <strong id="dcScore">0</strong></span>
            <span>✅ <strong id="dcCorrect">0</strong></span>
            <span>❌ <strong id="dcWrong">0</strong></span>
            <span>🔥 <strong id="dcStreak">0</strong></span>
        </div>
        
        <div class="game-area" id="dcGameArea">
            <p style="padding:2rem; color:#ffb347;">Загружаю фразы...</p>
        </div>
        
        <div style="text-align:center; margin-top:1rem;">
            <button class="btn" onclick="dcNext()">▶ Следующая фраза</button>
            <button class="btn secondary" onclick="dcReset()">🔄 Сбросить</button>
        </div>
    </div>
</div>

<script src="pinyin-full-db.js"></script>
<script src="phrases-db.js"></script>
<script>
    // ========== НАВИГАЦИЯ ==========
    function openGame(game) {
        document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
        if (game === 'menu') {
            document.getElementById('mainMenu').style.display = 'grid';
        } else {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('section-' + game).classList.add('active');
            if (game === 'word-match') initWordMatch();
            if (game === 'dictant') initDictant();
        }
    }
    
    // ==================== ИГРА 1: УГАДАЙ СЛОВО ====================
    let wmMode = 'pinyin';
    let wmScore = 0, wmCorrect = 0, wmWrong = 0, wmStreak = 0;
    let wmCurrent = null, wmAnswered = false;
    let allWords = [];
    
    function initWordMatch() {
        if (allWords.length === 0) loadWords();
        wmUpdateScore();
        wmNext();
        
        document.querySelectorAll('#wordMatchTabs .game-tab').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('#wordMatchTabs .game-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                wmMode = this.dataset.mode;
                wmReset();
            };
        });
    }
    
    function loadWords() {
        if (typeof pinyinFullDB === 'undefined') return;
        allWords = [];
        const seen = new Set();
        
        for (const [initial, data] of Object.entries(pinyinFullDB)) {
            if (!data.syllables) continue;
            for (const [syllable, sylData] of Object.entries(data.syllables)) {
                if (!sylData.tones) continue;
                for (const tone of sylData.tones) {
                    if (tone.char === '—' || !tone.char) continue;
                    if (!tone.example || tone.example === '—') continue;
                    
                    const raw = tone.example.trim();
                    const firstSpace = raw.indexOf(' ');
                    let word, pinyinPart;
                    if (firstSpace > 0) {
                        word = raw.substring(0, firstSpace);
                        pinyinPart = raw.substring(firstSpace + 1).trim();
                    } else {
                        word = raw;
                        pinyinPart = tone.pinyin;
                    }
                    
                    if (!word || !/^[\u4e00-\u9fff]+$/.test(word)) continue;
                    if (word.length < 2) continue;
                    if (seen.has(word)) continue;
                    seen.add(word);
                    
                    allWords.push({
                        word, pinyin: pinyinPart,
                        meaning: tone.meaning || '',
                        example_ru: tone.example_ru || tone.meaning || '',
                        sound: word
                    });
                }
            }
        }
        allWords.sort(() => Math.random() - 0.5);
    }
    
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; u.rate = 0.7;
        setTimeout(() => window.speechSynthesis.speak(u), 100);
    }
    
    function wmRandom() { return allWords[Math.floor(Math.random() * allWords.length)]; }
    
    function wmNext() {
        if (allWords.length === 0) return;
        if (wmMode === 'pinyin') wmRenderPinyin();
        else if (wmMode === 'meaning') wmRenderMeaning();
        else if (wmMode === 'listen') wmRenderListen();
    }
    
    function wmRenderPinyin() {
        const word = wmRandom(); wmCurrent = word; wmAnswered = false;
        const options = [word];
        const added = new Set([word.pinyin]);
        allWords.filter(w => w.word !== word.word && !added.has(w.pinyin)).sort(() => Math.random() - 0.5).slice(0, 3).forEach(w => {
            if (!added.has(w.pinyin) && options.length < 4) { options.push(w); added.add(w.pinyin); }
        });
        const shuffled = options.sort(() => Math.random() - 0.5);
        
        document.getElementById('wmGameArea').innerHTML = `
            <p style="color:#ffb347;">Как читается это слово?</p>
            <div class="word-display">${word.word}</div>
            <div style="color:#ffb347;">${word.meaning || ''}</div>
            <div class="result-msg" id="wmMsg"></div>
            <div class="options-grid">
                ${shuffled.map(w => `<button class="option-btn" onclick="wmCheck(this, '${w.pinyin.replace(/'/g, "\\'")}', '${word.pinyin.replace(/'/g, "\\'")}')">${w.pinyin}</button>`).join('')}
            </div>
            <button class="play-btn" onclick="speak('${word.word}')">🔊 Слушать</button>
        `;
    }
    
    function wmRenderMeaning() {
        const withRu = allWords.filter(w => w.example_ru && w.example_ru !== '—');
        const pool = withRu.length >= 4 ? withRu : allWords;
        const correct = pool[Math.floor(Math.random() * pool.length)];
        wmCurrent = correct; wmAnswered = false;
        
        const options = [correct];
        const added = new Set([correct.example_ru]);
        pool.filter(w => !added.has(w.example_ru)).sort(() => Math.random() - 0.5).slice(0, 3).forEach(w => {
            if (!added.has(w.example_ru) && options.length < 4) { options.push(w); added.add(w.example_ru); }
        });
        const shuffled = options.sort(() => Math.random() - 0.5);
        
        document.getElementById('wmGameArea').innerHTML = `
            <p style="color:#ffb347;">Что значит это слово?</p>
            <div class="word-display">${correct.word}</div>
            <div class="result-msg" id="wmMsg"></div>
            <div class="options-grid">
                ${shuffled.map(w => `<button class="option-btn" onclick="wmCheck(this, '${w.example_ru.replace(/'/g, "\\'")}', '${correct.example_ru.replace(/'/g, "\\'")}')" style="font-family:'Segoe UI',sans-serif; font-size:0.95rem;">${w.example_ru}</button>`).join('')}
            </div>
            <button class="play-btn" onclick="speak('${correct.word}')">🔊 Слушать</button>
        `;
    }
    
    function wmRenderListen() {
        const word = wmRandom(); wmCurrent = word; wmAnswered = false;
        const options = [word];
        const added = new Set([word.word]);
        allWords.filter(w => w.word !== word.word && !added.has(w.word)).sort(() => Math.random() - 0.5).slice(0, 3).forEach(w => {
            if (!added.has(w.word) && options.length < 4) { options.push(w); added.add(w.word); }
        });
        const shuffled = options.sort(() => Math.random() - 0.5);
        
        document.getElementById('wmGameArea').innerHTML = `
            <p style="color:#ffb347;">Что вы услышали?</p>
            <div class="word-display">👂</div>
            <div class="result-msg" id="wmMsg"></div>
            <div class="options-grid">
                ${shuffled.map(w => `<button class="option-btn" onclick="wmCheck(this, '${w.word}', '${word.word}')">${w.word}</button>`).join('')}
            </div>
            <button class="play-btn" onclick="speak('${word.word}')">🔊 Прослушать ещё раз</button>
        `;
        setTimeout(() => speak(word.word), 500);
    }
    
    function wmCheck(btn, selected, correct) {
        if (wmAnswered) return;
        wmAnswered = true;
        const buttons = document.querySelectorAll('#wmGameArea .option-btn');
        buttons.forEach(b => b.disabled = true);
        const msgEl = document.getElementById('wmMsg');
        
        if (selected === correct) {
            btn.classList.add('correct');
            wmScore += 10 + Math.min(wmStreak, 10); wmCorrect++; wmStreak++;
            if (msgEl) { msgEl.textContent = '✅ Правильно!'; msgEl.className = 'result-msg ok'; }
        } else {
            btn.classList.add('wrong');
            wmWrong++; wmStreak = 0;
            buttons.forEach(b => { if (b.textContent.trim() === correct) b.classList.add('correct'); });
            if (msgEl) { msgEl.textContent = '❌ Неверно! Правильно: ' + correct; msgEl.className = 'result-msg fail'; }
        }
        wmUpdateScore();
    }
    
    function wmUpdateScore() {
        document.getElementById('wmScore').textContent = wmScore;
        document.getElementById('wmCorrect').textContent = wmCorrect;
        document.getElementById('wmWrong').textContent = wmWrong;
        document.getElementById('wmStreak').textContent = wmStreak;
    }
    
    function wmReset() {
        wmScore = 0; wmCorrect = 0; wmWrong = 0; wmStreak = 0;
        wmUpdateScore();
        wmNext();
    }
    
    // ==================== ИГРА 2: ПИНЬИНЬ-ДИКТАНТ ====================
    let dcLevel = 1;
    let dcScore = 0, dcCorrect = 0, dcWrong = 0, dcStreak = 0;
    let dcCurrent = null, dcAnswered = false;
    let dcPhrases = [];
    
    function initDictant() {
        filterPhrases();
        dcUpdateScore();
        dcNext();
        
        document.querySelectorAll('#levelSelector .level-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('#levelSelector .level-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                dcLevel = parseInt(this.dataset.level);
                filterPhrases();
                dcReset();
            };
        });
    }
    
    function filterPhrases() {
        if (typeof phrasesDB === 'undefined') { dcPhrases = []; return; }
        if (dcLevel === 0) dcPhrases = [...phrasesDB];
        else dcPhrases = phrasesDB.filter(p => p.level === dcLevel);
        dcPhrases.sort(() => Math.random() - 0.5);
    }
    
    function dcNext() {
        if (dcPhrases.length === 0) {
            document.getElementById('dcGameArea').innerHTML = '<p style="padding:2rem; color:#ffb347;">⚠️ Нет фраз для этого уровня</p>';
            return;
        }
        dcCurrent = dcPhrases[Math.floor(Math.random() * dcPhrases.length)];
        dcAnswered = false;
        
        document.getElementById('dcGameArea').innerHTML = `
            <p style="color:#ffb347;">Напишите пиньинь для фразы:</p>
            <div class="phrase-display">${dcCurrent.chinese}</div>
            <p style="color:#aaa; font-size:0.9rem;">${dcCurrent.russian}</p>
            <input type="text" class="dictant-input" id="dcInput" placeholder="Введите пиньинь..." autocomplete="off">
            <div class="result-msg" id="dcMsg"></div>
            <button class="btn" onclick="dcCheck()">✅ Проверить</button>
            <button class="play-btn" onclick="speak('${dcCurrent.chinese}')">🔊 Слушать</button>
        `;
        
        document.getElementById('dcInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') dcCheck();
        });
        
        setTimeout(() => speak(dcCurrent.chinese), 500);
    }
    
    function dcCheck() {
        if (dcAnswered || !dcCurrent) return;
        const input = document.getElementById('dcInput');
        const msgEl = document.getElementById('dcMsg');
        if (!input) return;
        
        const userAnswer = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
        const correctAnswer = dcCurrent.pinyin.toLowerCase().replace(/\s+/g, ' ');
        
        dcAnswered = true;
        input.disabled = true;
        
        // Сравниваем без тонов для большей лояльности
        const userNoTone = userAnswer.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        const correctNoTone = correctAnswer.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        
        if (userNoTone === correctNoTone || userAnswer === correctAnswer) {
            input.classList.add('correct');
            dcScore += 20 + Math.min(dcStreak, 15);
            dcCorrect++; dcStreak++;
            if (msgEl) { msgEl.textContent = '✅ Отлично! ' + correctAnswer; msgEl.className = 'result-msg ok'; }
        } else {
            input.classList.add('wrong');
            dcWrong++; dcStreak = 0;
            if (msgEl) { msgEl.textContent = '❌ Правильно: ' + dcCurrent.pinyin; msgEl.className = 'result-msg fail'; }
        }
        dcUpdateScore();
    }
    
    function dcUpdateScore() {
        document.getElementById('dcScore').textContent = dcScore;
        document.getElementById('dcCorrect').textContent = dcCorrect;
        document.getElementById('dcWrong').textContent = dcWrong;
        document.getElementById('dcStreak').textContent = dcStreak;
    }
    
    function dcReset() {
        dcScore = 0; dcCorrect = 0; dcWrong = 0; dcStreak = 0;
        dcUpdateScore();
        dcNext();
    }
</script>
</body>
</html>
