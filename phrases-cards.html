<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📚 Карточки фраз | Китайский язык | Разбор иероглифов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            background: linear-gradient(135deg, #FFD966, #FFB347);
            display: inline-block;
            padding: 12px 30px;
            border-radius: 60px;
            color: #5a2e0e;
            font-size: 1.6rem;
            box-shadow: 0 6px 0 #C16F1A;
        }
        .header p {
            color: #FFE0A3;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        /* Панель управления */
        .controls {
            background: #2b4f3a;
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .level-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .level-btn {
            background: #FFE0C0;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.1s;
        }
        .level-btn.active {
            background: #FFB347;
            color: white;
            box-shadow: 0 2px 0 #C16F1A;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            background: #FFB347;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .counter {
            background: #1e3a2f;
            padding: 5px 15px;
            border-radius: 30px;
            color: #FFD966;
            font-weight: bold;
        }

        /* КАРТОЧКА */
        .card {
            background: #FFFDF5;
            border-radius: 48px;
            padding: 30px 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.5);
            margin-bottom: 25px;
            transition: 0.2s;
        }
        .chinese-main {
            text-align: center;
            font-size: 4.2rem;
            font-family: 'Noto Sans SC', monospace;
            font-weight: bold;
            color: #A64B2A;
            letter-spacing: 8px;
            margin-bottom: 15px;
            word-break: break-word;
        }
        .pinyin-badge {
            text-align: center;
            background: #FFE8D0;
            display: inline-block;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            font-size: 1.5rem;
            color: #E67E22;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .russian-meaning {
            text-align: center;
            font-size: 1.4rem;
            color: #2d6a4f;
            font-weight: bold;
            background: #E8F5E9;
            padding: 12px;
            border-radius: 40px;
            margin-bottom: 25px;
        }

        /* Разбор иероглифов */
        .char-breakdown {
            background: #FFF3E0;
            border-radius: 32px;
            padding: 20px;
            margin-top: 10px;
        }
        .char-breakdown h3 {
            color: #B45F1B;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .char-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .char-item {
            background: white;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            border-left: 6px solid #FFB347;
        }
        .char-symbol {
            font-size: 2.2rem;
            font-family: 'Noto Sans SC', monospace;
            background: #FFF0D0;
            padding: 5px 15px;
            border-radius: 30px;
            min-width: 80px;
            text-align: center;
        }
        .char-details {
            flex: 1;
        }
        .char-pinyin {
            font-weight: bold;
            color: #E67E22;
            font-size: 0.9rem;
        }
        .char-meaning {
            color: #6B3A1A;
            font-size: 0.85rem;
        }
        .char-components {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }
        .emoji-badge {
            font-size: 1.3rem;
        }

        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .action-btn {
            background: #5D9B4B;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.05s linear;
            box-shadow: 0 4px 0 #2E6B2F;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2E6B2F;
        }
        .action-btn.speak {
            background: #FF8C42;
            box-shadow: 0 4px 0 #B45F1B;
        }
        .action-btn.notebook {
            background: #2196F3;
            box-shadow: 0 4px 0 #0b5e7e;
        }

        footer {
            text-align: center;
            color: #FFD966;
            padding: 20px;
            font-size: 0.7rem;
        }

        @media (max-width: 550px) {
            .chinese-main { font-size: 2.5rem; letter-spacing: 4px; }
            .pinyin-badge { font-size: 1.1rem; }
            .russian-meaning { font-size: 1.1rem; }
            .char-symbol { font-size: 1.6rem; min-width: 60px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 Карточки китайских фраз</h1>
        <p>🎯 Разбор иероглифов | 🔊 Озвучка | ✍️ Тетрадь для прописи</p>
    </div>

    <div class="controls">
        <div class="level-buttons">
            <button class="level-btn" data-level="1">⭐ Уровень 1</button>
            <button class="level-btn" data-level="2">⭐⭐ Уровень 2</button>
            <button class="level-btn" data-level="3">⭐⭐⭐ Уровень 3</button>
            <button class="level-btn" data-level="4">⭐⭐⭐⭐ Уровень 4</button>
            <button class="level-btn" data-level="5">⭐⭐⭐⭐⭐ Уровень 5</button>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">◀</button>
            <span class="counter" id="counter">1 / 0</span>
            <button class="nav-btn" id="nextBtn">▶</button>
        </div>
    </div>

    <div class="card" id="card">
        <div class="chinese-main" id="chineseText">你好</div>
        <div class="pinyin-badge" id="pinyinText">nǐ hǎo</div>
        <div class="russian-meaning" id="russianText">Привет</div>
        
        <div class="char-breakdown">
            <h3>📖 Разбор иероглифов <span>🔍</span></h3>
            <div class="char-items" id="breakdownList"></div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn speak" id="speakBtn">🔊 Озвучить фразу</button>
            <button class="action-btn notebook" id="studyBtn">✍️ Учить в тетради</button>
        </div>
    </div>
    <footer>💡 Каждый иероглиф разобран: радикал → фонетика → смысл | Нажми «Учить в тетради» — откроется пропись</footer>
</div>

<script>
    // ==================== БАЗА РАДИКАЛОВ ДЛЯ РАЗБОРА ====================
    const radicalMap = {
        "你": { radical: "亻", radicalMeaning: "человек", phonetic: "尔", meaning: "ты" },
        "好": { radical: "女", radicalMeaning: "женщина", phonetic: "子", meaning: "хорошо" },
        "们": { radical: "亻", radicalMeaning: "человек", phonetic: "门", meaning: "суффикс мн.ч." },
        "您": { radical: "心", radicalMeaning: "сердце", phonetic: "你", meaning: "Вы (вежл.)" },
        "大": { radical: "大", radicalMeaning: "большой", phonetic: "", meaning: "большой" },

        "午": { radical: "十", radicalMeaning: "десять", phonetic: "", meaning: "полдень" },

        "见": { radical: "见", radicalMeaning: "видеть", phonetic: "", meaning: "видеть" },
        "明": { radical: "日", radicalMeaning: "солнце", phonetic: "月", meaning: "яркий, завтра" },
        "天": { radical: "一", radicalMeaning: "небо", phonetic: "", meaning: "небо, день" },
        "回": { radical: "囗", radicalMeaning: "окружать", phonetic: "", meaning: "возвращаться" },
        "头": { radical: "大", radicalMeaning: "голова", phonetic: "", meaning: "голова" },
        "会": { radical: "人", radicalMeaning: "человек", phonetic: "云", meaning: "уметь, встреча" },
        "儿": { radical: "儿", radicalMeaning: "ребёнок", phonetic: "", meaning: "ребёнок" },
        "次": { radical: "欠", radicalMeaning: "недостаток", phonetic: "", meaning: "раз, следующий" },
        "吗": { radical: "口", radicalMeaning: "рот", phonetic: "马", meaning: "вопрос. частица" },
        "最": { radical: "曰", radicalMeaning: "говорить", phonetic: "取", meaning: "самый" },
        "近": { radical: "辶", radicalMeaning: "движение", phonetic: "斤", meaning: "близкий" },
        "怎": { radical: "心", radicalMeaning: "сердце", phonetic: "乍", meaning: "как" },
        "么": { radical: "丿", radicalMeaning: "черта", phonetic: "", meaning: "суффикс" },
        "样": { radical: "木", radicalMeaning: "дерево", phonetic: "羊", meaning: "вид, образец" },
        "一": { radical: "一", radicalMeaning: "один", phonetic: "", meaning: "один" },
        "切": { radical: "刀", radicalMeaning: "нож", phonetic: "七", meaning: "резать, всё" },
        "都": { radical: "阝", radicalMeaning: "город", phonetic: "者", meaning: "все, весь" },
        "久": { radical: "丿", radicalMeaning: "черта", phonetic: "", meaning: "долго" },
        "不": { radical: "一", radicalMeaning: "нет", phonetic: "", meaning: "не" },
        "很": { radical: "彳", radicalMeaning: "шаг", phonetic: "艮", meaning: "очень" },
        "高": { radical: "高", radicalMeaning: "высокий", phonetic: "", meaning: "высокий" },
        "兴": { radical: "八", radicalMeaning: "восемь", phonetic: "", meaning: "интерес, радость" },
        "到": { radical: "刂", radicalMeaning: "нож", phonetic: "至", meaning: "достигать" },
        "谢": { radical: "讠", radicalMeaning: "речь", phonetic: "射", meaning: "благодарить" },
        "多": { radical: "夕", radicalMeaning: "вечер", phonetic: "", meaning: "много" },
        "非": { radical: "非", radicalMeaning: "неправильно", phonetic: "", meaning: "не, неправильно" },
        "常": { radical: "巾", radicalMeaning: "платок", phonetic: "尚", meaning: "часто, обычный" },
        "感": { radical: "心", radicalMeaning: "сердце", phonetic: "咸", meaning: "чувство" },
        "客": { radical: "宀", radicalMeaning: "крыша", phonetic: "各", meaning: "гость" },
        "气": { radical: "气", radicalMeaning: "газ", phonetic: "", meaning: "воздух, энергия" },
        "用": { radical: "用", radicalMeaning: "использовать", phonetic: "", meaning: "использовать" },
        "没": { radical: "氵", radicalMeaning: "вода", phonetic: "殳", meaning: "нет, не иметь" },
        "关": { radical: "丷", radicalMeaning: "восемь", phonetic: "", meaning: "закрывать" },
        "系": { radical: "糸", radicalMeaning: "шёлк", phonetic: "", meaning: "система, связь" },
        "事": { radical: "亅", radicalMeaning: "крюк", phonetic: "", meaning: "дело, вещь" },
        "问": { radical: "门", radicalMeaning: "дверь", phonetic: "口", meaning: "спрашивать" },
        "题": { radical: "页", radicalMeaning: "голова", phonetic: "是", meaning: "вопрос" },
        "对": { radical: "寸", radicalMeaning: "дюйм", phonetic: "", meaning: "правильно, пара" },
        "起": { radical: "走", radicalMeaning: "ходить", phonetic: "己", meaning: "вставать" },
        "意": { radical: "心", radicalMeaning: "сердце", phonetic: "音", meaning: "мысль, значение" },
        "思": { radical: "心", radicalMeaning: "сердце", phonetic: "田", meaning: "мысль" },
        "抱": { radical: "扌", radicalMeaning: "рука", phonetic: "包", meaning: "обнимать" },
        "歉": { radical: "欠", radicalMeaning: "недостаток", phonetic: "兼", meaning: "извинение" },
        "请": { radical: "讠", radicalMeaning: "речь", phonetic: "青", meaning: "пожалуйста" },
        "原": { radical: "厂", radicalMeaning: "утёс", phonetic: "泉", meaning: "источник, извинять" },
        "谅": { radical: "讠", radicalMeaning: "речь", phonetic: "京", meaning: "прощать" },
        "进": { radical: "辶", radicalMeaning: "движение", phonetic: "井", meaning: "входить" },
        "坐": { radical: "土", radicalMeaning: "земля", phonetic: "", meaning: "сидеть" },
        "等": { radical: "⺮", radicalMeaning: "бамбук", phonetic: "寺", meaning: "ждать" },
        "帮": { radical: "巾", radicalMeaning: "платок", phonetic: "邦", meaning: "помогать" },
        "我": { radical: "戈", radicalMeaning: "копьё", phonetic: "", meaning: "я" },
        "麻": { radical: "麻", radicalMeaning: "конопля", phonetic: "", meaning: "конопля, онемение" },
        "烦": { radical: "火", radicalMeaning: "огонь", phonetic: "页", meaning: "надоедать" },
        "了": { radical: "亅", radicalMeaning: "крюк", phonetic: "", meaning: "частица прош. вр." },
        "辛": { radical: "辛", radicalMeaning: "горький", phonetic: "", meaning: "горький, трудный" },
        "苦": { radical: "艹", radicalMeaning: "трава", phonetic: "古", meaning: "горький" },
        "慢": { radical: "忄", radicalMeaning: "сердце", phonetic: "曼", meaning: "медленный" },
        "走": { radical: "走", radicalMeaning: "ходить", phonetic: "", meaning: "идти" },
        "保": { radical: "亻", radicalMeaning: "человек", phonetic: "呆", meaning: "защищать" },
        "重": { radical: "里", radicalMeaning: "внутри", phonetic: "", meaning: "тяжёлый" },
        "祝": { radical: "礻", radicalMeaning: "дух", phonetic: "兄", meaning: "желать" },
        "运": { radical: "辶", radicalMeaning: "движение", phonetic: "云", meaning: "удача, везти" },
        "生": { radical: "生", radicalMeaning: "жизнь", phonetic: "", meaning: "рождаться, жизнь" },
        "日": { radical: "日", radicalMeaning: "солнце", phonetic: "", meaning: "день, солнце" },
        "快": { radical: "忄", radicalMeaning: "сердце", phonetic: "夬", meaning: "быстрый, радость" },
        "乐": { radical: "丿", radicalMeaning: "черта", phonetic: "", meaning: "радость, музыка" },
        "新": { radical: "斤", radicalMeaning: "топор", phonetic: "亲", meaning: "новый" },
        "年": { radical: "干", radicalMeaning: "сухой", phonetic: "", meaning: "год" }
    };

    // Функция получения разбора иероглифа
    function getCharBreakdown(char) {
        if (radicalMap[char]) {
            const data = radicalMap[char];
            let componentsText = [];
            if (data.radical) componentsText.push(`🗿 радикал: ${data.radical} (${data.radicalMeaning})`);
            if (data.phonetic) componentsText.push(`🔊 фонетика: ${data.phonetic}`);
            if (data.meaning) componentsText.push(`📖 значение: ${data.meaning}`);
            return {
                radical: data.radical,
                radicalMeaning: data.radicalMeaning,
                phonetic: data.phonetic,
                meaning: data.meaning,
                components: componentsText.join(' · ')
            };
        }
        return {
            radical: "?",
            radicalMeaning: "неизвестно",
            phonetic: "",
            meaning: "—",
            components: "📖 информация отсутствует"
        };
    }

    // База фраз
    const phrasesDB = window.phrasesDB || [];

    // Состояние
    let currentLevel = 1;
    let currentIndex = 0;
    let filteredPhrases = [];

    // Загрузка фраз из глобальной переменной (если определена)
    function loadPhrasesFromGlobal() {
        if (typeof window.phrasesDB !== 'undefined' && window.phrasesDB.length) {
            return window.phrasesDB;
        }
        return [];
    }

    function filterByLevel(level) {
        const all = loadPhrasesFromGlobal();
        return all.filter(p => p.level === level);
    }

    function updateCard() {
        if (!filteredPhrases.length) {
            document.getElementById('chineseText').innerText = 'Нет фраз';
            document.getElementById('pinyinText').innerText = '';
            document.getElementById('russianText').innerText = 'Добавьте phrasesDB';
            document.getElementById('breakdownList').innerHTML = '<div class="char-item">⚠️ База фраз не загружена</div>';
            document.getElementById('counter').innerText = `0 / 0`;
            return;
        }
        const phrase = filteredPhrases[currentIndex];
        document.getElementById('chineseText').innerText = phrase.chinese;
        document.getElementById('pinyinText').innerText = phrase.pinyin;
        document.getElementById('russianText').innerText = phrase.russian;
        document.getElementById('counter').innerText = `${currentIndex + 1} / ${filteredPhrases.length}`;

        // Разбор иероглифов
        const chars = phrase.chinese.split('');
        const breakdownHtml = chars.map(char => {
            const breakdown = getCharBreakdown(char);
            return `
                <div class="char-item">
                    <div class="char-symbol">${char}</div>
                    <div class="char-details">
                        <div class="char-pinyin">${breakdown.radical ? `🔹 ${breakdown.radical} (${breakdown.radicalMeaning})` : ''} ${breakdown.phonetic ? `🎵 ${breakdown.phonetic}` : ''}</div>
                        <div class="char-meaning">📖 ${breakdown.meaning}</div>
                        <div class="char-components">${breakdown.components}</div>
                    </div>
                    <div class="emoji-badge">${getEmojiForChar(char)}</div>
                </div>
            `;
        }).join('');
        document.getElementById('breakdownList').innerHTML = breakdownHtml;
    }

    function getEmojiForChar(char) {
        const emojiMap = {
            "你": "👤", "我": "🙋", "他": "👨", "她": "👩", "们": "👥", "好": "👍", "谢": "🙏", "对": "✅",
            "不": "❌", "是": "✔️", "有": "🔑", "没": "🚫", "去": "🏃", "来": "🚶", "吃": "🍜", "喝": "🥤",
            "大": "🐘", "小": "🐭", "多": "🔢", "少": "🔢", "天": "☀️", "地": "🌍", "人": "👤", "家": "🏠",
            "学": "📚", "生": "🎓", "老": "👴", "师": "👩‍🏫", "朋": "👫", "友": "🤝", "妈": "👩", "爸": "👨",
            "哥": "👦", "姐": "👧", "弟": "👶", "妹": "👧", "爱": "❤️", "心": "💖", "开": "🚪", "关": "🔒",
            "说": "💬", "听": "👂", "看": "👀", "写": "✍️", "读": "📖", "问": "❓", "答": "💡"
        };
        return emojiMap[char] || "🀄";
    }

    function changeLevel(level) {
        currentLevel = level;
        filteredPhrases = filterByLevel(currentLevel);
        currentIndex = 0;
        if (filteredPhrases.length) updateCard();
        document.querySelectorAll('.level-btn').forEach(btn => {
            if (parseInt(btn.dataset.level) === level) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function nextPhrase() {
        if (filteredPhrases.length && currentIndex < filteredPhrases.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevPhrase() {
        if (filteredPhrases.length && currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function speakPhrase() {
        const chinese = document.getElementById('chineseText').innerText;
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(chinese);
            utterance.lang = "zh-CN";
            utterance.rate = 0.65;
            window.speechSynthesis.speak(utterance);
        }
    }

    function studyInNotebook() {
        const chinese = document.getElementById('chineseText').innerText;
        const pinyin = document.getElementById('pinyinText').innerText;
        const russian = document.getElementById('russianText').innerText;
        // Сохраняем первое слово фразы для изучения
        const firstChar = chinese[0];
        const wordData = { char: firstChar, pinyin: pinyin.split(' ')[0], meaning: russian };
        localStorage.setItem('selected_character', JSON.stringify(wordData));
        window.location.href = 'phrases-notebook.html';
    }

    // Инициализация
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => changeLevel(parseInt(btn.dataset.level)));
    });
    document.getElementById('prevBtn').addEventListener('click', prevPhrase);
    document.getElementById('nextBtn').addEventListener('click', nextPhrase);
    document.getElementById('speakBtn').addEventListener('click', speakPhrase);
    document.getElementById('studyBtn').addEventListener('click', studyInNotebook);

    // Загружаем фразы и стартуем
    changeLevel(1);
</script>
</body>
</html>
