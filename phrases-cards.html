<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📚 Карточки фраз | Китайский | Переворот + Разбор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка с кнопкой назад */
        .top-bar {
            background: rgba(0,0,0,0.3);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            backdrop-filter: blur(10px);
        }
        .back-btn {
            background: #FF6B35;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
        }
        .menu-btn {
            background: #2d6a4f;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .title {
            color: #FFD966;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        /* Поиск и фильтры */
        .search-section {
            background: rgba(43, 79, 58, 0.9);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            backdrop-filter: blur(5px);
        }
        .search-input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            background: white;
            font-family: inherit;
        }
        .search-btn, .clear-btn {
            background: #FFB347;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            color: #5a2e0e;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .clear-btn { background: #A64B2A; color: white; }
        .search-btn:active, .clear-btn:active { transform: scale(0.96);}

        .controls {
            background: rgba(43, 79, 58, 0.9);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            backdrop-filter: blur(5px);
        }
        .level-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .level-btn {
            background: #FFE0C0;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .level-btn.active {
            background: #FFB347;
            color: white;
            box-shadow: 0 2px 0 #C16F1A;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .nav-btn {
            background: #FFB347;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .counter {
            background: #1e3a2f;
            padding: 8px 18px;
            border-radius: 40px;
            color: #FFD966;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* КАРТОЧКА НА ВЕСЬ ЭКРАН */
        .card-wrapper {
            perspective: 1000px;
            margin-bottom: 25px;
            cursor: pointer;
            min-height: 450px;
        }
        .card {
            position: relative;
            width: 100%;
            min-height: 450px;
            text-align: center;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            border-radius: 40px;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            min-height: 450px;
            backface-visibility: hidden;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .card-front {
            background: linear-gradient(145deg, #FFF8E7, #FFE8C8);
            border: 3px solid #FFB347;
        }
        .card-back {
            background: linear-gradient(145deg, #FFB347, #FF8C42);
            transform: rotateY(180deg);
            color: white;
            border: 3px solid #FFF0C0;
        }
        .chinese-main {
            font-size: 5rem;
            font-family: 'Noto Sans SC', monospace;
            font-weight: bold;
            color: #A64B2A;
            letter-spacing: 8px;
            margin-bottom: 25px;
            word-break: break-word;
            line-height: 1.3;
        }
        .pinyin-badge {
            background: rgba(255,255,255,0.85);
            padding: 12px 25px;
            border-radius: 60px;
            font-size: 1.6rem;
            color: #E67E22;
            font-weight: bold;
        }
        .card-back .chinese-main {
            color: white;
            font-size: 3.5rem;
        }
        .card-back .pinyin-badge {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        .russian-meaning {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 25px;
            color: #FFF0C0;
        }
        .flip-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: #B87C2E;
            background: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
        }
        .card-back .flip-hint {
            color: #FFE0A3;
            background: rgba(0,0,0,0.3);
        }

        /* Разбор иероглифов — кликабельные радикалы */
        .char-breakdown {
            background: rgba(255,243,224,0.95);
            border-radius: 32px;
            padding: 20px;
            margin-top: 15px;
        }
        .char-breakdown h3 {
            color: #B45F1B;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .char-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
        }
        .char-item {
            background: white;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #FFB347;
        }
        .char-symbol {
            font-size: 2rem;
            font-family: 'Noto Sans SC', monospace;
            background: #FFF0D0;
            padding: 5px 15px;
            border-radius: 30px;
            min-width: 80px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .char-symbol:active {
            transform: scale(0.95);
            background: #FFD699;
        }
        .char-details {
            flex: 1;
        }
        .char-detail {
            font-size: 0.85rem;
            color: #6B3A1A;
            margin: 4px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .char-detail strong {
            color: #E67E22;
        }
        .clickable-part {
            background: #FFF0D0;
            padding: 3px 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .clickable-part:active {
            transform: scale(0.95);
            background: #FFD699;
        }
        .clickable-part .part-pinyin {
            font-size: 0.7rem;
            color: #FF8C42;
        }
        .emoji-badge {
            font-size: 1.5rem;
        }

        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #5D9B4B;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.05s linear;
            box-shadow: 0 4px 0 #2E6B2F;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2E6B2F;
        }
        .action-btn.speak {
            background: #FF8C42;
            box-shadow: 0 4px 0 #B45F1B;
        }
        .action-btn.notebook {
            background: #2196F3;
            box-shadow: 0 4px 0 #0b5e7e;
        }
        .action-btn.random {
            background: #9C27B0;
            box-shadow: 0 4px 0 #6a1b9a;
        }

        .stats-info {
            background: rgba(30, 58, 47, 0.9);
            border-radius: 40px;
            padding: 10px 20px;
            margin-top: 20px;
            text-align: center;
            color: #FFD966;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 700px) {
            .chinese-main { font-size: 3rem; letter-spacing: 4px; }
            .pinyin-badge { font-size: 1.2rem; }
            .card-back .chinese-main { font-size: 2.2rem; }
            .russian-meaning { font-size: 1.3rem; }
            .char-symbol { font-size: 1.5rem; min-width: 60px; }
            .action-btn { padding: 10px 18px; font-size: 0.85rem; }
            .card-front, .card-back { min-height: 380px; }
            .card-wrapper { min-height: 380px; }
        }
    </style>
</head>
<body>
    <!-- Верхняя панель с кнопкой назад -->
    <div class="top-bar">
        <button class="back-btn" onclick="history.back()">← Назад</button>
        <span class="title">📚 Китайские фразы | Переворачивающиеся карточки</span>
        <a href="index.html" class="menu-btn">🏠 В меню</a>
    </div>

    <div class="container">
        <!-- Поиск -->
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по китайски, пиньинь или русски...">
            <button id="searchBtn" class="search-btn">🔍 Найти</button>
            <button id="clearSearchBtn" class="clear-btn">✖ Сброс</button>
        </div>

        <!-- Управление -->
        <div class="controls">
            <div class="level-buttons" id="levelButtons">
                <button class="level-btn active" data-level="all">🎯 Все</button>
                <button class="level-btn" data-level="1">⭐ Уровень 1</button>
                <button class="level-btn" data-level="2">⭐⭐ Уровень 2</button>
                <button class="level-btn" data-level="3">⭐⭐⭐ Уровень 3</button>
                <button class="level-btn" data-level="4">⭐⭐⭐⭐ Уровень 4</button>
                <button class="level-btn" data-level="5">⭐⭐⭐⭐⭐ Уровень 5</button>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn">◀</button>
                <span class="counter" id="counter">0 / 0</span>
                <button class="nav-btn" id="nextBtn">▶</button>
            </div>
        </div>

        <!-- Карточка с переворотом на весь экран -->
        <div class="card-wrapper" id="cardWrapper">
            <div class="card" id="card">
                <div class="card-front">
                    <div class="chinese-main" id="chineseText">你好</div>
                    <div class="pinyin-badge" id="pinyinText">nǐ hǎo</div>
                    <div class="flip-hint">🖱️ Нажми на карточку, чтобы перевернуть</div>
                </div>
                <div class="card-back">
                    <div class="chinese-main" id="chineseBack">你好</div>
                    <div class="pinyin-badge" id="pinyinBack">nǐ hǎo</div>
                    <div class="russian-meaning" id="russianText">Привет</div>
                    <div class="flip-hint">🖱️ Нажми, чтобы вернуть</div>
                </div>
            </div>
        </div>

        <!-- Разбор иероглифов с кликабельными радикалами -->
        <div class="char-breakdown">
            <h3>📖 Разбор иероглифов <span>🔍</span> <span style="font-size:0.8rem;">(нажми на радикал или фонетику — озвучим!)</span></h3>
            <div class="char-items" id="breakdownList"></div>
        </div>

        <!-- Кнопки действий -->
        <div class="action-buttons">
            <button class="action-btn speak" id="speakBtn">🔊 Озвучить фразу</button>
            <button class="action-btn notebook" id="studyBtn">✍️ Учить в тетради</button>
            <button class="action-btn random" id="randomBtn">🎲 Случайная</button>
        </div>

        <div class="stats-info" id="statsInfo">
            📊 Загрузка фраз...
        </div>
    </div>

    <script src="phrases-db.js"></script>
    <script>
        // ==================== БАЗА РАДИКАЛОВ С ПИНЬИНЕМ ====================
        const radicalMap = {
            "你": { radical: "亻", radicalPinyin: "rén", radicalMeaning: "человек", phonetic: "尔", phoneticPinyin: "ěr", meaning: "ты" },
            "好": { radical: "女", radicalPinyin: "nǚ", radicalMeaning: "женщина", phonetic: "子", phoneticPinyin: "zǐ", meaning: "хорошо" },
            "们": { radical: "亻", radicalPinyin: "rén", radicalMeaning: "человек", phonetic: "门", phoneticPinyin: "mén", meaning: "суффикс мн.ч." },
            "您": { radical: "心", radicalPinyin: "xīn", radicalMeaning: "сердце", phonetic: "你", phoneticPinyin: "nǐ", meaning: "Вы (вежл.)" },
            "大": { radical: "大", radicalPinyin: "dà", radicalMeaning: "большой", phonetic: "", phoneticPinyin: "", meaning: "большой" },
            "家": { radical: "宀", radicalPinyin: "mián", radicalMeaning: "крыша", phonetic: "豕", phoneticPinyin: "shǐ", meaning: "дом, семья" },
            "早": { radical: "日", radicalPinyin: "rì", radicalMeaning: "солнце", phonetic: "十", phoneticPinyin: "shí", meaning: "рано" },
            "上": { radical: "一", radicalPinyin: "yī", radicalMeaning: "один/верх", phonetic: "", phoneticPinyin: "", meaning: "верх, на" },
            "安": { radical: "宀", radicalPinyin: "mián", radicalMeaning: "крыша", phonetic: "女", phoneticPinyin: "nǚ", meaning: "спокойствие" },
            "下": { radical: "一", radicalPinyin: "yī", radicalMeaning: "один/низ", phonetic: "", phoneticPinyin: "", meaning: "низ, под" },
            "晚": { radical: "日", radicalPinyin: "rì", radicalMeaning: "солнце", phonetic: "免", phoneticPinyin: "miǎn", meaning: "вечер" },
            "再": { radical: "冂", radicalPinyin: "jiōng", radicalMeaning: "граница", phonetic: "", phoneticPinyin: "", meaning: "снова" },
            "见": { radical: "见", radicalPinyin: "jiàn", radicalMeaning: "видеть", phonetic: "", phoneticPinyin: "", meaning: "видеть" },
            "明": { radical: "日", radicalPinyin: "rì", radicalMeaning: "солнце", phonetic: "月", phoneticPinyin: "yuè", meaning: "яркий, завтра" },
            "天": { radical: "一", radicalPinyin: "yī", radicalMeaning: "один/небо", phonetic: "", phoneticPinyin: "", meaning: "небо, день" },
            "回": { radical: "囗", radicalPinyin: "wéi", radicalMeaning: "окружать", phonetic: "", phoneticPinyin: "", meaning: "возвращаться" },
            "头": { radical: "大", radicalPinyin: "dà", radicalMeaning: "большой", phonetic: "", phoneticPinyin: "", meaning: "голова" },
            "会": { radical: "人", radicalPinyin: "rén", radicalMeaning: "человек", phonetic: "云", phoneticPinyin: "yún", meaning: "уметь, встреча" },
            "吗": { radical: "口", radicalPinyin: "kǒu", radicalMeaning: "рот", phonetic: "马", phoneticPinyin: "mǎ", meaning: "вопрос. частица" },
            "一": { radical: "一", radicalPinyin: "yī", radicalMeaning: "один", phonetic: "", phoneticPinyin: "", meaning: "один" },
            "不": { radical: "一", radicalPinyin: "yī", radicalMeaning: "нет", phonetic: "", phoneticPinyin: "", meaning: "не" },
            "很": { radical: "彳", radicalPinyin: "chì", radicalMeaning: "шаг", phonetic: "艮", phoneticPinyin: "gèn", meaning: "очень" },
            "高": { radical: "高", radicalPinyin: "gāo", radicalMeaning: "высокий", phonetic: "", phoneticPinyin: "", meaning: "высокий" },
            "谢": { radical: "讠", radicalPinyin: "yán", radicalMeaning: "речь", phonetic: "射", phoneticPinyin: "shè", meaning: "благодарить" },
            "多": { radical: "夕", radicalPinyin: "xī", radicalMeaning: "вечер", phonetic: "", phoneticPinyin: "", meaning: "много" },
            "请": { radical: "讠", radicalPinyin: "yán", radicalMeaning: "речь", phonetic: "青", phoneticPinyin: "qīng", meaning: "пожалуйста" },
            "进": { radical: "辶", radicalPinyin: "chuò", radicalMeaning: "движение", phonetic: "井", phoneticPinyin: "jǐng", meaning: "входить" },
            "坐": { radical: "土", radicalPinyin: "tǔ", radicalMeaning: "земля", phonetic: "", phoneticPinyin: "", meaning: "сидеть" },
            "等": { radical: "⺮", radicalPinyin: "zhú", radicalMeaning: "бамбук", phonetic: "寺", phoneticPinyin: "sì", meaning: "ждать" },
            "我": { radical: "戈", radicalPinyin: "gē", radicalMeaning: "копьё", phonetic: "", phoneticPinyin: "", meaning: "я" },
            "是": { radical: "日", radicalPinyin: "rì", radicalMeaning: "солнце", phonetic: "正", phoneticPinyin: "zhèng", meaning: "быть" },
            "有": { radical: "月", radicalPinyin: "yuè", radicalMeaning: "мясо", phonetic: "又", phoneticPinyin: "yòu", meaning: "иметь" },
            "在": { radical: "土", radicalPinyin: "tǔ", radicalMeaning: "земля", phonetic: "", phoneticPinyin: "", meaning: "находиться" },
            "去": { radical: "土", radicalPinyin: "tǔ", radicalMeaning: "земля", phonetic: "厶", phoneticPinyin: "sī", meaning: "идти" },
            "来": { radical: "木", radicalPinyin: "mù", radicalMeaning: "дерево", phonetic: "米", phoneticPinyin: "mǐ", meaning: "приходить" },
            "说": { radical: "讠", radicalPinyin: "yán", radicalMeaning: "речь", phonetic: "兑", phoneticPinyin: "duì", meaning: "говорить" },
            "吃": { radical: "口", radicalPinyin: "kǒu", radicalMeaning: "рот", phonetic: "乞", phoneticPinyin: "qǐ", meaning: "есть" },
            "人": { radical: "人", radicalPinyin: "rén", radicalMeaning: "человек", phonetic: "", phoneticPinyin: "", meaning: "человек" },
            "这": { radical: "辶", radicalPinyin: "chuò", radicalMeaning: "движение", phonetic: "文", phoneticPinyin: "wén", meaning: "этот" },
            "那": { radical: "阝", radicalPinyin: "yì", radicalMeaning: "город", phonetic: "", phoneticPinyin: "", meaning: "тот" },
            "她": { radical: "女", radicalPinyin: "nǚ", radicalMeaning: "женщина", phonetic: "也", phoneticPinyin: "yě", meaning: "она" },
            "他": { radical: "亻", radicalPinyin: "rén", radicalMeaning: "человек", phonetic: "也", phoneticPinyin: "yě", meaning: "он" },
            "子": { radical: "子", radicalPinyin: "zǐ", radicalMeaning: "ребёнок", phonetic: "", phoneticPinyin: "", meaning: "ребёнок" },
            "女": { radical: "女", radicalPinyin: "nǚ", radicalMeaning: "женщина", phonetic: "", phoneticPinyin: "", meaning: "женщина" },
            "口": { radical: "口", radicalPinyin: "kǒu", radicalMeaning: "рот", phonetic: "", phoneticPinyin: "", meaning: "рот" }
        };

        function speakText(text, lang = "zh-CN") {
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.7;
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        function getCharBreakdown(char) {
            if (radicalMap[char]) {
                const data = radicalMap[char];
                return {
                    radical: data.radical,
                    radicalPinyin: data.radicalPinyin || "",
                    radicalMeaning: data.radicalMeaning,
                    phonetic: data.phonetic,
                    phoneticPinyin: data.phoneticPinyin || "",
                    meaning: data.meaning,
                    hasRadical: true
                };
            }
            return {
                radical: "?",
                radicalPinyin: "",
                radicalMeaning: "неизвестно",
                phonetic: "",
                phoneticPinyin: "",
                meaning: "—",
                hasRadical: false
            };
        }

        function getEmojiForChar(char) {
            const emojiMap = {
                "你": "👤", "我": "🙋", "他": "👨", "她": "👩", "们": "👥", "好": "👍", "谢": "🙏", "对": "✅",
                "不": "❌", "是": "✔️", "有": "🔑", "没": "🚫", "去": "🏃", "来": "🚶", "吃": "🍜", "喝": "🥤",
                "大": "🐘", "小": "🐭", "多": "🔢", "天": "☀️", "地": "🌍", "人": "👤", "家": "🏠", "学": "📚",
                "生": "🎓", "老": "👴", "师": "👩‍🏫", "朋": "👫", "友": "🤝", "妈": "👩", "爸": "👨", "爱": "❤️",
                "心": "💖", "开": "🚪", "关": "🔒", "说": "💬", "听": "👂", "看": "👀", "写": "✍️", "问": "❓"
            };
            return emojiMap[char] || "🀄";
        }

        // Состояние
        let allPhrases = [];
        let filteredPhrases = [];
        let currentIndex = 0;
        let currentLevel = "all";
        let currentSearchQuery = "";
        let isFlipped = false;

        function loadPhrases() {
            if (typeof phrasesDB !== 'undefined' && Array.isArray(phrasesDB)) {
                allPhrases = phrasesDB;
                document.getElementById('statsInfo').innerHTML = `📊 Всего: ${allPhrases.length} фраз | ⭐1: ${allPhrases.filter(p=>p.level===1).length} | ⭐⭐2: ${allPhrases.filter(p=>p.level===2).length} | ⭐⭐⭐3: ${allPhrases.filter(p=>p.level===3).length} | ⭐⭐⭐⭐4: ${allPhrases.filter(p=>p.level===4).length} | ⭐⭐⭐⭐⭐5: ${allPhrases.filter(p=>p.level===5).length}`;
                applyFilters();
            } else {
                console.error("phrasesDB не загружена");
                document.getElementById('statsInfo').innerHTML = "⚠️ База фраз не загружена!";
                allPhrases = [
                    { chinese: "你好", pinyin: "nǐ hǎo", russian: "Привет", level: 1 },
                    { chinese: "谢谢", pinyin: "xiè xie", russian: "Спасибо", level: 1 }
                ];
                applyFilters();
            }
        }

        function applyFilters() {
            let result = [...allPhrases];
            if (currentLevel !== "all") {
                result = result.filter(p => p.level === parseInt(currentLevel));
            }
            if (currentSearchQuery.trim() !== "") {
                const query = currentSearchQuery.trim().toLowerCase();
                result = result.filter(p => 
                    p.chinese.toLowerCase().includes(query) ||
                    p.pinyin.toLowerCase().includes(query) ||
                    p.russian.toLowerCase().includes(query)
                );
            }
            filteredPhrases = result;
            if (filteredPhrases.length === 0) {
                document.getElementById('counter').innerText = `0 / 0`;
                document.getElementById('chineseText').innerText = "😔";
                document.getElementById('pinyinText').innerText = "";
                document.getElementById('chineseBack').innerText = "😔";
                document.getElementById('pinyinBack').innerText = "";
                document.getElementById('russianText').innerText = "Ничего не найдено";
                document.getElementById('breakdownList').innerHTML = '<div class="char-item">Ничего не найдено</div>';
                return;
            }
            if (currentIndex >= filteredPhrases.length) currentIndex = 0;
            updateCard();
            updateCounter();
        }

        function updateCard() {
            if (!filteredPhrases.length) return;
            const phrase = filteredPhrases[currentIndex];
            document.getElementById('chineseText').innerText = phrase.chinese;
            document.getElementById('pinyinText').innerText = phrase.pinyin;
            document.getElementById('chineseBack').innerText = phrase.chinese;
            document.getElementById('pinyinBack').innerText = phrase.pinyin;
            document.getElementById('russianText').innerText = phrase.russian;
            
            const chars = phrase.chinese.split('');
            const breakdownHtml = chars.map(char => {
                const breakdown = getCharBreakdown(char);
                return `
                    <div class="char-item">
                        <div class="char-symbol" onclick="speakText('${char}')">${char}</div>
                        <div class="char-details">
                            ${breakdown.hasRadical ? `
                                <div class="char-detail">
                                    <strong>🗿 Радикал:</strong>
                                    <span class="clickable-part" onclick="speakText('${breakdown.radical}')">
                                        ${breakdown.radical} 
                                        <span class="part-pinyin">(${breakdown.radicalPinyin})</span>
                                    </span>
                                    — ${breakdown.radicalMeaning}
                                </div>
                            ` : ''}
                            ${breakdown.phonetic ? `
                                <div class="char-detail">
                                    <strong>🔊 Фонетика:</strong>
                                    <span class="clickable-part" onclick="speakText('${breakdown.phonetic}')">
                                        ${breakdown.phonetic}
                                        <span class="part-pinyin">(${breakdown.phoneticPinyin})</span>
                                    </span>
                                </div>
                            ` : ''}
                            <div class="char-detail"><strong>📖 Значение:</strong> ${breakdown.meaning}</div>
                        </div>
                        <div class="emoji-badge">${getEmojiForChar(char)}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('breakdownList').innerHTML = breakdownHtml;
            
            if (isFlipped) {
                document.getElementById('card').classList.remove('flipped');
                isFlipped = false;
            }
        }

        function updateCounter() {
            document.getElementById('counter').innerText = `${filteredPhrases.length ? currentIndex + 1 : 0} / ${filteredPhrases.length}`;
        }

        function nextPhrase() {
            if (filteredPhrases.length) {
                currentIndex = (currentIndex + 1) % filteredPhrases.length;
                updateCard();
            }
        }

        function prevPhrase() {
            if (filteredPhrases.length) {
                currentIndex = (currentIndex - 1 + filteredPhrases.length) % filteredPhrases.length;
                updateCard();
            }
        }

        function randomPhrase() {
            if (filteredPhrases.length) {
                currentIndex = Math.floor(Math.random() * filteredPhrases.length);
                updateCard();
            }
        }

        function speakPhrase() {
            const chinese = document.getElementById('chineseText').innerText;
            if (chinese && chinese !== "😔") speakText(chinese);
        }

        function studyInNotebook() {
            const phrase = filteredPhrases[currentIndex];
            if (!phrase) return;
            const firstChar = phrase.chinese[0];
            const wordData = { char: firstChar, pinyin: phrase.pinyin.split(' ')[0], meaning: phrase.russian };
            localStorage.setItem('selected_character', JSON.stringify(wordData));
            window.location.href = 'phrases-notebook.html';
        }

        function setLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(btn => {
                if (btn.dataset.level === level) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            currentIndex = 0;
            applyFilters();
        }

        function searchPhrases() {
            currentSearchQuery = document.getElementById('searchInput').value;
            currentIndex = 0;
            applyFilters();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentSearchQuery = '';
            currentIndex = 0;
            applyFilters();
        }

        function flipCard() {
            isFlipped = !isFlipped;
            if (isFlipped) document.getElementById('card').classList.add('flipped');
            else document.getElementById('card').classList.remove('flipped');
        }

        // Event listeners
        document.getElementById('prevBtn').addEventListener('click', prevPhrase);
        document.getElementById('nextBtn').addEventListener('click', nextPhrase);
        document.getElementById('randomBtn').addEventListener('click', randomPhrase);
        document.getElementById('speakBtn').addEventListener('click', speakPhrase);
        document.getElementById('studyBtn').addEventListener('click', studyInNotebook);
        document.getElementById('searchBtn').addEventListener('click', searchPhrases);
        document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
        document.getElementById('cardWrapper').addEventListener('click', flipCard);
        
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', () => setLevel(btn.dataset.level));
        });
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchPhrases();
        });

        // Глобальная функция для озвучки из onclick
        window.speakText = speakText;
        
        loadPhrases();
    </script>
</body>
</html>
