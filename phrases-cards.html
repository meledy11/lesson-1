<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📚 Карточки фраз | Китайский | Переворот + Разбор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            background: linear-gradient(135deg, #FFD966, #FFB347);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 60px;
            color: #5a2e0e;
            font-size: 1.3rem;
            box-shadow: 0 5px 0 #C16F1A;
        }
        .header p {
            color: #FFE0A3;
            margin-top: 8px;
            font-size: 0.8rem;
        }

        /* Поиск и фильтры */
        .search-section {
            background: #2b4f3a;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 50px;
            font-size: 0.9rem;
            outline: none;
            background: white;
        }
        .search-btn, .clear-btn {
            background: #FFB347;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            color: #5a2e0e;
            transition: 0.1s;
        }
        .clear-btn { background: #A64B2A; color: white; }
        .search-btn:active, .clear-btn:active { transform: scale(0.96);}

        .controls {
            background: #2b4f3a;
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .level-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .level-btn {
            background: #FFE0C0;
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .level-btn.active {
            background: #FFB347;
            color: white;
            box-shadow: 0 2px 0 #C16F1A;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .nav-btn {
            background: #FFB347;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .counter {
            background: #1e3a2f;
            padding: 5px 15px;
            border-radius: 30px;
            color: #FFD966;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* КАРТОЧКА С ПЕРЕВОРОТОМ */
        .card-container {
            perspective: 1000px;
            margin-bottom: 25px;
            cursor: pointer;
        }
        .card {
            position: relative;
            width: 100%;
            height: 320px;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 40px;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .card-front {
            background: linear-gradient(145deg, #FFF8E7, #FFE8C8);
            border: 3px solid #FFB347;
        }
        .card-back {
            background: linear-gradient(145deg, #FFB347, #FF8C42);
            transform: rotateY(180deg);
            color: white;
            border: 3px solid #FFF0C0;
        }
        .chinese-main {
            font-size: 4rem;
            font-family: 'Noto Sans SC', monospace;
            font-weight: bold;
            color: #A64B2A;
            letter-spacing: 6px;
            margin-bottom: 20px;
            word-break: break-word;
        }
        .pinyin-badge {
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1.3rem;
            color: #E67E22;
            font-weight: bold;
        }
        .card-back .chinese-main {
            color: white;
            font-size: 3rem;
        }
        .card-back .pinyin-badge {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        .russian-meaning {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            color: #FFF0C0;
        }
        .flip-hint {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 0.7rem;
            color: #B87C2E;
            background: rgba(255,255,255,0.6);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .card-back .flip-hint {
            color: #FFE0A3;
            background: rgba(0,0,0,0.3);
        }

        /* Разбор иероглифов */
        .char-breakdown {
            background: #FFF3E0;
            border-radius: 32px;
            padding: 18px;
            margin-top: 10px;
        }
        .char-breakdown h3 {
            color: #B45F1B;
            margin-bottom: 12px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .char-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }
        .char-item {
            background: white;
            border-radius: 20px;
            padding: 10px 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #FFB347;
        }
        .char-symbol {
            font-size: 1.8rem;
            font-family: 'Noto Sans SC', monospace;
            background: #FFF0D0;
            padding: 5px 12px;
            border-radius: 25px;
            min-width: 70px;
            text-align: center;
        }
        .char-details {
            flex: 1;
        }
        .char-detail {
            font-size: 0.8rem;
            color: #6B3A1A;
            margin: 2px 0;
        }
        .char-detail strong {
            color: #E67E22;
        }
        .emoji-badge {
            font-size: 1.3rem;
        }

        /* Кнопки действий */
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #5D9B4B;
            border: none;
            padding: 12px 22px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.05s linear;
            box-shadow: 0 3px 0 #2E6B2F;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2E6B2F;
        }
        .action-btn.speak {
            background: #FF8C42;
            box-shadow: 0 3px 0 #B45F1B;
        }
        .action-btn.notebook {
            background: #2196F3;
            box-shadow: 0 3px 0 #0b5e7e;
        }
        .action-btn.random {
            background: #9C27B0;
            box-shadow: 0 3px 0 #6a1b9a;
        }

        .stats-info {
            background: #1e3a2f;
            border-radius: 30px;
            padding: 8px 15px;
            margin-top: 15px;
            text-align: center;
            color: #FFD966;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .card { height: 280px; }
            .chinese-main { font-size: 2.5rem; letter-spacing: 3px; }
            .pinyin-badge { font-size: 1rem; }
            .card-back .chinese-main { font-size: 2rem; }
            .russian-meaning { font-size: 1.1rem; }
            .char-symbol { font-size: 1.4rem; min-width: 55px; }
            .action-btn { padding: 8px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 Карточки китайских фраз</h1>
        <p>🎯 Нажми на карточку — переворот | 🔊 Озвучка | ✍️ Тетрадь для прописи</p>
    </div>

    <!-- Поиск -->
    <div class="search-section">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по китайски, пиньинь или русски...">
        <button id="searchBtn" class="search-btn">🔍 Найти</button>
        <button id="clearSearchBtn" class="clear-btn">✖ Сброс</button>
    </div>

    <!-- Управление -->
    <div class="controls">
        <div class="level-buttons" id="levelButtons">
            <button class="level-btn active" data-level="all">🎯 Все</button>
            <button class="level-btn" data-level="1">⭐ Уровень 1</button>
            <button class="level-btn" data-level="2">⭐⭐ Уровень 2</button>
            <button class="level-btn" data-level="3">⭐⭐⭐ Уровень 3</button>
            <button class="level-btn" data-level="4">⭐⭐⭐⭐ Уровень 4</button>
            <button class="level-btn" data-level="5">⭐⭐⭐⭐⭐ Уровень 5</button>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">◀</button>
            <span class="counter" id="counter">0 / 0</span>
            <button class="nav-btn" id="nextBtn">▶</button>
        </div>
    </div>

    <!-- Карточка с переворотом -->
    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <div class="card-front">
                <div class="chinese-main" id="chineseText">你好</div>
                <div class="pinyin-badge" id="pinyinText">nǐ hǎo</div>
                <div class="flip-hint">🖱️ Нажми, чтобы перевернуть</div>
            </div>
            <div class="card-back">
                <div class="chinese-main" id="chineseBack">你好</div>
                <div class="pinyin-badge" id="pinyinBack">nǐ hǎo</div>
                <div class="russian-meaning" id="russianText">Привет</div>
                <div class="flip-hint">🖱️ Нажми, чтобы вернуть</div>
            </div>
        </div>
    </div>

    <!-- Разбор иероглифов -->
    <div class="char-breakdown">
        <h3>📖 Разбор иероглифов <span>🔍</span></h3>
        <div class="char-items" id="breakdownList"></div>
    </div>

    <!-- Кнопки действий -->
    <div class="action-buttons">
        <button class="action-btn speak" id="speakBtn">🔊 Озвучить фразу</button>
        <button class="action-btn notebook" id="studyBtn">✍️ Учить в тетради</button>
        <button class="action-btn random" id="randomBtn">🎲 Случайная карточка</button>
    </div>

    <div class="stats-info" id="statsInfo">
        📊 Всего фраз: загрузка...
    </div>
</div>

<script src="phrases-db.js"></script>

    function getCharBreakdown(char) {
        if (radicalMap[char]) {
            const data = radicalMap[char];
            let parts = [];
            if (data.radical) parts.push(`🗿 радикал: ${data.radical} (${data.radicalMeaning})`);
            if (data.phonetic) parts.push(`🔊 фонетика: ${data.phonetic}`);
            if (data.meaning) parts.push(`📖 значение: ${data.meaning}`);
            return {
                radical: data.radical,
                radicalMeaning: data.radicalMeaning,
                phonetic: data.phonetic,
                meaning: data.meaning,
                parts: parts.join(' · ')
            };
        }
        return {
            radical: "?",
            radicalMeaning: "неизвестно",
            phonetic: "",
            meaning: "—",
            parts: "📖 информация отсутствует"
        };
    }

    function getEmojiForChar(char) {
        const emojiMap = {
            "你": "👤", "我": "🙋", "他": "👨", "她": "👩", "们": "👥", "好": "👍", "谢": "🙏", "对": "✅",
            "不": "❌", "是": "✔️", "有": "🔑", "没": "🚫", "去": "🏃", "来": "🚶", "吃": "🍜", "喝": "🥤",
            "大": "🐘", "小": "🐭", "多": "🔢", "少": "🔢", "天": "☀️", "地": "🌍", "人": "👤", "家": "🏠",
            "学": "📚", "生": "🎓", "老": "👴", "师": "👩‍🏫", "朋": "👫", "友": "🤝", "妈": "👩", "爸": "👨",
            "哥": "👦", "姐": "👧", "弟": "👶", "妹": "👧", "爱": "❤️", "心": "💖", "开": "🚪", "关": "🔒",
            "说": "💬", "听": "👂", "看": "👀", "写": "✍️", "读": "📖", "问": "❓", "答": "💡"
        };
        return emojiMap[char] || "🀄";
    }

    // Состояние
    let allPhrases = [];
    let filteredPhrases = [];
    let currentIndex = 0;
    let currentLevel = "all";
    let currentSearchQuery = "";
    let isFlipped = false;

    // Загрузка фраз
    function loadPhrases() {
        if (typeof phrasesDB !== 'undefined' && Array.isArray(phrasesDB)) {
            allPhrases = phrasesDB;
            document.getElementById('statsInfo').innerHTML = `📊 Всего фраз: ${allPhrases.length} | ⭐1: ${allPhrases.filter(p=>p.level===1).length} | ⭐⭐2: ${allPhrases.filter(p=>p.level===2).length} | ⭐⭐⭐3: ${allPhrases.filter(p=>p.level===3).length} | ⭐⭐⭐⭐4: ${allPhrases.filter(p=>p.level===4).length} | ⭐⭐⭐⭐⭐5: ${allPhrases.filter(p=>p.level===5).length}`;
            applyFilters();
        } else {
            console.error("phrasesDB не загружена");
            document.getElementById('statsInfo').innerHTML = "⚠️ База фраз не загружена! Проверьте phrases-db.js";
            // Демо-данные
            allPhrases = [
                { chinese: "你好", pinyin: "nǐ hǎo", russian: "Привет", level: 1 },
                { chinese: "你好吗", pinyin: "nǐ hǎo ma", russian: "Как дела?", level: 1 },
                { chinese: "谢谢", pinyin: "xiè xie", russian: "Спасибо", level: 1 }
            ];
            applyFilters();
        }
    }

    function applyFilters() {
        let result = [...allPhrases];
        
        // Фильтр по уровню
        if (currentLevel !== "all") {
            result = result.filter(p => p.level === parseInt(currentLevel));
        }
        
        // Фильтр по поиску
        if (currentSearchQuery.trim() !== "") {
            const query = currentSearchQuery.trim().toLowerCase();
            result = result.filter(p => 
                p.chinese.toLowerCase().includes(query) ||
                p.pinyin.toLowerCase().includes(query) ||
                p.russian.toLowerCase().includes(query)
            );
        }
        
        filteredPhrases = result;
        
        if (filteredPhrases.length === 0) {
            document.getElementById('counter').innerText = `0 / 0`;
            document.getElementById('chineseText').innerText = "😔";
            document.getElementById('pinyinText').innerText = "";
            document.getElementById('chineseBack').innerText = "😔";
            document.getElementById('pinyinBack').innerText = "";
            document.getElementById('russianText').innerText = "Ничего не найдено";
            document.getElementById('breakdownList').innerHTML = '<div class="char-item">Ничего не найдено</div>';
            return;
        }
        
        if (currentIndex >= filteredPhrases.length) currentIndex = 0;
        updateCard();
        updateCounter();
    }

    function updateCard() {
        if (!filteredPhrases.length) return;
        
        const phrase = filteredPhrases[currentIndex];
        document.getElementById('chineseText').innerText = phrase.chinese;
        document.getElementById('pinyinText').innerText = phrase.pinyin;
        document.getElementById('chineseBack').innerText = phrase.chinese;
        document.getElementById('pinyinBack').innerText = phrase.pinyin;
        document.getElementById('russianText').innerText = phrase.russian;
        
        // Разбор иероглифов
        const chars = phrase.chinese.split('');
        const breakdownHtml = chars.map(char => {
            const breakdown = getCharBreakdown(char);
            return `
                <div class="char-item">
                    <div class="char-symbol">${char}</div>
                    <div class="char-details">
                        <div class="char-detail"><strong>🔹 Радикал:</strong> ${breakdown.radical} (${breakdown.radicalMeaning})</div>
                        ${breakdown.phonetic ? `<div class="char-detail"><strong>🎵 Фонетика:</strong> ${breakdown.phonetic}</div>` : ''}
                        <div class="char-detail"><strong>📖 Значение:</strong> ${breakdown.meaning}</div>
                        <div class="char-detail">${breakdown.parts}</div>
                    </div>
                    <div class="emoji-badge">${getEmojiForChar(char)}</div>
                </div>
            `;
        }).join('');
        document.getElementById('breakdownList').innerHTML = breakdownHtml;
        
        // Сбрасываем переворот
        if (isFlipped) {
            document.getElementById('card').classList.remove('flipped');
            isFlipped = false;
        }
    }

    function updateCounter() {
        document.getElementById('counter').innerText = `${filteredPhrases.length ? currentIndex + 1 : 0} / ${filteredPhrases.length}`;
    }

    function nextPhrase() {
        if (filteredPhrases.length && currentIndex < filteredPhrases.length - 1) {
            currentIndex++;
            updateCard();
        } else if (filteredPhrases.length) {
            currentIndex = 0;
            updateCard();
        }
    }

    function prevPhrase() {
        if (filteredPhrases.length && currentIndex > 0) {
            currentIndex--;
            updateCard();
        } else if (filteredPhrases.length) {
            currentIndex = filteredPhrases.length - 1;
            updateCard();
        }
    }

    function randomPhrase() {
        if (filteredPhrases.length) {
            currentIndex = Math.floor(Math.random() * filteredPhrases.length);
            updateCard();
        }
    }

    function speakPhrase() {
        const chinese = document.getElementById('chineseText').innerText;
        if (window.speechSynthesis && chinese && chinese !== "😔") {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(chinese);
            utterance.lang = "zh-CN";
            utterance.rate = 0.65;
            window.speechSynthesis.speak(utterance);
        }
    }

    function studyInNotebook() {
        const phrase = filteredPhrases[currentIndex];
        if (!phrase) return;
        const firstChar = phrase.chinese[0];
        const wordData = { char: firstChar, pinyin: phrase.pinyin.split(' ')[0], meaning: phrase.russian };
        localStorage.setItem('selected_character', JSON.stringify(wordData));
        window.location.href = 'phrases-notebook.html';
    }

    function setLevel(level) {
        currentLevel = level;
        document.querySelectorAll('.level-btn').forEach(btn => {
            if (btn.dataset.level === level) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        currentIndex = 0;
        applyFilters();
    }

    function searchPhrases() {
        currentSearchQuery = document.getElementById('searchInput').value;
        currentIndex = 0;
        applyFilters();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        currentSearchQuery = '';
        currentIndex = 0;
        applyFilters();
    }

    function flipCard() {
        isFlipped = !isFlipped;
        if (isFlipped) {
            document.getElementById('card').classList.add('flipped');
        } else {
            document.getElementById('card').classList.remove('flipped');
        }
    }

    // Event listeners
    document.getElementById('prevBtn').addEventListener('click', prevPhrase);
    document.getElementById('nextBtn').addEventListener('click', nextPhrase);
    document.getElementById('randomBtn').addEventListener('click', randomPhrase);
    document.getElementById('speakBtn').addEventListener('click', speakPhrase);
    document.getElementById('studyBtn').addEventListener('click', studyInNotebook);
    document.getElementById('searchBtn').addEventListener('click', searchPhrases);
    document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);
    document.getElementById('cardContainer').addEventListener('click', flipCard);
    
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => setLevel(btn.dataset.level));
    });
    
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchPhrases();
    });

    // Инициализация
    loadPhrases();
</script>
</body>
</html>
