        let currentFilter = "all";
        let currentSearch = "";

        // Функция озвучивания
        function speak(text) {
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.65;
                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        // Озвучить слог целиком (все тоны подряд)
        function speakSyllable(displayStr) {
            if (!displayStr) return;
            speak(displayStr);
        }

        // Отображение карточек
        function renderSyllables() {
            let filtered = [...syllablesDB];

            // Фильтр по типу
            if (currentFilter !== "all") {
                filtered = filtered.filter(s => s.type === currentFilter);
            }

            // Поиск по слогу, пиньиню, примерам
            if (currentSearch.trim() !== "") {
                const query = currentSearch.toLowerCase();
                filtered = filtered.filter(s => {
                    if (s.syllable.toLowerCase().includes(query)) return true;
                    if (s.display.toLowerCase().includes(query)) return true;
                    return s.examples.some(ex => 
                        ex.chinese.toLowerCase().includes(query) ||
                        ex.pinyin.toLowerCase().includes(query) ||
                        ex.russian.toLowerCase().includes(query)
                    );
                });
            }

            const statsDiv = document.getElementById("stats");
            const grid = document.getElementById("syllablesGrid");
            
            statsDiv.innerHTML = `📊 Найдено слогов: ${filtered.length} из ${syllablesDB.length} | 🔍 Нажми на слог или слово — услышишь!`;

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">😔 Ничего не найдено. Попробуй другой запрос!</div>';
                return;
            }

            let html = "";
            for (const s of filtered) {
                // Блок примеров
                let examplesHtml = "";
                for (const ex of s.examples) {
                    const safeChinese = ex.chinese.replace(/'/g, "\\'");
                    examplesHtml += `
                        <div class="example-item" onclick="speak('${safeChinese}')">
                            <span class="example-chinese">${ex.chinese}</span>
                            <div class="example-info">
                                <div class="example-pinyin">${ex.pinyin}</div>
                                <div class="example-russian">${ex.russian}</div>
                            </div>
                            <button class="speak-small" onclick="event.stopPropagation(); speak('${safeChinese}')">🔊</button>
                        </div>
                    `;
                }

                html += `
                    <div class="syllable-card">
                        <div class="syllable-header" onclick="speakSyllable('${s.display}')">
                            <div class="syllable-text">${s.syllable}</div>
                            <div class="syllable-pinyin">${s.display}</div>
                        </div>
                        <div class="syllable-body">
                            <div class="example-title">
                                <span>📖</span> Примеры слов
                            </div>
                            <div class="example-list">
                                ${examplesHtml}
                            </div>
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function searchSyllables() {
            const input = document.getElementById("searchInput");
            currentSearch = input.value;
            renderSyllables();
        }

        // Фильтры
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                currentFilter = this.dataset.type;
                renderSyllables();
            });
        });

        // Поиск по Enter
        document.getElementById("searchInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchSyllables();
        });

        // Инициализация
        renderSyllables();
    </script>
