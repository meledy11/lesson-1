<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍎 Весёлый китайский: Топ-10 иероглифов с озвучкой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #FFE5B4 0%, #FFDAB9 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            background: #FFB347;
            border-radius: 70px;
            padding: 1rem 1rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 15px 0 #C16F1A;
            color: white;
        }

        .hero h1 {
            font-size: 2.5rem;
            text-shadow: 4px 4px 0 #C16F1A;
            background: #FFF6E0;
            display: inline-block;
            padding: 0.3rem 2rem;
            border-radius: 60px;
            color: #E67E22;
            margin-bottom: 0.8rem;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.3rem;
            font-weight: bold;
            background: #FFD966;
            display: inline-block;
            padding: 0.4rem 1.5rem;
            border-radius: 50px;
            color: #b45f2b;
        }

        .speak-tip {
            background: #FFF1C1;
            border-radius: 50px;
            padding: 0.8rem;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: bold;
            font-size: 1.2rem;
            border: 3px solid #FF8C42;
            color: #a65311;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
        }

        .card {
            background: #FFFEF7;
            border-radius: 48px;
            box-shadow: 0 18px 0 #FFB347;
            transition: all 0.15s ease;
            overflow: hidden;
            border: 3px solid #FFCF9A;
            cursor: pointer;
        }

        .card:active {
            transform: translateY(5px);
            box-shadow: 0 8px 0 #FFB347;
        }

        .char-block {
            background: radial-gradient(circle at 10% 20%, #FFE0A3, #FFC785);
            padding: 2rem 0.8rem;
            text-align: center;
            border-bottom: 5px solid #F9A03F;
        }

        .big-hanzi {
            font-size: 8rem;
            font-weight: 900;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
            background: white;
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            box-shadow: 0 8px 0 #D98F33;
            color: #C4450C;
            transition: 0.05s linear;
            cursor: pointer;
            line-height: 1.2;
            letter-spacing: 0.05em;
        }

        .big-hanzi:active {
            transform: scale(0.97);
        }

        .pinyin-badge {
            background: #FFD966;
            margin-top: 1rem;
            display: inline-block;
            padding: 0.7rem 2rem;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: bold;
            color: #A64B2A;
            letter-spacing: 1px;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans SC', sans-serif;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .meaning-badge {
            background: #FFB347;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            margin-top: 0.8rem;
            font-size: 1rem;
            font-weight: bold;
            display: inline-block;
        }

        .stroke-info {
            background: #FCE6CF;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-bottom: 1px solid #FFCF9A;
            color: #AA6F3C;
        }

        .assoc {
            background: #FFF2DF;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 2px solid #FFDCA8;
            color: #B95C1A;
            line-height: 1.4;
        }

        .phrases-box {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .phrase-btn {
            background: #FAF0E1;
            border-radius: 48px;
            padding: 14px 20px;
            border: 2px solid #FFD58C;
            transition: 0.07s linear;
            cursor: pointer;
            box-shadow: 0 6px 0 #E7C49C;
        }

        .phrase-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #E7C49C;
        }

        .ch-text {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #2c1810;
        }

        .py-text {
            font-size: 1.3rem;
            color: #C5511A;
            margin: 8px 0 6px;
            font-weight: 700;
            background: #FFF5E8;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            letter-spacing: 0.5px;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans SC', sans-serif;
        }

        .trans-text {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 600;
            color: #A5511D;
            margin-top: 6px;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            background: #FFD699;
            padding: 0.8rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
        }

        @media (max-width: 750px) {
            .big-hanzi {
                font-size: 5.5rem;
                padding: 0.3rem 0.8rem;
            }
            .pinyin-badge {
                font-size: 1.6rem;
                padding: 0.5rem 1.2rem;
            }
            .py-text {
                font-size: 1.1rem;
            }
            .ch-text {
                font-size: 1.5rem;
            }
            .hero h1 {
                font-size: 1.6rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>🧸 魔法汉字 · Волшебные иероглифы 🧸</h1>
        <p>🎤 Нажми на букву или фразу — китайский скажет сам! 🎤</p>
    </div>
    <div class="speak-tip">
        <span>🔊🔊🔊</span> КЛИКАЙ НА ЛЮБОЙ ИЕРОГЛИФ ИЛИ ЖЁЛТУЮ ФРАЗУ — УСЛЫШИШЬ ПРОИЗНОШЕНИЕ! <span>🎧✨</span>
    </div>

    <div class="grid" id="cardsGrid"></div>

    <footer>
        🌟 Учи весело! Запоминай картинки-ассоциации и повторяй фразы. 🌟
    </footer>
</div>

<script>
    const lesson = [
        { char: "的", pinyin: "de", tone: "5-й нейтр.", meaning: "⭐ частица: чей? какой?",
          stroke: "ノ 丨 𠃍 一 一 ㇂ ノ 丶 + ノ 𠃌 一 一 丨 一 ㇂ ノ 丶",
          assoc: "🎯🥏 МЕТКИЙ ВЫСТРЕЛ В БЕЛУЮ ЦЕЛЬ (白 + 勺) — точно описывает предмет",
          phrases: [
              { ch: "🚗 我的车", py: "wǒ de chē", ru: "Моя машина" },
              { ch: "🍎 红色的苹果", py: "hóngsè de píngguǒ", ru: "Красное яблоко" },
              { ch: "👍 好的！", py: "hǎo de", ru: "Хорошо!" },
              { ch: "☕ 给我的咖啡", py: "gěi wǒ de kāfēi", ru: "Кофе для меня" }
          ] },
        { char: "一", pinyin: "yī", tone: "1-й высокий", meaning: "🔢 ОДИН, первый",
          stroke: "一 (горизонтальная черта)", assoc: "📏📦 ПОЛКА С ОДНИМ ПРЕДМЕТОМ — начало",
          phrases: [
              { ch: "👤 一个人", py: "yī gè rén", ru: "Один человек" },
              { ch: "⏳ 等一下", py: "děng yī xià", ru: "Подожди секунду" },
              { ch: "🥇 第一名", py: "dì yī míng", ru: "Первое место" },
              { ch: "💘 一见钟情", py: "yī jiàn zhōngqíng", ru: "Любовь с первого взгляда" }
          ] },
        { char: "是", pinyin: "shì", tone: "4-й резкий", meaning: "✅ БЫТЬ, ЯВЛЯТЬСЯ",
          stroke: "日 + 正 (11 черт)", assoc: "☀️👑 СОЛНЦЕ ПРЯМО НАД ГОЛОВОЙ = ИСТИНА",
          phrases: [
              { ch: "👩‍⚕️ 她是医生", py: "tā shì yīshēng", ru: "Она врач" },
              { ch: "❓ 这是什么？", py: "zhè shì shénme", ru: "Что это?" },
              { ch: "✔️ 是的", py: "shì de", ru: "Да / верно" },
              { ch: "🏛️ 北京是首都", py: "Běijīng shì shǒudū", ru: "Пекин — столица" }
          ] },
        { char: "不", pinyin: "bù", tone: "4-й", meaning: "🚫 НЕТ, НЕ",
          stroke: "一 ノ 丨 丶", assoc: "🐦🙅‍♀️ ПТИЧКА ОТВЕРНУЛАСЬ И СКАЗАЛА 'НЕТ!'",
          phrases: [
              { ch: "🙏 不好意思", py: "bù hǎoyìsi", ru: "Извините / мне неловко" },
              { ch: "❌ 不是我的错", py: "bùshì wǒ de cuò", ru: "Не моя вина" },
              { ch: "📚 学不好", py: "xué bù hǎo", ru: "Плохо учится" },
              { ch: "☕ 我不喝咖啡", py: "wǒ bù hē kāfēi", ru: "Я не пью кофе" }
          ] },
        { char: "了", pinyin: "le", tone: "нейтр.", meaning: "✨ УЖЕ / ИЗМЕНИЛОСЬ",
          stroke: "𠃋 亅", assoc: "🎣 КРЮЧОК ВЫТАЩИЛ СОБЫТИЕ",
          phrases: [
              { ch: "🍜 吃了吗", py: "chī le ma", ru: "Поел?" },
              { ch: "🤩 太棒了", py: "tài bàng le", ru: "Потрясающе!" },
              { ch: "😴 我累了", py: "wǒ lèi le", ru: "Я устал" },
              { ch: "🌧️ 下雨了", py: "xiàyǔ le", ru: "Дождь пошёл" }
          ] },
        { char: "在", pinyin: "zài", tone: "4-й", meaning: "📍 НАХОДИТЬСЯ В",
          stroke: "𠂇 + 土", assoc: "🌱🙋 ЧЕЛОВЕК НА ЗЕМЛЕ — ОН ТАМ",
          phrases: [
              { ch: "🏠 在家", py: "zài jiā", ru: "Дома" },
              { ch: "📱 你在干嘛", py: "nǐ zài gàn ma", ru: "Что делаешь?" },
              { ch: "🍚 他在吃饭", py: "tā zài chīfàn", ru: "Он ест (сейчас)" },
              { ch: "⏳ 我在这里等你", py: "wǒ zài zhèlǐ děng nǐ", ru: "Я здесь жду тебя" }
          ] },
        { char: "人", pinyin: "rén", tone: "2-й восх.", meaning: "🧑 ЧЕЛОВЕК, ЛЮДИ",
          stroke: "ノ ㇏", assoc: "🚶 ЧЕЛОВЕК ИДЁТ В ПРОФИЛЬ",
          phrases: [
              { ch: "🇨🇳 中国人", py: "Zhōngguó rén", ru: "Китаец" },
              { ch: "🏠 家人", py: "jiā rén", ru: "Семья" },
              { ch: "😇 好人", py: "hǎo rén", ru: "Хороший человек" },
              { ch: "👩 大人", py: "dà rén", ru: "Взрослый" }
          ] },
        { char: "有", pinyin: "yǒu", tone: "3-й", meaning: "🫴 ИМЕТЬ, ЕСТЬ",
          stroke: "𠂇 + 月", assoc: "✋🍖 РУКА ДЕРЖИТ МЯСО — ЕСТЬ!",
          phrases: [
              { ch: "❓ 有没有", py: "yǒu méiyǒu", ru: "Есть или нет?" },
              { ch: "💰 我有钱", py: "wǒ yǒu qián", ru: "У меня есть деньги" },
              { ch: "⏰ 有时间吗", py: "yǒu shíjiān ma", ru: "Есть время?" },
              { ch: "📖 有一本书", py: "yǒu yī běn shū", ru: "Есть одна книга" }
          ] },
        { char: "我", pinyin: "wǒ", tone: "3-й", meaning: "🙋 Я, МОЙ, МЕНЯ",
          stroke: "手 + 戈 (рука с копьём)", assoc: "🛡️⚔️ Я ЗАЩИЩАЮ СЕБЯ КОПЬЁМ",
          phrases: [
              { ch: "❤️ 我爱你", py: "wǒ ài nǐ", ru: "Я тебя люблю" },
              { ch: "🎓 我是学生", py: "wǒ shì xuésheng", ru: "Я студент" },
              { ch: "🤷 我不知道", py: "wǒ bù zhīdào", ru: "Я не знаю" },
              { ch: "💪 我自己做", py: "wǒ zìjǐ zuò", ru: "Я сам сделаю" }
          ] },
        { char: "他", pinyin: "tā", tone: "1-й", meaning: "👨 ОН (про людей)",
          stroke: "亻 + 也", assoc: "🐍 ЧЕЛОВЕК И ЗМЕЯ — 'чужой, далекий'",
          phrases: [
              { ch: "👥 他们", py: "tā men", ru: "Они (мужчины/смешан.)" },
              { ch: "🏃 他跑了", py: "tā pǎo le", ru: "Он убежал" },
              { ch: "👬 他的朋友", py: "tā de péngyou", ru: "Его друг" },
              { ch: "🤔 他怎么了", py: "tā zěnme le", ru: "Что с ним?" }
          ] }
    ];

    function speakChinese(text) {
        if (!window.speechSynthesis) {
            alert("Ваш браузер не поддерживает голосовое воспроизведение. Попробуйте Chrome, Edge или Safari.");
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-CN";
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        setTimeout(() => {
            window.speechSynthesis.speak(utterance);
        }, 10);
    }

    const container = document.getElementById("cardsGrid");
    
    lesson.forEach(c => {
        const card = document.createElement("div");
        card.className = "card";

        const charBlock = document.createElement("div");
        charBlock.className = "char-block";
        
        const bigChar = document.createElement("div");
        bigChar.className = "big-hanzi";
        bigChar.innerText = c.char;
        bigChar.addEventListener("click", (e) => {
            e.stopPropagation();
            speakChinese(c.char);
        });
        
        const pinyinSpan = document.createElement("div");
        pinyinSpan.className = "pinyin-badge";
        pinyinSpan.innerText = `${c.pinyin}  (${c.tone})`;
        
        const meaningSpan = document.createElement("div");
        meaningSpan.className = "meaning-badge";
        meaningSpan.innerText = c.meaning;

        charBlock.appendChild(bigChar);
        charBlock.appendChild(pinyinSpan);
        charBlock.appendChild(meaningSpan);

        const strokeDiv = document.createElement("div");
        strokeDiv.className = "stroke-info";
        strokeDiv.innerText = `✍️ Прописи порядок: ${c.stroke}`;

        const assocDiv = document.createElement("div");
        assocDiv.className = "assoc";
        assocDiv.innerHTML = `🧠 ЗАПОМНИ: ${c.assoc}`;

        const phrasesBox = document.createElement("div");
        phrasesBox.className = "phrases-box";
        
        c.phrases.forEach(ph => {
            const btn = document.createElement("div");
            btn.className = "phrase-btn";
            btn.innerHTML = `
                <div class="ch-text">${ph.ch}</div>
                <div class="py-text">${ph.py}</div>
                <div class="trans-text"><span>🎧</span> ${ph.ru}</div>
            `;
            // ВАЖНО: произносим именно китайскую фразу, которая написана
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                speakChinese(ph.ch);
            });
            phrasesBox.appendChild(btn);
        });

        card.appendChild(charBlock);
        card.appendChild(strokeDiv);
        card.appendChild(assocDiv);
        card.appendChild(phrasesBox);
        container.appendChild(card);
    });

    if (window.speechSynthesis) {
        const dummy = new SpeechSynthesisUtterance(" ");
        dummy.lang = "zh-CN";
        window.speechSynthesis.speak(dummy);
        window.speechSynthesis.cancel();
    }
</script>
</body>
</html>
