<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📚 Весёлый китайский - Все уроки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(145deg, #FFF0E0 0%, #FFE0C0 100%);
            font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
            padding: 1rem;
            min-height: 100vh;
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        .hero {
            text-align: center;
            background: linear-gradient(135deg, #FF6B35, #FF8C42, #FFB347);
            border-radius: 80px;
            padding: 2rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 0 #C16F1A;
            color: white;
        }
        .hero h1 { font-size: 2rem; }
        .hero p { font-size: 1rem; margin-top: 0.5rem; }
        
        .speak-tip {
            text-align: center;
            background: #FFF1C1;
            padding: 0.8rem;
            border-radius: 50px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border: 2px solid #FFB347;
        }
        
        .lessons-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        .lesson-card {
            background: white;
            border-radius: 30px;
            padding: 1.3rem;
            text-decoration: none;
            color: #A64B2A;
            border: 3px solid #FFB347;
            box-shadow: 0 10px 0 #D98F33;
            transition: 0.1s;
            display: block;
        }
        .lesson-card:hover { transform: translateY(-2px); }
        .lesson-card:active { transform: translateY(3px); box-shadow: 0 7px 0 #D98F33; }
        .lesson-card h2 { font-size: 1.2rem; margin-bottom: 0.3rem; }
        .lesson-card p { font-size: 0.85rem; color: #8B5A2B; }
        
        .game-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
        }
        .game-link a {
            display: inline-block;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 8px 0 #8b1e3f;
            transition: 0.1s;
        }
        .game-link a:active { transform: translateY(3px); box-shadow: 0 5px 0 #8b1e3f; }
        
        footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            background: #FFD699;
            border-radius: 50px;
            font-weight: bold;
            color: #A64B2A;
        }
        
        @media (max-width: 600px) {
            .lessons-list { grid-template-columns: 1fr; }
            .hero h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>📚 Весёлый китайский</h1>
            <p>🎧 Интерактивные уроки с озвучкой 🎧</p>
        </div>
        
        <div class="speak-tip">
            <span>🌟</span> Выбери урок и начинай учить иероглифы с удовольствием! <span>🌟</span>
        </div>
        
        <div class="lessons-list" id="lessonsList"></div>
        
        <div class="game-link">
            <a href="word-match.html">🎮 Игра: Угадай слово</a>
        </div>
        
        <footer>
            🌟 Нажимай на иероглифы и фразы — слушай правильное произношение! 🌟
        </footer>
    </div>
    
    <script src="lessons-data.js"></script>
    <script>
        const lessonsList = document.getElementById('lessonsList');
        
        if (typeof lessonsDB !== 'undefined') {
            const sortedLessons = Object.entries(lessonsDB).sort((a, b) => {
                const numA = parseInt(a[0].replace('lesson', '')) || 0;
                const numB = parseInt(b[0].replace('lesson', '')) || 0;
                return numA - numB;
            });
            
            for (const [key, lesson] of sortedLessons) {
                const lessonCard = document.createElement('a');
                lessonCard.href = `${key}.html`;
                lessonCard.className = 'lesson-card';
                lessonCard.innerHTML = `
                    <h2>${lesson.icon} ${lesson.title}</h2>
                    <p>${lesson.description}</p>
                    <div style="margin-top: 0.8rem; font-size: 0.9rem; color: #E67E22;">
                        ${lesson.data ? '🎯 ' + lesson.data.length + ' иероглифов' : '📖 Теоретический урок'}
                    </div>
                `;
                lessonsList.appendChild(lessonCard);
            }
        } else {
            lessonsList.innerHTML = '<div style="text-align: center; padding: 2rem;">📖 Скоро здесь появятся новые уроки!</div>';
        }
    </script>
</body>
</html>
