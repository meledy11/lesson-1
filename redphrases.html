<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📕 Красная книга — китайские фразы</title>
    <script src="redphrases.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(145deg, #1a3a2a 0%, #0a1a0f 100%);
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
            padding: 12px;
            color: #f5e6d3;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* ===== НАВИГАЦИЯ ===== */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 25, 20, 0.7);
            padding: 10px 18px;
            border-radius: 60px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        .nav-bar .back-btn {
            background: linear-gradient(135deg, #5a4a3a, #3a2a1a);
            color: #f7e05e;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.15s;
            box-shadow: 0 3px 0 #2a1a0a;
        }
        .nav-bar .back-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2a1a0a; }
        .nav-bar .title {
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-bar .notebook-link {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 3px 0 #1a7a3a;
            transition: 0.15s;
        }
        .nav-bar .notebook-link:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a7a3a; }

        /* ===== СТАТИСТИКА ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            background: rgba(30, 25, 20, 0.6);
            padding: 10px 16px;
            border-radius: 60px;
            margin-bottom: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 215, 0, 0.06);
        }
        .stats-bar span {
            color: #d4c9a6;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .stats-bar strong { color: #ffd700; }

        /* ===== ВКЛАДКИ ===== */
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0 14px;
        }
        .tab-btn {
            background: rgba(45, 27, 14, 0.6);
            color: #b8956a;
            border: 2px solid rgba(255, 215, 0, 0.08);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            font-family: inherit;
            backdrop-filter: blur(5px);
        }
        .tab-btn:hover { border-color: rgba(255, 215, 0, 0.2); transform: translateY(-2px); }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.2);
        }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        /* ===== ПОИСК ===== */
        .search {
            width: 100%;
            padding: 14px 22px;
            border: 2px solid rgba(255, 215, 0, 0.08);
            border-radius: 60px;
            background: rgba(30, 25, 20, 0.7);
            color: #f5e6d3;
            font-size: clamp(0.9rem, 1.2vw, 1.1rem);
            outline: none;
            transition: all 0.3s;
            margin-bottom: 14px;
            font-family: inherit;
            backdrop-filter: blur(5px);
        }
        .search::placeholder { color: #6b5a45; }
        .search:focus { border-color: rgba(255, 215, 0, 0.2); box-shadow: 0 8px 40px rgba(255, 215, 0, 0.03); }

        /* ===== КАТЕГОРИИ ===== */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 14px;
        }
        .categories button {
            padding: 6px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            border-radius: 50px;
            background: rgba(30, 25, 20, 0.5);
            color: #8b7355;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .categories button.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.15);
        }

        /* ===== ГРУППА ===== */
        .group-container { margin-bottom: 20px; animation: fadeIn 0.4s ease; }
        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            background: rgba(30, 25, 20, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.04);
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        .group-header:hover { background: rgba(30, 25, 20, 0.7); border-color: rgba(255, 215, 0, 0.08); }
        .group-header .icon { font-size: clamp(1.5rem, 2.5vw, 2rem); }
        .group-header .title { font-size: clamp(1rem, 1.8vw, 1.3rem); font-weight: 600; color: #f5e6d3; }
        .group-header .count { margin-left: auto; color: #8b7355; font-size: 0.75rem; background: rgba(255,255,255,0.04); padding: 2px 14px; border-radius: 50px; }
        .group-header .arrow { color: #8b7355; transition: transform 0.3s; font-size: 0.9rem; }
        .group-header.collapsed .arrow { transform: rotate(-90deg); }
        .group-phrases { overflow: hidden; transition: max-height 0.4s ease; max-height: 10000px; }
        .group-phrases.collapsed { max-height: 0; }

        /* ===== КАРТОЧКА ФРАЗЫ (БОЛЬШАЯ, ПАПИРУС) ===== */
        .phrase-card {
            background: linear-gradient(145deg, #f5ede4, #e8d5c0);
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 245, 200, 0.4) 1%, transparent 1.5%);
            background-size: 30px 30px;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 10px;
            border-left: 6px solid #c8aa6e;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,240,0.3);
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease both;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .phrase-card:hover { transform: translateX(6px); border-left-color: #ffd700; box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
        .phrase-card .chinese {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #3c2a1f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
            min-width: 120px;
            text-shadow: 0 1px 2px rgba(255,255,240,0.3);
        }
        .phrase-card .chinese .mini-badge {
            font-size: clamp(0.45rem, 0.6vw, 0.55rem);
            padding: 2px 12px;
            border-radius: 50px;
            font-weight: 700;
        }
        .phrase-card .chinese .mini-badge.red { background: rgba(220, 38, 38, 0.15); color: #c0392b; }
        .phrase-card .chinese .mini-badge.analog { background: rgba(59, 130, 246, 0.12); color: #2980b9; }
        .phrase-card .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 2;
            min-width: 160px;
        }
        .phrase-card .pinyin {
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            color: #8e6b3a;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .phrase-card .translation {
            font-size: clamp(1.1rem, 1.8vw, 1.4rem);
            color: #4a3a2a;
            font-weight: 500;
        }
        .phrase-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }
        .phrase-card .tags .tag {
            font-size: clamp(0.5rem, 0.7vw, 0.6rem);
            padding: 2px 12px;
            border-radius: 50px;
            background: rgba(60, 42, 31, 0.06);
            color: #6b5a4a;
            border: 1px solid rgba(60, 42, 31, 0.06);
        }
        .phrase-card .tags .tag.category { background: rgba(41, 128, 185, 0.08); color: #2980b9; }
        .phrase-card .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .phrase-card .audio-mini {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #b34e1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phrase-card .audio-mini:active { transform: translateY(2px); box-shadow: 0 1px 0 #b34e1a; }
        .phrase-card .save-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #1a7a3a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phrase-card .save-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a7a3a; }
        .phrase-card .save-btn.saved { background: linear-gradient(135deg, #f39c12, #e67e22); }

        /* ===== ТЕТРАДЬ ===== */
        .notebook-container {
            background: linear-gradient(145deg, #f5ede4, #e8d5c0);
            border-radius: 28px;
            padding: 20px;
            border: 2px solid #c8aa6e;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            min-height: 300px;
        }
        .notebook-container .empty {
            text-align: center;
            padding: 40px 20px;
            color: #8b7355;
            font-size: 1.1rem;
        }
        .notebook-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(60, 42, 31, 0.08);
            flex-wrap: wrap;
            gap: 8px;
        }
        .notebook-item .char {
            font-size: 2.2rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #3c2a1f;
            cursor: pointer;
        }
        .notebook-item .info { color: #6b5a4a; font-size: 0.9rem; }
        .notebook-item .remove-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            color: white;
            padding: 4px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
            box-shadow: 0 2px 0 #8a2a1a;
        }
        .notebook-item .remove-btn:active { transform: translateY(2px); box-shadow: 0 0 0 #8a2a1a; }
        .notebook-item .speak-mini {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: 0.15s;
        }
        .notebook-item .speak-mini:hover { background: rgba(60, 42, 31, 0.06); }

        /* ===== КАЛЛИГРАФИЯ ===== */
        .canvas-container {
            background: linear-gradient(145deg, #f5ede4, #e8d5c0);
            border-radius: 28px;
            padding: 20px;
            border: 2px solid #c8aa6e;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .canvas-wrapper {
            background: #fffef9;
            border-radius: 18px;
            padding: 8px;
            border: 2px solid #c8aa6e;
            display: inline-block;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.06);
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="rgba(255,107,53,0.3)" stroke="%23ff6b35" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="%23ff6b35"/></svg>') 12 12, auto;
            touch-action: none;
        }
        .canvas-tools {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 14px;
        }
        .canvas-tools button {
            padding: 8px 20px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.15s;
            font-family: inherit;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
        }
        .canvas-tools button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        .canvas-tools .clear-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .canvas-tools .trace-btn { background: linear-gradient(135deg, #2980b9, #3498db); color: white; }
        .canvas-tools .check-btn { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
        .canvas-tools .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            padding: 0;
            min-width: unset;
        }
        .canvas-tools .color-btn.active { border-color: #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        .canvas-examples {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }
        .canvas-examples button {
            padding: 6px 14px;
            border-radius: 40px;
            background: rgba(60, 42, 31, 0.1);
            border: 1px solid rgba(60, 42, 31, 0.1);
            color: #6b5a4a;
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            cursor: pointer;
            transition: 0.15s;
        }
        .canvas-examples button:hover { background: rgba(60, 42, 31, 0.15); border-color: #c8aa6e; }
        .quality-bar {
            background: #2c2118;
            height: 8px;
            border-radius: 10px;
            margin: 12px auto;
            max-width: 300px;
            overflow: hidden;
        }
        .quality-fill { height: 100%; background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71); width: 0%; transition: width 0.5s ease; }
        .quality-text { font-size: 0.8rem; color: #8b7355; margin-top: 4px; }

        /* ===== АНИМАЦИИ ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 600px) {
            body { padding: 8px; }
            .phrase-card { padding: 14px 16px; flex-direction: column; align-items: stretch; }
            .phrase-card .chinese { font-size: clamp(2rem, 8vw, 2.8rem); }
            .phrase-card .actions { align-self: flex-end; }
            .nav-bar { padding: 8px 12px; }
            .stats-bar { gap: 6px; padding: 8px 12px; }
            .stats-bar span { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ===== НАВИГАЦИЯ ===== -->
    <div class="nav-bar">
        <a href="index.html" class="back-btn">◀ На главную</a>
        <span class="title">📕 Красная книга</span>
        <a href="#" class="notebook-link" id="notebookNav">📓 Тетрадь</a>
    </div>

    <!-- ===== СТАТИСТИКА ===== -->
    <div class="stats-bar" id="statsBar">
        <span>📄 Всего: <strong id="totalCount">0</strong></span>
        <span>🔴 Красная книга: <strong id="redCount">0</strong></span>
        <span>🔵 Аналоги: <strong id="analogCount">0</strong></span>
        <span>📓 В тетради: <strong id="notebookCount">0</strong></span>
    </div>

    <!-- ===== ВКЛАДКИ ===== -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="groups">📚 Группы</button>
        <button class="tab-btn" data-tab="notebook">📓 Тетрадь</button>
        <button class="tab-btn" data-tab="canvas">🖌️ Каллиграфия</button>
    </div>

    <!-- ========================================================== -->
    <!-- ВКЛАДКА: ГРУППЫ -->
    <!-- ========================================================== -->
    <div class="tab-content active" id="tab-groups">
        <input class="search" id="searchInput" type="text" placeholder="🔍 Поиск по группе или фразе..." />
        <div class="categories" id="categoryButtons">
            <button data-cat="all" class="active">📚 Все</button>
            <button data-cat="phrase">📄 Фразы</button>
            <button data-cat="travel">✈️ Путешествия</button>
            <button data-cat="food">🍜 Еда</button>
            <button data-cat="work">💼 Работа</button>
        </div>
        <div id="groupsContainer"></div>
    </div>

    <!-- ========================================================== -->
    <!-- ВКЛАДКА: ТЕТРАДЬ -->
    <!-- ========================================================== -->
    <div class="tab-content" id="tab-notebook">
        <div class="notebook-container" id="notebookContainer">
            <div class="empty">📓 Здесь будут сохранённые фразы для повторения</div>
        </div>
    </div>

    <!-- ========================================================== -->
    <!-- ВКЛАДКА: КАЛЛИГРАФИЯ -->
    <!-- ========================================================== -->
    <div class="tab-content" id="tab-canvas">
        <div class="canvas-container">
            <div class="canvas-wrapper">
                <canvas id="calligraphyCanvas"></canvas>
            </div>
            <div class="quality-bar"><div class="quality-fill" id="qFill"></div></div>
            <div class="quality-text" id="qText">🖌️ Рисуй иероглифы каллиграфической кистью</div>
            <div class="canvas-tools">
                <button class="clear-btn" id="canvasClear">🧽 Очистить</button>
                <button class="trace-btn" id="canvasTrace">👁️ Показать образец</button>
                <button class="check-btn" id="canvasCheck">✅ Проверить</button>
                <span style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">
                    <button class="color-btn active" data-color="#1a1a1a" style="background:#1a1a1a;"></button>
                    <button class="color-btn" data-color="#c0392b" style="background:#c0392b;"></button>
                    <button class="color-btn" data-color="#d4a017" style="background:#d4a017;"></button>
                    <button class="color-btn" data-color="#2471a3" style="background:#2471a3;"></button>
                </span>
            </div>
            <div class="canvas-examples" id="canvasExamples">
                <button data-char="永">永</button>
                <button data-char="爱">爱</button>
                <button data-char="龙">龙</button>
                <button data-char="学">学</button>
                <button data-char="好">好</button>
                <button data-char="心">心</button>
                <button data-char="家">家</button>
            </div>
        </div>
    </div>

</div>

<script>
// ============================================================
// 1. ЗАГРУЗКА МАССИВА
// ============================================================

let allPhrases = [];
let notebook = JSON.parse(localStorage.getItem('chinese_redbook_notebook') || '[]');

if (typeof redBookData !== 'undefined' && Array.isArray(redBookData) && redBookData.length > 0) {
    allPhrases = redBookData;
} else if (typeof allPhrases !== 'undefined' && Array.isArray(allPhrases) && allPhrases.length > 0) {
    allPhrases = allPhrases;
} else if (typeof redPhrases !== 'undefined' && Array.isArray(redPhrases) && redPhrases.length > 0) {
    allPhrases = redPhrases;
} else if (typeof window.redBookData !== 'undefined' && Array.isArray(window.redBookData) && window.redBookData.length > 0) {
    allPhrases = window.redBookData;
}

console.log("📄 Всего фраз:", allPhrases.length);

// ============================================================
// 2. ГРУППЫ
// ============================================================

const groups = [
    { id: 'decisions', icon: '💭', title: 'Решения и намерения', keywords: ['决定', '选好', '想好', '同意', '反对', '答应', '保证'] },
    { id: 'greetings', icon: '👋', title: 'Приветствия и прощания', keywords: ['你好', '怎么样', '见', '好久', '最近', '欢迎'] },
    { id: 'feelings', icon: '😊', title: 'Чувства и состояния', keywords: ['喜欢', '讨厌', '累', '饿', '饱', '困', '饿死', '累死'] },
    { id: 'actions', icon: '🏃', title: 'Действия и движения', keywords: ['走', '回去', '过来', '过去', '去', '来', '开'] },
    { id: 'requests', icon: '🙏', title: 'Просьбы и помощь', keywords: ['帮', '忙', '送', '陪', '让', '借'] },

    { id: 'emotions', icon: '❤️', title: 'Эмоции и реакции', keywords: ['开心', '难过', '担心', '紧张', '兴奋', '感动', '失望', '生气'] }
];

let searchQuery = '';
let collapsedGroups = new Set();
let currentCategory = 'all';

function getPhrasesForGroup(group) {
    return allPhrases.filter(p => {
        const text = p.chinese + ' ' + p.pinyin + ' ' + p.translation;
        return group.keywords.some(kw => text.includes(kw));
    });
}

function renderGroups() {
    const container = document.getElementById('groupsContainer');
    document.getElementById('totalCount').textContent = allPhrases.length;
    document.getElementById('redCount').textContent = allPhrases.filter(p => p.red !== false).length;
    document.getElementById('analogCount').textContent = allPhrases.filter(p => p.red === false).length;
    document.getElementById('notebookCount').textContent = notebook.length;

    let html = '';
    let visibleGroups = 0;

    for (const group of groups) {
        let phrases = getPhrasesForGroup(group);
        if (currentCategory !== 'all') {
            phrases = phrases.filter(p => p.category === currentCategory);
        }
        if (searchQuery.trim()) {
            const q = searchQuery.trim().toLowerCase();
            phrases = phrases.filter(p => p.chinese.includes(q) || p.pinyin.toLowerCase().includes(q) || 
                p.translation.toLowerCase().includes(q) || group.title.toLowerCase().includes(q));
        }
        if (phrases.length === 0) continue;
        visibleGroups++;

        const isCollapsed = collapsedGroups.has(group.id);

        html += `
            <div class="group-container">
                <div class="group-header ${isCollapsed ? 'collapsed' : ''}" data-group="${group.id}">
                    <span class="icon">${group.icon}</span>
                    <span class="title">${group.title}</span>
                    <span class="count">${phrases.length} фраз</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="group-phrases ${isCollapsed ? 'collapsed' : ''}">
        `;

        for (const p of phrases) {
            const isRed = p.red !== false;
            const badgeClass = isRed ? 'red' : 'analog';
            const badgeText = isRed ? '🔴' : '🔵';
            const isSaved = notebook.some(n => n.char === p.chinese);
            const safeChinese = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            html += `
                <div class="phrase-card">
                    <div class="chinese" onclick="speakChinese('${safeChinese}')">
                        ${p.chinese}
                        <span class="mini-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="info">
                        <div class="pinyin">${p.pinyin}</div>
                        <div class="translation">${p.translation}</div>
                        <div class="tags">
                            <span class="tag category">📂 ${p.category}</span>
                            ${isRed ? '<span class="tag" style="color:#c0392b;">🔴 Красная книга</span>' : '<span class="tag" style="color:#2980b9;">🔵 Аналог</span>'}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="audio-mini" onclick="speakChinese('${safeChinese}')">🔊</button>
                        <button class="save-btn ${isSaved ? 'saved' : ''}" data-char="${safeChinese}" data-pinyin="${p.pinyin}" data-translation="${p.translation}" onclick="toggleNotebook('${safeChinese}', '${p.pinyin}', '${p.translation}')">
                            ${isSaved ? '✓' : '📓'}
                        </button>
                    </div>
                </div>
            `;
        }

        html += `
                </div>
            </div>
        `;
    }

    if (visibleGroups === 0) {
        container.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#8b7355;font-size:1.1rem;">🔍 Ничего не найдено</div>`;
        return;
    }

    container.innerHTML = html;

    document.querySelectorAll('.group-header').forEach(header => {
        header.addEventListener('click', function() {
            const groupId = this.dataset.group;
            const phrases = this.nextElementSibling;
            const isCollapsed = phrases.classList.contains('collapsed');
            if (isCollapsed) {
                phrases.classList.remove('collapsed');
                this.classList.remove('collapsed');
                collapsedGroups.delete(groupId);
            } else {
                phrases.classList.add('collapsed');
                this.classList.add('collapsed');
                collapsedGroups.add(groupId);
            }
        });
    });
}

// 3. ТЕТРАДЬ

function toggleNotebook(char, pinyin, translation) {
    const idx = notebook.findIndex(n => n.char === char);
    if (idx >= 0) {
        notebook.splice(idx, 1);
        showToast(`❌ "${char}" удалён из тетради`);
    } else {
        notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
        showToast(`✅ "${char}" добавлен в тетрадь!`);
    }
    localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
    renderGroups();
    renderNotebook();
    document.getElementById('notebookCount').textContent = notebook.length;
}

function renderNotebook() {
    const container = document.getElementById('notebookContainer');
    if (notebook.length === 0) {
        container.innerHTML = `<div class="empty">📓 Здесь будут сохранённые фразы для повторения</div>`;
        return;
    }
    let html = '';
    for (const item of notebook) {
        const safeChar = item.char.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        html += `
            <div class="notebook-item">
                <span class="char" onclick="speakChinese('${safeChar}')">${item.char}</span>
                <span class="info">${item.pinyin || ''} — ${item.translation || ''}</span>
                <div style="display:flex;gap:6px;align-items:center;">
                    <button class="speak-mini" onclick="speakChinese('${safeChar}')">🔊</button>
                    <button class="remove-btn" onclick="toggleNotebook('${safeChar}')">✖</button>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:12px 24px;border-radius:50px;z-index:3000;font-size:15px;box-shadow:0 5px 20px rgba(0,0,0,0.3);font-weight:600;';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

let chineseVoice = null;
function loadChineseVoice() {
    if (!window.speechSynthesis) return;
    const voices = speechSynthesis.getVoices();
    chineseVoice = voices.find(v => v.lang.startsWith('zh')) || null;
}
if (window.speechSynthesis) {
    speechSynthesis.onvoiceschanged = loadChineseVoice;
    setTimeout(loadChineseVoice, 100);
}

function speakChinese(text) {
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    setTimeout(() => {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN';
        u.rate = 0.7;
        if (chineseVoice) u.voice = chineseVoice;
        speechSynthesis.speak(u);
    }, 50);
}
window.speakChinese = speakChinese;

// 5. КАЛЛИГРАФИЯ
// ============================================================

const canvasConfig = {
    size: 500,
    padding: 28,
    brushWidth: 14,
    exampleOpacity: 0.3,
    gridColor: '#b8956a',
    gridColorCenter: '#d4b896',
    strokeColor: '#1a0f0a',
    exampleColor: '#9b59b6',
    checkThreshold: 0.40,
    checkGoodThreshold: 0.25
};

let canvas, ctx, isDrawing = false, lastX, lastY, lastWidth, lastTime, strokeLen = 0;
let canvasHistory = [];
let currentColor = '#1a1a1a';
let canvasRefData = null;
let exampleVisible = false;

function initCanvas() {
    canvas = document.getElementById('calligraphyCanvas');
    const rect = canvas.parentElement.getBoundingClientRect();
    const size = Math.min(rect.width - 16, 500);
    canvas.width = canvas.height = size;
    canvasConfig.size = size;
    ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.fillStyle = '#fffef9';
    ctx.fillRect(0, 0, size, size);
    drawMiziGeGrid(ctx, size, canvasConfig.padding);
    ctx.lineWidth = canvasConfig.brushWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 1;
    canvasRefData = null;
    exampleVisible = false;
    setupDrawing(canvas);
    document.getElementById('qFill').style.width = '0%';
    document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы каллиграфической кистью';
    canvasHistory = [];
}

function drawMiziGeGrid(ctx, size, padding) {
    const inner = size - padding * 2;
    const center = size / 2;
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = canvasConfig.gridColor;
    ctx.strokeRect(padding, padding, inner, inner);
    ctx.setLineDash([6, 4]);
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = canvasConfig.gridColorCenter;
    ctx.beginPath();
    ctx.moveTo(center, padding);
    ctx.lineTo(center, size - padding);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(padding, center);
    ctx.lineTo(size - padding, center);
    ctx.stroke();
    ctx.setLineDash([3, 3]);
    ctx.lineWidth = 0.8;
    ctx.strokeStyle = canvasConfig.gridColor;
    ctx.beginPath();
    ctx.moveTo(padding, padding);
    ctx.lineTo(size - padding, size - padding);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(size - padding, padding);
    ctx.lineTo(padding, size - padding);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
}

function setupDrawing(canvas) {
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) * canvas.width / rect.width,
            y: (e.clientY - rect.top) * canvas.height / rect.height,
            pressure: Math.max(0.1, e.pressure || 0.5)
        };
    }

    function start(e) {
        e.preventDefault();
        isDrawing = true;
        strokeLen = 0;
        const p = getPos(e);
        lastX = p.x;
        lastY = p.y;
        lastTime = performance.now();
        lastWidth = canvasConfig.brushWidth * 0.7;
        saveCanvasState();
        ctx.fillStyle = currentColor;
        ctx.shadowBlur = 1;
        ctx.shadowColor = currentColor;
        ctx.beginPath();
        ctx.arc(p.x, p.y, lastWidth / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const p = getPos(e);
        const now = performance.now();
        const dt = Math.max(1, now - lastTime);
        const dx = p.x - lastX;
        const dy = p.y - lastY;
        const dist = Math.hypot(dx, dy);
        const speed = dist / dt;
        strokeLen += dist;

        const pressureFactor = 0.3 + p.pressure * 0.7;
        const speedFactor = Math.max(0.15, 1 - (speed / 1.2));
        let targetW = canvasConfig.brushWidth * pressureFactor * speedFactor;
        if (strokeLen < 20) targetW *= (0.6 + 0.4 * (strokeLen / 20));
        targetW = Math.max(3, Math.min(canvasConfig.brushWidth * 1.6, targetW));
        const newW = lastWidth * 0.7 + targetW * 0.3;

        ctx.save();
        ctx.fillStyle = currentColor;
        ctx.shadowBlur = 0.5;
        ctx.shadowColor = currentColor;

        const steps = Math.max(1, Math.floor(dist / 2));
        for (let i = 1; i <= steps; i++) {
            const t = i / steps;
            const ix = lastX + dx * t;
            const iy = lastY + dy * t;
            const iw = lastWidth + (newW - lastWidth) * t;
            ctx.beginPath();
            ctx.arc(ix, iy, iw / 2, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();

        lastX = p.x;
        lastY = p.y;
        lastWidth = newW;
        lastTime = now;
    }

    function stop() {
        if (!isDrawing) return;
        isDrawing = false;
        const angle = Math.atan2(lastY - (lastY - 1), lastX - (lastX - 1)) || 0;
        ctx.save();
        ctx.fillStyle = currentColor;
        ctx.shadowBlur = 0;
        for (let i = 1; i <= 8; i++) {
            const t = i / 8;
            const tw = lastWidth * Math.pow(1 - t, 1.5);
            ctx.beginPath();
            ctx.ellipse(lastX + Math.cos(angle) * t * 4, lastY + Math.sin(angle) * t * 4, tw/2, tw/3, angle, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }

    canvas.addEventListener('pointerdown', start);
    canvas.addEventListener('pointermove', draw);
    canvas.addEventListener('pointerup', stop);
    canvas.addEventListener('pointerleave', stop);
    canvas.addEventListener('pointercancel', stop);
}

function saveCanvasState() {
    canvasHistory.push(canvas.toDataURL());
    if (canvasHistory.length > 20) canvasHistory.shift();
}

function clearCanvas() {
    canvasHistory = [];
    const size = canvasConfig.size;
    ctx.fillStyle = '#fffef9';
    ctx.fillRect(0, 0, size, size);
    drawMiziGeGrid(ctx, size, canvasConfig.padding);
    canvasRefData = null;
    exampleVisible = false;
    document.getElementById('qFill').style.width = '0%';
    document.getElementById('qText').textContent = '🖌️ Очищено';
    document.getElementById('canvasTrace').textContent = '👁️ Показать образец';
}

function showExample(char) {
    const size = canvasConfig.size;
    const inner = size - canvasConfig.padding * 2;
    ctx.save();
    ctx.globalAlpha = canvasConfig.exampleOpacity;
    ctx.fillStyle = canvasConfig.exampleColor;
    ctx.font = `900 ${Math.floor(inner * 0.82)}px "Noto Sans CJK SC", "KaiTi", "STKaiti", serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(char, size / 2, size / 2 + size * 0.02);
    ctx.restore();
    canvasRefData = ctx.getImageData(0, 0, size, size);
    exampleVisible = true;
    document.getElementById('canvasTrace').textContent = '🙈 Скрыть образец';
}

function hideExample() {
    const size = canvasConfig.size;
    ctx.fillStyle = '#fffef9';
    ctx.fillRect(0, 0, size, size);
    drawMiziGeGrid(ctx, size, canvasConfig.padding);
    canvasRefData = null;
    exampleVisible = false;
    document.getElementById('canvasTrace').textContent = '👁️ Показать образец';
}

function checkQuality() {
    if (!canvasRefData) {
        document.getElementById('qText').textContent = '👁️ Сначала покажи образец';
        return;
    }
    const size = canvasConfig.size;
    const current = ctx.getImageData(0, 0, size, size);
    const dRef = canvasRefData.data;
    const dCur = current.data;
    let match = 0, totalRef = 0, userOutside = 0;
    const threshold = 235;
    for (let i = 0; i < dRef.length; i += 4) {
        const isRef = (dRef[i] < threshold || dRef[i+1] < threshold || dRef[i+2] < threshold);
        const isUser = (dCur[i] < threshold || dCur[i+1] < threshold || dCur[i+2] < threshold);
        if (isRef) { totalRef++; if (isUser) match++; }
        else if (isUser) { userOutside++; }
    }
    if (totalRef === 0) {
        document.getElementById('qText').textContent = '📝 Нет эталона для сравнения';
        return;
    }
    const precision = match / totalRef;
    const recall = match / (totalRef + userOutside + 0.001);
    const f1 = 2 * (precision * recall) / (precision + recall + 0.001);
    const pct = Math.round(f1 * 100);
    const fill = document.getElementById('qFill');
    const text = document.getElementById('qText');
    fill.style.width = pct + '%';
    if (f1 > canvasConfig.checkThreshold) {
        fill.style.background = '#2ecc71';
        text.textContent = `🌟 Отлично! ${pct}% совпадение`;
    } else if (f1 > canvasConfig.checkGoodThreshold) {
        fill.style.background = '#f39c12';
        text.textContent = `👍 Хорошо! ${pct}% совпадение`;
    } else {
        fill.style.background = '#e67e22';
        text.textContent = `📝 Продолжай тренироваться (${pct}%)`;
    }
}
