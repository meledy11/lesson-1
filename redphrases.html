<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📕 Красная книга</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js">
    </script>
    <script src="redphrases.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: linear-gradient(145deg, #1a3a2a 0%, #0a1a0f 100%);
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 8px;
            color: #f5e6d3;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 25, 20, 0.85);
            padding: 8px 16px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .top-bar .back-btn {
            background: #5a4a3a;
            color: #f7e05e;
            padding: 6px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #2a1a0a;
        }
        .top-bar .back-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2a1a0a;
        }
        .top-bar .title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-bar .notebook-link {
            background: #2ecc71;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #1a7a3a;
        }
        .top-bar .notebook-link:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a7a3a;
        }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            background: rgba(30, 25, 20, 0.6);
            padding: 6px 16px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 215, 0, 0.06);
            backdrop-filter: blur(5px);
        }
        .stats span {
            color: #b8956a;
            font-size: 0.85rem;
        }
        .stats strong {
            color: #ffd700;
            font-size: 1rem;
        }

        /* ===== ВКЛАДКИ ===== */
        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: rgba(45, 27, 14, 0.6);
            color: #b8956a;
            border: 2px solid rgba(255, 215, 0, 0.08);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: inherit;
            backdrop-filter: blur(5px);
        }
        .tab-btn:hover {
            border-color: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
        }
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .tab-content.active {
            display: flex;
        }

        /* ===== СКРОЛЛ ===== */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        .scroll-area::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: #b8956a;
            border-radius: 4px;
        }

        /* ===== ГРУППЫ (ФРАЗЫ) ===== */
        .search {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid rgba(255, 215, 0, 0.08);
            border-radius: 40px;
            background: rgba(30, 25, 20, 0.7);
            color: #f5e6d3;
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
            flex-shrink: 0;
        }
        .search::placeholder {
            color: #6b5a45;
            font-size: 1rem;
        }
        .search:focus {
            border-color: rgba(255, 215, 0, 0.2);
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .categories button {
            padding: 6px 14px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            border-radius: 30px;
            background: rgba(30, 25, 20, 0.4);
            color: #b8956a;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .categories button.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(30, 25, 20, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.04);
            margin-bottom: 6px;
            cursor: pointer;
        }
        .group-header:hover {
            background: rgba(30, 25, 20, 0.7);
        }
        .group-header .icon {
            font-size: 1.6rem;
        }
        .group-header .title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f5e6d3;
        }
        .group-header .count {
            margin-left: auto;
            color: #b8956a;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 12px;
            border-radius: 30px;
        }
        .group-header .arrow {
            color: #b8956a;
            transition: transform 0.3s;
            font-size: 1rem;
        }
        .group-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .group-phrases {
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 10000px;
        }
        .group-phrases.collapsed {
            max-height: 0;
        }

        .phrase-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 6px;
            border-left: 4px solid #ffd700;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .phrase-card:hover {
            transform: translateX(4px);
            background: rgba(30, 25, 20, 0.75);
        }
        .phrase-card .chinese {
            font-size: 2.6rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 80px;
        }
        .phrase-card .chinese:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .phrase-card .chinese .badge {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 700;
        }
        .phrase-card .chinese .badge.red {
            background: rgba(220, 38, 38, 0.2);
            color: #ff6b6b;
        }
        .phrase-card .chinese .badge.analog {
            background: rgba(59, 130, 246, 0.15);
            color: #6ea8fe;
        }
        .phrase-card .info {
            display: flex;
            flex-direction: column;
            flex: 2;
            min-width: 120px;
        }
        .phrase-card .pinyin {
            font-size: 1.05rem;
            color: #b8956a;
        }
        .phrase-card .translation {
            font-size: 1.15rem;
            color: #d4c9a6;
        }
        .phrase-card .actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .phrase-card .actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
        }
        .phrase-card .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
        }
        .phrase-card .actions .audio-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .phrase-card .actions .save-btn {
            background: #2ecc71;
            color: white;
        }
        .phrase-card .actions .save-btn.saved {
            background: #f39c12;
        }

        /* ===== ДИАЛОГИ ===== */
        .dialog-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 10px;
            border-left: 5px solid #3b82f6;
        }
        .dialog-card .title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f5e6d3;
            margin-bottom: 6px;
        }
        .dialog-card .phrases-list {
            font-size: 0.9rem;
            color: #b8956a;
            margin-bottom: 8px;
        }
        .dialog-card .phrases-list .dp {
            background: rgba(255, 255, 255, 0.04);
            padding: 3px 10px;
            border-radius: 8px;
            margin-right: 6px;
            display: inline-block;
            font-size: 0.9rem;
        }
        .dialog-card .phrases-list .dp.red {
            background: rgba(220, 38, 38, 0.15);
            color: #ff6b6b;
        }
        .dialog-line {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .dialog-line:last-child {
            border-bottom: none;
        }
        .dialog-line .sp {
            font-weight: 700;
            color: #3b82f6;
            min-width: 30px;
            font-size: 1rem;
        }
        .dialog-line .cn {
            font-size: 2rem;
            font-weight: 600;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
        }
        .dialog-line .cn:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .dialog-line .py {
            font-size: 0.95rem;
            color: #b8956a;
            align-self: center;
        }
        .dialog-line .ru {
            font-size: 1.05rem;
            color: #d4c9a6;
            align-self: center;
        }
        .dialog-speak-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #1d4ed8;
            margin-top: 8px;
            font-family: inherit;
        }
        .dialog-speak-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1d4ed8;
        }

        /* ===== РИСОВАЛКА (HANZI WRITER) ===== */
        #tab-hanzi {
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        #tab-hanzi.active {
            display: flex;
        }

        .hanzi-section {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .hanzi-section .input-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .hanzi-section .input-row input {
            flex: 1;
            min-width: 100px;
            padding: 10px 16px;
            border: 2px solid rgba(255, 215, 0, 0.1);
            border-radius: 40px;
            background: rgba(30, 25, 20, 0.6);
            color: #f5e6d3;
            font-size: 1.2rem;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            outline: none;
            maxlength: 4;
        }
        .hanzi-section .input-row input::placeholder {
            color: #6b5a45;
            font-size: 1rem;
        }
        .hanzi-section .input-row input:focus {
            border-color: rgba(255, 215, 0, 0.2);
        }
        .hanzi-section .input-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .hanzi-section .input-row button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
        }
        .hanzi-section .input-row .repeat-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .hanzi-section .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .hanzi-section .speed-control label {
            font-size: 0.8rem;
            color: #b8956a;
            font-weight: 600;
        }
        .hanzi-section .speed-control input[type="range"] {
            flex: 1;
            min-width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            outline: none;
        }
        .hanzi-section .speed-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ff6b35;
            border-radius: 50%;
            cursor: pointer;
        }
        .hanzi-section .speed-control .speed-value {
            font-size: 0.8rem;
            color: #d4c9a6;
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .hanzi-section .hanzi-wrapper {
            background: #fffef9;
            border-radius: 12px;
            padding: 4px;
            border: 2px solid #c8aa6e;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 200px;
        }
        .hanzi-section .hanzi-wrapper .hw-target {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1/1;
            max-height: 100%;
        }
        .hanzi-section .hanzi-wrapper .placeholder {
            color: #b8956a;
            font-size: 1.1rem;
            text-align: center;
            padding: 16px;
            position: absolute;
            pointer-events: none;
        }
        .hanzi-section .hanzi-wrapper .char-label {
            position: absolute;
            bottom: 8px;
            right: 12px;
            color: #b8956a;
            font-size: 0.7rem;
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===== ДНЕВНИК ===== */
        #tab-notebook {
            flex-direction: column;
            flex: 1;
        }
        #tab-notebook.active {
            display: flex;
        }

        .notebook-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .notebook-container .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 6px;
        }
        .notebook-container .header .count {
            background: rgba(255, 215, 0, 0.06);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #b8956a;
        }
        .notebook-container .header .actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .notebook-container .header .clear-btn {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }
        .notebook-container .header .clear-btn:hover {
            background: rgba(231, 76, 60, 0.25);
        }
        .notebook-container .header .export-btn {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }
        .notebook-container .header .export-btn:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        .notebook-container .list {
            flex: 1;
            overflow-y: auto;
        }
        .notebook-container .list::-webkit-scrollbar {
            width: 3px;
        }
        .notebook-container .list::-webkit-scrollbar-thumb {
            background: #2ecc71;
            border-radius: 4px;
        }

        .notebook-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            gap: 8px;
            cursor: pointer;
            border-radius: 8px;
        }
        .notebook-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .notebook-item .char {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            min-width: 40px;
        }
        .notebook-item .info {
            color: #d4c9a6;
            font-size: 0.9rem;
            flex: 1;
            min-width: 80px;
        }
        .notebook-item .info .pinyin {
            color: #b8956a;
        }
        .notebook-item .date {
            font-size: 0.65rem;
            color: #b8956a;
            opacity: 0.5;
            min-width: 60px;
        }
        .notebook-item .actions {
            display: flex;
            gap: 4px;
        }
        .notebook-item .actions button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }
        .notebook-item .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
        }
        .notebook-item .actions .speak-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .notebook-item .actions .remove-btn {
            background: #e74c3c;
            color: white;
            font-weight: bold;
            font-size: 0.7rem;
        }

        .empty {
            text-align: center;
            padding: 20px;
            color: #b8956a;
            font-size: 1rem;
        }
        .empty .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        /* ===== КАЛЛИГРАФИЯ ===== */
        #tab-canvas {
            flex: 1;
            flex-direction: column;
        }
        #tab-canvas.active {
            display: flex;
        }

        .canvas-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }
        .canvas-wrapper {
            background: #fffef9;
            border-radius: 12px;
            padding: 4px;
            border: 2px solid #c8aa6e;
            display: inline-block;
            max-width: 100%;
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1/1;
            touch-action: none;
        }
        .canvas-tools {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }
        .canvas-tools button {
            padding: 6px 16px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }
        .canvas-tools button:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
        }
        .canvas-tools .undo-btn {
            background: #3b82f6;
            color: white;
        }
        .canvas-tools .clear-btn {
            background: #e74c3c;
            color: white;
        }
        .canvas-tools .trace-btn {
            background: #8b5cf6;
            color: white;
        }
        .canvas-tools .check-btn {
            background: #2ecc71;
            color: white;
        }
        .canvas-tools .save-img-btn {
            background: #f39c12;
            color: white;
        }
        .canvas-tools .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 0;
            min-width: unset;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }
        .canvas-tools .color-btn.active {
            border-color: #ffd700;
        }

<body>

    <div class="container">

        <!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
        <div class="top-bar">
            <a href="index.html" class="back-btn">◀ На главную</a>
            <span class="title">📕 Красная книга</span>
            <a href="#" class="notebook-link" id="notebookNav">📓 Дневник</a>
        </div>

        <!-- ===== СТАТИСТИКА ===== -->
        <div class="stats" id="statsBar">
            <span>Всего: <strong id="totalCount">0</strong></span>
            <span>Красная: <strong id="redCount">0</strong></span>
            <span>Аналоги: <strong id="analogCount">0</strong></span>
            <span>Диалогов: <strong id="dialogCount">0</strong></span>
            <span>В дневнике: <strong id="notebookCount">0</strong></span>
        </div>

        <!-- ===== ВКЛАДКИ ===== -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="groups">📚 Фразы</button>
            <button class="tab-btn" data-tab="dialogues">💬 Диалоги</button>
            <button class="tab-btn" data-tab="hanzi">✍️ Рисовалка</button>
            <button class="tab-btn" data-tab="notebook">📓 Дневник</button>
            <button class="tab-btn" data-tab="canvas">🖌️ Каллиграфия</button>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ГРУППЫ (ФРАЗЫ) -->
        <!-- ========================================================== -->
        <div class="tab-content active" id="tab-groups">
            <input class="search" id="searchInput" placeholder="🔍 Поиск по группам и фразам..." />
            <div class="categories" id="categoryButtons">
                <button data-cat="all" class="active">📚 Все</button>
                <button data-cat="phrase">📄 Фразы</button>
                <button data-cat="travel">✈️ Путешествия</button>
                <button data-cat="food">🍜 Еда</button>
                <button data-cat="work">💼 Работа</button>
            </div>
            <div class="scroll-area" id="groupsContainer"></div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ДИАЛОГИ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-dialogues">
            <div class="scroll-area" id="dialoguesContainer"></div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: РИСОВАЛКА (HANZI WRITER) -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-hanzi">
            <div class="hanzi-section">
                <div class="input-row">
                    <input type="text" id="hanziInput" placeholder="Введите иероглиф(ы) до 4..." maxlength="4" autocomplete="off">
                    <button id="showHanziBtn">✍️ Показать</button>
                    <button class="repeat-btn" id="repeatHanziBtn">🔄 Повтор</button>
                </div>
                <div class="speed-control">
                    <label for="speedSlider">🐢 Скорость:</label>
                    <input type="range" id="speedSlider" min="0.3" max="2.5" step="0.1" value="1.0">
                    <span class="speed-value" id="speedValue">1.0x</span>
                    <label style="margin-left:8px;font-size:0.75rem;">
                        <input type="checkbox" id="autoSaveToggle" checked> Автосохранение
                    </label>
                </div>
                <div class="hanzi-wrapper" id="hanziWrapper">
                    <div class="placeholder" id="hanziPlaceholder">📖 Введите иероглиф(ы) и нажмите "Показать"</div>
                    <div class="hw-target" id="hwTarget"></div>
                    <div class="char-label" id="charLabel"></div>
                </div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ДНЕВНИК -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-notebook">
            <div class="notebook-container">
                <div class="header">
                    <span>📓 Сохранённые</span>
                    <div class="actions">
                        <span class="count" id="notebookCountLabel">0</span>
                        <button class="export-btn" id="exportNotebookBtn">📤 Экспорт</button>
                        <button class="clear-btn" id="clearNotebookBtn">🗑️ Очистить</button>
                    </div>
                </div>
                <div class="list" id="savedList">
                    <div class="empty">
                        <span class="icon">📓</span>
                        Сохраняйте фразы и иероглифы для повторения
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: КАЛЛИГРАФИЯ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-canvas">
            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="calligraphyCanvas"></canvas>
                </div>
                <div class="quality-bar"><div class="quality-fill" id="qFill"></div></div>
                <div class="quality-text" id="qText">🖌️ Рисуй иероглифы кистью</div>
                <div class="canvas-tools">
                    <button class="undo-btn" id="canvasUndo">↩️ Отменить</button>
                    <button class="clear-btn" id="canvasClear">🧽 Очистить</button>
                    <button class="trace-btn" id="canvasTrace">👁️ Образец</button>
                    <button class="check-btn" id="canvasCheck">✅ Проверить</button>
                    <button class="save-img-btn" id="canvasSaveImg">💾 Сохранить PNG</button>
                </div>
                <div class="canvas-tools" style="margin-top:4px;">
                    <span style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">
                        <button class="color-btn active" data-color="#1a1a1a" style="background:#1a1a1a;"></button>
                        <button class="color-btn" data-color="#c0392b" style="background:#c0392b;"></button>
                        <button class="color-btn" data-color="#d4a017" style="background:#d4a017;"></button>
                        <button class="color-btn" data-color="#2471a3" style="background:#2471a3;"></button>
                    </span>
                    <span class="brush-control">
                        <label for="brushSizeSlider">🖌️</label>
                        <input type="range" id="brushSizeSlider" min="2" max="20" value="8">
                        <span class="brush-value" id="brushSizeValue">8</span>
                    </span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. ДАННЫЕ
        // ============================================================

        let allPhrases = [];
        let allDialogues = [];
        let notebook = JSON.parse(localStorage.getItem('chinese_redbook_notebook') || '[]');
        let collapsedGroups = JSON.parse(localStorage.getItem('chinese_collapsed_groups') || '{}');

        if (typeof redBookData !== 'undefined') allPhrases = redBookData;
        else if (typeof allPhrases !== 'undefined') allPhrases = allPhrases;
        else if (typeof redPhrases !== 'undefined') allPhrases = redPhrases;

        if (typeof redBookDialogues !== 'undefined') allDialogues = redBookDialogues;
        else if (typeof dialogues !== 'undefined') allDialogues = dialogues;

        const groups = [
            { id: 'decisions', icon: '💭', title: 'Решения', keywords: ['决定', '选好', '想好', '同意', '反对', '答应', '保证'] },
            { id: 'greetings', icon: '👋', title: 'Приветствия', keywords: ['你好', '怎么样', '见', '好久', '最近', '欢迎'] },
            { id: 'feelings', icon: '😊', title: 'Чувства', keywords: ['喜欢', '讨厌', '累', '饿', '饱', '困', '饿死', '累死'] },
            { id: 'actions', icon: '🏃', title: 'Действия', keywords: ['走', '回去', '过来', '过去', '去', '来', '开'] },
            { id: 'requests', icon: '🙏', title: 'Просьбы', keywords: ['帮', '忙', '送', '陪', '让', '借'] },
            { id: 'time', icon: '⏰', title: 'Время', keywords: ['时间', '赶', '急', '等', '迟', '晚', '早', '快', '慢', '马上'] },
            { id: 'food', icon: '🍜', title: 'Еда', keywords: ['吃', '喝', '饭', '饿', '饱', '火锅', '买单', '结账'] },
            { id: 'work', icon: '💼', title: 'Работа', keywords: ['工作', '学习', '会议', '安排', '记录', '主持', '议程', '项目'] },
            { id: 'weather', icon: '🌤️', title: 'Погода', keywords: ['雨', '雪', '风', '天', '晴', '阴', '云', '冷', '热'] },
            { id: 'communication', icon: '📱', title: 'Общение', keywords: ['说', '话', '电话', '沟通', '联系', '确认', '邮件', '发送'] },
            { id: 'travel', icon: '✈️', title: 'Путешествия', keywords: ['路', '机场', '火车站', '地铁', '票', '顺风', '安全', '小心'] },
            { id: 'emotions', icon: '❤️', title: 'Эмоции', keywords: ['开心', '难过', '担心', '紧张', '兴奋', '感动', '失望', '生气'] }
        ];

        let searchQuery = '';
        let currentCategory = 'all';
        let hanziSpeed = 1.0;
        let hanziWriter = null;

        // ============================================================
        // 2. ГРУППЫ (ФРАЗЫ)
        // ============================================================

        function getPhrasesForGroup(group) {
            return allPhrases.filter(p => {
                const text = p.chinese + ' ' + p.pinyin + ' ' + p.translation;
                return group.keywords.some(kw => text.includes(kw));
            });
        }

        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            updateStats();
            let html = '';
            let visible = 0;

            for (const group of groups) {
                let phrases = getPhrasesForGroup(group);
                if (currentCategory !== 'all') phrases = phrases.filter(p => p.category === currentCategory);
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    phrases = phrases.filter(p =>
                        p.chinese.includes(q) || p.pinyin.toLowerCase().includes(q) ||
                        p.translation.toLowerCase().includes(q) || group.title.toLowerCase().includes(q)
                    );
                }
                if (phrases.length === 0) continue;
                visible++;

                const isCollapsed = collapsedGroups[group.id] || false;

                html += `
                            <div class="group-container">
                                <div class="group-header ${isCollapsed ? 'collapsed' : ''}" data-group="${group.id}">
                                    <span class="icon">${group.icon}</span>
                                    <span class="title">${group.title}</span>
                                    <span class="count">${phrases.length}</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <div class="group-phrases ${isCollapsed ? 'collapsed' : ''}">
                        `;

                for (const p of phrases) {
                    const isRed = p.red !== false;
                    const isSaved = notebook.some(n => n.char === p.chinese);
                    const safe = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    html += `
                                <div class="phrase-card">
                                    <div class="chinese" onclick="speakChinese('${safe}')">
                                        ${p.chinese}
                                        <span class="badge ${isRed ? 'red' : 'analog'}">${isRed ? '🔴' : '🔵'}</span>
                                    </div>
                                    <div class="info">
                                        <div class="pinyin">${p.pinyin}</div>
                                        <div class="translation">${p.translation}</div>
                                    </div>
                                    <div class="actions">
                                        <button class="audio-btn" onclick="speakChinese('${safe}')">🔊</button>
                                        <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleNotebook('${safe}', '${p.pinyin}', '${p.translation}')">${isSaved ? '✓' : '📓'}</button>
                                    </div>
                                </div>
                            `;
                }

                html += `
                                </div>
                            </div>
                        `;
            }

            container.innerHTML = visible === 0 ?
                `<div class="empty"><span class="icon">🔍</span>Ничего не найдено</div>` : html;

            document.querySelectorAll('.group-header').forEach(h => {
                h.onclick = function() {
                    const id = this.dataset.group;
                    const phrases = this.nextElementSibling;
                    const isCollapsed = phrases.classList.contains('collapsed');
                    phrases.classList.toggle('collapsed');
                    this.classList.toggle('collapsed');
                    collapsedGroups[id] = !isCollapsed;
                    localStorage.setItem('chinese_collapsed_groups', JSON.stringify(collapsedGroups));
                };
            });
        }

        // ============================================================
        // 3. ДИАЛОГИ
        // ============================================================

        function renderDialogues() {
            const container = document.getElementById('dialoguesContainer');
            if (allDialogues.length === 0) {
                container.innerHTML = `<div class="empty"><span class="icon">💬</span>Диалогов нет</div>`;
                return;
            }

            let html = '';
            for (const d of allDialogues) {
                let phrases = '';
                if (d.phrases) {
                    phrases = d.phrases.map(p => {
                        const isRed = allPhrases.some(fp => fp.chinese === p && fp.red !== false);
                        return `<span class="dp ${isRed ? 'red' : ''}">${p}</span>`;
                    }).join(' ');
                }

                let lines = '';
                for (const line of d.lines) {
                    const safe = line.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    lines += `
                                <div class="dialog-line">
                                    <span class="sp">${line.speaker}</span>
                                    <span class="cn" onclick="speakChinese('${safe}')">${line.chinese}</span>
                                    <span class="py">${line.pinyin}</span>
                                    <span class="ru">— ${line.russian}</span>
                                </div>
                            `;
                }

                const full = d.lines.map(l => l.chinese).join('。');
                const safeFull = full.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                html += `
                            <div class="dialog-card">
                                <div class="title">💬 ${d.title}</div>
                                ${phrases ? `<div class="phrases-list">📌 ${phrases}</div>` : ''}
                                ${lines}
                                <button class="dialog-speak-btn" onclick="speakChinese('${safeFull}')">🔊 Весь диалог</button>
                            </div>
                        `;
            }
            container.innerHTML = html;
        }

        // ============================================================
        // 4. ДНЕВНИК
        // ============================================================

        function toggleNotebook(char, pinyin, translation) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                showToast(`❌ "${char}" удалён`);
            } else {
                notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                showToast(`✅ "${char}" сохранён`);
            }
            localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
            renderGroups();
            renderNotebook();
            updateStats();
        }

        function renderNotebook() {
            const container = document.getElementById('savedList');
            if (notebook.length === 0) {
                container.innerHTML =
                    `<div class="empty"><span class="icon">📓</span>Сохраняйте фразы и иероглифы для повторения</div>`;
                return;
            }

            let html = '';
            for (const item of notebook) {
                const safe = item.char.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const date = new Date(item.added);
                const dateStr = date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', { hour: '2-digit',
                    minute: '2-digit' });
                html += `
                            <div class="notebook-item" onclick="loadToHanzi('${safe}')">
                                <span class="char">${item.char}</span>
                                <span class="info">
                                    <span class="pinyin">${item.pinyin || ''}</span>
                                    ${item.translation ? `— ${item.translation}` : ''}
                                </span>
                                <span class="date">${dateStr}</span>
                                <div class="actions">
                                    <button class="speak-btn" onclick="event.stopPropagation(); speakChinese('${safe}')">🔊</button>
                                    <button class="remove-btn" onclick="event.stopPropagation(); removeFromNotebook('${safe}')">✖</button>
                                </div>
                            </div>
                        `;
            }
            container.innerHTML = html;
            document.getElementById('notebookCountLabel').textContent = notebook.length;
        }

        function removeFromNotebook(char) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast(`❌ "${char}" удалён`);
            }
        }

        function clearNotebook() {
            if (notebook.length === 0) return;
            if (confirm('Удалить всё из дневника?')) {
                notebook = [];
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast('🗑️ Дневник очищен');
            }
        }

        function exportNotebook() {
            if (notebook.length === 0) {
                showToast('📓 Дневник пуст');
                return;
            }
            const data = JSON.stringify(notebook, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chinese_notebook_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ Дневник экспортирован');
        }

        // ============================================================
        // 5. HANZI WRITER (РИСОВАЛКА)
        // ============================================================

        function initHanziWriter(chars) {
            const target = document.getElementById('hwTarget');
            const placeholder = document.getElementById('hanziPlaceholder');
            const wrapper = document.getElementById('hanziWrapper');
            const label = document.getElementById('charLabel');

            if (hanziWriter) {
                try { hanziWriter.destroy(); } catch (e) {}
                hanziWriter = null;
            }

            if (!chars || chars.length === 0) {
                target.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.textContent = '📖 Введите иероглиф(ы) и нажмите "Показать"';
                label.textContent = '';
                return;
            }

            target.style.display = 'block';
            placeholder.style.display = 'none';
            label.textContent = chars.length + ' иероглиф' + (chars.length > 1 ? 'а' : '');

            try {
                const size = Math.min(wrapper.clientWidth - 16, 400);
                const text = chars.join('');

                hanziWriter = HanziWriter.create(target, text, {
                    width: size,
                    height: size,
                    padding: 6,
                    strokeColor: '#1a1a1a',
                    radicalColor: '#c0392b',
                    strokeAnimationSpeed: hanziSpeed,
                });

                setTimeout(() => {
                    if (hanziWriter) hanziWriter.animateCharacter();
                }, 200);

            } catch (e) {
                placeholder.style.display = 'block';
                placeholder.textContent = '❌ Ошибка: ' + e.message;
                target.style.display = 'none';
                label.textContent = '';
            }
        }

        function showHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                document.getElementById('hanziPlaceholder').textContent = '⚠️ Введите иероглиф(ы)';
                document.getElementById('hanziPlaceholder').style.display = 'block';
                document.getElementById('hwTarget').style.display = 'none';
                document.getElementById('charLabel').textContent = '';
                return;
            }

            const chars = [...raw];
            if (chars.length > 4) {
                const limited = chars.slice(0, 4);
                document.getElementById('hanziInput').value = limited.join('');
                initHanziWriter(limited);
                return;
            }

            initHanziWriter(chars);

            if (document.getElementById('autoSaveToggle').checked) {
                for (const char of chars) {
                    if (!notebook.some(n => n.char === char)) {
                        let pinyin = '',
                            translation = '';
                        const found = allPhrases.find(p => p.chinese === char);
                        if (found) { pinyin = found.pinyin;
                            translation = found.translation; }
                        notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                    }
                }
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast(`✅ Сохранено: ${chars.join(', ')}`);
            }
        }

        function repeatHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                showToast('⚠️ Сначала введите иероглиф');
                return;
            }
            const chars = [...raw];
            if (chars.length > 4) {
                const limited = chars.slice(0, 4);
                document.getElementById('hanziInput').value = limited.join('');
                initHanziWriter(limited);
            } else {
                initHanziWriter(chars);
            }
        }

        function loadToHanzi(char) {
            switchTab('hanzi');
            document.getElementById('hanziInput').value = char;
            setTimeout(() => initHanziWriter([char]), 100);
        }

        // ============================================================
        // 6. ОЗВУЧКА
        // ============================================================

        let chineseVoice = null;

        function loadChineseVoice() {
            if (!window.speechSynthesis) return;
            const voices = speechSynthesis.getVoices();
            chineseVoice = voices.find(v => v.lang.startsWith('zh')) || null;
        }
        if (window.speechSynthesis) {
            loadChineseVoice();
            speechSynthesis.onvoiceschanged = loadChineseVoice;
            setTimeout(loadChineseVoice, 500);
        }

        function speakChinese(text) {
            if (!text || !window.speechSynthesis) return;
            try { window.speechSynthesis.cancel(); } catch (e) {}
            setTimeout(() => {
                try {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'zh-CN';
                    u.rate = 0.7;
                    if (!chineseVoice) {
                        const voices = speechSynthesis.getVoices();
                        chineseVoice = voices.find(v => v.lang.startsWith('zh'));
                    }
                    if (chineseVoice) u.voice = chineseVoice;
                    window.speechSynthesis.speak(u);
                } catch (e) {}
            }, 50);
        }
        window.speakChinese = speakChinese;

        // ============================================================
        // 7. КАЛЛИГРАФИЯ
        // ============================================================

        let canvas, ctx, isDrawing = false,
            lastX, lastY, lastWidth, lastTime, strokeLen = 0;
        let canvasHistory = [];
        let currentColor = '#1a1a1a';
        let canvasRefData = null;
        let exampleVisible = false;
        let brushSize = 8;

        function initCanvas() {
            canvas = document.getElementById('calligraphyCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const size = Math.min(rect.width - 16, 450);
            canvas.width = canvas.height = size;
            ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            setupDrawing();
            document.getElementById('qFill').style.width = '0%';
            document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы кистью';
            canvasHistory = [];
            document.getElementById('canvasUndo').style.display = 'none';
        }

        function drawGrid(ctx, size) {
            const p = 20,
                c = size / 2;
            ctx.save();
            ctx.strokeStyle = '#e8e0d8';
            ctx.lineWidth = 1;
            ctx.strokeRect(p, p, size - p * 2, size - p * 2);
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(c, p);
            ctx.lineTo(c, size - p);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p, c);
            ctx.lineTo(size - p, c);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        function setupDrawing() {
            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left) * canvas.width / rect.width,
                    y: (e.clientY - rect.top) * canvas.height / rect.height,
                    pressure: e.pressure || 0.5
                };
            }

            function start(e) {
                e.preventDefault();
                isDrawing = true;
                const p = getPos(e);
                lastX = p.x;
                lastY = p.y;
                lastTime = performance.now();
                lastWidth = brushSize * 0.5;
                saveCanvasState();
                document.getElementById('canvasUndo').style.display = 'inline-block';
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                const p = getPos(e);
                const now = performance.now();
                const dt = Math.max(1, now - lastTime);
                const dist = Math.hypot(p.x - lastX, p.y - lastY);
                const speed = dist / dt;
                strokeLen += dist;

                const pressureFactor = 0.2 + p.pressure * 0.8;
                const speedFactor = Math.max(0.1, 1 - (speed / 0.8));
                let w = brushSize * pressureFactor * speedFactor;
                if (strokeLen < 15) w *= (0.3 + 0.7 * (strokeLen / 15));
                w = Math.max(2, Math.min(brushSize * 1.5, w));

                const newW = lastWidth * 0.6 + w * 0.4;

                ctx.save();
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = newW;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 0.5;
                ctx.shadowColor = currentColor + '33';

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();

                const midX = (lastX + p.x) / 2;
                const midY = (lastY + p.y) / 2;
                const midW = (lastWidth + newW) / 2;
                if (dist > 2) {
                    ctx.beginPath();
                    ctx.ellipse(midX, midY, midW / 2, midW / 2.2, Math.atan2(p.y - lastY, p.x - lastX) + Math.PI / 2, 0, Math
                        .PI * 2);
                    ctx.fill();
                }

                ctx.restore();

                lastX = p.x;
                lastY = p.y;
                lastWidth = newW;
                lastTime = now;
            }

            function stop() {
                if (!isDrawing) return;
                isDrawing = false;
                const angle = Math.atan2(lastY - (lastY - 1), lastX - (lastX - 1)) || 0;
                ctx.save();
                ctx.fillStyle = currentColor;
                ctx.shadowBlur = 0;
                for (let i = 1; i <= 10; i++) {
                    const t = i / 10;
                    const tw = lastWidth * Math.pow(1 - t, 1.8);
                    const tx = lastX + Math.cos(angle) * t * 5;
                    const ty = lastY + Math.sin(angle) * t * 5;
                    ctx.beginPath();
                    ctx.ellipse(tx, ty, tw / 2, tw / 2.8, angle, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
                saveCanvasState();
            }

            canvas.addEventListener('pointerdown', start);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', stop);
            canvas.addEventListener('pointerleave', stop);
            canvas.addEventListener('pointercancel', stop);
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('mouseleave', stop);
        }

        function saveCanvasState() {
            canvasHistory.push(canvas.toDataURL());
            if (canvasHistory.length > 30) canvasHistory.shift();
        }

        function undoCanvas() {
            if (canvasHistory.length < 2) return;
            canvasHistory.pop();
            const img = new Image();
            img.onload = function() {
                const size = canvas.width;
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(img, 0, 0);
                if (canvasHistory.length <= 1) {
                    document.getElementById('canvasUndo').style.display = 'none';
                }
            };
            img.src = canvasHistory[canvasHistory.length - 1];
        }

        function clearCanvas() {
            const size = canvas.width;
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            document.getElementById('qFill').style.width = '0%';
            document.getElementById('qText').textContent = '🧽 Очищено';
            document.getElementById('canvasTrace').textContent = '👁️ Образец';
            canvasHistory = [];
            document.getElementById('canvasUndo').style.display = 'none';
        }

        function showExample() {
            const char = prompt('Введите иероглиф для образца (1 символ):', '永');
            if (!char || char.length !== 1) return;
            clearCanvas();
            const size = canvas.width;
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#9b59b6';
            ctx.font = `900 ${size * 0.7}px "Noto Sans CJK SC", "KaiTi", "STKaiti", serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, size / 2, size / 2 + size * 0.02);
            ctx.restore();
            canvasRefData = ctx.getImageData(0, 0, size, size);
            exampleVisible = true;
            document.getElementById('canvasTrace').textContent = '🙈 Скрыть';
            document.getElementById('qText').textContent = `🖌️ Обводи образец "${char}"`;
        }

        function hideExample() {
            const size = canvas.width;
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            document.getElementById('canvasTrace').textContent = '👁️ Образец';
            document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы кистью';
        }

        function checkQuality() {
            if (!canvasRefData) {
                document.getElementById('qText').textContent = '👁️ Сначала покажи образец';
                return;
            }
            const size = canvas.width;
            const current = ctx.getImageData(0, 0, size, size);
            const dRef = canvasRefData.data;
            const dCur = current.data;
            let match = 0,
                totalRef = 0,
                userOutside = 0;
            const threshold = 235;
            for (let i = 0; i < dRef.length; i += 4) {
                const isRef = (dRef[i] < threshold || dRef[i + 1] < threshold || dRef[i + 2] < threshold);
                const isUser = (dCur[i] < threshold || dCur[i + 1] < threshold || dCur[i + 2] < threshold);
                if (isRef) { totalRef++;
                    if (isUser) match++; } else if (isUser) { userOutside++; }
            }
            if (totalRef === 0) {
                document.getElementById('qText').textContent = '📝 Нет эталона';
                return;
            }
            const pct = Math.round(2 * (match / totalRef) * (match / (totalRef + userOutside + 0.001)) /
                ((match / totalRef) + (match / (totalRef + userOutside + 0.001)) + 0.001) * 100);
            const fill = document.getElementById('qFill');
            const text = document.getElementById('qText');
            fill.style.width = pct + '%';
            if (pct > 60) { fill.style.background = '#2ecc71';
                text.textContent = `🌟 Отлично! ${pct}%`; } else if (pct > 35) { fill.style.background = '#f39c12';
                text.textContent = `👍 Хорошо! ${pct}%`; } else { fill.style.background = '#e67e22';
                text.textContent = `📝 Продолжай (${pct}%)`; }
        }

        function saveCanvasImage() {
            const link = document.createElement('a');
            link.download = 'calligraphy_' + new Date().toISOString().slice(0, 10) + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('💾 Рисунок сохранён');
        }

        // ============================================================
        // 8. ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================================

        function updateStats() {
            document.getElementById('totalCount').textContent = allPhrases.length;
            document.getElementById('redCount').textContent = allPhrases.filter(p => p.red !== false).length;
            document.getElementById('analogCount').textContent = allPhrases.filter(p => p.red === false).length;
            document.getElementById('dialogCount').textContent = allDialogues.length;
            document.getElementById('notebookCount').textContent = notebook.length;
        }

        // ============================================================
        // 9. ТОСТЫ
        // ============================================================

        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText =
                'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:10px 20px;border-radius:40px;z-index:9999;font-size:0.95rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);max-width:90%;text-align:center;';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1800);
        }

        // ============================================================
        // 10. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================

        function switchTab(tabName) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(tc => {
                tc.classList.remove('active');
            });

            // Показываем нужную
            const target = document.getElementById('tab-' + tabName);
            if (target) {
                target.classList.add('active');
            }

            // Обновляем кнопки
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tabName) {
                    btn.classList.add('active');
                }
            });

            // Дополнительные действия при переключении
            if (tabName === 'notebook') {
                renderNotebook();
            }
            if (tabName === 'dialogues') {
                renderDialogues();
            }
            if (tabName === 'hanzi') {
                setTimeout(() => {
                    const input = document.getElementById('hanziInput');
                    if (input && input.value.trim()) {
                        const chars = [...input.value.trim()];
                        initHanziWriter(chars.slice(0, 4));
                    } else {
                        initHanziWriter([]);
                    }
                }, 100);
            }
            if (tabName === 'canvas') {
                setTimeout(initCanvas, 50);
            }
            if (tabName === 'groups') {
                renderGroups();
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                switchTab(tabName);
            });
        });

        // ============================================================
        // 11. СОБЫТИЯ
        // ============================================================

        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value;
            renderGroups();
        });

        document.querySelectorAll('#categoryButtons button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#categoryButtons button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                renderGroups();
            });
        });

        document.getElementById('notebookNav').addEventListener('click', function(e) {
            e.preventDefault();
            switchTab('notebook');
        });

        // Hanzi
        document.getElementById('showHanziBtn').addEventListener('click', showHanzi);
        document.getElementById('repeatHanziBtn').addEventListener('click', repeatHanzi);
        document.getElementById('hanziInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                showHanzi(); }
        });
        document.getElementById('hanziInput').addEventListener('input', function() {
            const val = this.value.trim();
            if (val.length > 0) {
                const chars = [...val];
                if (chars.length <= 4) initHanziWriter(chars);
                else {
                    const limited = chars.slice(0, 4);
                    this.value = limited.join('');
                    initHanziWriter(limited);
                }
            } else {
                initHanziWriter([]);
            }
        });
        document.getElementById('speedSlider').addEventListener('input', function() {
            hanziSpeed = parseFloat(this.value);
            document.getElementById('speedValue').textContent = hanziSpeed.toFixed(1) + 'x';
            const input = document.getElementById('hanziInput');
            if (input && input.value.trim()) {
                const chars = [...input.value.trim()];
                initHanziWriter(chars.slice(0, 4));
            }
        });

        // Дневник
        document.getElementById('clearNotebookBtn').addEventListener('click', clearNotebook);
        document.getElementById('exportNotebookBtn').addEventListener('click', exportNotebook);

        // Каллиграфия
        document.getElementById('canvasClear').addEventListener('click', clearCanvas);
        document.getElementById('canvasUndo').addEventListener('click', undoCanvas);
        document.getElementById('canvasTrace').addEventListener('click', function() {
            if (exampleVisible) hideExample();
            else showExample();
        });
        document.getElementById('canvasCheck').addEventListener('click', checkQuality);
        document.getElementById('canvasSaveImg').addEventListener('click', saveCanvasImage);
        document.getElementById('brushSizeSlider').addEventListener('input', function() {
            brushSize = parseInt(this.value);
            document.getElementById('brushSizeValue').textContent = brushSize;
        });
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentColor = this.dataset.color;
            });
        });

        // ============================================================
        // 12. СТАРТ
        // ============================================================

        // Стартуем с вкладкой "Фразы"
        switchTab('groups');

        setTimeout(() => {
            renderGroups();
            renderDialogues();
            renderNotebook();
            updateStats();
            setTimeout(initCanvas, 100);
            setTimeout(() => initHanziWriter([]), 200);
        }, 200);

        // Глобальные функции
        window.speakChinese = speakChinese;
        window.toggleNotebook = toggleNotebook;
        window.removeFromNotebook = removeFromNotebook;
        window.loadToHanzi = loadToHanzi;
        window.showToast = showToast;
        window.initHanziWriter = initHanziWriter;
        window.showHanzi = showHanzi;
        window.repeatHanzi = repeatHanzi;
        window.undoCanvas = undoCanvas;
        window.saveCanvasImage = saveCanvasImage;
        window.exportNotebook = exportNotebook;
        window.switchTab = switchTab;
        window.initCanvas = initCanvas;
        window.clearCanvas = clearCanvas;
        window.showExample = showExample;
        window.hideExample = hideExample;
        window.checkQuality = checkQuality;

        console.log('✅ Приложение загружено!');
    </script>

</body>
