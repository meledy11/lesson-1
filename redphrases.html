<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📕 Красная книга</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a3a2a;
            font-family: system-ui, sans-serif;
            padding: 10px;
            color: #f5e6d3;
        }
        .container { max-width: 800px; margin: 0 auto; }

        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 12px;
        }
        .tab-btn {
            background: rgba(255,255,255,0.05);
            color: #b8956a;
            border: 2px solid rgba(255,215,0,0.08);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
        }
        .tab-content {
            display: none;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            min-height: 200px;
        }
        .tab-content.active { display: block; }
        .tab-content h2 { color: #ffd700; margin-bottom: 10px; }
        .tab-content p { color: #d4c9a6; }

        .quiz-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 12px;
            border: 2px solid #444;
            background: #2a2a2a;
            color: #f5e6d3;
            cursor: pointer;
            font-size: 1rem;
        }
        .quiz-options button:hover { background: #3a3a3a; }
        .quiz-options button.correct { border-color: #2ecc71; background: rgba(46,204,113,0.2); }
        .quiz-options button.wrong { border-color: #e74c3c; background: rgba(231,76,60,0.2); }
        .quiz-options button:disabled { opacity: 0.5; cursor: default; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="text-align:center;color:#ffd700;">📕 Красная книга</h1>

        <!-- ===== ВКЛАДКИ ===== -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="groups">📚 Группы</button>
            <button class="tab-btn" data-tab="dialogues">💬 Диалоги</button>
            <button class="tab-btn" data-tab="hanzi">✍️ Рисовалка</button>
            <button class="tab-btn" data-tab="notebook">📓 Дневник</button>
            <button class="tab-btn" data-tab="quiz">🎮 Викторина</button>
            <button class="tab-btn" data-tab="canvas">🖌️ Каллиграфия</button>
        </div>

        <!-- ===== КОНТЕНТ ===== -->
        <div class="tab-content active" id="tab-groups">
            <h2>📚 Группы</h2>
            <p>Здесь фразы с поиском и группами</p>
        </div>

        <div class="tab-content" id="tab-dialogues">
            <h2>💬 Диалоги</h2>
            <p>Здесь диалоги с озвучкой</p>
        </div>

        <div class="tab-content" id="tab-hanzi">
            <h2>✍️ Рисовалка</h2>
            <p>Здесь Hanzi Writer</p>
        </div>

        <div class="tab-content" id="tab-notebook">
            <h2>📓 Дневник</h2>
            <p>Здесь сохранённые фразы</p>
        </div>

        <!-- ===== ВИКТОРИНА ===== -->
        <div class="tab-content" id="tab-quiz">
            <h2>🎮 Викторина</h2>
            <div id="quizContainer">
                <div id="qNumber">1 / 3</div>
                <div id="qChinese" style="font-size:3rem;margin:10px 0;">—</div>
                <div id="qPinyin" style="color:#b8956a;">—</div>
                <div id="qHint" style="color:#b8956a;margin:10px 0;">Выберите перевод</div>
                <div class="quiz-options" id="quizOptions"></div>
                <div id="quizScore" style="margin-top:10px;">✅ 0 / 0</div>
                <button id="quizNext" style="margin-top:10px;padding:8px 20px;border-radius:40px;border:none;background:#ff6b35;color:white;font-weight:bold;cursor:pointer;">➜ Следующий</button>
                <button id="quizRestart" style="margin-top:10px;padding:8px 20px;border-radius:40px;border:none;background:#3b82f6;color:white;font-weight:bold;cursor:pointer;">🔄 Заново</button>
            </div>
        </div>

        <div class="tab-content" id="tab-canvas">
            <h2>🖌️ Каллиграфия</h2>
            <p>Здесь рисование кистью</p>
        </div>

    </div>

    <script>
        // ============================================================
        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // ============================================================
        // ВИКТОРИНА
        // ============================================================

        const words = [
            { chinese: '你好', pinyin: 'nǐ hǎo', translation: 'Привет' },
            { chinese: '谢谢', pinyin: 'xiè xie', translation: 'Спасибо' },
            { chinese: '再见', pinyin: 'zài jiàn', translation: 'До свидания' },
            { chinese: '对不起', pinyin: 'duì bu qǐ', translation: 'Извините' },
            { chinese: '请', pinyin: 'qǐng', translation: 'Пожалуйста' },
        ];

        let quizQuestions = [];
        let quizIndex = 0;
        let quizScore = 0;
        let quizTotal = 0;
        let quizAnswered = false;

        function initQuiz() {
            const shuffled = [...words].sort(() => Math.random() - 0.5);
            quizQuestions = shuffled.slice(0, 3);
            quizTotal = quizQuestions.length;
            quizIndex = 0;
            quizScore = 0;
            quizAnswered = false;
            showQuestion();
        }

        function showQuestion() {
            if (quizIndex >= quizTotal) {
                document.getElementById('qNumber').textContent = '🎉';
                document.getElementById('qChinese').textContent = '🏆';
                document.getElementById('qPinyin').textContent = '';
                document.getElementById('qHint').textContent = `Ты ответил ${quizScore} из ${quizTotal}!`;
                document.getElementById('quizOptions').innerHTML = '';
                document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
                document.getElementById('quizNext').style.display = 'none';
                return;
            }

            const q = quizQuestions[quizIndex];
            const correct = q.translation;

            const others = words.filter(w => w.translation !== correct);
            const shuffledOthers = others.sort(() => Math.random() - 0.5).slice(0, 3);
            const options = [correct, ...shuffledOthers.map(w => w.translation)].sort(() => Math.random() - 0.5);

            document.getElementById('qNumber').textContent = `${quizIndex + 1} / ${quizTotal}`;
            document.getElementById('qChinese').textContent = q.chinese;
            document.getElementById('qPinyin').textContent = q.pinyin;
            document.getElementById('qHint').textContent = 'Выберите правильный перевод';
            document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
            document.getElementById('quizNext').style.display = 'none';
            quizAnswered = false;

            const container = document.getElementById('quizOptions');
            container.innerHTML = '';

            for (const opt of options) {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.dataset.correct = opt === correct ? 'true' : 'false';
                btn.onclick = function() {
                    if (quizAnswered) return;
                    quizAnswered = true;
                    const isCorrect = this.dataset.correct === 'true';

                    document.querySelectorAll('#quizOptions button').forEach(b => b.disabled = true);

                    if (isCorrect) {
                        quizScore++;
                        this.classList.add('correct');
                    } else {
                        this.classList.add('wrong');
                        document.querySelectorAll('#quizOptions button').forEach(b => {
                            if (b.dataset.correct === 'true') b.classList.add('correct');
                        });
                    }

                    document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
                    document.getElementById('quizNext').style.display = 'inline-block';
                };
                container.appendChild(btn);
            }
        }

        document.getElementById('quizNext').onclick = function() {
            if (quizAnswered) {
                quizIndex++;
                showQuestion();
            }
        };

        document.getElementById('quizRestart').onclick = initQuiz;

        // ===== СТАРТ =====
        initQuiz();

        console.log('✅ Приложение загружено!');
    </script>

</body>
</html>
