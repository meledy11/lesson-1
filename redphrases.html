<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>📕 Красная книга — игры и каллиграфия</title>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #1a0a05 0%, #2d1b0e 40%, #1f0f07 100%);
            min-height: 100vh;
            padding: 16px;
            color: #f5e6d3;
            overflow-x: hidden;
        }

        /* ===== ФОНОВЫЕ ЗВЁЗДЫ ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffd700, transparent),
                radial-gradient(2px 2px at 40px 70px, #ffd700, transparent),
                radial-gradient(2px 2px at 50px 160px, #ffd700, transparent),
                radial-gradient(2px 2px at 90px 40px, #ffd700, transparent),
                radial-gradient(2px 2px at 130px 80px, #ffd700, transparent),
                radial-gradient(2px 2px at 160px 30px, #ffd700, transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ===== ЗАГОЛОВОК ===== */
        .header {
            text-align: center;
            padding: 20px 0 12px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.1));
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .header .sub {
            color: #b8956a;
            font-size: clamp(0.8rem, 1.5vw, 1.1rem);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* ===== ВКЛАДКИ ===== */
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 12px 0 16px;
            animation: fadeInUp 0.6s ease-out;
        }

        .tab-btn {
            padding: 10px 22px;
            border: 2px solid rgba(255, 215, 0, 0.15);
            border-radius: 50px;
            background: rgba(45, 27, 14, 0.6);
            backdrop-filter: blur(5px);
            color: #b8956a;
            font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-family: inherit;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.25);
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== ПОИСК ===== */
        .search {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid rgba(255, 215, 0, 0.12);
            border-radius: 60px;
            background: rgba(45, 27, 14, 0.7);
            backdrop-filter: blur(5px);
            color: #f5e6d3;
            font-size: clamp(0.9rem, 1.3vw, 1rem);
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .search::placeholder {
            color: #6b5a45;
        }

        .search:focus {
            border-color: rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 40px rgba(255, 215, 0, 0.05);
        }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            background: rgba(45, 27, 14, 0.6);
            backdrop-filter: blur(5px);
            padding: 12px 20px;
            border-radius: 16px;
            margin: 10px 0 16px;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }

        .stats span {
            color: #8b7355;
            font-size: clamp(0.7rem, 1.2vw, 0.9rem);
        }

        .stats strong {
            color: #ffd700;
        }

        /* ===== ГРУППА ===== */
        .group-container {
            margin-bottom: 24px;
            animation: fadeInUp 0.5s ease-out;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.06), rgba(255, 107, 53, 0.03));
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .group-header:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 107, 53, 0.06));
            border-color: rgba(255, 215, 0, 0.12);
        }

        .group-header .group-icon {
            font-size: clamp(1.5rem, 2.5vw, 2.2rem);
        }

        .group-header .group-title {
            font-size: clamp(1.1rem, 1.8vw, 1.4rem);
            font-weight: 600;
            color: #f5e6d3;
        }

        .group-header .group-count {
            margin-left: auto;
            color: #8b7355;
            font-size: clamp(0.7rem, 1vw, 0.85rem);
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 14px;
            border-radius: 50px;
        }

        .group-header .group-arrow {
            color: #8b7355;
            transition: transform 0.3s ease;
            font-size: 1.2rem;
        }

        .group-header.collapsed .group-arrow {
            transform: rotate(-90deg);
        }

        .group-phrases {
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 10000px;
        }

        .group-phrases.collapsed {
            max-height: 0;
        }

        /* ===== КАРТОЧКА ФРАЗЫ ===== */
        .phrase-card {
            background: linear-gradient(145deg, rgba(45, 27, 14, 0.85), rgba(30, 18, 10, 0.9));
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 8px;
            border-left: 3px solid rgba(255, 215, 0, 0.15);
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease-out both;
        }

        .phrase-card:hover {
            transform: translateX(6px);
            border-left-color: #ffd700;
        }

        .phrase-card .chinese {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 600;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #f5e6d3;
            cursor: pointer;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .phrase-card .chinese:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }

        .phrase-card .chinese .mini-badge {
            font-size: clamp(0.45rem, 0.6vw, 0.55rem);
            padding: 2px 10px;
            border-radius: 50px;
            background: rgba(255, 107, 53, 0.15);
            color: #ff8c42;
            font-weight: 600;
        }

        .phrase-card .chinese .mini-badge.analog {
            background: rgba(59, 130, 246, 0.12);
            color: #6ea8fe;
        }

        .phrase-card .row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-top: 2px;
        }

        .phrase-card .pinyin {
            color: #b8956a;
            font-size: clamp(0.8rem, 1.2vw, 0.95rem);
        }

        .phrase-card .translation {
            color: #d4c5a9;
            font-size: clamp(0.9rem, 1.3vw, 1.05rem);
        }

        .phrase-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .phrase-card .tags .tag {
            font-size: clamp(0.5rem, 0.7vw, 0.6rem);
            padding: 2px 12px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            color: #6b5a45;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .phrase-card .tags .tag.category {
            background: rgba(59, 130, 246, 0.06);
            color: #6ea8fe;
        }

        .phrase-card .audio-mini {
            margin-left: auto;
            background: none;
            border: none;
            color: #b8956a;
            font-size: clamp(1rem, 1.2vw, 1.2rem);
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 4px 8px;
            border-radius: 50px;
        }

        .phrase-card .audio-mini:hover {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.04);
        }

        /* ===== КАРТОЧКИ ===== */
        .flashcard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
        }

        .flashcard {
            width: 100%;
            max-width: 500px;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.08);
        }

        .flashcard-front {
            background: linear-gradient(145deg, rgba(45, 27, 14, 0.95), rgba(30, 18, 10, 0.98));
            border-left: 4px solid #ffd700;
        }

        .flashcard-back {
            background: linear-gradient(145deg, rgba(30, 18, 10, 0.98), rgba(45, 27, 14, 0.95));
            transform: rotateY(180deg);
            border-right: 4px solid #ff6b35;
        }

        .flashcard-front .fc-chinese {
            font-size: clamp(3.5rem, 8vw, 5rem);
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #f5e6d3;
        }

        .flashcard-front .fc-pinyin {
            color: #b8956a;
            font-size: clamp(1.2rem, 2vw, 1.6rem);
            margin-top: 8px;
        }

        .flashcard-back .fc-translation {
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            color: #f5e6d3;
            font-weight: 600;
        }

        .flashcard-back .fc-hint {
            color: #8b7355;
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            margin-top: 12px;
        }

        .flashcard-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .flashcard-controls button {
            padding: 12px 28px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            font-size: clamp(0.9rem, 1.2vw, 1rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.15);
            font-family: inherit;
        }

        .flashcard-controls button:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.25);
        }

        .flashcard-controls button.secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.1);
            color: #b8956a;
            box-shadow: none;
        }

        .flashcard-progress {
            color: #8b7355;
            font-size: clamp(0.8rem, 1vw, 0.9rem);
            text-align: center;
        }

        /* ===== ИГРА ===== */
        .quiz-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px 0;
        }

        .quiz-question {
            background: rgba(45, 27, 14, 0.8);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.06);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .quiz-question .q-chinese {
            font-size: clamp(3rem, 7vw, 4.5rem);
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #f5e6d3;
        }

        .quiz-question .q-hint {
            color: #8b7355;
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            margin-top: 8px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 500px) {
            .quiz-options {
                grid-template-columns: 1fr;
            }
        }

        .quiz-option {
            padding: 16px 20px;
            border-radius: 18px;
            background: rgba(45, 27, 14, 0.7);
            border: 2px solid rgba(255, 215, 0, 0.06);
            color: #d4c5a9;
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-align: center;
        }

        .quiz-option:hover {
            border-color: rgba(255, 215, 0, 0.2);
            transform: scale(1.02);
        }

        .quiz-option.correct {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .quiz-option.wrong {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .quiz-option.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        .quiz-score {
            text-align: center;
            color: #b8956a;
            font-size: clamp(0.9rem, 1.2vw, 1.1rem);
            margin-top: 16px;
        }

        .quiz-next-btn {
            display: block;
            margin: 16px auto 0;
            padding: 12px 32px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            color: #1a0a05;
            font-size: clamp(1rem, 1.3vw, 1.1rem);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .quiz-next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.2);
        }

        /* ===== ХОЛСТ ===== */
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            background: rgba(45, 27, 14, 0.7);
            border-radius: 28px;
            border: 2px solid rgba(255, 215, 0, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            padding: 6px;
        }

        .canvas-container canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #f5ede4;
            border-radius: 22px;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="rgba(255,107,53,0.3)" stroke="%23ff6b35" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="%23ff6b35"/></svg>') 12 12, auto;
            touch-action: none;
        }

        .canvas-container .canvas-watermark {
            position: absolute;
            bottom: 16px;
            right: 20px;
            color: rgba(139, 115, 85, 0.15);
            font-size: clamp(0.6rem, 0.8vw, 0.8rem);
            pointer-events: none;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .canvas-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }

        .canvas-controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            font-size: clamp(0.8rem, 1vw, 0.9rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .canvas-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(255, 107, 53, 0.2);
        }

        .canvas-controls button.secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.08);
            color: #b8956a;
        }

        .canvas-controls button.danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .canvas-controls .color-picker {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .canvas-controls .color-picker button {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 0;
            min-width: unset;
        }

        .canvas-controls .color-picker button.active {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .canvas-controls .color-picker button.black { background: #1a1a1a; }
        .canvas-controls .color-picker button.red { background: #dc2626; }
        .canvas-controls .color-picker button.gold { background: #d4a017; }
        .canvas-controls .color-picker button.blue { background: #2563eb; }

        .canvas-example {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }

        .canvas-example button {
            padding: 6px 16px;
            border-radius: 40px;
            background: rgba(45, 27, 14, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.06);
            color: #b8956a;
            font-size: clamp(0.7rem, 0.9vw, 0.8rem);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .canvas-example button:hover {
            border-color: rgba(255, 215, 0, 0.15);
            color: #d4c5a9;
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== СКРОЛЛ ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(45, 27, 14, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ffd700, #ff6b35);
            border-radius: 10px;
        }

        /* ===== АДАПТ ===== */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .phrase-card { padding: 14px 16px; }
            .group-header { padding: 12px 16px; }
            .flashcard { height: 220px; }
            .flashcard-front .fc-chinese { font-size: clamp(2.5rem, 6vw, 3.5rem); }
            .quiz-options { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== ЗАГОЛОВОК ===== -->
        <div class="header">
            <h1>📕 Красная книга</h1>
            <div class="sub">Группы похожих фраз для массового изучения</div>
        </div>

        <!-- ===== СТАТИСТИКА ===== -->
        <div class="stats" id="stats">
            <span>📄 Всего: <strong id="totalCount">0</strong></span>
            <span>📂 Групп: <strong id="groupCount">0</strong></span>
        </div>

        <!-- ===== ВКЛАДКИ ===== -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="groups">📚 Группы</button>
            <button class="tab-btn" data-tab="flashcards">🃏 Карточки</button>
            <button class="tab-btn" data-tab="quiz">📝 Викторина</button>
            <button class="tab-btn" data-tab="canvas">🖌️ Каллиграфия</button>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ГРУППЫ -->
        <!-- ========================================================== -->
        <div class="tab-content active" id="tab-groups">
            <input class="search" id="searchInput" type="text" placeholder="🔍 Поиск по группе или фразе..." />
            <div id="groupsContainer"></div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: КАРТОЧКИ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-flashcards">
            <div class="flashcard-container" id="flashcardContainer">
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <div class="fc-chinese" id="fcChinese">—</div>
                            <div class="fc-pinyin" id="fcPinyin">—</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="fc-translation" id="fcTranslation">—</div>
                            <div class="fc-hint">👆 Нажми, чтобы перевернуть</div>
                        </div>
                    </div>
                </div>
                <div class="flashcard-controls">
                    <button id="fcPrev">◀ Назад</button>
                    <button id="fcFlip">🔄 Перевернуть</button>
                    <button id="fcNext">Вперед ▶</button>
                </div>
                <div class="flashcard-progress" id="fcProgress">0 / 0</div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ВИКТОРИНА -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-quiz">
            <div class="quiz-container" id="quizContainer">
                <div class="quiz-question">
                    <div class="q-chinese" id="qChinese">—</div>
                    <div class="q-hint" id="qHint">Выбери правильный перевод</div>
                </div>
                <div class="quiz-options" id="quizOptions"></div>
                <div class="quiz-score" id="quizScore">✅ 0 / <span id="quizTotal">0</span></div>
                <button class="quiz-next-btn" id="quizNext">Следующий ➜</button>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: КАЛЛИГРАФИЯ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-canvas">
            <div class="canvas-container">
                <canvas id="calligraphyCanvas"></canvas>
                <div class="canvas-watermark">🖌️ 书法</div>
            </div>
            <div class="canvas-controls">
                <div class="color-picker">
                    <button class="black active" data-color="#1a1a1a" style="background:#1a1a1a;"></button>
                    <button class="red" data-color="#c0392b" style="background:#c0392b;"></button>
                    <button class="gold" data-color="#d4a017" style="background:#d4a017;"></button>
                    <button class="blue" data-color="#2471a3" style="background:#2471a3;"></button>
                </div>
                <button class="secondary" id="canvasUndo">↩️ Отменить</button>
                <button class="danger" id="canvasClear">🗑️ Очистить</button>
            </div>
            <div class="canvas-example" id="canvasExamples">
                <button data-char="永">永</button>
                <button data-char="爱">爱</button>
                <button data-char="龙">龙</button>
                <button data-char="学">学</button>
                <button data-char="好">好</button>
                <button data-char="心">心</button>
            </div>
        </div>

    </div>

    <!-- ========================================================== -->
    <!-- ПОДКЛЮЧАЕМ МАССИВ -->
    <!-- ========================================================== -->
    <script src="redphrases.js"></script>

    <!-- ========================================================== -->
    <!-- ЛОГИКА -->
    <!-- ========================================================== -->
    <script>
        // ============================================================
        // ЗАГРУЗКА МАССИВА
        // ============================================================

        let allPhrases = [];

        if (typeof redBookData !== 'undefined' && Array.isArray(redBookData) && redBookData.length > 0) {
            allPhrases = redBookData;
        } else if (typeof allPhrases !== 'undefined' && Array.isArray(allPhrases) && allPhrases.length > 0) {
            allPhrases = allPhrases;
        } else if (typeof redPhrases !== 'undefined' && Array.isArray(redPhrases) && redPhrases.length > 0) {
            allPhrases = redPhrases;
        }

        console.log("📄 Всего фраз:", allPhrases.length);

        // ============================================================
        // ГРУППЫ ПОХОЖИХ ФРАЗ
        // ============================================================

        const groups = [
            {
                id: 'decisions',
                icon: '💭',
                title: 'Решения и намерения',
                keywords: ['决定', '选好', '想好', '同意', '反对', '答应', '保证']
            },
            {
                id: 'greetings',
                icon: '👋',
                title: 'Приветствия и прощания',
                keywords: ['你好', '怎么样', '见', '好久', '最近', '欢迎']
            },
            {
                id: 'feelings',
                icon: '😊',
                title: 'Чувства и состояния',
                keywords: ['喜欢', '讨厌', '累', '饿', '饱', '困', '饿死', '累死']
            },
            {
                id: 'actions',
                icon: '🏃',
                title: 'Действия и движения',
                keywords: ['走', '回去', '过来', '过去', '去', '来', '开']
            },
            {
                id: 'requests',
                icon: '🙏',
                title: 'Просьбы и помощь',
                keywords: ['帮', '忙', '送', '陪', '让', '借']
            },
            {
                id: 'time',
                icon: '⏰',
                title: 'Время и спешка',
                keywords: ['时间', '赶', '急', '等', '迟', '晚', '早', '快', '慢', '马上']
            },
            {
                id: 'food',
                icon: '🍜',
                title: 'Еда и напитки',
                keywords: ['吃', '喝', '饭', '饿', '饱', '火锅', '买单', '结账']
            },
            {
                id: 'work',
                icon: '💼',
                title: 'Работа и учёба',
                keywords: ['工作', '学习', '会议', '安排', '记录', '主持', '议程', '项目']
            },
            {
                id: 'weather',
                icon: '🌤️',
                title: 'Погода и природа',
                keywords: ['雨', '雪', '风', '天', '晴', '阴', '云', '冷', '热']
            },
            {
                id: 'communication',
                icon: '📱',
                title: 'Общение и связь',
                keywords: ['说', '话', '电话', '沟通', '联系', '确认', '邮件', '发送']
            },
            {
                id: 'travel',
                icon: '✈️',
                title: 'Путешествия',
                keywords: ['路', '机场', '火车站', '地铁', '票', '顺风', '安全', '小心']
            },
            {
                id: 'emotions',
                icon: '❤️',
                title: 'Эмоции и реакции',
                keywords: ['开心', '难过', '担心', '紧张', '兴奋', '感动', '失望', '生气']
            }
        ];

        // ============================================================
        // ГРУППИРОВКА ФРАЗ
        // ============================================================

        function getPhrasesForGroup(group) {
            return allPhrases.filter(p => {
                const text = p.chinese + ' ' + p.pinyin + ' ' + p.translation;
                return group.keywords.some(kw => text.includes(kw));
            });
        }

        // ============================================================
        // РЕНДЕРИНГ ГРУПП
        // ============================================================

        let searchQuery = '';
        let collapsedGroups = new Set();

        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            const totalCountEl = document.getElementById('totalCount');
            const groupCountEl = document.getElementById('groupCount');

            totalCountEl.textContent = allPhrases.length;
            groupCountEl.textContent = groups.length;

            let html = '';
            let visibleGroups = 0;

            for (const group of groups) {
                const phrases = getPhrasesForGroup(group);
                const filtered = phrases.filter(p => {
                    if (!searchQuery.trim()) return true;
                    const q = searchQuery.trim().toLowerCase();
                    return p.chinese.includes(q) || p.pinyin.toLowerCase().includes(q) || p.translation.toLowerCase()
                        .includes(q) || group.title.toLowerCase().includes(q);
                });

                if (filtered.length === 0) continue;
                visibleGroups++;

                const isCollapsed = collapsedGroups.has(group.id);
                const arrowClass = isCollapsed ? 'collapsed' : '';

                html += `
                    <div class="group-container">
                        <div class="group-header ${arrowClass}" data-group="${group.id}">
                            <span class="group-icon">${group.icon}</span>
                            <span class="group-title">${group.title}</span>
                            <span class="group-count">${filtered.length} фраз</span>
                            <span class="group-arrow">▼</span>
                        </div>
                        <div class="group-phrases ${isCollapsed ? 'collapsed' : ''}">
                `;

                for (const p of filtered) {
                    const isRed = p.red !== undefined ? p.red : true;
                    const badgeClass = isRed ? 'mini-badge' : 'mini-badge analog';
                    const badgeText = isRed ? '🔴' : '🔵';
                    const safeChinese = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                    html += `
                        <div class="phrase-card">
                            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                                <div class="chinese" onclick="speakChinese('${safeChinese}')">
                                    ${p.chinese}
                                    <span class="${badgeClass}">${badgeText}</span>
                                </div>
                                <button class="audio-mini" onclick="speakChinese('${safeChinese}')">🔊</button>
                            </div>
                            <div class="row">
                                <span class="pinyin">${p.pinyin}</span>
                                <span class="translation">${p.translation}</span>
                            </div>
                            <div class="tags">
                                <span class="tag category">📂 ${p.category}</span>
                                ${isRed ? '<span class="tag" style="color:#ff8c42;">🔴 Красная книга</span>' : '<span class="tag" style="color:#6ea8fe;">🔵 Аналог</span>'}
                            </div>
                        </div>
                    `;
                }

                html += `
                        </div>
                    </div>
                `;
            }

            if (visibleGroups === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:40px 20px;color:#8b7355;">
                        <span style="font-size:3rem;display:block;margin-bottom:12px;">🔍</span>
                        Ничего не найдено
                    </div>
                `;
                return;
            }

            container.innerHTML = html;

            // ===== ОБРАБОТЧИКИ ГРУПП =====
            document.querySelectorAll('.group-header').forEach(header => {
                header.addEventListener('click', function() {
                    const groupId = this.dataset.group;
                    const phrases = this.nextElementSibling;
                    const isCollapsed = phrases.classList.contains('collapsed');

                    if (isCollapsed) {
                        phrases.classList.remove('collapsed');
                        this.classList.remove('collapsed');
                        collapsedGroups.delete(groupId);
                    } else {
                        phrases.classList.add('collapsed');
                        this.classList.add('collapsed');
                        collapsedGroups.add(groupId);
                    }
                });
            });
        }

        // ============================================================
        // КАРТОЧКИ
        // ============================================================

        let flashcardIndex = 0;
        let flashcardData = [];

        function initFlashcards() {
            flashcardData = allPhrases.filter(p => p.red !== false);
            if (flashcardData.length === 0) return;
            flashcardIndex = 0;
            updateFlashcard();
            document.getElementById('fcProgress').textContent = `1 / ${flashcardData.length}`;
        }

        function updateFlashcard() {
            if (flashcardData.length === 0) return;
            const p = flashcardData[flashcardIndex];
            const safeChinese = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            document.getElementById('fcChinese').textContent = p.chinese;
            document.getElementById('fcPinyin').textContent = p.pinyin;
            document.getElementById('fcTranslation').textContent = p.translation;
            document.getElementById('fcProgress').textContent = `${flashcardIndex + 1} / ${flashcardData.length}`;
            document.getElementById('flashcard').classList.remove('flipped');
            // Обновляем клик по иероглифу
            document.querySelector('.fc-chinese').onclick = () => speakChinese(p.chinese);
        }

        // ============================================================
        // ВИКТОРИНА
        // ============================================================

        let quizData = [];
        let quizIndex = 0;
        let quizScore = 0;
        let quizAnswered = false;
        let quizTotal = 0;

        function initQuiz() {
            quizData = allPhrases.filter(p => p.red !== false);
            if (quizData.length < 4) return;
            quizTotal = Math.min(quizData.length, 30);
            quizIndex = 0;
            quizScore = 0;
            quizAnswered = false;
            document.getElementById('quizTotal').textContent = quizTotal;
            showQuizQuestion();
        }

        function showQuizQuestion() {
            if (quizIndex >= quizTotal) {
                document.getElementById('qChinese').textContent = '🎉';
                document.getElementById('qHint').textContent = `Ты ответил ${quizScore} из ${quizTotal}!`;
                document.getElementById('quizOptions').innerHTML = '';
                document.getElementById('quizNext').textContent = '🔄 Начать заново';
                document.getElementById('quizNext').onclick = () => { quizIndex = 0;
                    quizScore = 0;
                    showQuizQuestion(); };
                return;
            }

            const correct = quizData[quizIndex];
            const options = [correct];
            const shuffled = [...quizData].filter(p => p.id !== correct.id);
            const shuffledOptions = shuffled.sort(() => Math.random() - 0.5).slice(0, 3);
            options.push(...shuffledOptions);
            const shuffledFinal = options.sort(() => Math.random() - 0.5);

            document.getElementById('qChinese').textContent = correct.chinese;
            document.getElementById('qHint').textContent = `Выбери правильный перевод (${quizIndex + 1}/${quizTotal})`;
            document.getElementById('quizNext').textContent = 'Следующий ➜';
            document.getElementById('quizNext').onclick = () => {
                if (!quizAnswered) return;
                quizIndex++;
                quizAnswered = false;
                showQuizQuestion();
            };
            document.getElementById('quizNext').style.display = 'none';

            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            quizAnswered = false;

            for (const opt of shuffledFinal) {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.textContent = opt.translation;
                btn.dataset.correct = opt.id === correct.id ? 'true' : 'false';
                btn.onclick = function() {
                    if (quizAnswered) return;
                    quizAnswered = true;
                    const isCorrect = this.dataset.correct === 'true';
                    if (isCorrect) { quizScore++;
                        this.classList.add('correct'); } else { this.classList.add('wrong'); }
                    document.querySelectorAll('.quiz-option').forEach(b => b.classList.add('disabled'));
                    document.querySelectorAll('.quiz-option').forEach(b => {
                        if (b.dataset.correct === 'true') b.classList.add('correct');
                    });
                    document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
                    document.getElementById('quizNext').style.display = 'block';
                };
                container.appendChild(btn);
            }
        }

        // ============================================================
        // КАЛЛИГРАФИЯ
        // ============================================================

        let canvas, ctx, isDrawing = false,
            lastX, lastY;
        let canvasHistory = [];
        let currentColor = '#1a1a1a';
        let canvasSize = 700;

        function initCanvas() {
            canvas = document.getElementById('calligraphyCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const size = Math.min(rect.width - 12, 700);
            canvas.width = size;
            canvas.height = size;
            canvasSize = size;
            ctx = canvas.getContext('2d');
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = Math.max(4, size / 80);

            // Белый фон
            ctx.fillStyle = '#f5ede4';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // События
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);

            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', endDraw, { passive: false });

            // Цвета
            document.querySelectorAll('.color-picker button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.color-picker button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentColor = this.dataset.color;
                });
            });

            // Примеры
            document.querySelectorAll('#canvasExamples button').forEach(btn => {
                btn.addEventListener('click', function() {
                    const char = this.dataset.char;
                    drawExampleChar(char);
                });
            });

            document.getElementById('canvasClear').addEventListener('click', clearCanvas);
            document.getElementById('canvasUndo').addEventListener('click', undoCanvas);
        }

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function startDraw(e) {
            isDrawing = true;
            const pos = getCanvasPos(e);
            lastX = pos.x;
            lastY = pos.y;
            saveCanvasState();
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getCanvasPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = Math.max(3, canvasSize / 60);
            ctx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        }

        function endDraw() { isDrawing = false; }

        function handleTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        }

        function saveCanvasState() {
            canvasHistory.push(canvas.toDataURL());
            if (canvasHistory.length > 30) canvasHistory.shift();
        }

        function undoCanvas() {
            if (canvasHistory.length < 2) return;
            canvasHistory.pop();
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
            img.src = canvasHistory[canvasHistory.length - 1];
        }

        function clearCanvas() {
            canvasHistory = [];
            ctx.fillStyle = '#f5ede4';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveCanvasState();
        }

        function drawExampleChar(char) {
            // Сохраняем текущий цвет
            const tempColor = currentColor;
            currentColor = '#1a1a1a';
            ctx.fillStyle = '#f5ede4';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = `${canvasSize * 0.7}px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#1a1a1a';
            ctx.fillText(char, canvas.width / 2, canvas.height / 2 + canvasSize * 0.02);

            // Добавляем лёгкое свечение
            ctx.shadowColor = 'rgba(255,215,0,0.05)';
            ctx.shadowBlur = 20;
            ctx.fillText(char, canvas.width / 2, canvas.height / 2 + canvasSize * 0.02);
            ctx.shadowBlur = 0;

            saveCanvasState();
            currentColor = tempColor;
        }

        // ============================================================
        // ОЗВУЧКА
        // ============================================================

        function speakChinese(text) {
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.7;
                window.speechSynthesis.speak(utterance);
            }, 50);
        }
        window.speakChinese = speakChinese;

        // ============================================================
        // ВКЛАДКИ
        // ============================================================

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tabName = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById('tab-' + tabName).classList.add('active');

                if (tabName === 'flashcards' && flashcardData.length === 0) initFlashcards();
                if (tabName === 'quiz' && quizData.length === 0) initQuiz();
                if (tabName === 'canvas') setTimeout(initCanvas, 50);
            });
        });

        // ============================================================
        // УПРАВЛЕНИЕ КАРТОЧКАМИ
        // ============================================================

        document.getElementById('fcFlip').addEventListener('click', () => {
            document.getElementById('flashcard').classList.toggle('flipped');
        });

        document.getElementById('fcNext').addEventListener('click', () => {
            if (flashcardData.length === 0) return;
            flashcardIndex = (flashcardIndex + 1) % flashcardData.length;
            updateFlashcard();
        });

        document.getElementById('fcPrev').addEventListener('click', () => {
            if (flashcardData.length === 0) return;
            flashcardIndex = (flashcardIndex - 1 + flashcardData.length) % flashcardData.length;
            updateFlashcard();
        });

        // Клик по карточке для переворота
        document.getElementById('flashcard').addEventListener('click', function(e) {
            if (e.target.closest('.fc-chinese')) return;
            this.classList.toggle('flipped');
        });

        // ============================================================
        // ПОИСК
        // ============================================================

        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value;
            renderGroups();
        });

        // ============================================================
        // СТАРТ
        // ============================================================

        setTimeout(() => {
            renderGroups();
            initFlashcards();
            initQuiz();
            setTimeout(initCanvas, 100);
        }, 200);

        console.log("✅ Страница загружена! Фраз:", allPhrases.length);
        console.log("📂 Групп:", groups.length);
    </script>
