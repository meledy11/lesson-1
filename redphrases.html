<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📕 Красная книга</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js">
    </script>
    <script src="redphrases.js">
    </script>
    <style>
        /* ===== ВСЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            background: linear-gradient(145deg, #1a3a2a 0%, #0a1a0f 100%);
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 8px;
            color: #f5e6d3;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 25, 20, 0.85);
            padding: 10px 20px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .top-bar .back-btn {
            background: #5a4a3a;
            color: #f7e05e;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 3px 0 #2a1a0a;
            cursor: pointer;
        }
        .top-bar .back-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2a1a0a;
        }
        .top-bar .title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-bar .notebook-link {
            background: #2ecc71;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 3px 0 #1a7a3a;
            cursor: pointer;
        }
        .top-bar .notebook-link:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a7a3a;
        }

        /* СТАТИСТИКА */
        .stats {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            background: rgba(30, 25, 20, 0.6);
            padding: 8px 20px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 215, 0, 0.06);
            backdrop-filter: blur(5px);
        }
        .stats span {
            color: #b8956a;
            font-size: 1rem;
        }
        .stats strong {
            color: #ffd700;
            font-size: 1.2rem;
        }

        /* ВКЛАДКИ */
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: rgba(45, 27, 14, 0.6);
            color: #b8956a;
            border: 2px solid rgba(255, 215, 0, 0.08);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            font-family: inherit;
            backdrop-filter: blur(5px);
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn:hover {
            border-color: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
        }
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .tab-content.active {
            display: flex;
        }

        /* СКРОЛЛ */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-area::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: #b8956a;
            border-radius: 4px;
        }

        /* ПОИСК */
        .search {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(255, 215, 0, 0.08);
            border-radius: 40px;
            background: rgba(30, 25, 20, 0.7);
            color: #f5e6d3;
            font-size: 1.2rem;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
            flex-shrink: 0;
        }
        .search::placeholder {
            color: #6b5a45;
            font-size: 1.1rem;
        }
        .search:focus {
            border-color: rgba(255, 215, 0, 0.2);
        }

        /* КАТЕГОРИИ */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .categories button {
            padding: 8px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            border-radius: 30px;
            background: rgba(30, 25, 20, 0.4);
            color: #b8956a;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .categories button.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
        }

        /* ГРУППЫ */
        .group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: rgba(30, 25, 20, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.04);
            margin-bottom: 6px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .group-header:hover {
            background: rgba(30, 25, 20, 0.7);
        }
        .group-header .icon {
            font-size: 2rem;
        }
        .group-header .title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #f5e6d3;
        }
        .group-header .count {
            margin-left: auto;
            color: #b8956a;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            border-radius: 30px;
        }
        .group-header .arrow {
            color: #b8956a;
            transition: transform 0.3s;
            font-size: 1.2rem;
        }
        .group-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .group-phrases {
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 10000px;
        }
        .group-phrases.collapsed {
            max-height: 0;
        }

        /* КАРТОЧКА ФРАЗЫ */
        .phrase-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 8px;
            border-left: 6px solid #ffd700;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .phrase-card:hover {
            transform: translateX(4px);
            background: rgba(30, 25, 20, 0.75);
        }
        .phrase-card .chinese {
            font-size: 3.4rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 100px;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.2;
        }
        .phrase-card .chinese:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .phrase-card .chinese .badge {
            font-size: 0.7rem;
            padding: 3px 12px;
            border-radius: 30px;
            font-weight: 700;
        }
        .phrase-card .chinese .badge.red {
            background: rgba(220, 38, 38, 0.2);
            color: #ff6b6b;
        }
        .phrase-card .chinese .badge.analog {
            background: rgba(59, 130, 246, 0.15);
            color: #6ea8fe;
        }
        .phrase-card .info {
            display: flex;
            flex-direction: column;
            flex: 2;
            min-width: 150px;
        }
        .phrase-card .pinyin {
            font-size: 1.3rem;
            color: #b8956a;
        }
        .phrase-card .translation {
            font-size: 1.4rem;
            color: #d4c9a6;
        }
        .phrase-card .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .phrase-card .actions button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .phrase-card .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
        }
        .phrase-card .actions .audio-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .phrase-card .actions .save-btn {
            background: #2ecc71;
            color: white;
        }
        .phrase-card .actions .save-btn.saved {
            background: #f39c12;
        }

        /* ДИАЛОГИ */
        .dialog-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 12px;
            border-left: 6px solid #3b82f6;
        }
        .dialog-card .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f5e6d3;
            margin-bottom: 8px;
        }
        .dialog-card .category-tag {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 3px 12px;
            border-radius: 30px;
            color: #b8956a;
            margin-left: 10px;
        }
        .dialog-card .phrases-list {
            font-size: 1.1rem;
            color: #b8956a;
            margin-bottom: 10px;
        }
        .dialog-card .phrases-list .dp {
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px;
            border-radius: 8px;
            margin-right: 6px;
            display: inline-block;
            font-size: 1.1rem;
        }
        .dialog-card .phrases-list .dp.red {
            background: rgba(220, 38, 38, 0.15);
            color: #ff6b6b;
        }
        .dialog-line {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 20px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .dialog-line:last-child {
            border-bottom: none;
        }
        .dialog-line .sp {
            font-weight: 700;
            color: #3b82f6;
            min-width: 35px;
            font-size: 1.2rem;
        }
        .dialog-line .cn {
            font-size: 2.6rem;
            font-weight: 600;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.2;
        }
        .dialog-line .cn:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .dialog-line .py {
            font-size: 1.15rem;
            color: #b8956a;
            align-self: center;
        }
        .dialog-line .ru {
            font-size: 1.25rem;
            color: #d4c9a6;
            align-self: center;
        }
        .dialog-speak-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #1d4ed8;
            margin-top: 10px;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .dialog-speak-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1d4ed8;
        }

        /* РИСОВАЛКА (HANZI WRITER) */
        #tab-hanzi {
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        #tab-hanzi.active {
            display: flex;
        }

        .hanzi-section {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .hanzi-section .input-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .hanzi-section .input-row input {
            flex: 1;
            min-width: 100px;
            padding: 10px 16px;
            border: 2px solid rgba(255, 215, 0, 0.1);
            border-radius: 40px;
            background: rgba(30, 25, 20, 0.6);
            color: #f5e6d3;
            font-size: 1.4rem;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            outline: none;
            maxlength: 4;
        }
        .hanzi-section .input-row input::placeholder {
            color: #6b5a45;
            font-size: 1rem;
        }
        .hanzi-section .input-row input:focus {
            border-color: rgba(255, 215, 0, 0.2);
        }
        .hanzi-section .input-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .hanzi-section .input-row button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
        }
        .hanzi-section .input-row .repeat-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .hanzi-section .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .hanzi-section .speed-control label {
            font-size: 0.9rem;
            color: #b8956a;
            font-weight: 600;
        }
        .hanzi-section .speed-control input[type="range"] {
            flex: 1;
            min-width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            outline: none;
        }
        .hanzi-section .speed-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ff6b35;
            border-radius: 50%;
            cursor: pointer;
        }
        .hanzi-section .speed-control .speed-value {
            font-size: 0.9rem;
            color: #d4c9a6;
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .hanzi-section .hanzi-wrapper {
            background: #fffef9;
            border-radius: 12px;
            padding: 4px;
            border: 2px solid #c8aa6e;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 280px;
            width: 100%;
        }
        .hanzi-section .hanzi-wrapper .hw-target {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1/1;
            max-height: 100%;
            min-height: 200px;
        }
        .hanzi-section .hanzi-wrapper .placeholder {
            color: #b8956a;
            font-size: 1.2rem;
            text-align: center;
            padding: 16px;
            position: absolute;
            pointer-events: none;
        }
        .hanzi-section .hanzi-wrapper .char-label {
            position: absolute;
            bottom: 8px;
            right: 12px;
            color: #b8956a;
            font-size: 0.8rem;
            opacity: 0.5;
            pointer-events: none;
        }

        /* ДНЕВНИК */
        #tab-notebook {
            flex-direction: column;
            flex: 1;
        }
        #tab-notebook.active {
            display: flex;
        }

        .notebook-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .notebook-container .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 6px;
        }
        .notebook-container .header .count {
            background: rgba(255, 215, 0, 0.06);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #b8956a;
        }
        .notebook-container .header .actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .notebook-container .header .clear-btn {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .notebook-container .header .clear-btn:hover {
            background: rgba(231, 76, 60, 0.25);
        }
        .notebook-container .header .export-btn {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .notebook-container .header .export-btn:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        .notebook-container .list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .notebook-container .list::-webkit-scrollbar {
            width: 3px;
        }
        .notebook-container .list::-webkit-scrollbar-thumb {
            background: #2ecc71;
            border-radius: 4px;
        }

        .notebook-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            gap: 8px;
            cursor: pointer;
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .notebook-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .notebook-item .char {
            font-size: 2.6rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            min-width: 50px;
        }
        .notebook-item .info {
            color: #d4c9a6;
            font-size: 1rem;
            flex: 1;
            min-width: 80px;
        }
        .notebook-item .info .pinyin {
            color: #b8956a;
        }
        .notebook-item .date {
            font-size: 0.7rem;
            color: #b8956a;
            opacity: 0.5;
            min-width: 60px;
        }
        .notebook-item .actions {
            display: flex;
            gap: 4px;
        }
        .notebook-item .actions button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .notebook-item .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
        }
        .notebook-item .actions .speak-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .notebook-item .actions .remove-btn {
            background: #e74c3c;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* КАЛЛИГРАФИЯ */
        #tab-canvas {
            flex: 1;
            flex-direction: column;
        }
        #tab-canvas.active {
            display: flex;
        }

        .canvas-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }
        .canvas-wrapper {
            background: #fffef9;
            border-radius: 12px;
            padding: 6px;
            border: 2px solid #c8aa6e;
            display: inline-block;
            max-width: 100%;
            width: 100%;
            max-width: 550px;
            touch-action: none;
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            aspect-ratio: 1/1;
            touch-action: none;
            cursor: crosshair;
            background: #fffef9;
        }
        .canvas-tools {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }
        .canvas-tools button {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: inherit;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .canvas-tools button:active {

                                <div class="group-phrases ${isCollapsed ? 'collapsed' : ''}">
                        `;

                for (const p of phrases) {
                    const isRed = p.red !== false;
                    const isSaved = notebook.some(n => n.char === p.chinese);
                    const safe = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    html += `
                                <div class="phrase-card">
                                    <div class="chinese" onclick="speakChinese('${safe}')">
                                        ${p.chinese}
                                        <span class="badge ${isRed ? 'red' : 'analog'}">${isRed ? '🔴' : '🔵'}</span>
                                    </div>
                                    <div class="info">
                                        <div class="pinyin">${p.pinyin}</div>
                                        <div class="translation">${p.translation}</div>
                                    </div>
                                    <div class="actions">
                                        <button class="audio-btn" onclick="speakChinese('${safe}')">🔊</button>
                                        <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleNotebook('${safe}', '${p.pinyin}', '${p.translation}')">${isSaved ? '✓' : '📓'}</button>
                                    </div>
                                </div>
                            `;
                }

                html += `
                                </div>
                            </div>
                        `;
            }

            container.innerHTML = visible === 0 ?
                `<div class="empty"><span class="icon">🔍</span>Ничего не найдено</div>` : html;

            document.querySelectorAll('.group-header').forEach(h => {
                h.onclick = function() {
                    const id = this.dataset.group;
                    const phrases = this.nextElementSibling;
                    const isCollapsed = phrases.classList.contains('collapsed');
                    phrases.classList.toggle('collapsed');
                    this.classList.toggle('collapsed');
                    collapsedGroups[id] = !isCollapsed;
                    localStorage.setItem('chinese_collapsed_groups', JSON.stringify(collapsedGroups));
                };
            });
        }

        function renderDialogues() {
            const container = document.getElementById('dialoguesContainer');
            if (!allDialogues || allDialogues.length === 0) {
                container.innerHTML = `<div class="empty"><span class="icon">💬</span>Диалогов нет</div>`;
                return;
            }

            let html = '';
            for (const d of allDialogues) {
                let phrases = '';
                if (d.phrases) {
                    phrases = d.phrases.map(p => {
                        const isRed = allPhrases.some(fp => fp.chinese === p && fp.red !== false);
                        return `<span class="dp ${isRed ? 'red' : ''}">${p}</span>`;
                    }).join(' ');
                }

                let lines = '';
                for (const line of d.lines) {
                    const safe = line.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    lines += `
                                <div class="dialog-line">
                                    <span class="sp">${line.speaker}</span>
                                    <span class="cn" onclick="speakChinese('${safe}')">${line.chinese}</span>
                                    <span class="py">${line.pinyin}</span>
                                    <span class="ru">— ${line.russian}</span>
                                </div>
                            `;
                }

                const full = d.lines.map(l => l.chinese).join('。');
                const safeFull = full.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const category = d.category || '';

                html += `
                            <div class="dialog-card">
                                <div class="title">
                                    💬 ${d.title}
                                    ${category ? `<span class="category-tag">#${category}</span>` : ''}
                                </div>
                                ${phrases ? `<div class="phrases-list">📌 ${phrases}</div>` : ''}
                                ${lines}
                                <button class="dialog-speak-btn" onclick="speakChinese('${safeFull}')">🔊 Весь диалог</button>
                            </div>
                        `;
            }
            container.innerHTML = html;
        }

        // 6. ДНЕВНИК
        // ============================================================

        function toggleNotebook(char, pinyin, translation) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                showToast(`❌ "${char}" удалён`);
            } else {
                notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                showToast(`✅ "${char}" сохранён`);
            }
            localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
            renderGroups();
            renderNotebook();
            updateStats();
        }

        function renderNotebook() {
            const container = document.getElementById('savedList');
            if (notebook.length === 0) {
                container.innerHTML =
                    `<div class="empty"><span class="icon">📓</span>Сохраняйте фразы и иероглифы для повторения</div>`;
                document.getElementById('notebookCountLabel').textContent = '0';
                return;
            }

            let html = '';
            for (const item of notebook) {
                const safe = item.char.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const date = new Date(item.added);
                const dateStr = date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', { hour: '2-digit',
                    minute: '2-digit' });
                html += `
                            <div class="notebook-item" onclick="loadToHanzi('${safe}')">
                                <span class="char">${item.char}</span>
                                <span class="info">
                                    <span class="pinyin">${item.pinyin || ''}</span>
                                    ${item.translation ? `— ${item.translation}` : ''}
                                </span>
                                <span class="date">${dateStr}</span>
                                <div class="actions">
                                    <button class="speak-btn" onclick="event.stopPropagation(); speakChinese('${safe}')">🔊</button>
                                    <button class="remove-btn" onclick="event.stopPropagation(); removeFromNotebook('${safe}')">✖</button>
                                </div>
                            </div>
                        `;
            }
            container.innerHTML = html;
            document.getElementById('notebookCountLabel').textContent = notebook.length;
        }

        function removeFromNotebook(char) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast(`❌ "${char}" удалён`);
            }
        }

        function clearNotebook() {
            if (notebook.length === 0) return;
            if (confirm('Удалить всё из дневника?')) {
                notebook = [];
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast('🗑️ Дневник очищен');
            }
        }

        function exportNotebook() {
            if (notebook.length === 0) {
                showToast('📓 Дневник пуст');
                return;
            }
            const data = JSON.stringify(notebook, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chinese_notebook_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ Дневник экспортирован');
        }

        // ============================================================
        // 7. HANZI WRITER (РИСОВАЛКА)
        // ============================================================

        let hanziWriter = null;
        let hanziSpeed = 1.0;

        function initHanziWriter(chars) {
            const target = document.getElementById('hwTarget');
            const placeholder = document.getElementById('hanziPlaceholder');
            const wrapper = document.getElementById('hanziWrapper');
            const label = document.getElementById('charLabel');

            if (hanziWriter) {
                try { hanziWriter.destroy(); } catch (e) {}
                hanziWriter = null;
            }

            target.innerHTML = '';
            target.style.display = 'block';

            if (!chars || chars.length === 0) {
                placeholder.style.display = 'block';
                placeholder.textContent = '📖 Введите иероглиф(ы) и нажмите "Показать"';
                label.textContent = '';
                target.style.display = 'none';
                return;
            }

            placeholder.style.display = 'none';
            label.textContent = chars.length + ' иероглиф' + (chars.length > 1 ? 'а' : '');

            try {
                const wrapperRect = wrapper.getBoundingClientRect();
                const size = Math.min(wrapperRect.width - 16, 500, window.innerHeight * 0.5);
                const text = chars.join('');

                if (typeof HanziWriter === 'undefined') {
                    placeholder.style.display = 'block';
                    placeholder.textContent = '⚠️ Библиотека не загружена. Проверьте подключение.';
                    target.style.display = 'none';
                    return;
                }

                hanziWriter = HanziWriter.create(target, text, {
                    width: Math.max(size, 200),
                    height: Math.max(size, 200),
                    padding: 6,
                    strokeColor: '#1a1a1a',
                    radicalColor: '#c0392b',
                    strokeAnimationSpeed: hanziSpeed,
                    showCharacter: false,
                    showOutline: true,
                    showHintAfterMisses: 1,
                });

                setTimeout(() => {
                    if (hanziWriter) {
                        hanziWriter.animateCharacter();
                    }
                }, 300);

            } catch (e) {
                console.error('HanziWriter error:', e);
                placeholder.style.display = 'block';
                placeholder.textContent = '❌ Ошибка: ' + e.message;
                target.style.display = 'none';
                label.textContent = '';
            }
        }

        function showHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                document.getElementById('hanziPlaceholder').textContent = '⚠️ Введите иероглиф(ы)';
                document.getElementById('hanziPlaceholder').style.display = 'block';
                document.getElementById('hwTarget').style.display = 'none';
                document.getElementById('charLabel').textContent = '';
                return;
            }

            const chars = [...raw];
            if (chars.length > 4) {
                const limited = chars.slice(0, 4);
                document.getElementById('hanziInput').value = limited.join('');
                initHanziWriter(limited);
                return;
            }

            initHanziWriter(chars);

            if (document.getElementById('autoSaveToggle').checked) {
                for (const char of chars) {
                    if (!notebook.some(n => n.char === char)) {
                        let pinyin = '',
                            translation = '';
                        const found = allPhrases.find(p => p.chinese === char);
                        if (found) { pinyin = found.pinyin;
                            translation = found.translation; }
                        notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                    }
                }
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast(`✅ Сохранено: ${chars.join(', ')}`);
            }
        }

        function repeatHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                showToast('⚠️ Сначала введите иероглиф');
                return;
            }
            const chars = [...raw];
            if (chars.length > 4) {
                const limited = chars.slice(0, 4);
                document.getElementById('hanziInput').value = limited.join('');
                initHanziWriter(limited);
            } else {
                initHanziWriter(chars);
            }
        }

        function loadToHanzi(char) {
            switchTab('hanzi');
            document.getElementById('hanziInput').value = char;
            setTimeout(() => initHanziWriter([char]), 200);
        }

        // 8. ОЗВУЧКА
        // ============================================================

        let chineseVoice = null;

        function loadChineseVoice() {
            if (!window.speechSynthesis) return;
            const voices = speechSynthesis.getVoices();
            chineseVoice = voices.find(v => v.lang.startsWith('zh')) || null;
        }
        if (window.speechSynthesis) {
            loadChineseVoice();
            speechSynthesis.onvoiceschanged = loadChineseVoice;
            setTimeout(loadChineseVoice, 500);
        }

        function speakChinese(text) {
            if (!text || !window.speechSynthesis) return;
            try { window.speechSynthesis.cancel(); } catch (e) {}
            setTimeout(() => {
                try {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'zh-CN';
                    u.rate = 0.7;
                    if (!chineseVoice) {
                        const voices = speechSynthesis.getVoices();
                        chineseVoice = voices.find(v => v.lang.startsWith('zh'));
                    }
                    if (chineseVoice) u.voice = chineseVoice;
                    window.speechSynthesis.speak(u);
                } catch (e) {}
            }, 50);
        }

        // ============================================================
        // 9. КАЛЛИГРАФИЯ
        // ============================================================

        let canvas, ctx, isDrawing = false,
            lastX, lastY;
        let canvasHistory = [];
        let currentColor = '#1a1a1a';
        let canvasRefData = null;
        let exampleVisible = false;
        let brushSize = 8;
        let canvasInitialized = false;
        let savedExampleChars = '';

        function initCanvas() {
            canvas = document.getElementById('calligraphyCanvas');
            if (!canvas) return;

            const wrapper = canvas.parentElement;
            const maxSize = Math.min(wrapper.clientWidth - 12, 550, window.innerHeight * 0.55);
            const size = Math.max(maxSize, 250);

            canvas.width = size;
            canvas.height = size;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';

            ctx = canvas.getContext('2d');
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);

            if (savedExampleChars) {
                drawExample(savedExampleChars);
                exampleVisible = true;
                document.getElementById('canvasTrace').textContent = '🙈 Скрыть';
                document.getElementById('qText').textContent = `🖌️ Обводи образец "${savedExampleChars}"`;
                canvasRefData = ctx.getImageData(0, 0, size, size);
            } else {
                canvasRefData = null;
                exampleVisible = false;
                document.getElementById('canvasTrace').textContent = '👁️ Образец';
                document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы кистью';
            }

            document.getElementById('qFill').style.width = '0%';
            canvasHistory = [];
            document.getElementById('canvasUndo').style.display = 'none';

            if (!canvasInitialized) {
                setupDrawing();
                canvasInitialized = true;
            }
        }

        function drawGrid(ctx, size) {
            const p = size * 0.05,
                c = size / 2;
            ctx.save();
            ctx.strokeStyle = '#e8e0d8';
            ctx.lineWidth = 1;
            ctx.strokeRect(p, p, size - p * 2, size - p * 2);
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(c, p);
            ctx.lineTo(c, size - p);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p, c);
            ctx.lineTo(size - p, c);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        function drawExample(chars) {
            const size = canvas.width;
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#9b59b6';
            const fontSize = size * 0.5;
            ctx.font = `900 ${fontSize}px "Noto Sans CJK SC", "KaiTi", "STKaiti", serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const charsArray = [...chars];
            if (charsArray.length === 1) {
                ctx.fillText(chars, size / 2, size / 2 + size * 0.02);
            } else {
                const spacing = size / (charsArray.length + 1);
                for (let i = 0; i < charsArray.length; i++) {
                    const x = spacing * (i + 1);
                    const y = size / 2 + size * 0.02;
                    ctx.fillText(charsArray[i], x, y);
                }
            }
            ctx.restore();
        }

        function setupDrawing() {
            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;

                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else if (e.changedTouches && e.changedTouches.length > 0) {
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            function start(e) {
                e.preventDefault();
                isDrawing = true;
                const p = getPos(e);
                lastX = p.x;
                lastY = p.y;
                saveCanvasState();
                document.getElementById('canvasUndo').style.display = 'inline-block';
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                const p = getPos(e);
                const dist = Math.hypot(p.x - lastX, p.y - lastY);
                if (dist < 0.5) {
                    lastX = p.x;
                    lastY = p.y;
                    return;
                }

                ctx.save();
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                ctx.restore();

                lastX = p.x;
                lastY = p.y;
            }

            function stop(e) {
                if (!isDrawing) return;
                isDrawing = false;
                saveCanvasState();
            }

            canvas.removeEventListener('pointerdown', start);
            canvas.removeEventListener('pointermove', draw);
            canvas.removeEventListener('pointerup', stop);
            canvas.removeEventListener('pointerleave', stop);
            canvas.removeEventListener('pointercancel', stop);
            canvas.removeEventListener('touchstart', start);
            canvas.removeEventListener('touchmove', draw);
            canvas.removeEventListener('touchend', stop);

            canvas.addEventListener('pointerdown', start);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', stop);
            canvas.addEventListener('pointerleave', stop);
            canvas.addEventListener('pointercancel', stop);

            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stop, { passive: false });
        }

        function saveCanvasState() {
            canvasHistory.push(canvas.toDataURL());
            if (canvasHistory.length > 30) canvasHistory.shift();
        }

        function undoCanvas() {
            if (canvasHistory.length < 2) return;
            canvasHistory.pop();
            const img = new Image();
            img.onload = function() {
                const size = canvas.width;
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(img, 0, 0);
                if (canvasHistory.length <= 1) {
                    document.getElementById('canvasUndo').style.display = 'none';
                }
                if (exampleVisible && savedExampleChars) {
                    drawExample(savedExampleChars);
                    canvasRefData = ctx.getImageData(0, 0, size, size);
                }
            };
            img.src = canvasHistory[canvasHistory.length - 1];
        }

        function clearCanvas() {
            const size = canvas.width;
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);

            if (exampleVisible && savedExampleChars) {
                drawExample(savedExampleChars);
                canvasRefData = ctx.getImageData(0, 0, size, size);
            } else {
                canvasRefData = null;
            }

            document.getElementById('qFill').style.width = '0%';
            document.getElementById('qText').textContent = exampleVisible ? `🖌️ Обводи образец "${savedExampleChars}"` :
                '🧽 Очищено';
            canvasHistory = [];
            document.getElementById('canvasUndo').style.display = 'none';
        }

        function showExample() {
            const char = prompt('Введите иероглиф(ы) для образца (до 4 символов):', savedExampleChars || '永');
            if (!char || char.length === 0 || char.length > 4) {
                if (char && char.length > 4) {
                    showToast('⚠️ Можно ввести не более 4 иероглифов');
                }
                return;
            }
            savedExampleChars = char;
            clearCanvas();
            drawExample(char);
            const size = canvas.width;
            canvasRefData = ctx.getImageData(0, 0, size, size);
            exampleVisible = true;
            document.getElementById('canvasTrace').textContent = '🙈 Скрыть';
            document.getElementById('qText').textContent = `🖌️ Обводи образец "${char}"`;
            try {
                localStorage.setItem('chinese_example_chars', char);
            } catch (e) {}
        }

        function hideExample() {
            const size = canvas.width;
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            document.getElementById('canvasTrace').textContent = '👁️ Образец';
            document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы кистью';
        }

        function checkQuality() {
            if (!canvasRefData) {
                document.getElementById('qText').textContent = '👁️ Сначала покажи образец';
                return;
            }
            const size = canvas.width;
            const current = ctx.getImageData(0, 0, size, size);
            const dRef = canvasRefData.data;
            const dCur = current.data;
            let match = 0,
                totalRef = 0,
                userOutside = 0;
            const threshold = 235;
            for (let i = 0; i < dRef.length; i += 4) {
                const isRef = (dRef[i] < threshold || dRef[i + 1] < threshold || dRef[i + 2] < threshold);
                const isUser = (dCur[i] < threshold || dCur[i + 1] < threshold || dCur[i + 2] < threshold);
                if (isRef) { totalRef++;
                    if (isUser) match++; } else if (isUser) { userOutside++; }
            }
            if (totalRef === 0) {
                document.getElementById('qText').textContent = '📝 Нет эталона';
                return;
            }
            const pct = Math.round(2 * (match / totalRef) * (match / (totalRef + userOutside + 0.001)) /
                ((match / totalRef) + (match / (totalRef + userOutside + 0.001)) + 0.001) * 100);
            const fill = document.getElementById('qFill');
            const text = document.getElementById('qText');
            fill.style.width = pct + '%';
            if (pct > 60) { fill.style.background = '#2ecc71';
                text.textContent = `🌟 Отлично! ${pct}%`; } else if (pct > 35) { fill.style.background = '#f39c12';
                text.textContent = `👍 Хорошо! ${pct}%`; } else { fill.style.background = '#e67e22';
                text.textContent = `📝 Продолжай (${pct}%)`; }
        }

        function saveCanvasImage() {
            const link = document.createElement('a');
            link.download = 'calligraphy_' + new Date().toISOString().slice(0, 10) + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('💾 Рисунок сохранён');
        }

        // ============================================================
        // 10. ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================================

        function updateStats() {
            document.getElementById('totalCount').textContent = allPhrases.length;
            document.getElementById('redCount').textContent = allPhrases.filter(p => p.red !== false).length;
            document.getElementById('analogCount').textContent = allPhrases.filter(p => p.red === false).length;
            document.getElementById('dialogCount').textContent = allDialogues.length;
            document.getElementById('notebookCount').textContent = notebook.length;
        }

        // ============================================================
        // 11. ТОСТЫ
        // ============================================================

        function showToast(msg) {
            const t = document.getElementById('toastMsg');
            if (t) {
                t.textContent = msg;
                t.style.display = 'block';
                clearTimeout(t._hide);
                t._hide = setTimeout(() => t.style.display = 'none', 1800);
                return;
            }
            const el = document.createElement('div');
            el.id = 'toastMsg';
            el.style.cssText =
                'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:12px 24px;border-radius:40px;z-index:9999;font-size:1.1rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);max-width:90%;text-align:center;';
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1800);
        }

        // ============================================================
        // 12. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            const target = document.getElementById('tab-' + tabName);
            if (target) target.classList.add('active');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tabName) btn.classList.add('active');
            });

            if (tabName === 'dialogues') renderDialogues();
            if (tabName === 'groups') renderGroups();
            if (tabName === 'notebook') renderNotebook();
            if (tabName === 'hanzi') {
                setTimeout(() => {
                    const input = document.getElementById('hanziInput');
                    if (input && input.value.trim()) {
                        const chars = [...input.value.trim()];
                        initHanziWriter(chars.slice(0, 4));
                    } else {
                        initHanziWriter([]);
                    }
                }, 150);
            }
            if (tabName === 'canvas') {
                try {
                    const saved = localStorage.getItem('chinese_example_chars');
                    if (saved && !savedExampleChars) {
                        savedExampleChars = saved;
                    }
                } catch (e) {}
                setTimeout(initCanvas, 100);
            }
        }

        // ============================================================
        // 13. СОБЫТИЯ
        // ============================================================

        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value;
            renderGroups();
        });

        document.getElementById('notebookNav').addEventListener('click', function(e) {
            e.preventDefault();
            switchTab('notebook');
        });

        document.getElementById('showHanziBtn').addEventListener('click', showHanzi);
        document.getElementById('repeatHanziBtn').addEventListener('click', repeatHanzi);
        document.getElementById('hanziInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                showHanzi(); }
        });
        document.getElementById('hanziInput').addEventListener('input', function() {
            const val = this.value.trim();
            if (val.length > 0) {
                const chars = [...val];
                if (chars.length <= 4) initHanziWriter(chars);
                else {
                    const limited = chars.slice(0, 4);
                    this.value = limited.join('');
                    initHanziWriter(limited);
                }
            } else {
                initHanziWriter([]);
            }
        });
        document.getElementById('speedSlider').addEventListener('input', function() {
            hanziSpeed = parseFloat(this.value);
            document.getElementById('speedValue').textContent = hanziSpeed.toFixed(1) + 'x';
            const input = document.getElementById('hanziInput');
            if (input && input.value.trim()) {
                const chars = [...input.value.trim()];
                initHanziWriter(chars.slice(0, 4));
            }
        });

        document.getElementById('clearNotebookBtn').addEventListener('click', clearNotebook);
        document.getElementById('exportNotebookBtn').addEventListener('click', exportNotebook);

        document.getElementById('canvasClear').addEventListener('click', clearCanvas);
        document.getElementById('canvasUndo').addEventListener('click', undoCanvas);
        document.getElementById('canvasTrace').addEventListener('click', function() {
            if (exampleVisible) {
                hideExample();
            } else {
                showExample();
            }
        });
        document.getElementById('canvasCheck').addEventListener('click', checkQuality);
        document.getElementById('canvasSaveImg').addEventListener('click', saveCanvasImage);
        document.getElementById('brushSizeSlider').addEventListener('input', function() {
            brushSize = parseInt(this.value);
            document.getElementById('brushSizeValue').textContent = brushSize;
        });
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentColor = this.dataset.color;
            });
        });

        // ============================================================
        // 14. СТАРТ
        // ============================================================

        renderTabs();
        renderCategoryButtons();
        renderGroups();
        renderDialogues();
        renderNotebook();
        updateStats();

        try {
            const saved = localStorage.getItem('chinese_example_chars');
            if (saved) {
                savedExampleChars = saved;
            }
        } catch (e) {}

        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (document.getElementById('tab-canvas').classList.contains('active')) {
                    initCanvas();
                }
                if (document.getElementById('tab-hanzi').classList.contains('active')) {
                    const input = document.getElementById('hanziInput');
                    if (input && input.value.trim()) {
                        const chars = [...input.value.trim()];
                        initHanziWriter(chars.slice(0, 4));
                    }
                }
            }, 300);
        });

        setTimeout(() => {
            initCanvas();
            initHanziWriter([]);
        }, 300);

        // Переключаем на первую вкладку
        switchTab('groups');

        console.log('✅ Приложение загружено!');
        console.log('📄 Всего фраз:', allPhrases.length);
        console.log('💬 Всего диалогов:', allDialogues.length);
        console.log('📓 В дневнике:', notebook.length);

        // Экспортируем функции в глобальную область
        window.toggleNotebook = toggleNotebook;
        window.removeFromNotebook = removeFromNotebook;
        window.loadToHanzi = loadToHanzi;
        window.speakChinese = speakChinese;
        window.switchTab = switchTab;
        window.showToast = showToast;
        window.initHanziWriter = initHanziWriter;
        window.showHanzi = showHanzi;
        window.repeatHanzi = repeatHanzi;
        window.undoCanvas = undoCanvas;
        window.saveCanvasImage = saveCanvasImage;
        window.exportNotebook = exportNotebook;
        window.initCanvas = initCanvas;
        window.clearCanvas = clearCanvas;
        window.showExample = showExample;
        window.hideExample = hideExample;
        window.checkQuality = checkQuality;
    </script>

</body>
</html>
