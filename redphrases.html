<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📕 Красная книга — китайские фразы</title>
    <script src="redphrases.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(145deg, #1a3a2a 0%, #0a1a0f 100%);
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
            padding: 10px;
            color: #f5e6d3;
        }
        .container { max-width: 1100px; margin: 0 auto; }

        /* ===== НАВИГАЦИЯ ===== */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 25, 20, 0.85);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .nav-bar .back-btn {
            background: linear-gradient(135deg, #5a4a3a, #3a2a1a);
            color: #f7e05e;
            padding: 10px 22px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s;
            box-shadow: 0 3px 0 #2a1a0a;
        }
        .nav-bar .back-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2a1a0a; }
        .nav-bar .title {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-bar .notebook-link {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            padding: 10px 22px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 3px 0 #1a7a3a;
            transition: 0.15s;
        }
        .nav-bar .notebook-link:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a7a3a; }

        /* ===== СТАТИСТИКА ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            background: rgba(30, 25, 20, 0.7);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 215, 0, 0.06);
        }
        .stats-bar span { color: #d4c9a6; font-size: 0.95rem; font-weight: 600; }
        .stats-bar strong { color: #ffd700; font-size: 1.1rem; }

        /* ===== ВКЛАДКИ ===== */
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0 16px;
        }
        .tab-btn {
            background: rgba(45, 27, 14, 0.6);
            color: #b8956a;
            border: 2px solid rgba(255, 215, 0, 0.08);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: inherit;
            backdrop-filter: blur(5px);
        }
        .tab-btn:hover { border-color: rgba(255, 215, 0, 0.25); transform: translateY(-2px); }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.25);
        }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        /* ===== ПОИСК ===== */
        .search {
            width: 100%;
            padding: 16px 24px;
            border: 2px solid rgba(255, 215, 0, 0.08);
            border-radius: 60px;
            background: rgba(30, 25, 20, 0.8);
            color: #f5e6d3;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 16px;
            font-family: inherit;
            backdrop-filter: blur(5px);
        }
        .search::placeholder { color: #8b7355; font-size: 1rem; }
        .search:focus { border-color: rgba(255, 215, 0, 0.2); box-shadow: 0 8px 40px rgba(255, 215, 0, 0.04); }

        /* ===== КАТЕГОРИИ ===== */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .categories button {
            padding: 8px 20px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            border-radius: 50px;
            background: rgba(30, 25, 20, 0.5);
            color: #b8956a;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .categories button.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.15);
        }

        /* ===== ГРУППА ===== */
        .group-container { margin-bottom: 24px; animation: fadeIn 0.4s ease; }
        .group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(30, 25, 20, 0.6);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        .group-header:hover { background: rgba(30, 25, 20, 0.8); border-color: rgba(255, 215, 0, 0.1); }
        .group-header .icon { font-size: 2rem; }
        .group-header .title { font-size: 1.4rem; font-weight: 700; color: #f5e6d3; }
        .group-header .count { margin-left: auto; color: #b8956a; font-size: 0.9rem; background: rgba(255,255,255,0.05); padding: 4px 16px; border-radius: 50px; }
        .group-header .arrow { color: #b8956a; transition: transform 0.3s; font-size: 1.2rem; }
        .group-header.collapsed .arrow { transform: rotate(-90deg); }
        .group-phrases { overflow: hidden; transition: max-height 0.4s ease; max-height: 10000px; }
        .group-phrases.collapsed { max-height: 0; }

        /* ===== КАРТОЧКА ФРАЗЫ ===== */
        .phrase-card {
            background: rgba(30, 25, 20, 0.7);
            border-radius: 24px;
            padding: 24px 28px;
            margin-bottom: 12px;
            border-left: 6px solid #ffd700;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease both;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 215, 0, 0.04);
        }
        .phrase-card:hover { transform: translateX(8px); border-left-color: #ff6b35; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
        .phrase-card .chinese {
            font-size: clamp(2.8rem, 7vw, 4.5rem);
            font-weight: 800;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            flex: 1;
            min-width: 140px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.04);
        }
        .phrase-card .chinese .mini-badge {
            font-size: 0.65rem;
            padding: 4px 14px;
            border-radius: 50px;
            font-weight: 700;
        }
        .phrase-card .chinese .mini-badge.red { background: rgba(220, 38, 38, 0.2); color: #ff6b6b; border: 1px solid rgba(220, 38, 38, 0.15); }
        .phrase-card .chinese .mini-badge.analog { background: rgba(59, 130, 246, 0.15); color: #6ea8fe; border: 1px solid rgba(59, 130, 246, 0.1); }
        .phrase-card .info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 2;
            min-width: 180px;
        }
        .phrase-card .pinyin { font-size: clamp(1.2rem, 2vw, 1.6rem); color: #d4a373; font-weight: 500; letter-spacing: 0.5px; }
        .phrase-card .translation { font-size: clamp(1.3rem, 2vw, 1.7rem); color: #f5e6d3; font-weight: 500; }
        .phrase-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .phrase-card .tags .tag {
            font-size: 0.7rem;
            padding: 4px 14px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            color: #b8956a;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .phrase-card .tags .tag.category { background: rgba(41, 128, 185, 0.1); color: #6ea8fe; border-color: rgba(41, 128, 185, 0.06); }
        .phrase-card .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .phrase-card .audio-mini {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            border: none;
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #b34e1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phrase-card .audio-mini:active { transform: translateY(2px); box-shadow: 0 1px 0 #b34e1a; }
        .phrase-card .save-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 0 #1a7a3a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .phrase-card .save-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a7a3a; }
        .phrase-card .save-btn.saved { background: linear-gradient(135deg, #f39c12, #e67e22); box-shadow: 0 3px 0 #b36b0f; }

        /* ===== ДИАЛОГИ ===== */
        .dialog-card {
            background: rgba(30, 25, 20, 0.7);
            border-radius: 24px;
            padding: 24px 28px;
            margin-bottom: 16px;
            border-left: 6px solid #3b82f6;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(59, 130, 246, 0.06);
        }
        .dialog-card .dialog-title { font-size: 1.4rem; font-weight: 700; color: #f5e6d3; margin-bottom: 4px
