<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📕 Красная книга</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js">
    </script>
    <script src="redphrases.js">
    </script>
    <style>
        /* ===== БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            background: linear-gradient(145deg, #1a3a2a 0%, #0a1a0f 100%);
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 4px;
            color: #f5e6d3;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ - МАКСИМАЛЬНО КОМПАКТНАЯ ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 25, 20, 0.85);
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 4px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.06);
            min-height: 32px;
        }
        .top-bar .title {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .top-bar .notebook-link {
            background: #2ecc71;
            padding: 3px 10px;
            border-radius: 20px;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 0.7rem;
            box-shadow: 0 2px 0 #1a7a3a;
            cursor: pointer;
            font-family: inherit;
        }
        .top-bar .notebook-link:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #1a7a3a;
        }

        /* ===== СТАТИСТИКА - МАКСИМАЛЬНО КОМПАКТНАЯ ===== */
        .stats {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            background: rgba(30, 25, 20, 0.5);
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 4px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 215, 0, 0.04);
        }
        .stats span {
            color: #b8956a;
            font-size: 0.6rem;
        }
        .stats strong {
            color: #ffd700;
            font-size: 0.7rem;
        }

        /* ===== ВКЛАДКИ - КОМПАКТНЫЕ ===== */
        .tabs {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: rgba(45, 27, 14, 0.5);
            color: #b8956a;
            border: 1px solid rgba(255, 215, 0, 0.06);
            padding: 3px 8px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.6rem;
            transition: all 0.2s;
            font-family: inherit;
            backdrop-filter: blur(5px);
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .tab-btn:hover {
            border-color: rgba(255, 215, 0, 0.15);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 2px 8px rgba(255, 107, 53, 0.15);
        }

        /* ===== КОНТЕНТ ВКЛАДОК ===== */
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
            min-height: 0;
        }
        .tab-content.active {
            display: flex;
        }

        /* ===== СКРОЛЛ ===== */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 3px;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        .scroll-area::-webkit-scrollbar {
            width: 3px;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: #b8956a;
            border-radius: 4px;
        }

        /* ===== ПОИСК ===== */
        .search {
            width: 100%;
            padding: 4px 10px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 20px;
            background: rgba(30, 25, 20, 0.7);
            color: #f5e6d3;
            font-size: 0.8rem;
            outline: none;
            margin-bottom: 4px;
            font-family: inherit;
            flex-shrink: 0;
        }
        .search::placeholder {
            color: #6b5a45;
            font-size: 0.7rem;
        }
        .search:focus {
            border-color: rgba(255, 215, 0, 0.2);
        }

        /* ===== КАТЕГОРИИ - КОМПАКТНЫЕ ===== */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            justify-content: center;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .categories button {
            padding: 2px 8px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            border-radius: 16px;
            background: rgba(30, 25, 20, 0.4);
            color: #b8956a;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .categories button.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
        }

        /* ===== ГРУППЫ ===== */
        .group-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: rgba(30, 25, 20, 0.5);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.03);
            margin-bottom: 3px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .group-header:hover {
            background: rgba(30, 25, 20, 0.7);
        }
        .group-header .icon {
            font-size: 1rem;
        }
        .group-header .title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #f5e6d3;
        }
        .group-header .count {
            margin-left: auto;
            color: #b8956a;
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 8px;
            border-radius: 16px;
        }
        .group-header .arrow {
            color: #b8956a;
            transition: transform 0.3s;
            font-size: 0.7rem;
        }
        .group-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .group-phrases {
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 10000px;
        }
        .group-phrases.collapsed {
            max-height: 0;
        }

        /* ===== КАРТОЧКА ФРАЗЫ ===== */
        .phrase-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 8px;
            padding: 6px 10px;
            margin-bottom: 3px;
            border-left: 3px solid #ffd700;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }
        .phrase-card:hover {
            transform: translateX(3px);
            background: rgba(30, 25, 20, 0.75);
        }
        .phrase-card .chinese {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 50px;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.2;
        }
        .phrase-card .chinese:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .phrase-card .chinese .badge {
            font-size: 0.4rem;
            padding: 1px 6px;
            border-radius: 16px;
            font-weight: 700;
        }
        .phrase-card .chinese .badge.red {
            background: rgba(220, 38, 38, 0.2);
            color: #ff6b6b;
        }
        .phrase-card .chinese .badge.analog {
            background: rgba(59, 130, 246, 0.15);
            color: #6ea8fe;
        }
        .phrase-card .info {
            display: flex;
            flex-direction: column;
            flex: 2;
            min-width: 80px;
        }
        .phrase-card .pinyin {
            font-size: 0.7rem;
            color: #b8956a;
        }
        .phrase-card .translation {
            font-size: 0.8rem;
            color: #d4c9a6;
        }
        .phrase-card .actions {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .phrase-card .actions button {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .phrase-card .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0.2);
        }
        .phrase-card .actions .audio-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .phrase-card .actions .save-btn {
            background: #2ecc71;
            color: white;
            font-size: 0.55rem;
        }
        .phrase-card .actions .save-btn.saved {
            background: #f39c12;
        }
        .phrase-card .actions .fav-btn {
            background: #e74c3c;
            color: white;
            font-size: 0.55rem;
        }
        .phrase-card .actions .fav-btn.active {
            background: #f1c40f;
        }

        /* ===== ДИАЛОГИ ===== */
        .dialog-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 6px;
            border-left: 3px solid #3b82f6;
        }
        .dialog-card .title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #f5e6d3;
            margin-bottom: 4px;
        }
        .dialog-card .category-tag {
            font-size: 0.5rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 6px;
            border-radius: 16px;
            color: #b8956a;
            margin-left: 4px;
        }
        .dialog-card .phrases-list {
            font-size: 0.65rem;
            color: #b8956a;
            margin-bottom: 4px;
        }
        .dialog-card .phrases-list .dp {
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 6px;
            border-radius: 6px;
            margin-right: 3px;
            display: inline-block;
            font-size: 0.65rem;
        }
        .dialog-card .phrases-list .dp.red {
            background: rgba(220, 38, 38, 0.15);
            color: #ff6b6b;
        }
        .dialog-line {
            display: flex;
            flex-wrap: wrap;
            gap: 3px 8px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .dialog-line:last-child {
            border-bottom: none;
        }
        .dialog-line .sp {
            font-weight: 700;
            color: #3b82f6;
            min-width: 20px;
            font-size: 0.7rem;
        }
        .dialog-line .cn {
            font-size: 1.3rem;
            font-weight: 600;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.2;
        }
        .dialog-line .cn:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .dialog-line .py {
            font-size: 0.65rem;
            color: #b8956a;
            align-self: center;
        }
        .dialog-line .ru {
            font-size: 0.7rem;
            color: #d4c9a6;
            align-self: center;
        }
        .dialog-speak-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: 0 2px 0 #1d4ed8;
            margin-top: 4px;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .dialog-speak-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #1d4ed8;
        }

        /* ===== ВИКТОРИНА ===== */
        #tab-quiz {
            flex-direction: column;
            flex: 1;
        }
        #tab-quiz.active {
            display: flex;
        }

        .quiz-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 10px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .quiz-container .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 3px;
        }
        .quiz-container .quiz-header .title {
            font-size: 0.9rem;
            font-weight: 700;
        }
        .quiz-container .quiz-header .score {
            font-size: 0.7rem;
            color: #b8956a;
        }
        .quiz-container .quiz-header .score strong {
            color: #ffd700;
        }
        .quiz-container .quiz-question {
            text-align: center;
            padding: 10px 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .quiz-container .quiz-question .q-char {
            font-size: 2.4rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            margin-bottom: 2px;
            cursor: pointer;
        }
        .quiz-container .quiz-question .q-pinyin {
            font-size: 0.75rem;
            color: #b8956a;
            margin-bottom: 2px;
        }
        .quiz-container .quiz-question .q-hint {
            font-size: 0.65rem;
            color: #6b5a45;
        }
        .quiz-container .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        @media (max-width: 500px) {
            .quiz-container .quiz-options {
                grid-template-columns: 1fr;
            }
        }
        .quiz-container .quiz-options button {
            padding: 6px 10px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 8px;
            background: rgba(30, 25, 20, 0.4);
            color: #f5e6d3;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            min-height: 36px;
        }
        .quiz-container .quiz-options button:hover {
            border-color: rgba(255, 215, 0, 0.2);
        }
        .quiz-container .quiz-options button.correct {
            background: rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
            color: #2ecc71;
        }
        .quiz-container .quiz-options button.wrong {
            background: rgba(231, 76, 60, 0.3);
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .quiz-container .quiz-options button.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .quiz-container .quiz-controls {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }
        .quiz-container .quiz-controls button {
            padding: 4px 12px;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.65rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .quiz-container .quiz-controls button:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0.2);
        }
        .quiz-container .quiz-controls .next-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        .quiz-container .quiz-controls .reset-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        .quiz-container .quiz-controls .mode-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        /* ===== ИНТЕРВАЛЬНОЕ ПОВТОРЕНИЕ ===== */
        #tab-spaced {
            flex-direction: column;
            flex: 1;
        }
        #tab-spaced.active {
            display: flex;
        }

        .spaced-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 10px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .spaced-container .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 3px;
        }
        .spaced-container .header .title {
            font-size: 0.9rem;
            font-weight: 700;
        }
        .spaced-container .header .count {
            font-size: 0.6rem;
            color: #b8956a;
        }
        .spaced-container .header .count strong {
            color: #ffd700;
        }
        .spaced-container .card-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }
        .spaced-container .card-area .card {
            background: rgba(30, 25, 20, 0.5);
            border-radius: 12px;
            padding: 14px 18px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .spaced-container .card-area .card:hover {
            border-color: rgba(255, 215, 0, 0.15);
        }
        .spaced-container .card-area .card .char {
            font-size: 2.4rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
        }
        .spaced-container .card-area .card .pinyin {
            font-size: 0.75rem;
            color: #b8956a;
            margin-top: 3px;
        }
        .spaced-container .card-area .card .translation {
            font-size: 1rem;
            color: #d4c9a6;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .spaced-container .card-area .card .translation.show {
            opacity: 1;
        }
        .spaced-container .card-area .card .progress-text {
            font-size: 0.55rem;
            color: #6b5a45;
            margin-top: 6px;
        }
        .spaced-container .card-area .card .level-badge {
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 0.5rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 8px;
            border-radius: 16px;
            color: #b8956a;
        }
        .spaced-container .card-controls {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .spaced-container .card-controls button {
            padding: 4px 12px;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.65rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            min-width: 50px;
        }
        .spaced-container .card-controls button:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0.2);
        }
        .spaced-container .card-controls .hard-btn {
            background: #e74c3c;
            color: white;
        }
        .spaced-container .card-controls .good-btn {
            background: #f39c12;
            color: white;
        }
        .spaced-container .card-controls .easy-btn {
            background: #2ecc71;
            color: white;
        }
        .spaced-container .card-controls .reset-spaced-btn {
            background: #3b82f6;
            color: white;
        }
        .spaced-container .empty {
            text-align: center;
            padding: 16px;
            color: #b8956a;
        }
        .spaced-container .empty .icon {
            font-size: 1.6rem;
            display: block;
            margin-bottom: 4px;
            opacity: 0.4;
        }

        /* ===== РИСОВАЛКА ===== */
        #tab-hanzi {
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        #tab-hanzi.active {
            display: flex;
        }

        .hanzi-section {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 10px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .hanzi-section .input-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .hanzi-section .input-row input {
            flex: 1;
            min-width: 60px;
            padding: 4px 10px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;

        .hanzi-section .input-row input::placeholder {

        .hanzi-section .input-row input:focus {

        }
        .hanzi-section .input-row button:active {

        }
        .hanzi-section .input-row .repeat-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .hanzi-section .speed-control {

            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            margin-bottom: 3px;
            flex-wrap: wrap;

            color: #b8956a;

        .hanzi-section .speed-control input[type="range"] {

            height: 3px;

        .hanzi-section .speed-control input[type="range"]::-webkit-slider-thumb {

            height: 10px;
            background: #ff6b35;
            border-radius: 50%;

        .hanzi-section .speed-control .speed-value {

            min-width: 20px;

        }

        .hanzi-section .hanzi-wrapper {
            background: #fffef9;
            border-radius: 8px;
            padding: 3px;
            border: 2px solid #c8aa6e;

            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 150px;
            width: 100%;
        }
        .hanzi-section .hanzi-wrapper .hw-target {

            max-width: 100%;

            max-height: 100%;

        }
        .hanzi-section .hanzi-wrapper .placeholder {

            font-size: 0.75rem;
            text-align: center;
            padding: 10px;
            position: absolute;
            pointer-events: none;
        }
        .hanzi-section .hanzi-wrapper .char-label {
            position: absolute;
            bottom: 3px;
            right: 6px;
            color: #b8956a;
            font-size: 0.5rem;
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===== ДНЕВНИК ===== */
        #tab-notebook {
            flex-direction: column;
            flex: 1;
        }
        #tab-notebook.active {
            display: flex;
        }

        .notebook-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 10px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .notebook-container .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 3px;
        }
        .notebook-container .header .count {
            background: rgba(255, 215, 0, 0.06);
            padding: 1px 8px;
            border-radius: 16px;
            font-size: 0.6rem;
            color: #b8956a;
        }
        .notebook-container .header .actions {
            display: flex;
            gap: 3px;
            align-items: center;
            flex-wrap: wrap;
        }
        .notebook-container .header .clear-btn {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: none;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.55rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .notebook-container .header .export-btn {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: none;
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.55rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .notebook-container .list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .notebook-container .list::-webkit-scrollbar {
            width: 2px;
        }
        .notebook-container .list::-webkit-scrollbar-thumb {
            background: #2ecc71;
            border-radius: 4px;
        }

        .notebook-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            gap: 4px;
            cursor: pointer;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        .notebook-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .notebook-item .char {
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            min-width: 30px;
        }
        .notebook-item .info {
            color: #d4c9a6;
            font-size: 0.65rem;
            flex: 1;
            min-width: 50px;
        }
        .notebook-item .info .pinyin {
            color: #b8956a;
        }
        .notebook-item .date {
            font-size: 0.45rem;
            color: #b8956a;
            opacity: 0.5;
            min-width: 40px;
        }
        .notebook-item .actions {
            display: flex;
            gap: 2px;
        }
        .notebook-item .actions button {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            font-size: 0.55rem;
            cursor: pointer;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .notebook-item .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0.2);
        }
        .notebook-item .actions .speak-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .notebook-item .actions .remove-btn {
            background: #e74c3c;
            color: white;
            font-weight: bold;
            font-size: 0.5rem;
        }

        /* ===== КАЛЛИГРАФИЯ ===== */
        #tab-canvas {
            flex: 1;
            flex-direction: column;
        }
        #tab-canvas.active {
            display: flex;
        }

        .canvas-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 10px;
            padding: 6px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }
        .canvas-wrapper {
            background: #fffef9;
            border-radius: 8px;
            padding: 3px;
            border: 2px solid #c8aa6e;
            display: inline-block;
            max-width: 100%;
            width: 100%;
            max-width: 400px;
            touch-action: none;
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            aspect-ratio: 1/1;
            touch-action: none;
            cursor: crosshair;
            background: #fffef9;
        }
        .canvas-tools {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 4px;
        }
        .canvas-tools button {
            padding: 3px 10px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.6rem;
            font-family: inherit;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .canvas-tools button:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0.2);
        }
        .canvas-tools .undo-btn {
            background: #3b82f6;
            color: white;
        }
        .canvas-tools .clear-btn {
            background: #e74c3c;
            color: white;
        }
        .canvas-tools .trace-btn {
            background: #8b5cf6;
            color: white;
        }
        .canvas-tools .check-btn {
            background: #2ecc71;
            color: white;
        }
        .canvas-tools .save-img-btn {
            background: #f39c12;
            color: white;
        }
        .canvas-tools .color-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 0;
            min-width: unset;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.1s;
            touch-action: manipulation;
        }
        .canvas-tools .color-btn.active {
            border-color: #ffd700;
            transform: scale(1.1);
        }

        .canvas-tools .brush-control {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .canvas-tools .brush-control label {
            font-size: 0.5rem;
            color: #b8956a;
        }
        .canvas-tools .brush-control input[type="range"] {
            width: 30px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            outline: none;
        }
        .canvas-tools .brush-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: #ff6b35;
            border-radius: 50%;
            cursor: pointer;
        }
        .canvas-tools .brush-control .brush-value {
            font-size: 0.5rem;
            color: #b8956a;
            min-width: 12px;
            text-align: center;
        }

        .quality-bar {
            background: rgba(30, 25, 20, 0.4);
            height: 3px;
            border-radius: 4px;
            margin: 3px auto 2px;
            max-width: 120px;
            overflow: hidden;
        }
        .quality-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71);
            width: 0%;
            transition: width 0.5s ease;
        }
        .quality-text {
            font-size: 0.6rem;
            color: #b8956a;
            margin-top: 2px;
            text-align: center;
        }

        .empty {
            text-align: center;
            padding: 16px;
            color: #b8956a;
            font-size: 0.8rem;
        }
        .empty .icon {
            font-size: 1.6rem;
            display: block;
            margin-bottom: 4px;
            opacity: 0.4;
        }

        /* ===== ГЛАВНОЕ МЕНЮ С КНОПКОЙ "В ПРИЛОЖЕНИЕ" ===== */
        .main-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease;
        }
        .main-menu-overlay.active {
            display: flex;
        }
        .main-menu-overlay .menu-container {
            background: rgba(30, 25, 20, 0.95);
            border-radius: 20px;
            padding: 24px 28px;
            max-width: 380px;
            width: 92%;
            border: 2px solid rgba(255, 215, 0, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .main-menu-overlay .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .main-menu-overlay .menu-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-menu-overlay .menu-back {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 0 #1d4ed8;
        }
        .main-menu-overlay .menu-back:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #1d4ed8;
        }
        .main-menu-overlay .menu-back:hover {
            transform: translateY(-1px);
        }
        .main-menu-overlay .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #f5e6d3;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            font-family: inherit;
            width: 100%;
            text-align: left;
        }
        .main-menu-overlay .menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 215, 0, 0.15);
            transform: translateX(3px);
        }
        .main-menu-overlay .menu-item .icon {
            font-size: 1.2rem;
            min-width: 28px;
        }
        .main-menu-overlay .menu-item .badge {
            margin-left: auto;
            font-size: 0.5rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 1px 6px;
            border-radius: 16px;
            color: #b8956a;
        }
        .main-menu-overlay .menu-close {
            display: block;
            width: 100%;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            background: rgba(231, 76, 60, 0.12);
            color: #e74c3c;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            margin-top: 6px;
            transition: all 0.2s;
        }
        .main-menu-overlay .menu-close:hover {
            background: rgba(231, 76, 60, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== ТОСТ ===== */
        #toastMsg {
            display: none;
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            z-index: 9999;
            font-size: 0.7rem;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            text-align: center;
        }

        /* ===== КНОПКА МЕНЮ (ТОЛЬКО НА ГЛАВНОМ ЭКРАНЕ) ===== */
        .menu-toggle {
            background: rgba(255, 255, 255, 0.06);
            color: #b8956a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.65rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .menu-toggle:active {
            transform: scale(0.95);
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 600px) {
            body {
                padding: 3px;
            }
            .top-bar {
                padding: 2px 8px;
                min-height: 28px;
            }
            .top-bar .title {
                font-size: 0.9rem;
            }
            .top-bar .notebook-link {
                font-size: 0.6rem;
                padding: 2px 8px;
            }
            .stats {
                gap: 4px;
                padding: 2px 6px;
            }
            .stats span {
                font-size: 0.5rem;
            }
            .stats strong {
                font-size: 0.6rem;
            }
            .tab-btn {
                padding: 2px 6px;
                font-size: 0.5rem;
            }
            .phrase-card .chinese {
                font-size: 1.3rem;
            }
            .phrase-card .translation {
                font-size: 0.7rem;
            }
            .phrase-card .pinyin {
                font-size: 0.6rem;
            }
            .dialog-line .cn {
                font-size: 1.1rem;
            }
            .dialog-line .ru {
                font-size: 0.6rem;
            }
            .quiz-container .quiz-question .q-char {
                font-size: 2rem;
            }
            .spaced-container .card-area .card .char {
                font-size: 2rem;
            }
            .main-menu-overlay .menu-container {
                padding: 18px 16px;
            }
            .main-menu-overlay .menu-title {
                font-size: 1.2rem;
            }
            .main-menu-overlay .menu-item {
                font-size: 0.8rem;
                padding: 6px 10px;
            }
            .main-menu-overlay .menu-item .icon {
                font-size: 1rem;
                min-width: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== ВЕРХНЯЯ ПАНЕЛЬ - СУПЕР КОМПАКТНАЯ ===== -->
        <div class="top-bar">
            <span class="title" onclick="switchTab('groups')">📕 Кр.книга</span>
            <span class="menu-toggle" id="menuToggle">☰</span>
            <button class="notebook-link" id="notebookNav">📓</button>
        </div>

        <!-- ===== СТАТИСТИКА - СУПЕР КОМПАКТНАЯ ===== -->
        <div class="stats" id="statsBar">
            <span>Всего: <strong id="totalCount">0</strong></span>
            <span>🔴 <strong id="redCount">0</strong></span>
            <span>🔵 <strong id="analogCount">0</strong></span>
            <span>💬 <strong id="dialogCount">0</strong></span>
            <span>📓 <strong id="notebookCount">0</strong></span>
            <span>🧠 <strong id="spacedCount">0</strong></span>
        </div>

        <!-- ===== ВКЛАДКИ - СУПЕР КОМПАКТНЫЕ ===== -->
        <div class="tabs" id="tabsContainer"></div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ГРУППЫ (ФРАЗЫ) -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-groups">
            <input class="search" id="searchInput" placeholder="🔍 Поиск..." />
            <div class="categories" id="categoryButtons"></div>
            <div class="scroll-area" id="groupsContainer"></div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ДИАЛОГИ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-dialogues">
            <div class="scroll-area" id="dialoguesContainer"></div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ВИКТОРИНА -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-quiz">
            <div class="quiz-container">
                <div class="quiz-header">
                    <span class="title">📝 Викторина</span>
                    <span class="score">Счёт: <strong id="quizScore">0</strong> / <span id="quizTotal">0</span></span>
                </div>
                <div class="quiz-question" id="quizQuestion">
                    <div class="q-char" id="qChar" onclick="speakChinese(document.getElementById('qChar').textContent)">?</div>
                    <div class="q-pinyin" id="qPinyin"></div>
                    <div class="q-hint" id="qHint">Выберите правильный перевод</div>
                </div>
                <div class="quiz-options" id="quizOptions"></div>
                <div class="quiz-controls">
                    <button class="mode-btn" id="quizModeBtn">🔄 Режим</button>
                    <button class="next-btn" id="quizNextBtn">➡️</button>
                    <button class="reset-btn" id="quizResetBtn">🔄</button>
                </div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ИНТЕРВАЛЬНОЕ ПОВТОРЕНИЕ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-spaced">
            <div class="spaced-container">
                <div class="header">
                    <span class="title">🧠 Повторение</span>
                    <span class="count">Осталось: <strong id="spacedRemaining">0</strong></span>
                </div>
                <div class="card-area" id="spacedCardArea">
                    <div class="empty" id="spacedEmpty">
                        <span class="icon">🎉</span>
                        Всё повторено!
                    </div>
                    <div class="card" id="spacedCard" style="display:none;">
                        <div class="level-badge" id="spacedLevel">Ур. 1</div>
                        <div class="char" id="spacedChar" onclick="speakChinese(this.textContent)">?</div>
                        <div class="pinyin" id="spacedPinyin"></div>
                        <div class="translation" id="spacedTranslation"></div>
                        <div class="progress-text" id="spacedProgress">Нажмите для перевода</div>
                    </div>
                </div>
                <div class="card-controls" id="spacedControls" style="display:none;">
                    <button class="hard-btn" id="spacedHard">😓</button>
                    <button class="good-btn" id="spacedGood">😊</button>
                    <button class="easy-btn" id="spacedEasy">😄</button>
                    <button class="reset-spaced-btn" id="spacedReset">🔄</button>
                </div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: РИСОВАЛКА (HANZI WRITER) -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-hanzi">
            <div class="hanzi-section">
                <div class="input-row">

    <script>
        // ============================================================
        // 1. ДАННЫЕ

        let allPhrases = [];

        // ============================================================
        // 2. ДИНАМИЧЕСКИЕ ВКЛАДКИ (КОМПАКТНЫЕ)
        // ============================================================

                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;

        // ============================================================
        // 3. КАТЕГОРИИ

        function getUniqueCategories() {
            const cats = new Set();
            allPhrases.forEach(p => {
                if (p.category) cats.add(p.category);
            });
            return ['all', ...Array.from(cats)];
        }

        function renderCategoryButtons() {
            const container = document.getElementById('categoryButtons');

        const groupIcons = {
            decisions: '💭',
            greetings: '👋',
            feelings: '😊',
            actions: '🏃',
            requests: '🙏',
            time: '⏰',
            food: '🍜',
            work: '💼',
            weather: '🌤️',
            communication: '📱',
            travel: '✈️',
            emotions: '❤️',
            family: '👨‍👩‍👧‍👦',
            health: '🏥',
            tech: '💻',
            nature: '🌿',
            shop: '🛍️',
            numbers: '🔢'
        };

        const groupTitles = {
            decisions: 'Решения',
            greetings: 'Приветствия',
            feelings: 'Чувства',
            actions: 'Действия',
            requests: 'Просьбы',
            time: 'Время',
            food: 'Еда',
            work: 'Работа',
            weather: 'Погода',
            communication: 'Общение',
            travel: 'Путешествия',
            emotions: 'Эмоции',
            family: 'Семья',
            health: 'Здоровье',
            tech: 'Технологии',
            nature: 'Природа',
            shop: 'Покупки',
            numbers: 'Числа'
        };

        let searchQuery = '';
        let currentCategory = 'all';

        function getPhrasesForGroup(keywords) {
            return allPhrases.filter(p => {
                const text = p.chinese + ' ' + p.pinyin + ' ' + p.translation;
                return keywords.some(kw => text.includes(kw));
            });
        }

        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            updateStats();
            let html = '';
            let visible = 0;

            for (const [groupId, keywords] of Object.entries(groupKeywords)) {
                let phrases = getPhrasesForGroup(keywords);
                if (currentCategory !== 'all') phrases = phrases.filter(p => p.category === currentCategory);
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    phrases = phrases.filter(p =>
                        p.chinese.includes(q) || p.pinyin.toLowerCase().includes(q) ||
                        p.translation.toLowerCase().includes(q) || groupTitles[groupId].toLowerCase().includes(q)
                    );
                }
                if (phrases.length === 0) continue;
                visible++;

                const isCollapsed = collapsedGroups[groupId] || false;
                const icon = groupIcons[groupId] || '📄';
                const title = groupTitles[groupId] || groupId;

                html += `
                            <div class="group-container">
                                <div class="group-header ${isCollapsed ? 'collapsed' : ''}" data-group="${groupId}">
                                    <span class="icon">${icon}</span>
                                    <span class="title">${title}</span>
                                    <span class="count">${phrases.length}</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <div class="group-phrases ${isCollapsed ? 'collapsed' : ''}">
                        `;

                for (const p of phrases) {
                    const isRed = p.red !== false;
                    const isSaved = notebook.some(n => n.char === p.chinese);
                    const isFav = favorites.includes(p.chinese);
                    const safe = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    html += `
                                <div class="phrase-card">
                                    <div class="chinese" onclick="speakChinese('${safe}')">
                                        ${p.chinese}
                                        <span class="badge ${isRed ? 'red' : 'analog'}">${isRed ? '🔴' : '🔵'}</span>
                                    </div>
                                    <div class="info">
                                        <div class="pinyin">${p.pinyin}</div>
                                        <div class="translation">${p.translation}</div>
                                    </div>
                                    <div class="actions">
                                        <button class="audio-btn" onclick="speakChinese('${safe}')">🔊</button>
                                        <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleNotebook('${safe}', '${p.pinyin}', '${p.translation}')">${isSaved ? '✓' : '📓'}</button>
                                        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${safe}')">${isFav ? '⭐' : '☆'}</button>
                                    </div>
                                </div>
                            `;
                }

                html += `
                                </div>
                            </div>
                        `;
            }

            container.innerHTML = visible === 0 ?
                `<div class="empty"><span class="icon">🔍</span>Ничего не найдено</div>` : html;

            document.querySelectorAll('.group-header').forEach(h => {
                h.onclick = function() {
                    const id = this.dataset.group;
                    const phrases = this.nextElementSibling;
                    const isCollapsed = phrases.classList.contains('collapsed');
                    phrases.classList.toggle('collapsed');
                    this.classList.toggle('collapsed');
                    collapsedGroups[id] = !isCollapsed;
                    localStorage.setItem('chinese_collapsed_groups', JSON.stringify(collapsedGroups));
                };
            });
        }

        // 5. ИЗБРАННОЕ
        // ============================================================

        function toggleFavorite(char) {
            const idx = favorites.indexOf(char);
            if (idx >= 0) {
                favorites.splice(idx, 1);
                showToast(`⭐ "${char}" удалён из избранного`);
            } else {
                favorites.push(char);
                showToast(`⭐ "${char}" добавлен в избранное`);
            }
            localStorage.setItem('chinese_favorites', JSON.stringify(favorites));
            renderGroups();
        }

        // ============================================================
        // 6. ДИАЛОГИ
        // ============================================================

        function renderDialogues() {
            const container = document.getElementById('dialoguesContainer');
            if (!allDialogues || allDialogues.length === 0) {
                container.innerHTML = `<div class="empty"><span class="icon">💬</span>Диалогов нет</div>`;
                return;
            }

            let html = '';
            for (const d of allDialogues) {
                let phrases = '';
                if (d.phrases) {
                    phrases = d.phrases.map(p => {
                        const isRed = allPhrases.some(fp => fp.chinese === p && fp.red !== false);
                        return `<span class="dp ${isRed ? 'red' : ''}">${p}</span>`;
                    }).join(' ');
                }

                let lines = '';
                for (const line of d.lines) {
                    const safe = line.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    lines += `
                                <div class="dialog-line">
                                    <span class="sp">${line.speaker}</span>
                                    <span class="cn" onclick="speakChinese('${safe}')">${line.chinese}</span>
                                    <span class="py">${line.pinyin}</span>
                                    <span class="ru">— ${line.russian}</span>
                                </div>
                            `;
                }

                const full = d.lines.map(l => l.chinese).join('。');
                const safeFull = full.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const category = d.category || '';

                html += `
                            <div class="dialog-card">
                                <div class="title">
                                    💬 ${d.title}
                                    ${category ? `<span class="category-tag">#${category}</span>` : ''}
                                </div>
                                ${phrases ? `<div class="phrases-list">📌 ${phrases}</div>` : ''}
                                ${lines}
                                <button class="dialog-speak-btn" onclick="speakChinese('${safeFull}')">🔊 Весь диалог</button>
                            </div>
                        `;
            }
            container.innerHTML = html;
        }

        // ============================================================
        // 7. ВИКТОРИНА
        // ============================================================

        let quizQuestions = [];
        let quizIndex = 0;
        let quizScore = 0;
        let quizAnswered = false;
        let quizMode = 'translation';

        function initQuiz() {
            const source = notebook.length > 0 ? notebook : allPhrases.slice(0, 30);
            const chars = source.map(item => {
                if (item.char) {
                    const found = allPhrases.find(p => p.chinese === item.char);
                    return found || item;
                }
                return item;
            });

            quizQuestions = chars.filter(p => p.chinese && p.translation).map(p => ({
                chinese: p.chinese,
                pinyin: p.pinyin || '',
                translation: p.translation,
                category: p.category || ''
            }));

            if (quizQuestions.length === 0) {
                quizQuestions = allPhrases.slice(0, 20).map(p => ({
                    chinese: p.chinese,
                    pinyin: p.pinyin || '',
                    translation: p.translation,
                    category: p.category || ''
                }));
            }

            shuffleArray(quizQuestions);
            quizIndex = 0;
            quizScore = 0;
            quizAnswered = false;
            document.getElementById('quizScore').textContent = '0';
            document.getElementById('quizTotal').textContent = quizQuestions.length;
            showQuizQuestion();
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showQuizQuestion() {
            if (quizIndex >= quizQuestions.length) {
                document.getElementById('qChar').textContent = '🎉';
                document.getElementById('qPinyin').textContent = '';
                document.getElementById('qHint').textContent = `Правильно: ${quizScore} из ${quizQuestions.length}`;
                document.getElementById('quizOptions').innerHTML = `
                            <button onclick="initQuiz()" style="grid-column:1/-1;background:linear-gradient(135deg,#2ecc71,#27ae60);color:white;border:none;padding:8px;border-radius:8px;font-size:0.8rem;cursor:pointer;font-family:inherit;">🔄 Заново</button>
                        `;
                document.getElementById('quizNextBtn').style.display = 'none';
                return;
            }

            const q = quizQuestions[quizIndex];
            document.getElementById('quizNextBtn').style.display = 'inline-block';
            document.getElementById('qChar').textContent = q.chinese;
            document.getElementById('qPinyin').textContent = q.pinyin;
            document.getElementById('qHint').textContent = quizMode === 'translation' ? 'Выберите перевод' :
                'Выберите иероглиф';

            let options = [quizMode === 'translation' ? q.translation : q.chinese];
            const others = quizQuestions
                .filter((_, i) => i !== quizIndex)
                .map(p => quizMode === 'translation' ? p.translation : p.chinese)
                .filter(t => t !== options[0]);

            shuffleArray(others);
            for (let i = 0; i < Math.min(3, others.length); i++) {
                options.push(others[i]);
            }
            shuffleArray(options);

            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            quizAnswered = false;

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.onclick = () => checkQuizAnswer(btn, opt, q);
                container.appendChild(btn);
            });
        }

        function checkQuizAnswer(btn, selected, q) {
            if (quizAnswered) return;
            quizAnswered = true;

            const correct = quizMode === 'translation' ? q.translation : q.chinese;
            const isCorrect = selected === correct;

            if (isCorrect) {
                quizScore++;
                document.getElementById('quizScore').textContent = quizScore;
            }

            document.querySelectorAll('#quizOptions button').forEach(b => {
                b.classList.add('disabled');
                if (b.textContent === correct) b.classList.add('correct');
                if (b === btn && !isCorrect) b.classList.add('wrong');
            });

            document.getElementById('qHint').textContent = isCorrect ?
                `✅ ${q.chinese} — ${q.translation}` :
                `❌ Правильно: ${correct}`;
        }

        function nextQuizQuestion() {
            quizIndex++;
            showQuizQuestion();
        }

        let spacedCards = [];
        let spacedIndex = 0;
        let spacedShowingAnswer = false;

        function getSpacedCards() {
            const now = Date.now();
            const items = notebook.map(item => {
                const data = spacedData[item.char] || { level: 0, interval: 1, nextReview: 0 };
                return {
                    ...item,
                    ...data,
                    due: data.nextReview <= now
                };
            });

            items.sort((a, b) => {
                if (a.due && !b.due) return -1;
                if (!a.due && b.due) return 1;
                return a.level - b.level;
            });

            return items;
        }

        function renderSpaced() {
            spacedCards = getSpacedCards();
            const dueCards = spacedCards.filter(c => c.due);

            document.getElementById('spacedRemaining').textContent = dueCards.length;
            document.getElementById('spacedTotal').textContent = spacedCards.length;
            document.getElementById('menuSpacedCount').textContent = dueCards.length;

            if (dueCards.length === 0) {
                document.getElementById('spacedEmpty').style.display = 'block';
                document.getElementById('spacedCard').style.display = 'none';
                document.getElementById('spacedControls').style.display = 'none';
                return;
            }

            document.getElementById('spacedEmpty').style.display = 'none';
            document.getElementById('spacedCard').style.display = 'block';
            document.getElementById('spacedControls').style.display = 'flex';

            spacedIndex = 0;
            showSpacedCard();
        }

        function showSpacedCard() {
            const dueCards = spacedCards.filter(c => c.due);
            if (dueCards.length === 0 || spacedIndex >= dueCards.length) {
                renderSpaced();
                return;
            }

            const card = dueCards[spacedIndex];
            spacedShowingAnswer = false;

            document.getElementById('spacedChar').textContent = card.char;
            document.getElementById('spacedPinyin').textContent = card.pinyin || '';
            document.getElementById('spacedTranslation').textContent = card.translation || '';
            document.getElementById('spacedTranslation').classList.remove('show');
            document.getElementById('spacedLevel').textContent = `Ур. ${card.level || 0}`;

            const total = dueCards.length;
            document.getElementById('spacedProgress').textContent =
                `${spacedIndex + 1}/${total} | Нажмите для перевода`;

            const cardEl = document.getElementById('spacedCard');
            cardEl.onclick = function() {
                if (!spacedShowingAnswer) {
                    spacedShowingAnswer = true;
                    document.getElementById('spacedTranslation').classList.add('show');
                    document.getElementById('spacedProgress').textContent = 'Как запомнили?';
                }
            };
        }

        function answerSpaced(difficulty) {
            const dueCards = spacedCards.filter(c => c.due);
            if (dueCards.length === 0 || spacedIndex >= dueCards.length) {
                renderSpaced();
                return;
            }

            const card = dueCards[spacedIndex];
            const data = spacedData[card.char] || { level: 0, interval: 1, nextReview: 0 };

            if (difficulty === 'hard') {
                data.level = Math.max(0, data.level - 1);
                data.interval = Math.max(1, Math.round(data.interval * 0.7));
            } else if (difficulty === 'good') {
                data.level = data.level + 1;
                data.interval = Math.round(data.interval * (1.5 + data.level * 0.2));
            } else if (difficulty === 'easy') {
                data.level = data.level + 2;
                data.interval = Math.round(data.interval * (2 + data.level * 0.3));
            }

            data.interval = Math.min(365, Math.max(1, data.interval));
            data.nextReview = Date.now() + data.interval * 24 * 60 * 60 * 1000;

            spacedData[card.char] = data;
            localStorage.setItem('chinese_spaced_data', JSON.stringify(spacedData));

            spacedIndex++;
            showSpacedCard();
            updateStats();
        }

        function resetSpaced() {
            if (confirm('Сбросить весь прогресс?')) {
                spacedData = {};
                localStorage.setItem('chinese_spaced_data', JSON.stringify(spacedData));

        let hanziWriter = null;
        let hanziSpeed = 1.0;

        function initHanziWriter(chars) {
            const target = document.getElementById('hwTarget');
            const placeholder = document.getElementById('hanziPlaceholder');
            const wrapper = document.getElementById('hanziWrapper');
            const label = document.getElementById('charLabel');

            if (hanziWriter) {
                try { hanziWriter.destroy(); } catch (e) {}
                hanziWriter = null;
            }

            target.innerHTML = '';
            target.style.display = 'block';

            if (!chars || chars.length === 0) {
                placeholder.style.display = 'block';
                placeholder.textContent = '📖 Введите иероглиф(ы)';
                label.textContent = '';
                target.style.display = 'none';
                return;
            }

            placeholder.style.display = 'none';
            label.textContent = chars.length + ' иероглиф' + (chars.length > 1 ? 'а' : '');

            try {
                const wrapperRect = wrapper.getBoundingClientRect();
                const size = Math.min(wrapperRect.width - 16, 450, window.innerHeight * 0.45);
                const text = chars.join('');

                if (typeof HanziWriter === 'undefined') {
                    placeholder.style.display = 'block';
                    placeholder.textContent = '⚠️ Библиотека не загружена';
                    target.style.display = 'none';
                    return;
                }

                hanziWriter = HanziWriter.create(target, text, {
                    width: Math.max(size, 150),
                    height: Math.max(size, 150),
                    padding: 6,
                    strokeColor: '#1a1a1a',
                    radicalColor: '#c0392b',
                    strokeAnimationSpeed: hanziSpeed,
                    showCharacter: false,
                    showOutline: true,
                    showHintAfterMisses: 1,
                });

                setTimeout(() => {
                    if (hanziWriter) {
                        hanziWriter.animateCharacter();
                    }
                }, 300);

            } catch (e) {
                console.error('HanziWriter error:', e);
                placeholder.style.display = 'block';
                placeholder.textContent = '❌ Ошибка: ' + e.message;
                target.style.display = 'none';
                label.textContent = '';
            }
        }

        function showHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                document.getElementById('hanziPlaceholder').textContent = '⚠️ Введите иероглиф(ы)';
                document.getElementById('hanziPlaceholder').style.display = 'block';
                document.getElementById('hwTarget').style.display = 'none';
                document.getElementById('charLabel').textContent = '';
                return;
            }

            const chars = [...raw];
            if (chars.length > 4) {
                const limited = chars.slice(0, 4);
                document.getElementById('hanziInput').value = limited.join('');
                initHanziWriter(limited);
                return;
            }

            initHanziWriter(chars);

            if (document.getElementById('autoSaveToggle').checked) {
                for (const char of chars) {
                    if (!notebook.some(n => n.char === char)) {
                        let pinyin = '',
                            translation = '';
                        const found = allPhrases.find(p => p.chinese === char);
                        if (found) { pinyin = found.pinyin;
                            translation = found.translation; }
                        notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                        if (!spacedData[char]) {
                            spacedData[char] = { level: 0, interval: 1, nextReview: Date.now() };
                        }
                    }
                }
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                localStorage.setItem('chinese_spaced_data', JSON.stringify(spacedData));
                renderNotebook();
                updateStats();
                renderSpaced();
                showToast(`✅ Сохранено: ${chars.join(', ')}`);
            }
        }

        function repeatHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                showToast('⚠️ Сначала введите иероглиф');

            const chars = [...raw];
            if (chars.length > 4) {
                const limited = chars.slice(0, 4);
