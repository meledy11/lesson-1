<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📕 Красная книга</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js">
    </script>
    <script src="redphrases.js"></script>
    <style>
        /* ============================================================
           ТЕМЫ
           ============================================================ */
        :root {
            --bg-primary: #1a3a2a;
            --bg-secondary: #0a1a0f;
            --bg-card: rgba(30, 25, 20, 0.7);
            --bg-card-hover: rgba(30, 25, 20, 0.85);
            --bg-card-light: rgba(255, 255, 255, 0.06);
            --text-primary: #f5e6d3;
            --text-secondary: #d4c9a6;
            --text-muted: #b8956a;
            --gold: #ffd700;
            --orange: #ff6b35;
            --blue: #3b82f6;
            --green: #2ecc71;
            --red: #e74c3c;
            --purple: #8b5cf6;
            --shadow: rgba(0, 0, 0, 0.3);
            --border: rgba(255, 215, 0, 0.08);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f5ede4;
            --bg-secondary: #e8d5c0;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --bg-card-light: rgba(0, 0, 0, 0.04);
            --text-primary: #2d1b0e;
            --text-secondary: #5a4a3a;
            --text-muted: #8b7355;
            --shadow: rgba(0, 0, 0, 0.1);
            --border: rgba(139, 115, 85, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 8px;
            color: var(--text-primary);
            transition: background var(--transition);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            transition: background var(--transition);
        }
        .top-bar .back-btn {
            background: #5a4a3a;
            color: #f7e05e;
            padding: 6px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #2a1a0a;
            transition: 0.15s;
        }
        .top-bar .back-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2a1a0a;
        }
        .top-bar .title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-bar .notebook-link {
            background: var(--green);
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #1a7a3a;
            transition: 0.15s;
        }
        .top-bar .notebook-link:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a7a3a;
        }
        .top-bar .theme-toggle {
            background: var(--bg-card-light);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }
        .top-bar .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            background: var(--bg-card);
            padding: 6px 16px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-shrink: 0;
            border: 1px solid var(--border);
            backdrop-filter: blur(5px);
            transition: background var(--transition);
        }
        .stats span {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .stats strong {
            color: var(--gold);
            font-size: 1rem;
        }

        /* ===== ВКЛАДКИ ===== */
        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 2px solid var(--border);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all var(--transition);
            font-family: inherit;
            backdrop-filter: blur(5px);
        }
        .tab-btn:hover {
            border-color: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--orange), #ff8c42);
            color: white;
            border-color: var(--orange);
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
        }
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
            animation: fadeSlide 0.3s ease;
        }
        .tab-content.active {
            display: flex;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== СКРОЛЛ ===== */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        .scroll-area::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        /* ============================================================
           ГРУППЫ
           ============================================================ */
        .search {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
            flex-shrink: 0;
            transition: border var(--transition), background var(--transition);
        }
        .search::placeholder {
            color: var(--text-muted);
            font-size: 1rem;
        }
        .search:focus {
            border-color: rgba(255, 215, 0, 0.2);
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .categories button {
            padding: 6px 14px;
            border: 2px solid var(--border);
            border-radius: 30px;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
        }
        .categories button.active {
            background: linear-gradient(135deg, var(--orange), #ff8c42);
            color: white;
            border-color: var(--orange);
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 6px;
            cursor: pointer;
            transition: background var(--transition);
        }
        .group-header:hover {
            background: var(--bg-card-hover);
        }
        .group-header .icon {
            font-size: 1.6rem;
        }
        .group-header .title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .group-header .count {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.8rem;
            background: var(--bg-card-light);
            padding: 2px 12px;
            border-radius: 30px;
        }
        .group-header .arrow {
            color: var(--text-muted);
            transition: transform 0.3s;
            font-size: 1rem;
        }
        .group-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .group-phrases {
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 10000px;
        }
        .group-phrases.collapsed {
            max-height: 0;
        }

        /* ===== КАРТОЧКА ФРАЗЫ ===== */
        .phrase-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 6px;
            border-left: 4px solid var(--gold);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            transition: all var(--transition);
        }
        .phrase-card:hover {
            transform: translateX(4px);
            background: var(--bg-card-hover);
        }
        .phrase-card .chinese {
            font-size: 2.6rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 80px;
            transition: text-shadow 0.15s;
        }
        .phrase-card .chinese:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .phrase-card .chinese .badge {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 700;
        }
        .phrase-card .chinese .badge.red {
            background: rgba(220, 38, 38, 0.2);
            color: #ff6b6b;
        }
        .phrase-card .chinese .badge.analog {
            background: rgba(59, 130, 246, 0.15);
            color: #6ea8fe;
        }
        .phrase-card .info {
            display: flex;
            flex-direction: column;
            flex: 2;
            min-width: 120px;
        }
        .phrase-card .pinyin {
            font-size: 1.05rem;
            color: var(--text-muted);
        }
        .phrase-card .translation {
            font-size: 1.15rem;
            color: var(--text-secondary);
        }
        .phrase-card .actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .phrase-card .actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
        }
        .phrase-card .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
        }
        .phrase-card .actions .audio-btn {
            background: linear-gradient(135deg, var(--orange), #ff8c42);
            color: white;
        }
        .phrase-card .actions .save-btn {
            background: var(--green);
            color: white;
        }
        .phrase-card .actions .save-btn.saved {
            background: #f39c12;
        }

        /* ============================================================
           ДИАЛОГИ
           ============================================================ */
        .dialog-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 10px;
            border-left: 5px solid var(--blue);
            transition: background var(--transition);
        }
        .dialog-card .title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .dialog-card .phrases-list {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .dialog-card .phrases-list .dp {
            background: var(--bg-card-light);
            padding: 3px 10px;
            border-radius: 8px;
            margin-right: 6px;
            display: inline-block;
            font-size: 0.9rem;
        }
        .dialog-card .phrases-list .dp.red {
            background: rgba(220, 38, 38, 0.15);
            color: #ff6b6b;
        }
        .dialog-line {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .dialog-line:last-child {
            border-bottom: none;
        }
        .dialog-line .sp {
            font-weight: 700;
            color: var(--blue);
            min-width: 30px;
            font-size: 1rem;
        }
        .dialog-line .cn {
            font-size: 2rem;
            font-weight: 600;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: var(--text-primary);
            cursor: pointer;
            transition: text-shadow 0.15s;
        }
        .dialog-line .cn:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .dialog-line .py {
            font-size: 0.95rem;
            color: var(--text-muted);
            align-self: center;
        }
        .dialog-line .ru {
            font-size: 1.05rem;
            color: var(--text-secondary);
            align-self: center;
        }
        .dialog-speak-btn {
            background: linear-gradient(135deg, var(--blue), #2563eb);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #1d4ed8;
            margin-top: 8px;
            font-family: inherit;
            transition: 0.15s;
        }
        .dialog-speak-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
        <div class="top-bar">
            <a href="index.html" class="back-btn">◀ На главную</a>
            <span class="title">📕 Красная книга</span>
            <a href="#" class="notebook-link" id="notebookNav">📓 Дневник</a>
            <button class="theme-toggle" id="themeToggle" title="Сменить тему">🌙</button>
        </div>

        <!-- ===== СТАТИСТИКА ===== -->
        <div class="stats" id="statsBar">
            <span>Всего: <strong id="totalCount">0</strong></span>
            <span>Красная: <strong id="redCount">0</strong></span>
            <span>Аналоги: <strong id="analogCount">0</strong></span>
            <span>Диалогов: <strong id="dialogCount">0</strong></span>
            <span>В дневнике: <strong id="notebookCount">0</strong></span>
        </div>

        <!-- ===== ВКЛАДКИ ===== -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="groups">📚 Группы</button>
            <button class="tab-btn" data-tab="dialogues">💬 Диалоги</button>
            <button class="tab-btn" data-tab="hanzi">✍️ Рисовалка</button>
            <button class="tab-btn" data-tab="notebook">📓 Дневник</button>
            <button class="tab-btn" data-tab="quiz">🎮 Викторина</button>
            <button class="tab-btn" data-tab="canvas">🖌️ Каллиграфия</button>
        </div>
        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ГРУППЫ -->
        <!-- ========================================================== -->
        <div class="tab-content active" id="tab-groups">
            <input class="search" id="searchInput" placeholder="🔍 Поиск по группам и фразам..." />
            <div class="categories" id="categoryButtons">
                <button data-cat="all" class="active">📚 Все</button>
                <button data-cat="phrase">📄 Фразы</button>
                <button data-cat="travel">✈️ Путешествия</button>
                <button data-cat="food">🍜 Еда</button>
                <button data-cat="work">💼 Работа</button>
            </div>
            <div class="scroll-area" id="groupsContainer"></div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ДИАЛОГИ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-dialogues">
            <div class="scroll-area" id="dialoguesContainer"></div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: РИСОВАЛКА (HANZI WRITER) — УЛУЧШЕННАЯ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-hanzi">
            <div class="hanzi-section">
                <div class="input-row">
                    <input type="text" id="hanziInput" placeholder="Введите иероглиф(ы) до 4..." maxlength="4" autocomplete="off">
                    <button id="showHanziBtn">✍️ Показать</button>
                    <button id="repeatHanziBtn" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white;">🔄 Повтор</button>
                </div>
                <div class="speed-control">
                    <label for="speedSlider">🐢 Скорость:</label>
                    <input type="range" id="speedSlider" min="0.3" max="2.5" step="0.1" value="1.0">
                    <span class="speed-value" id="speedValue">1.0x</span>
                    <label style="margin-left:8px;font-size:0.75rem;">
                        <input type="checkbox" id="autoSaveToggle" checked> Автосохранение
                    </label>
                </div>
                <div class="hanzi-wrapper" id="hanziWrapper">
                    <div class="placeholder" id="hanziPlaceholder">📖 Введите иероглиф(ы) и нажмите "Показать"</div>
                    <div class="hw-target" id="hwTarget"></div>
                    <div class="char-label" id="charLabel"></div>
                </div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ДНЕВНИК (УЛУЧШЕННЫЙ) -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-notebook">
            <div class="notebook-container">
                <div class="header">
                    <span>📓 Сохранённые</span>
                    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
                        <span class="count" id="notebookCountLabel">0</span>
                        <button class="export-btn" id="exportNotebookBtn">📤 Экспорт</button>
                        <button class="clear-btn" id="clearNotebookBtn">🗑️ Очистить</button>
                    </div>
                </div>
                <div class="list" id="savedList">
                    <div class="empty">
                        <span class="icon">📓</span>
                        Сохраняйте фразы и иероглифы для повторения
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ВИКТОРИНА (УЛУЧШЕННАЯ) -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-quiz">
            <div class="quiz-container" id="quizContainer">
                <div class="quiz-difficulty" id="quizDifficulty">
                    <button data-level="easy">🟢 Лёгкий (2 варианта)</button>
                    <button data-level="medium" class="active">🟡 Средний (4 варианта)</button>
                    <button data-level="hard">🔴 Сложный (6 вариантов)</button>
                </div>
                <div class="q-number" id="qNumber">1 / 10</div>
                <div class="q-chinese" id="qChinese" onclick="speakChinese(this.textContent)">—</div>
                <div class="q-pinyin" id="qPinyin">—</div>
                <div class="q-hint" id="qHint">Выберите правильный перевод</div>
                <div class="quiz-options" id="quizOptions"></div>
                <div class="quiz-score" id="quizScore">✅ 0 / 0</div>
                <div class="quiz-controls">
                    <button class="btn-next" id="quizNext">➜ Следующий</button>
                    <button class="btn-restart" id="quizRestart">🔄 Заново</button>
                    <button class="btn-hint" id="quizHint">💡 Подсказка</button>
                </div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: КАЛЛИГРАФИЯ (УЛУЧШЕННАЯ) -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-canvas">
            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="calligraphyCanvas"></canvas>
                </div>
                <div class="quality-bar"><div class="quality-fill" id="qFill"></div></div>
                <div class="quality-text" id="qText">🖌️ Рисуй иероглифы кистью</div>
                <div class="canvas-tools">
                    <button class="undo-btn" id="canvasUndo">↩️ Отменить</button>
                    <button class="clear-btn" id="canvasClear">🧽 Очистить</button>
                    <button class="trace-btn" id="canvasTrace">👁️ Образец</button>
                    <button class="check-btn" id="canvasCheck">✅ Проверить</button>
                    <button class="save-img-btn" id="canvasSaveImg">💾 Сохранить PNG</button>
                    <span style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:4px;">
                        <button class="color-btn active" data-color="#1a1a1a" style="background:#1a1a1a;"></button>
                        <button class="color-btn" data-color="#c0392b" style="background:#c0392b;"></button>
                        <button class="color-btn" data-color="#d4a017" style="background:#d4a017;"></button>
                        <button class="color-btn" data-color="#2471a3" style="background:#2471a3;"></button>
                    </span>
                    <span style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-top:4px;">
                        <label style="font-size:0.7rem;color:var(--text-muted);">Размер:</label>
                        <input type="range" id="brushSizeSlider" min="2" max="20" value="8" style="width:80px;">
                        <span style="font-size:0.7rem;color:var(--text-muted);" id="brushSizeValue">8</span>
                    </span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. ДАННЫЕ
        // ============================================================

        let allPhrases = [];
        let allDialogues = [];
        let notebook = JSON.parse(localStorage.getItem('chinese_redbook_notebook') || '[]');

        const groups = [

        let searchQuery = '';
        let currentCategory = 'all';
        let currentTab = 'groups';

        // 2. ГРУППЫ
        // ============================================================

        function getPhrasesForGroup(group) {
            return allPhrases.filter(p => {
                const text = p.chinese + ' ' + p.pinyin + ' ' + p.translation;
                return group.keywords.some(kw => text.includes(kw));
            });
        }

        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            updateStats();
            let html = '';
            let visible = 0;

            for (const group of groups) {
                let phrases = getPhrasesForGroup(group);
                if (currentCategory !== 'all') phrases = phrases.filter(p => p.category === currentCategory);
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    phrases = phrases.filter(p =>
                        p.chinese.includes(q) || p.pinyin.toLowerCase().includes(q) ||
                        p.translation.toLowerCase().includes(q) || group.title.toLowerCase().includes(q)
                    );
                }
                if (phrases.length === 0) continue;
                visible++;

                const isCollapsed = collapsedGroups[group.id] || false;

                html += `
                            <div class="group-container">
                                <div class="group-header ${isCollapsed ? 'collapsed' : ''}" data-group="${group.id}">
                                    <span class="icon">${group.icon}</span>
                                    <span class="title">${group.title}</span>
                                    <span class="count">${phrases.length}</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <div class="group-phrases ${isCollapsed ? 'collapsed' : ''}">
                        `;

                for (const p of phrases) {
                    const isRed = p.red !== false;
                    const isSaved = notebook.some(n => n.char === p.chinese);
                    const safe = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    html += `
                                <div class="phrase-card">
                                    <div class="chinese" onclick="speakChinese('${safe}')">
                                        ${p.chinese}
                                        <span class="badge ${isRed ? 'red' : 'analog'}">${isRed ? '🔴' : '🔵'}</span>
                                    </div>
                                    <div class="info">
                                        <div class="pinyin">${p.pinyin}</div>
                                        <div class="translation">${p.translation}</div>
                                    </div>
                                    <div class="actions">
                                        <button class="audio-btn" onclick="speakChinese('${safe}')">🔊</button>
                                        <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleNotebook('${safe}', '${p.pinyin}', '${p.translation}')">${isSaved ? '✓' : '📓'}</button>
                                    </div>
                                </div>
                            `;
                }

                html += `
                                </div>
                            </div>
                        `;
            }

            container.innerHTML = visible === 0 ?
                `<div class="empty"><span class="icon">🔍</span>Ничего не найдено</div>` : html;

            document.querySelectorAll('.group-header').forEach(h => {
                h.onclick = function() {
                    const id = this.dataset.group;
                    const phrases = this.nextElementSibling;
                    const isCollapsed = phrases.classList.contains('collapsed');
                    phrases.classList.toggle('collapsed');
                    this.classList.toggle('collapsed');
                    collapsedGroups[id] = !isCollapsed;
                    localStorage.setItem('chinese_collapsed_groups', JSON.stringify(collapsedGroups));
                };
            });
        }

        // 3. ДИАЛОГИ
        // ============================================================

        function renderDialogues() {
            const container = document.getElementById('dialoguesContainer');
            if (allDialogues.length === 0) {
                container.innerHTML = `<div class="empty"><span class="icon">💬</span>Диалогов нет</div>`;
                return;
            }

            let html = '';
            for (const d of allDialogues) {
                let phrases = '';
                if (d.phrases) {
                    phrases = d.phrases.map(p => {
                        const isRed = allPhrases.some(fp => fp.chinese === p && fp.red !== false);
                        return `<span class="dp ${isRed ? 'red' : ''}">${p}</span>`;
                    }).join(' ');

                    lines += `

                                    <span class="sp">${line.speaker}</span>

                                    <span class="ru">— ${line.russian}</span>

        // ============================================================
        // 4. ДНЕВНИК
        // ============================================================

        function toggleNotebook(char, pinyin, translation) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                showToast(`❌ "${char}" удалён`);
            } else {
                notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                showToast(`✅ "${char}" сохранён`);
            }
            localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
            renderGroups();
            renderNotebook();
            updateStats();
        }

        function renderNotebook() {
            const container = document.getElementById('savedList');
            if (notebook.length === 0) {
                container.innerHTML =
                    `<div class="empty"><span class="icon">📓</span>Сохраняйте фразы и иероглифы для повторения</div>`;
                return;
            }

            let html = '';
            for (const item of notebook) {
                const safe = item.char.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                const dateStr = date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', { hour: '2-digit',

                html += `
                            <div class="notebook-item" onclick="loadToHanzi('${safe}')">
                                <span class="char">${item.char}</span>
                                <span class="info">

                            </div>

            container.innerHTML = html;
            document.getElementById('notebookCountLabel').textContent = notebook.length;
        }

        function removeFromNotebook(char) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast(`❌ "${char}" удалён`);
            }
        }

        function clearNotebook() {
            if (notebook.length === 0) return;
            if (confirm('Удалить всё из дневника?')) {
                notebook = [];
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast('🗑️ Дневник очищен');
            }
        }

        function exportNotebook() {
            if (notebook.length === 0) {
                showToast('📓 Дневник пуст');
                return;
            }
            const data = JSON.stringify(notebook, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'chinese_notebook_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ Дневник экспортирован');
        }

        // ============================================================
        // 5. HANZI WRITER (УЛУЧШЕННЫЙ)
        // ============================================================

        let hanziWriter = null;
        let hanziSpeed = 1.0;

        function initHanziWriter(chars) {
            const target = document.getElementById('hwTarget');
            const placeholder = document.getElementById('hanziPlaceholder');
            const wrapper = document.getElementById('hanziWrapper');
            const label = document.getElementById('charLabel');

            if (hanziWriter) {
                try { hanziWriter.destroy(); } catch (e) {}
                hanziWriter = null;
            }

            if (!chars || chars.length === 0) {
                target.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.textContent = '📖 Введите иероглиф(ы) и нажмите "Показать"';
                label.textContent = '';
                return;
            }

            target.style.display = 'block';
            placeholder.style.display = 'none';
            label.textContent = chars.length + ' иероглиф' + (chars.length > 1 ? 'а' : '');

            try {
                const size = Math.min(wrapper.clientWidth - 16, 400);
                const text = chars.join('');

                hanziWriter = HanziWriter.create(target, text, {
                    width: size,
                    height: size,
                    padding: 6,
                    strokeColor: '#1a1a1a',
                    radicalColor: '#c0392b',
                    strokeAnimationSpeed: hanziSpeed,
                });

                setTimeout(() => {
                    if (hanziWriter) hanziWriter.animateCharacter();
                }, 200);

            } catch (e) {
                placeholder.style.display = 'block';
                placeholder.textContent = '❌ Ошибка: ' + e.message;
                target.style.display = 'none';
                label.textContent = '';
            }
        }

        function showHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                document.getElementById('hanziPlaceholder').textContent = '⚠️ Введите иероглиф(ы)';
                document.getElementById('hanziPlaceholder').style.display = 'block';
                document.getElementById('hwTarget').style.display = 'none';
                document.getElementById('charLabel').textContent = '';
                return;
            }

            const chars = [...raw];
            if (chars.length > 4) {
                const limited = chars.slice(0, 4);
                document.getElementById('hanziInput').value = limited.join('');
                initHanziWriter(limited);
                return;
            }

            initHanziWriter(chars);

            // Автосохранение
            if (document.getElementById('autoSaveToggle').checked) {
                for (const char of chars) {
                    if (!notebook.some(n => n.char === char)) {
                        let pinyin = '',
                            translation = '';
                        const found = allPhrases.find(p => p.chinese === char);
                        if (found) { pinyin = found.pinyin;
                            translation = found.translation; }
                        notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                    }
                }
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast(`✅ Сохранено: ${chars.join(', ')}`);
            }
        }

        function repeatHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                showToast('⚠️ Сначала введите иероглиф');
                return;
            }
            const chars = [...raw];
            if (chars.length > 4) {
                const limited = chars.slice(0, 4);
                document.getElementById('hanziInput').value = limited.join('');
                initHanziWriter(limited);
            } else {
                initHanziWriter(chars);
            }
        }

        function loadToHanzi(char) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelector('[data-tab="hanzi"]').classList.add('active');
            document.getElementById('tab-hanzi').classList.add('active');
            document.getElementById('hanziInput').value = char;
            setTimeout(() => initHanziWriter([char]), 100);
        }

        let chineseVoice = null;
        let autoSpeak = false;

        function loadChineseVoice() {
            if (!window.speechSynthesis) return;
            const voices = speechSynthesis.getVoices();
            chineseVoice = voices.find(v => v.lang.startsWith('zh')) || null;
        }
        if (window.speechSynthesis) {
            loadChineseVoice();
            speechSynthesis.onvoiceschanged = loadChineseVoice;
            setTimeout(loadChineseVoice, 500);
        }

        function speakChinese(text) {
            if (!text || !window.speechSynthesis) return;
            try { window.speechSynthesis.cancel(); } catch (e) {}
            setTimeout(() => {
                try {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'zh-CN';
                    u.rate = 0.7;
                    if (!chineseVoice) {
                        const voices = speechSynthesis.getVoices();
                        chineseVoice = voices.find(v => v.lang.startsWith('zh'));
                    }
                    if (chineseVoice) u.voice = chineseVoice;
                    window.speechSynthesis.speak(u);
                } catch (e) {}
            }, 50);
        }
        window.speakChinese = speakChinese;

        let quizQuestions = [];
        let quizIndex = 0;
        let quizScore = 0;
        let quizTotal = 0;
        let quizAnswered = false;
        let quizHintUsed = false;
        let quizDifficulty = 'medium';
        let quizOptionsCount = 4;

        function initQuiz() {
            const allWords = allPhrases.filter(p => p.red !== false);
            if (allWords.length < 4) {
                document.getElementById('quizContainer').innerHTML =
                    `<div class="empty"><span class="icon">🎮</span>Недостаточно фраз для викторины</div>`;
                return;
            }

            const shuffled = [...allWords].sort(() => Math.random() - 0.5);
            quizQuestions = shuffled.slice(0, 10);
            quizTotal = quizQuestions.length;
            quizIndex = 0;
            quizScore = 0;
            quizAnswered = false;
            quizHintUsed = false;

            // Уровень сложности
            const levels = {
                easy: 2,
                medium: 4,
                hard: 6
            };
            quizOptionsCount = levels[quizDifficulty] || 4;

            document.getElementById('quizRestart').style.display = 'inline-block';
            showQuestion();
        }

        function showQuestion() {
            if (quizIndex >= quizTotal) {
                document.getElementById('qNumber').textContent = '🎉';
                document.getElementById('qChinese').textContent = '🏆';
                document.getElementById('qPinyin').textContent = '';
                document.getElementById('qHint').textContent = `Ты ответил ${quizScore} из ${quizTotal}!`;
                document.getElementById('quizOptions').innerHTML = '';
                document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
                document.getElementById('quizNext').style.display = 'none';
                return;
            }

            const q = quizQuestions[quizIndex];
            const correct = q.translation;

            const allTranslations = allPhrases.filter(p => p.red !== false).map(p => p.translation);
            const others = allTranslations.filter(t => t !== correct);
            const shuffledOthers = others.sort(() => Math.random() - 0.5).slice(0, quizOptionsCount - 1);
            const options = [correct, ...shuffledOthers].sort(() => Math.random() - 0.5);

            document.getElementById('qNumber').textContent = `${quizIndex + 1} / ${quizTotal}`;
            document.getElementById('qChinese').textContent = q.chinese;
            document.getElementById('qPinyin').textContent = q.pinyin;
            document.getElementById('qHint').textContent = 'Выберите правильный перевод';
            document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
            document.getElementById('quizNext').style.display = 'none';
            quizAnswered = false;
            quizHintUsed = false;

            const container = document.getElementById('quizOptions');
            container.innerHTML = '';

            for (const opt of options) {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.dataset.correct = opt === correct ? 'true' : 'false';
                btn.onclick = function() {
                    if (quizAnswered) return;
                    quizAnswered = true;
                    const isCorrect = this.dataset.correct === 'true';

                    document.querySelectorAll('#quizOptions button').forEach(b => b.disabled = true);

                    if (isCorrect) {
                        quizScore++;
                        this.classList.add('correct');
                        speakChinese(q.chinese);
                    } else {
                        this.classList.add('wrong');
                        document.querySelectorAll('#quizOptions button').forEach(b => {
                            if (b.dataset.correct === 'true') b.classList.add('correct');
                        });
                        speakChinese(q.chinese);
                    }

                    document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
                    document.getElementById('quizNext').style.display = 'inline-block';
                };
                container.appendChild(btn);
            }
        }

        function nextQuestion() {
            if (quizAnswered) {
                quizIndex++;
                showQuestion();
            }
        }

        function restartQuiz() {
            initQuiz();
        }

        function giveHint() {
            if (quizAnswered || quizHintUsed) return;
            quizHintUsed = true;

            const q = quizQuestions[quizIndex];
            const correct = q.translation;

            document.querySelectorAll('#quizOptions button').forEach(btn => {
                if (btn.dataset.correct === 'true') {

            setTimeout(() => {
                document.querySelectorAll('#quizOptions button').forEach(btn => {
                    if (btn.dataset.correct === 'true') {

        function setQuizDifficulty(level) {

        // ============================================================
        // 8. КАЛЛИГРАФИЯ (УЛУЧШЕННАЯ)
        // ============================================================

        let canvas, ctx, isDrawing = false,
            lastX, lastY, lastWidth, lastTime, strokeLen = 0;
        let canvasHistory = [];
        let currentColor = '#1a1a1a';
        let canvasRefData = null;
        let exampleVisible = false;
        let brushSize = 8;

        function initCanvas() {
            canvas = document.getElementById('calligraphyCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const size = Math.min(rect.width - 16, 450);
            canvas.width = canvas.height = size;
            ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            setupDrawing();
            document.getElementById('qFill').style.width = '0%';
            document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы кистью';
            canvasHistory = [];
            document.getElementById('canvasUndo').style.display = 'none';
        }

        function drawGrid(ctx, size) {
            const p = 20,
                c = size / 2;
            ctx.save();
            ctx.strokeStyle = '#e8e0d8';
            ctx.lineWidth = 1;
            ctx.strokeRect(p, p, size - p * 2, size - p * 2);
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(c, p);
            ctx.lineTo(c, size - p);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p, c);
            ctx.lineTo(size - p, c);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        function setupDrawing() {
            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left) * canvas.width / rect.width,
                    y: (e.clientY - rect.top) * canvas.height / rect.height,
                    pressure: e.pressure || 0.5
                };
            }

            function start(e) {
                e.preventDefault();
                isDrawing = true;
                const p = getPos(e);
                lastX = p.x;
                lastY = p.y;
                lastTime = performance.now();
                lastWidth = brushSize * 0.5;
                saveCanvasState();
                document.getElementById('canvasUndo').style.display = 'inline-block';
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                const p = getPos(e);
                const now = performance.now();
                const dt = Math.max(1, now - lastTime);
                const dist = Math.hypot(p.x - lastX, p.y - lastY);
                const speed = dist / dt;
                strokeLen += dist;

                const pressureFactor = 0.2 + p.pressure * 0.8;
                const speedFactor = Math.max(0.1, 1 - (speed / 0.8));
                let w = brushSize * pressureFactor * speedFactor;
                if (strokeLen < 15) w *= (0.3 + 0.7 * (strokeLen / 15));
                w = Math.max(2, Math.min(brushSize * 1.5, w));

                const newW = lastWidth * 0.6 + w * 0.4;

                ctx.save();
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = newW;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 0.5;
                ctx.shadowColor = currentColor + '33';

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();

                // Заполнение промежутков для плавности
                const midX = (lastX + p.x) / 2;
                const midY = (lastY + p.y) / 2;
                const midW = (lastWidth + newW) / 2;
                if (dist > 2) {
                    ctx.beginPath();
                    ctx.ellipse(midX, midY, midW / 2, midW / 2.2, Math.atan2(p.y - lastY, p.x - lastX) + Math.PI / 2, 0, Math
                        .PI * 2);
                    ctx.fill();
                }

                ctx.restore();

                lastX = p.x;
                lastY = p.y;
                lastWidth = newW;
                lastTime = now;
            }

            function stop() {
                if (!isDrawing) return;
                isDrawing = false;
                const angle = Math.atan2(lastY - (lastY - 1), lastX - (lastX - 1)) || 0;
                ctx.save();
                ctx.fillStyle = currentColor;
                ctx.shadowBlur = 0;
                for (let i = 1; i <= 10; i++) {
                    const t = i / 10;
                    const tw = lastWidth * Math.pow(1 - t, 1.8);
                    const tx = lastX + Math.cos(angle) * t * 5;
                    const ty = lastY + Math.sin(angle) * t * 5;
                    ctx.beginPath();
                    ctx.ellipse(tx, ty, tw / 2, tw / 2.8, angle, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
                saveCanvasState();
            }

            canvas.addEventListener('pointerdown', start);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', stop);
            canvas.addEventListener('pointerleave', stop);
            canvas.addEventListener('pointercancel', stop);
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('mouseleave', stop);
        }

        function saveCanvasState() {
            canvasHistory.push(canvas.toDataURL());
            if (canvasHistory.length > 30) canvasHistory.shift();
        }

        function undoCanvas() {
            if (canvasHistory.length < 2) return;
            canvasHistory.pop();
            const img = new Image();
            img.onload = function() {
                const size = canvas.width;
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(img, 0, 0);
                if (canvasHistory.length <= 1) {
                    document.getElementById('canvasUndo').style.display = 'none';
                }
            };
            img.src = canvasHistory[canvasHistory.length - 1];
        }

        function clearCanvas() {
            const size = canvas.width;
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            document.getElementById('qFill').style.width = '0%';
            document.getElementById('qText').textContent = '🧽 Очищено';
            document.getElementById('canvasTrace').textContent = '👁️ Образец';
            canvasHistory = [];
            document.getElementById('canvasUndo').style.display = 'none';
        }

        function showExample() {
            const char = prompt('Введите иероглиф для образца (1 символ):', '永');
            if (!char || char.length !== 1) return;
            clearCanvas();
            const size = canvas.width;
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#9b59b6';
            ctx.font = `900 ${size * 0.7}px "Noto Sans CJK SC", "KaiTi", "STKaiti", serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, size / 2, size / 2 + size * 0.02);
            ctx.restore();
            canvasRefData = ctx.getImageData(0, 0, size, size);
            exampleVisible = true;
            document.getElementById('canvasTrace').textContent = '🙈 Скрыть';
            document.getElementById('qText').textContent = `🖌️ Обводи образец "${char}"`;
        }

        function hideExample() {
            const size = canvas.width;
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            document.getElementById('canvasTrace').textContent = '👁️ Образец';
            document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы кистью';
        }

        function checkQuality() {
            if (!canvasRefData) {
                document.getElementById('qText').textContent = '👁️ Сначала покажи образец';
                return;
            }
            const size = canvas.width;
            const current = ctx.getImageData(0, 0, size, size);
            const dRef = canvasRefData.data;
            const dCur = current.data;
            let match = 0,
                totalRef = 0,
                userOutside = 0;
            const threshold = 235;
            for (let i = 0; i < dRef.length; i += 4) {
                const isRef = (dRef[i] < threshold || dRef[i + 1] < threshold || dRef[i + 2] < threshold);
                const isUser = (dCur[i] < threshold || dCur[i + 1] < threshold || dCur[i + 2] < threshold);
                if (isRef) { totalRef++;
                    if (isUser) match++; } else if (isUser) { userOutside++; }
            }
            if (totalRef === 0) {
                document.getElementById('qText').textContent = '📝 Нет эталона';
                return;
            }
            const pct = Math.round(2 * (match / totalRef) * (match / (totalRef + userOutside + 0.001)) /
                ((match / totalRef) + (match / (totalRef + userOutside + 0.001)) + 0.001) * 100);
            const fill = document.getElementById('qFill');
            const text = document.getElementById('qText');
            fill.style.width = pct + '%';
            if (pct > 60) { fill.style.background = '#2ecc71';
                text.textContent = `🌟 Отлично! ${pct}%`; } else if (pct > 35) { fill.style.background = '#f39c12';
                text.textContent = `👍 Хорошо! ${pct}%`; } else { fill.style.background = '#e67e22';
                text.textContent = `📝 Продолжай (${pct}%)`; }
        }

        function saveCanvasImage() {
            const link = document.createElement('a');
            link.download = 'calligraphy_' + new Date().toISOString().slice(0, 10) + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('💾 Рисунок сохранён');
        }

        // ============================================================
        // 9. ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================================

        function updateStats() {
            document.getElementById('totalCount').textContent = allPhrases.length;
            document.getElementById('redCount').textContent = allPhrases.filter(p => p.red !== false).length;
            document.getElementById('analogCount').textContent = allPhrases.filter(p => p.red === false).length;
            document.getElementById('dialogCount').textContent = allDialogues.length;
            document.getElementById('notebookCount').textContent = notebook.length;
        }

        // ============================================================
        // 10. ТОСТЫ
        // ============================================================

        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText =
                'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:10px 20px;border-radius:40px;z-index:9999;font-size:0.95rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);max-width:90%;text-align:center;';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1800);
        }

        // ============================================================
        // 11. ТЕМА
        // ============================================================

        let currentTheme = localStorage.getItem('chinese_theme') || 'dark';

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('chinese_theme', currentTheme);
            document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
        }

        function loadTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
        }

        // ============================================================
        // 12. СОБЫТИЯ
        // ============================================================

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                this.classList.add('active');
                const tabName = this.dataset.tab;
                document.getElementById('tab-' + tabName).classList.add('active');
                if (tabName === 'notebook') renderNotebook();
                if (tabName === 'dialogues') renderDialogues();
                if (tabName === 'hanzi') {
                    setTimeout(() => {
                        const input = document.getElementById('hanziInput');
                        if (input.value.trim()) {
                            const chars = [...input.value.trim()];
                            initHanziWriter(chars.slice(0, 4));
                        }
                    }, 100);
                }
                if (tabName === 'quiz') setTimeout(initQuiz, 50);
                if (tabName === 'canvas') setTimeout(initCanvas, 50);
                currentTab = tabName;
                localStorage.setItem('chinese_last_tab', tabName);
            };
        });

        // Восстановление последней вкладки
        const lastTab = localStorage.getItem('chinese_last_tab') || 'groups';
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.tab === lastTab);
        });
        document.querySelectorAll('.tab-content').forEach(tc => {
            tc.classList.toggle('active', tc.id === 'tab-' + lastTab);
        });

        document.getElementById('searchInput').oninput = function() {
            searchQuery = this.value;
            renderGroups();
        };

        document.querySelectorAll('#categoryButtons button').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('#categoryButtons button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                renderGroups();
            };
        });

        document.getElementById('notebookNav').onclick = function(e) {
            e.preventDefault();
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelector('[data-tab="notebook"]').classList.add('active');
            document.getElementById('tab-notebook').classList.add('active');
            renderNotebook();
        };

        // Hanzi
        document.getElementById('showHanziBtn').onclick = showHanzi;
        document.getElementById('repeatHanziBtn').onclick = repeatHanzi;
        document.getElementById('hanziInput').onkeydown = function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                showHanzi(); }
        };
        document.getElementById('hanziInput').oninput = function() {
            const val = this.value.trim();
            if (val.length > 0) {
                const chars = [...val];
                if (chars.length <= 4) initHanziWriter(chars);
                else { const limited = chars.slice(0, 4);
                    this.value = limited.join('');
                    initHanziWriter(limited); }
            } else initHanziWriter([]);
        };

        document.getElementById('speedSlider').oninput = function() {
            hanziSpeed = parseFloat(this.value);
            document.getElementById('speedValue').textContent = hanziSpeed.toFixed(1) + 'x';
            // Если есть активный Hanzi Writer, перезапускаем
            const input = document.getElementById('hanziInput');
            if (input.value.trim()) {
                const chars = [...input.value.trim()];
                if (chars.length > 4) chars.slice(0, 4);
                initHanziWriter(chars.slice(0, 4));
            }
        };

        // Дневник
        document.getElementById('clearNotebookBtn').onclick = clearNotebook;
        document.getElementById('exportNotebookBtn').onclick = exportNotebook;

        // Викторина
        document.getElementById('quizNext').onclick = nextQuestion;
        document.getElementById('quizRestart').onclick = restartQuiz;
        document.getElementById('quizHint').onclick = giveHint;
        document.querySelectorAll('#quizDifficulty button').forEach(btn => {
            btn.onclick = function() {
                setQuizDifficulty(this.dataset.level);
            };
        });

        // Каллиграфия
        document.getElementById('canvasClear').onclick = clearCanvas;
        document.getElementById('canvasUndo').onclick = undoCanvas;
        document.getElementById('canvasTrace').onclick = function() {
            if (exampleVisible) hideExample();
            else showExample();
        };
        document.getElementById('canvasCheck').onclick = checkQuality;
        document.getElementById('canvasSaveImg').onclick = saveCanvasImage;

        document.getElementById('brushSizeSlider').oninput = function() {
            brushSize = parseInt(this.value);
            document.getElementById('brushSizeValue').textContent = brushSize;
        };

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentColor = this.dataset.color;
            };
        });

        // Тема
        document.getElementById('themeToggle').onclick = toggleTheme;
        loadTheme();

        // ============================================================
        // 13. СТАРТ
        // ============================================================

        setTimeout(() => {
            renderGroups();
            renderDialogues();
            renderNotebook();
            updateStats();
            setTimeout(initCanvas, 100);
            setTimeout(() => initHanziWriter([]), 200);
            setTimeout(initQuiz, 300);
        }, 200);

        // Глобальные функции
        window.speakChinese = speakChinese;
        window.toggleNotebook = toggleNotebook;
        window.removeFromNotebook = removeFromNotebook;
        window.loadToHanzi = loadToHanzi;
        window.showToast = showToast;
        window.initQuiz = initQuiz;
        window.nextQuestion = nextQuestion;
        window.restartQuiz = restartQuiz;
        window.giveHint = giveHint;
        window.initHanziWriter = initHanziWriter;
        window.showHanzi = showHanzi;
        window.repeatHanzi = repeatHanzi;
        window.setQuizDifficulty = setQuizDifficulty;
        window.undoCanvas = undoCanvas;
        window.saveCanvasImage = saveCanvasImage;
        window.exportNotebook = exportNotebook;
        window.toggleTheme = toggleTheme;
    </script>

</body>
