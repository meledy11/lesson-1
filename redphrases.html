<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📕 Красная книга</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js">
    </script>
    <script src="redphrases.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: linear-gradient(145deg, #1a3a2a 0%, #0a1a0f 100%);
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 8px;
            color: #f5e6d3;
        }
        .container { max-width: 1100px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 25, 20, 0.85);
            padding: 8px 16px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
        }
        .top-bar .back-btn {
            background: #5a4a3a;
            color: #f7e05e;
            padding: 6px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #2a1a0a;
        }
        .top-bar .back-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2a1a0a; }
        .top-bar .title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-bar .notebook-link {
            background: #2ecc71;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #1a7a3a;
        }
        .top-bar .notebook-link:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a7a3a; }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            background: rgba(30, 25, 20, 0.6);
            padding: 6px 16px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .stats span { color: #b8956a; font-size: 0.85rem; }
        .stats strong { color: #ffd700; font-size: 1rem; }

        /* ===== ВКЛАДКИ ===== */
        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: rgba(45, 27, 14, 0.6);
            color: #b8956a;
            border: 2px solid rgba(255, 215, 0, 0.08);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        .tab-btn:hover { border-color: rgba(255, 215, 0, 0.2); }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
        }
        .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
        .tab-content.active { display: flex; }

        /* ===== СКРОЛЛ ===== */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #b8956a; border-radius: 4px; }

        /* ===== ГРУППЫ ===== */
        .search {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid rgba(255, 215, 0, 0.08);
            border-radius: 40px;
            background: rgba(30, 25, 20, 0.7);
            color: #f5e6d3;
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
            flex-shrink: 0;
        }
        .search::placeholder { color: #6b5a45; font-size: 1rem; }
        .search:focus { border-color: rgba(255, 215, 0, 0.2); }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .categories button {
            padding: 6px 14px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            border-radius: 30px;
            background: rgba(30, 25, 20, 0.4);
            color: #b8956a;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .categories button.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(30, 25, 20, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.04);
            margin-bottom: 6px;
            cursor: pointer;
        }
        .group-header .icon { font-size: 1.6rem; }
        .group-header .title { font-size: 1.2rem; font-weight: 600; color: #f5e6d3; }
        .group-header .count { margin-left: auto; color: #b8956a; font-size: 0.8rem; background: rgba(255, 255, 255, 0.04);
            padding: 2px 12px; border-radius: 30px; }
        .group-header .arrow { color: #b8956a; transition: transform 0.3s; font-size: 1rem; }
        .group-header.collapsed .arrow { transform: rotate(-90deg); }
        .group-phrases { overflow: hidden; transition: max-height 0.3s ease; max-height: 10000px; }
        .group-phrases.collapsed { max-height: 0; }

        .phrase-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 6px;
            border-left: 4px solid #ffd700;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .phrase-card .chinese {
            font-size: 2.2rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 80px;
        }
        .phrase-card .chinese .badge {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 30px;
            font-weight: 700;
        }
        .phrase-card .chinese .badge.red { background: rgba(220, 38, 38, 0.2); color: #ff6b6b; }
        .phrase-card .chinese .badge.analog { background: rgba(59, 130, 246, 0.15); color: #6ea8fe; }
        .phrase-card .info {
            display: flex;
            flex-direction: column;
            flex: 2;
            min-width: 120px;
        }
        .phrase-card .pinyin { font-size: 1rem; color: #d4a373; }
        .phrase-card .translation { font-size: 1.1rem; color: #d4c9a6; }
        .phrase-card .actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .phrase-card .actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
        }
        .phrase-card .actions button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2); }
        .phrase-card .actions .audio-btn { background: linear-gradient(135deg, #ff6b35, #ff8c42); color: white; }
        .phrase-card .actions .save-btn { background: #2ecc71; color: white; }
        .phrase-card .actions .save-btn.saved { background: #f39c12; }

        /* ===== ДИАЛОГИ ===== */
        .dialog-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 10px;
            border-left: 5px solid #3b82f6;
        }
        .dialog-card .title { font-size: 1.4rem; font-weight: 700; color: #f5e6d3; margin-bottom: 6px; }
        .dialog-card .phrases-list { font-size: 0.9rem; color: #b8956a; margin-bottom: 8px; }
        .dialog-card .phrases-list .dp { background: rgba(255, 255, 255, 0.04); padding: 3px 10px; border-radius: 8px;
            margin-right: 6px; display: inline-block; font-size: 0.9rem; }
        .dialog-card .phrases-list .dp.red { background: rgba(220, 38, 38, 0.15); color: #ff6b6b; }
        .dialog-line {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .dialog-line:last-child { border-bottom: none; }
        .dialog-line .sp { font-weight: 700; color: #3b82f6; min-width: 30px; font-size: 1rem; }
        .dialog-line .cn {
            font-size: 1.8rem;
            font-weight: 600;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
        }
        .dialog-line .py { font-size: 0.95rem; color: #d4a373; align-self: center; }
        .dialog-line .ru { font-size: 1.05rem; color: #d4c9a6; align-self: center; }
        .dialog-speak-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #1d4ed8;
            margin-top: 8px;
            font-family: inherit;
        }
        .dialog-speak-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1d4ed8; }

        /* ===== РИСОВАЛКА ===== */
        #tab-hanzi {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .hanzi-section {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .hanzi-section .input-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .hanzi-section .input-row input {
            flex: 1;
            min-width: 100px;
            padding: 10px 16px;
            border: 2px solid rgba(255, 215, 0, 0.1);
            border-radius: 40px;
            background: rgba(30, 25, 20, 0.6);
            color: #f5e6d3;
            font-size: 1.2rem;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            outline: none;
        }
        .hanzi-section .input-row input::placeholder { color: #6b5a45; font-size: 1rem; }
        .hanzi-section .input-row input:focus { border-color: rgba(255, 215, 0, 0.2); }
        .hanzi-section .input-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .hanzi-section .input-row button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2); }

        .hanzi-section .hanzi-wrapper {
            background: #fffef9;
            border-radius: 12px;
            padding: 4px;
            border: 2px solid #c8aa6e;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 200px;
        }
        .hanzi-section .hanzi-wrapper .hw-target {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1/1;
            max-height: 100%;
        }
        .hanzi-section .hanzi-wrapper .placeholder {
            color: #b8956a;
            font-size: 1.1rem;
            text-align: center;
            padding: 16px;
            position: absolute;
            pointer-events: none;
        }
        .hanzi-section .hanzi-wrapper .char-label {
            position: absolute;
            bottom: 8px;
            right: 12px;
            color: #b8956a;
            font-size: 0.7rem;
            opacity: 0.5;
            pointer-events: none;
        }

        /* ===== ДНЕВНИК ===== */
        #tab-notebook {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .notebook-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .notebook-container .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .notebook-container .header .count {
            background: rgba(255, 215, 0, 0.06);
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #b8956a;
        }
        .notebook-container .header .clear-btn {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }
        .notebook-container .list {
            flex: 1;
            overflow-y: auto;
        }
        .notebook-container .list::-webkit-scrollbar { width: 3px; }
        .notebook-container .list::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 4px; }

        .notebook-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            gap: 8px;
            cursor: pointer;
            border-radius: 8px;
        }
        .notebook-item:hover { background: rgba(255, 255, 255, 0.02); }
        .notebook-item .char {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            min-width: 40px;
        }
        .notebook-item .info {
            color: #d4c9a6;
            font-size: 0.9rem;
            flex: 1;
            min-width: 80px;
        }
        .notebook-item .info .pinyin { color: #d4a373; }
        .notebook-item .actions {
            display: flex;
            gap: 4px;
        }
        .notebook-item .actions button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }
        .notebook-item .actions button:active { transform: translateY(2px); box-shadow: 0 0 0 rgba(0, 0, 0, 0.2); }
        .notebook-item .actions .speak-btn { background: linear-gradient(135deg, #ff6b35, #ff8c42); color: white; }
        .notebook-item .actions .remove-btn { background: #e74c3c; color: white; font-weight: bold; font-size: 0.7rem; }

        .empty {
            text-align: center;
            padding: 20px;
            color: #b8956a;
            font-size: 1rem;
        }
        .empty .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; opacity: 0.4; }

        /* ===== КАЛЛИГРАФИЯ ===== */
        #tab-canvas { flex: 1; display: flex; flex-direction: column; }
        .canvas-container {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 12px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }
        .canvas-wrapper {
            background: #fffef9;
            border-radius: 12px;
            padding: 4px;
            border: 2px solid #c8aa6e;
            display: inline-block;
            max-width: 100%;
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1/1;
            touch-action: none;
        }
        .canvas-tools {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }
        .canvas-tools button {
            padding: 6px 16px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }
        .canvas-tools button:active { transform: translateY(2px); box-shadow: 0 0 0 rgba(0, 0, 0, 0.2); }
        .canvas-tools .clear-btn { background: #e74c3c; color: white; }
        .canvas-tools .trace-btn { background: #2980b9; color: white; }
        .canvas-tools .check-btn { background: #27ae60; color: white; }
        .canvas-tools .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 0;
            min-width: unset;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }
        .canvas-tools .color-btn.active { border-color: #ffd700; }
        .quality-bar {
            background: rgba(30, 25, 20, 0.4);
            height: 6px;
            border-radius: 10px;
            margin: 6px auto 4px;
            max-width: 200px;
            overflow: hidden;
        }
        .quality-fill { height: 100%; background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71); width: 0%; transition: width 0.5s ease; }
        .quality-text { font-size: 0.85rem; color: #b8956a; margin-top: 2px; }

        /* ========================================================== */
        /* ===== ВИКТОРИНА ===== */
        /* ========================================================== */
        #tab-quiz {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .quiz-container {
            background: rgba(30, 25, 20, 0.7);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255, 215, 0, 0.08);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }
        .quiz-container .q-number {
            font-size: 0.9rem;
            color: #b8956a;
            margin-bottom: 6px;
        }
        .quiz-container .q-chinese {
            font-size: 4rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .quiz-container .q-chinese:hover { text-shadow: 0 0 30px rgba(255, 215, 0, 0.1); }
        .quiz-container .q-pinyin {
            font-size: 1.2rem;
            color: #d4a373;
            margin-bottom: 12px;
        }
        .quiz-container .q-hint {
            font-size: 1rem;
            color: #b8956a;
            margin-bottom: 16px;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }
        @media (max-width: 500px) {
            .quiz-options {
                grid-template-columns: 1fr;
            }
        }
        .quiz-options button {
            padding: 14px 18px;
            border-radius: 16px;
            border: 2px solid rgba(255, 215, 0, 0.1);
            background: rgba(30, 25, 20, 0.6);
            color: #d4c9a6;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-align: center;
        }
        .quiz-options button:hover { border-color: rgba(255, 215, 0, 0.25); transform: scale(1.02); }
        .quiz-options button:active { transform: scale(0.97); }
        .quiz-options button.correct {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.1);
        }
        .quiz-options button.wrong {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.1);
        }
        .quiz-options button:disabled { cursor: default; opacity: 0.6; }
        .quiz-options button:disabled:hover { transform: none; }

        .quiz-score {
            font-size: 1.1rem;
            color: #b8956a;
            margin-top: 14px;
        }
        .quiz-score strong { color: #ffd700; }

        .quiz-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .quiz-controls button {
            padding: 8px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
            transition: 0.15s;
        }
        .quiz-controls button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2); }
        .quiz-controls .btn-next {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .quiz-controls .btn-restart {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        .quiz-controls .btn-hint {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 600px) {
            body { padding: 4px; }
            .top-bar { padding: 6px 12px; }
            .top-bar .title { font-size: 1.2rem; }

<body>

    <div class="container">

        <div class="top-bar">
            <a href="index.html" class="back-btn">◀ На главную</a>
            <span class="title">📕 Красная книга</span>
            <a href="#" class="notebook-link" id="notebookNav">📓 Дневник</a>
        </div>

        <div class="stats" id="statsBar">
            <span>Всего: <strong id="totalCount">0</strong></span>
            <span>Красная: <strong id="redCount">0</strong></span>
            <span>Аналоги: <strong id="analogCount">0</strong></span>
            <span>Диалогов: <strong id="dialogCount">0</strong></span>
            <span>В дневнике: <strong id="notebookCount">0</strong></span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="groups">📚 Группы</button>
            <button class="tab-btn" data-tab="dialogues">💬 Диалоги</button>
            <button class="tab-btn" data-tab="hanzi">✍️ Рисовалка</button>
            <button class="tab-btn" data-tab="notebook">📓 Дневник</button>
            <button class="tab-btn" data-tab="quiz">🎮 Викторина</button>
            <button class="tab-btn" data-tab="canvas">🖌️ Каллиграфия</button>
        </div>

        <!-- ===== ГРУППЫ ===== -->
        <div class="tab-content active" id="tab-groups">
            <input class="search" id="searchInput" placeholder="🔍 Поиск..." />
            <div class="categories" id="categoryButtons">
                <button data-cat="all" class="active">Все</button>
                <button data-cat="phrase">Фразы</button>
                <button data-cat="travel">Путешествия</button>
                <button data-cat="food">Еда</button>
                <button data-cat="work">Работа</button>
            </div>
            <div class="scroll-area" id="groupsContainer"></div>
        </div>

        <!-- ===== ДИАЛОГИ ===== -->
        <div class="tab-content" id="tab-dialogues">
            <div class="scroll-area" id="dialoguesContainer"></div>
        </div>

        <!-- ===== РИСОВАЛКА ===== -->
        <div class="tab-content" id="tab-hanzi">
            <div class="hanzi-section">
                <div class="input-row">
                    <input type="text" id="hanziInput" placeholder="Введите иероглиф(ы)..." maxlength="2" autocomplete="off">
                    <button id="showHanziBtn">✍️ Показать</button>
                </div>
                <div class="hanzi-wrapper" id="hanziWrapper">
                    <div class="placeholder" id="hanziPlaceholder">📖 Введите иероглиф и нажмите "Показать"</div>
                    <div class="hw-target" id="hwTarget"></div>
                    <div class="char-label" id="charLabel"></div>
                </div>
            </div>
        </div>

        <!-- ===== ДНЕВНИК ===== -->
        <div class="tab-content" id="tab-notebook">
            <div class="notebook-container">
                <div class="header">
                    <span>📓 Сохранённые</span>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <span class="count" id="notebookCountLabel">0</span>
                        <button class="clear-btn" id="clearNotebookBtn">Очистить</button>
                    </div>
                </div>
                <div class="list" id="savedList">
                    <div class="empty">
                        <span class="icon">📓</span>
                        Сохраняйте фразы и иероглифы для повторения
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================================== -->
        <!-- ВИКТОРИНА -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-quiz">
            <div class="quiz-container" id="quizContainer">
                <div class="q-number" id="qNumber">1 / 10</div>
                <div class="q-chinese" id="qChinese" onclick="speakChinese(this.textContent)">—</div>
                <div class="q-pinyin" id="qPinyin">—</div>
                <div class="q-hint" id="qHint">Выберите правильный перевод</div>
                <div class="quiz-options" id="quizOptions"></div>
                <div class="quiz-score" id="quizScore">✅ 0 / 0</div>
                <div class="quiz-controls">
                    <button class="btn-next" id="quizNext">➜ Следующий</button>
                    <button class="btn-restart" id="quizRestart">🔄 Заново</button>
                    <button class="btn-hint" id="quizHint">💡 Подсказка</button>
                </div>
            </div>
        </div>

        <!-- ===== КАЛЛИГРАФИЯ ===== -->
        <div class="tab-content" id="tab-canvas">
            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="calligraphyCanvas"></canvas>
                </div>
                <div class="quality-bar"><div class="quality-fill" id="qFill"></div></div>
                <div class="quality-text" id="qText">🖌️ Рисуй иероглифы кистью</div>
                <div class="canvas-tools">
                    <button class="clear-btn" id="canvasClear">🧽 Очистить</button>
                    <button class="trace-btn" id="canvasTrace">👁️ Образец</button>
                    <button class="check-btn" id="canvasCheck">✅ Проверить</button>
                    <button class="color-btn active" data-color="#1a1a1a" style="background:#1a1a1a;"></button>
                    <button class="color-btn" data-color="#c0392b" style="background:#c0392b;"></button>
                    <button class="color-btn" data-color="#d4a017" style="background:#d4a017;"></button>
                    <button class="color-btn" data-color="#2471a3" style="background:#2471a3;"></button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. ДАННЫЕ
        // ============================================================

        let allPhrases = [];
        let allDialogues = [];
        let notebook = JSON.parse(localStorage.getItem('chinese_redbook_notebook') || '[]');

        if (typeof redBookData !== 'undefined') allPhrases = redBookData;
        else if (typeof allPhrases !== 'undefined') allPhrases = allPhrases;
        else if (typeof redPhrases !== 'undefined') allPhrases = redPhrases;

        if (typeof redBookDialogues !== 'undefined') allDialogues = redBookDialogues;
        else if (typeof dialogues !== 'undefined') allDialogues = dialogues;

        const groups = [
            { id: 'decisions', icon: '💭', title: 'Решения', keywords: ['决定', '选好', '想好', '同意', '反对', '答应', '保证'] },
            { id: 'greetings', icon: '👋', title: 'Приветствия', keywords: ['你好', '怎么样', '见', '好久', '最近', '欢迎'] },
            { id: 'feelings', icon: '😊', title: 'Чувства', keywords: ['喜欢', '讨厌', '累', '饿', '饱', '困', '饿死', '累死'] },
            { id: 'actions', icon: '🏃', title: 'Действия', keywords: ['走', '回去', '过来', '过去', '去', '来', '开'] },
            { id: 'requests', icon: '🙏', title: 'Просьбы', keywords: ['帮', '忙', '送', '陪', '让', '借'] },
            { id: 'time', icon: '⏰', title: 'Время', keywords: ['时间', '赶', '急', '等', '迟', '晚', '早', '快', '慢', '马上'] },
            { id: 'food', icon: '🍜', title: 'Еда', keywords: ['吃', '喝', '饭', '饿', '饱', '火锅', '买单', '结账'] },
            { id: 'work', icon: '💼', title: 'Работа', keywords: ['工作', '学习', '会议', '安排', '记录', '主持', '议程', '项目'] },
            { id: 'weather', icon: '🌤️', title: 'Погода', keywords: ['雨', '雪', '风', '天', '晴', '阴', '云', '冷', '热'] },
            { id: 'communication', icon: '📱', title: 'Общение', keywords: ['说', '话', '电话', '沟通', '联系', '确认', '邮件',
                    '发送'
                ] },
            { id: 'travel', icon: '✈️', title: 'Путешествия', keywords: ['路', '机场', '火车站', '地铁', '票', '顺风', '安全',
                    '小心'
                ] },
            { id: 'emotions', icon: '❤️', title: 'Эмоции', keywords: ['开心', '难过', '担心', '紧张', '兴奋', '感动', '失望',
                    '生气'
                ] }
        ];

        let searchQuery = '';
        let collapsedGroups = new Set();
        let currentCategory = 'all';

        // ============================================================
        // 2. ГРУППЫ
        // ============================================================

        function getPhrasesForGroup(group) {
            return allPhrases.filter(p => {
                const text = p.chinese + ' ' + p.pinyin + ' ' + p.translation;
                return group.keywords.some(kw => text.includes(kw));
            });
        }

        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            updateStats();
            let html = '';
            let visible = 0;

            for (const group of groups) {
                let phrases = getPhrasesForGroup(group);
                if (currentCategory !== 'all') phrases = phrases.filter(p => p.category === currentCategory);
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    phrases = phrases.filter(p =>
                        p.chinese.includes(q) || p.pinyin.toLowerCase().includes(q) ||
                        p.translation.toLowerCase().includes(q) || group.title.toLowerCase().includes(q)
                    );
                }
                if (phrases.length === 0) continue;
                visible++;

                const isCollapsed = collapsedGroups.has(group.id);
                html += `
                            <div class="group-container">
                                <div class="group-header ${isCollapsed ? 'collapsed' : ''}" data-group="${group.id}">
                                    <span class="icon">${group.icon}</span>
                                    <span class="title">${group.title}</span>
                                    <span class="count">${phrases.length}</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <div class="group-phrases ${isCollapsed ? 'collapsed' : ''}">
                        `;

                for (const p of phrases) {
                    const isRed = p.red !== false;
                    const isSaved = notebook.some(n => n.char === p.chinese);
                    const safe = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    html += `
                                <div class="phrase-card">
                                    <div class="chinese" onclick="speakChinese('${safe}')">
                                        ${p.chinese}
                                        <span class="badge ${isRed ? 'red' : 'analog'}">${isRed ? '🔴' : '🔵'}</span>
                                    </div>
                                    <div class="info">
                                        <div class="pinyin">${p.pinyin}</div>
                                        <div class="translation">${p.translation}</div>
                                    </div>
                                    <div class="actions">
                                        <button class="audio-btn" onclick="speakChinese('${safe}')">🔊</button>
                                        <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleNotebook('${safe}', '${p.pinyin}', '${p.translation}')">${isSaved ? '✓' : '📓'}</button>
                                    </div>
                                </div>
                            `;
                }

                html += `
                                </div>
                            </div>
                        `;
            }

            container.innerHTML = visible === 0 ?
                `<div class="empty"><span class="icon">🔍</span>Ничего не найдено</div>` : html;

            document.querySelectorAll('.group-header').forEach(h => {
                h.onclick = function() {
                    const id = this.dataset.group;
                    const phrases = this.nextElementSibling;
                    const isCollapsed = phrases.classList.contains('collapsed');
                    phrases.classList.toggle('collapsed');
                    this.classList.toggle('collapsed');
                    if (isCollapsed) collapsedGroups.delete(id);
                    else collapsedGroups.add(id);
                };
            });
        }

        // ============================================================
        // 3. ДИАЛОГИ
        // ============================================================

        function renderDialogues() {
            const container = document.getElementById('dialoguesContainer');
            if (allDialogues.length === 0) {
                container.innerHTML = `<div class="empty"><span class="icon">💬</span>Диалогов нет</div>`;
                return;
            }

            let html = '';
            for (const d of allDialogues) {
                let phrases = '';
                if (d.phrases) {
                    phrases = d.phrases.map(p => {
                        const isRed = allPhrases.some(fp => fp.chinese === p && fp.red !== false);
                        return `<span class="dp ${isRed ? 'red' : ''}">${p}</span>`;
                    }).join(' ');
                }

                let lines = '';
                for (const line of d.lines) {
                    const safe = line.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    lines += `
                                <div class="dialog-line">
                                    <span class="sp">${line.speaker}</span>
                                    <span class="cn" onclick="speakChinese('${safe}')">${line.chinese}</span>
                                    <span class="py">${line.pinyin}</span>
                                    <span class="ru">— ${line.russian}</span>
                                </div>
                            `;
                }

                const full = d.lines.map(l => l.chinese).join('。');
                const safeFull = full.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                html += `
                            <div class="dialog-card">
                                <div class="title">💬 ${d.title}</div>
                                ${phrases ? `<div class="phrases-list">📌 ${phrases}</div>` : ''}
                                ${lines}
                                <button class="dialog-speak-btn" onclick="speakChinese('${safeFull}')">🔊 Весь диалог</button>
                            </div>
                        `;
            }
            container.innerHTML = html;
        }

        // ============================================================
        // 4. ДНЕВНИК
        // ============================================================

        function toggleNotebook(char, pinyin, translation) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                showToast(`❌ "${char}" удалён`);
            } else {
                notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                showToast(`✅ "${char}" сохранён`);
            }
            localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
            renderGroups();
            renderNotebook();
            updateStats();
        }

        function renderNotebook() {
            const container = document.getElementById('savedList');
            if (notebook.length === 0) {
                container.innerHTML =
                    `<div class="empty"><span class="icon">📓</span>Сохраняйте фразы и иероглифы для повторения</div>`;
                return;
            }

            let html = '';
            for (const item of notebook) {
                const safe = item.char.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                html += `
                            <div class="notebook-item" onclick="loadToHanzi('${safe}')">
                                <span class="char">${item.char}</span>
                                <span class="info">
                                    <span class="pinyin">${item.pinyin || ''}</span>
                                    ${item.translation ? `— ${item.translation}` : ''}
                                </span>
                                <div class="actions">
                                    <button class="speak-btn" onclick="event.stopPropagation(); speakChinese('${safe}')">🔊</button>
                                    <button class="remove-btn" onclick="event.stopPropagation(); removeFromNotebook('${safe}')">✖</button>
                                </div>
                            </div>
                        `;
            }
            container.innerHTML = html;
            document.getElementById('notebookCountLabel').textContent = notebook.length;
        }

        function removeFromNotebook(char) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast(`❌ "${char}" удалён`);
            }
        }

        function clearNotebook() {
            if (notebook.length === 0) return;
            if (confirm('Удалить всё из дневника?')) {
                notebook = [];
                localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
                renderNotebook();
                updateStats();
                showToast('🗑️ Дневник очищен');
            }
        }

        // ============================================================
        // 5. HANZI WRITER
        // ============================================================

        let hanziWriter = null;

        function initHanziWriter(chars) {
            const target = document.getElementById('hwTarget');
            const placeholder = document.getElementById('hanziPlaceholder');
            const wrapper = document.getElementById('hanziWrapper');
            const label = document.getElementById('charLabel');

            if (hanziWriter) {
                try { hanziWriter.destroy(); } catch (e) {}
                hanziWriter = null;
            }

            if (!chars || chars.length === 0) {
                target.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.textContent = '📖 Введите иероглиф и нажмите "Показать"';
                label.textContent = '';
                return;
            }

            target.style.display = 'block';
            placeholder.style.display = 'none';
            label.textContent = chars.length + ' иероглиф' + (chars.length > 1 ? 'а' : '');

            try {
                const size = Math.min(wrapper.clientWidth - 16, 400);
                const text = chars.join('');

                hanziWriter = HanziWriter.create(target, text, {
                    width: size,
                    height: size,
                    padding: 6,
                    strokeColor: '#1a1a1a',
                    radicalColor: '#c0392b',
                    strokeAnimationSpeed: 1.0,
                });

                setTimeout(() => {
                    if (hanziWriter) hanziWriter.animateCharacter();
                }, 300);

            } catch (e) {
                placeholder.style.display = 'block';
                placeholder.textContent = '❌ Ошибка: ' + e.message;
                target.style.display = 'none';
                label.textContent = '';
            }
        }

        function showHanzi() {
            const input = document.getElementById('hanziInput');
            const raw = input.value.trim();
            if (!raw) {
                document.getElementById('hanziPlaceholder').textContent = '⚠️ Введите иероглиф(ы)';
                document.getElementById('hanziPlaceholder').style.display = 'block';
                document.getElementById('hwTarget').style.display = 'none';
                document.getElementById('charLabel').textContent = '';
                return;
            }

            const chars = [...raw];
            if (chars.length > 2) {
                const limited = chars.slice(0, 2);
                document.getElementById('hanziInput').value = limited.join('');
                initHanziWriter(limited);
                return;
            }

            initHanziWriter(chars);

            for (const char of chars) {
                if (!notebook.some(n => n.char === char)) {
                    let pinyin = '',
                        translation = '';
                    const found = allPhrases.find(p => p.chinese === char);
                    if (found) { pinyin = found.pinyin;
                        translation = found.translation; }
                    notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                }
            }
            localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
            renderNotebook();
            updateStats();
            showToast(`✅ Сохранено: ${chars.join(', ')}`);
        }

        function loadToHanzi(char) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelector('[data-tab="hanzi"]').classList.add('active');
            document.getElementById('tab-hanzi').classList.add('active');
            document.getElementById('hanziInput').value = char;
            setTimeout(() => initHanziWriter([char]), 100);
        }

        // ============================================================
        // 6. ОЗВУЧКА
        // ============================================================

        let chineseVoice = null;

        function speakChinese(text) {
            if (!text || !window.speechSynthesis) return;
            try { window.speechSynthesis.cancel(); } catch (e) {}
            setTimeout(() => {
                try {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'zh-CN';
                    u.rate = 0.7;
                    if (!chineseVoice) {
                        const voices = speechSynthesis.getVoices();
                        chineseVoice = voices.find(v => v.lang.startsWith('zh'));
                    }
                    if (chineseVoice) u.voice = chineseVoice;
                    window.speechSynthesis.speak(u);
                } catch (e) {}
            }, 50);
        }
        window.speakChinese = speakChinese;

        // ============================================================
        // 7. ВИКТОРИНА
        // ============================================================

        let quizQuestions = [];
        let quizIndex = 0;
        let quizScore = 0;
        let quizTotal = 0;
        let quizAnswered = false;
        let quizHintUsed = false;

        function initQuiz() {
            const allWords = allPhrases.filter(p => p.red !== false);
            if (allWords.length < 4) {
                document.getElementById('quizContainer').innerHTML =
                    `<div class="empty"><span class="icon">🎮</span>Недостаточно фраз для викторины</div>`;
                return;
            }

            // Перемешиваем и берём 10 вопросов
            const shuffled = [...allWords].sort(() => Math.random() - 0.5);
            quizQuestions = shuffled.slice(0, 10);
            quizTotal = quizQuestions.length;
            quizIndex = 0;
            quizScore = 0;
            quizAnswered = false;
            quizHintUsed = false;

            document.getElementById('quizRestart').style.display = 'inline-block';
            showQuestion();
        }

        function showQuestion() {
            if (quizIndex >= quizTotal) {
                document.getElementById('qNumber').textContent = '🎉';
                document.getElementById('qChinese').textContent = '🏆';
                document.getElementById('qPinyin').textContent = '';
                document.getElementById('qHint').textContent = `Ты ответил ${quizScore} из ${quizTotal}!`;
                document.getElementById('quizOptions').innerHTML = '';
                document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
                document.getElementById('quizNext').style.display = 'none';
                return;
            }

            const q = quizQuestions[quizIndex];
            const correct = q.translation;

            // Собираем варианты
            const allTranslations = allPhrases.filter(p => p.red !== false).map(p => p.translation);
            const others = allTranslations.filter(t => t !== correct);
            const shuffledOthers = others.sort(() => Math.random() - 0.5).slice(0, 3);
            const options = [correct, ...shuffledOthers].sort(() => Math.random() - 0.5);

            document.getElementById('qNumber').textContent = `${quizIndex + 1} / ${quizTotal}`;
            document.getElementById('qChinese').textContent = q.chinese;
            document.getElementById('qPinyin').textContent = q.pinyin;
            document.getElementById('qHint').textContent = 'Выберите правильный перевод';
            document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
            document.getElementById('quizNext').style.display = 'none';
            quizAnswered = false;
            quizHintUsed = false;

            const container = document.getElementById('quizOptions');
            container.innerHTML = '';

            for (const opt of options) {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.dataset.correct = opt === correct ? 'true' : 'false';
                btn.onclick = function() {
                    if (quizAnswered) return;
                    quizAnswered = true;
                    const isCorrect = this.dataset.correct === 'true';

                    // Блокируем все кнопки
                    document.querySelectorAll('#quizOptions button').forEach(b => b.disabled = true);

                    if (isCorrect) {
                        quizScore++;
                        this.classList.add('correct');
                        speakChinese(q.chinese);
                    } else {
                        this.classList.add('wrong');
                        // Показываем правильный ответ
                        document.querySelectorAll('#quizOptions button').forEach(b => {
                            if (b.dataset.correct === 'true') b.classList.add('correct');
                        });
                        speakChinese(q.chinese);
                    }

                    document.getElementById('quizScore').innerHTML = `✅ ${quizScore} / ${quizTotal}`;
                    document.getElementById('quizNext').style.display = 'inline-block';
                };
                container.appendChild(btn);
            }
        }

        function nextQuestion() {
            if (quizAnswered) {
                quizIndex++;
                showQuestion();
            }
        }

        function restartQuiz() {
            initQuiz();
        }

        function giveHint() {
            if (quizAnswered || quizHintUsed) return;
            quizHintUsed = true;

            const q = quizQuestions[quizIndex];
            const correct = q.translation;

            document.querySelectorAll('#quizOptions button').forEach(btn => {
                if (btn.dataset.correct === 'true') {
                    btn.style.borderColor = '#ffd700';
                    btn.style.boxShadow = '0 0 30px rgba(255,215,0,0.2)';
                    btn.style.background = 'rgba(255,215,0,0.05)';
                }
            });

            // Через 2 секунды убираем подсветку
            setTimeout(() => {
                document.querySelectorAll('#quizOptions button').forEach(btn => {
                    if (btn.dataset.correct === 'true') {
                        btn.style.borderColor = '';
                        btn.style.boxShadow = '';
                        btn.style.background = '';
                    }
                });
            }, 2000);

            showToast('💡 Подсказка: посмотри на выделенный вариант');
        }

        // ============================================================
        // 8. КАЛЛИГРАФИЯ (сокращено)
        // ============================================================

        let canvas, ctx, isDrawing = false,
            lastX, lastY, lastWidth, lastTime, strokeLen = 0;
        let canvasHistory = [];
        let currentColor = '#1a1a1a';
        let canvasRefData = null;
        let exampleVisible = false;

        function initCanvas() {
            canvas = document.getElementById('calligraphyCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const size = Math.min(rect.width - 16, 450);
            canvas.width = canvas.height = size;
            ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            setupDrawing();
            document.getElementById('qFill').style.width = '0%';
            document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы кистью';
            canvasHistory = [];
        }

        function drawGrid(ctx, size) {
            const p = 20,
                c = size / 2;
            ctx.save();
            ctx.strokeStyle = '#e8e0d8';
            ctx.lineWidth = 1;
            ctx.strokeRect(p, p, size - p * 2, size - p * 2);
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(c, p);
            ctx.lineTo(c, size - p);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p, c);
            ctx.lineTo(size - p, c);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        function setupDrawing() {
            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                return { x: (e.clientX - rect.left) * canvas.width / rect.width, y: (e.clientY - rect.top) * canvas
                        .height / rect.height };
            }

            function start(e) {
                e.preventDefault();
                isDrawing = true;
                const p = getPos(e);
                lastX = p.x;
                lastY = p.y;
                lastTime = performance.now();
                lastWidth = 8;
                saveCanvasState();
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                const p = getPos(e);
                const now = performance.now();
                const dt = Math.max(1, now - lastTime);
                const dist = Math.hypot(p.x - lastX, p.y - lastY);
                const speed = dist / dt;
                strokeLen += dist;

                let w = Math.max(2, Math.min(16, 12 / (1 + speed * 0.3) + 2));
                if (strokeLen < 15) w *= (0.4 + 0.6 * (strokeLen / 15));

                ctx.save();
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = w;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                ctx.restore();

                lastX = p.x;
                lastY = p.y;
                lastTime = now;
            }

            function stop() {
                if (!isDrawing) return;
                isDrawing = false;
                saveCanvasState();
            }

            canvas.addEventListener('pointerdown', start);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', stop);
            canvas.addEventListener('pointerleave', stop);
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('mouseleave', stop);
        }

        function saveCanvasState() {
            canvasHistory.push(canvas.toDataURL());
            if (canvasHistory.length > 20) canvasHistory.shift();
        }

        function clearCanvas() {
            const size = canvas.width;
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            document.getElementById('qFill').style.width = '0%';
            document.getElementById('qText').textContent = '🧽 Очищено';
            document.getElementById('canvasTrace').textContent = '👁️ Образец';
            canvasHistory = [];
        }

        function showExample() {
            const char = prompt('Введите иероглиф для образца:', '永');
            if (!char || char.length !== 1) return;
            clearCanvas();
            const size = canvas.width;
            ctx.save();
            ctx.globalAlpha = 0.25;
            ctx.fillStyle = '#9b59b6';
            ctx.font = `900 ${size * 0.7}px "Noto Sans CJK SC", "KaiTi", "STKaiti", serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, size / 2, size / 2 + size * 0.02);
            ctx.restore();
            canvasRefData = ctx.getImageData(0, 0, size, size);
            exampleVisible = true;
            document.getElementById('canvasTrace').textContent = '🙈 Скрыть';
            document.getElementById('qText').textContent = `🖌️ Обводи образец "${char}"`;
        }

        function hideExample() {
            const size = canvas.width;
            ctx.fillStyle = '#fffef9';
            ctx.fillRect(0, 0, size, size);
            drawGrid(ctx, size);
            canvasRefData = null;
            exampleVisible = false;
            document.getElementById('canvasTrace').textContent = '👁️ Образец';
            document.getElementById('qText').textContent = '🖌️ Рисуй иероглифы кистью';
        }

        function checkQuality() {
            if (!canvasRefData) {
                document.getElementById('qText').textContent = '👁️ Сначала покажи образец';
                return;
            }
            const size = canvas.width;
            const current = ctx.getImageData(0, 0, size, size);
            const dRef = canvasRefData.data;
            const dCur = current.data;
            let match = 0,
                totalRef = 0,
                userOutside = 0;
            const threshold = 235;
            for (let i = 0; i < dRef.length; i += 4) {
                const isRef = (dRef[i] < threshold || dRef[i + 1] < threshold || dRef[i + 2] < threshold);
                const isUser = (dCur[i] < threshold || dCur[i + 1] < threshold || dCur[i + 2] < threshold);
                if (isRef) { totalRef++;
                    if (isUser) match++; } else if (isUser) { userOutside++; }
            }
            if (totalRef === 0) {
                document.getElementById('qText').textContent = '📝 Нет эталона';
                return;
            }
            const pct = Math.round(2 * (match / totalRef) * (match / (totalRef + userOutside + 0.001)) /
                ((match / totalRef) + (match / (totalRef + userOutside + 0.001)) + 0.001) * 100);
            const fill = document.getElementById('qFill');
            const text = document.getElementById('qText');
            fill.style.width = pct + '%';
            if (pct > 60) { fill.style.background = '#2ecc71';
                text.textContent = `🌟 Отлично! ${pct}%`; } else if (pct > 35) { fill.style.background = '#f39c12';
                text.textContent = `👍 Хорошо! ${pct}%`; } else { fill.style.background = '#e67e22';
                text.textContent = `📝 Продолжай (${pct}%)`; }
        }

        // ============================================================
        // 9. ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================================

        function updateStats() {
            document.getElementById('totalCount').textContent = allPhrases.length;
            document.getElementById('redCount').textContent = allPhrases.filter(p => p.red !== false).length;
            document.getElementById('analogCount').textContent = allPhrases.filter(p => p.red === false).length;
            document.getElementById('dialogCount').textContent = allDialogues.length;
            document.getElementById('notebookCount').textContent = notebook.length;
        }

        // ============================================================
        // 10. ТОСТЫ
        // ============================================================

        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText =
                'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:10px 20px;border-radius:40px;z-index:9999;font-size:0.95rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1800);
        }

        // ============================================================
        // 11. СОБЫТИЯ
        // ============================================================

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
                if (this.dataset.tab === 'notebook') renderNotebook();
                if (this.dataset.tab === 'dialogues') renderDialogues();
                if (this.dataset.tab === 'hanzi') {
                    setTimeout(() => {
                        const input = document.getElementById('hanziInput');
                        if (input.value.trim()) {
                            const chars = [...input.value.trim()];
                            initHanziWriter(chars.slice(0, 2));
                        }
                    }, 100);
                }
                if (this.dataset.tab === 'quiz') setTimeout(initQuiz, 50);
                if (this.dataset.tab === 'canvas') setTimeout(initCanvas, 50);
            };
        });

        document.getElementById('searchInput').oninput = function() {
            searchQuery = this.value;
            renderGroups();
        };

        document.querySelectorAll('#categoryButtons button').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('#categoryButtons button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.cat;
                renderGroups();
            };
        });

        document.getElementById('notebookNav').onclick = function(e) {
            e.preventDefault();
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelector('[data-tab="notebook"]').classList.add('active');
            document.getElementById('tab-notebook').classList.add('active');
            renderNotebook();
        };

        // Hanzi
        document.getElementById('showHanziBtn').onclick = showHanzi;
        document.getElementById('hanziInput').onkeydown = function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                showHanzi(); }
        };
        document.getElementById('hanziInput').oninput = function() {
            const val = this.value.trim();
            if (val.length > 0) {
                const chars = [...val];
                if (chars.length <= 2) initHanziWriter(chars);
                else { const limited = chars.slice(0, 2);
                    this.value = limited.join('');
                    initHanziWriter(limited); }
            } else initHanziWriter([]);
        };

        document.getElementById('clearNotebookBtn').onclick = clearNotebook;

        // Викторина
        document.getElementById('quizNext').onclick = nextQuestion;
        document.getElementById('quizRestart').onclick = restartQuiz;
        document.getElementById('quizHint').onclick = giveHint;

        // Каллиграфия
        document.getElementById('canvasClear').onclick = clearCanvas;
        document.getElementById('canvasTrace').onclick = function() {
            if (exampleVisible) hideExample();
            else showExample();
        };
        document.getElementById('canvasCheck').onclick = checkQuality;

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentColor = this.dataset.color;
            };
        });

        // ============================================================
        // 12. СТАРТ
        // ============================================================

        setTimeout(() => {
            renderGroups();
            renderDialogues();
            renderNotebook();
            updateStats();
            setTimeout(initCanvas, 100);
            setTimeout(() => initHanziWriter([]), 200);
            setTimeout(initQuiz, 300);
        }, 200);

        // Глобальные функции
        window.speakChinese = speakChinese;
        window.toggleNotebook = toggleNotebook;
        window.removeFromNotebook = removeFromNotebook;
        window.loadToHanzi = loadToHanzi;
        window.showToast = showToast;
        window.initQuiz = initQuiz;
        window.nextQuestion = nextQuestion;
        window.restartQuiz = restartQuiz;
        window.giveHint = giveHint;
    </script>
