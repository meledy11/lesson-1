<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📕 Красная книга</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js">
    </script>
    <script src="redphrases.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            background: linear-gradient(145deg, #1a3a2a 0%, #0a1a0f 100%);
            font-family: system-ui, 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 8px;
            color: #f5e6d3;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 25, 20, 0.85);
            padding: 10px 20px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .top-bar .back-btn {
            background: #5a4a3a;
            color: #f7e05e;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 3px 0 #2a1a0a;
        }
        .top-bar .back-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2a1a0a;
        }
        .top-bar .title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-bar .notebook-link {
            background: #2ecc71;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 3px 0 #1a7a3a;
        }
        .top-bar .notebook-link:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a7a3a;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            background: rgba(30, 25, 20, 0.6);
            padding: 8px 20px;
            border-radius: 40px;
            margin-bottom: 8px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 215, 0, 0.06);
            backdrop-filter: blur(5px);
        }
        .stats span {
            color: #b8956a;
            font-size: 1rem;
        }
        .stats strong {
            color: #ffd700;
            font-size: 1.2rem;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: rgba(45, 27, 14, 0.6);
            color: #b8956a;
            border: 2px solid rgba(255, 215, 0, 0.08);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            font-family: inherit;
            backdrop-filter: blur(5px);
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn:hover {
            border-color: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
        }
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .tab-content.active {
            display: flex;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-area::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: #b8956a;
            border-radius: 4px;
        }

        .search {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(255, 215, 0, 0.08);
            border-radius: 40px;
            background: rgba(30, 25, 20, 0.7);
            color: #f5e6d3;
            font-size: 1.2rem;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
            flex-shrink: 0;
        }
        .search::placeholder {
            color: #6b5a45;
            font-size: 1.1rem;
        }
        .search:focus {
            border-color: rgba(255, 215, 0, 0.2);
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .categories button {
            padding: 8px 16px;
            border: 2px solid rgba(255, 215, 0, 0.06);
            border-radius: 30px;
            background: rgba(30, 25, 20, 0.4);
            color: #b8956a;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .categories button.active {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            border-color: #ff6b35;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: rgba(30, 25, 20, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.04);
            margin-bottom: 6px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .group-header:hover {
            background: rgba(30, 25, 20, 0.7);
        }
        .group-header .icon {
            font-size: 2rem;
        }
        .group-header .title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #f5e6d3;
        }
        .group-header .count {
            margin-left: auto;
            color: #b8956a;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 14px;
            border-radius: 30px;
        }
        .group-header .arrow {
            color: #b8956a;
            transition: transform 0.3s;
            font-size: 1.2rem;
        }
        .group-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .group-phrases {
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 10000px;
        }
        .group-phrases.collapsed {
            max-height: 0;
        }

        .phrase-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 8px;
            border-left: 6px solid #ffd700;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .phrase-card:hover {
            transform: translateX(4px);
            background: rgba(30, 25, 20, 0.75);
        }
        .phrase-card .chinese {
            font-size: 3.4rem;
            font-weight: 700;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 100px;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.2;
        }
        .phrase-card .chinese:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .phrase-card .chinese .badge {
            font-size: 0.7rem;
            padding: 3px 12px;
            border-radius: 30px;
            font-weight: 700;
        }
        .phrase-card .chinese .badge.red {
            background: rgba(220, 38, 38, 0.2);
            color: #ff6b6b;
        }
        .phrase-card .chinese .badge.analog {
            background: rgba(59, 130, 246, 0.15);
            color: #6ea8fe;
        }
        .phrase-card .info {
            display: flex;
            flex-direction: column;
            flex: 2;
            min-width: 150px;
        }
        .phrase-card .pinyin {
            font-size: 1.3rem;
            color: #b8956a;
        }
        .phrase-card .translation {
            font-size: 1.4rem;
            color: #d4c9a6;
        }
        .phrase-card .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .phrase-card .actions button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .phrase-card .actions button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
        }
        .phrase-card .actions .audio-btn {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
        }
        .phrase-card .actions .save-btn {
            background: #2ecc71;
            color: white;
        }
        .phrase-card .actions .save-btn.saved {
            background: #f39c12;
        }

        .dialog-card {
            background: rgba(30, 25, 20, 0.6);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 12px;
            border-left: 6px solid #3b82f6;
        }
        .dialog-card .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f5e6d3;
            margin-bottom: 8px;
        }
        .dialog-card .category-tag {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 3px 12px;
            border-radius: 30px;
            color: #b8956a;
            margin-left: 10px;
        }
        .dialog-card .phrases-list {
            font-size: 1.1rem;
            color: #b8956a;
            margin-bottom: 10px;
        }
        .dialog-card .phrases-list .dp {
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px;
            border-radius: 8px;
            margin-right: 6px;
            display: inline-block;
            font-size: 1.1rem;
        }
        .dialog-card .phrases-list .dp.red {
            background: rgba(220, 38, 38, 0.15);
            color: #ff6b6b;
        }
        .dialog-line {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 20px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .dialog-line:last-child {
            border-bottom: none;
        }
        .dialog-line .sp {
            font-weight: 700;
            color: #3b82f6;
            min-width: 35px;
            font-size: 1.2rem;
        }
        .dialog-line .cn {
            font-size: 2.6rem;
            font-weight: 600;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'KaiTi', serif;
            color: #f5e6d3;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.2;
        }
        .dialog-line .cn:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
        }
        .dialog-line .py {
            font-size: 1.15rem;
            color: #b8956a;
            align-self: center;
        }
        .dialog-line .ru {
            font-size: 1.25rem;
            color: #d4c9a6;
            align-self: center;
        }
        .dialog-speak-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #1d4ed8;
            margin-top: 10px;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .dialog-speak-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1d4ed8;
        }

        .empty {
            text-align: center;
            padding: 30px;
            color: #b8956a;
            font-size: 1.2rem;
        }
        .empty .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 768px) {
            body {
                padding: 4px;
            }
            .top-bar {
                padding: 8px 14px;
            }
            .top-bar .title {
                font-size: 1.4rem;
            }
            .top-bar .back-btn,
            .top-bar .notebook-link {
                font-size: 0.9rem;
                padding: 6px 14px;
            }
            .stats {
                gap: 10px;
                padding: 6px 14px;
            }
            .stats span {
                font-size: 0.8rem;
            }
            .stats strong {
                font-size: 1rem;
            }
            .tab-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
            .phrase-card .chinese {
                font-size: 2.6rem;
            }
            .phrase-card .translation {
                font-size: 1.1rem;
            }
            .phrase-card .pinyin {
                font-size: 1rem;
            }
            .dialog-line .cn {
                font-size: 2rem;
            }
            .dialog-line .ru {
                font-size: 1rem;
            }
            .dialog-line .py {
                font-size: 0.9rem;
            }
            .dialog-card .title {
                font-size: 1.4rem;
            }
            .group-header .title {
                font-size: 1.1rem;
            }
            .group-header .icon {
                font-size: 1.4rem;
            }
            .search {
                font-size: 1rem;
                padding: 10px 16px;
            }
            .categories button {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }
        @media (max-width: 480px) {
            .phrase-card .chinese {
                font-size: 2rem;
            }
            .phrase-card .translation {
                font-size: 0.95rem;
            }
            .phrase-card .pinyin {
                font-size: 0.85rem;
            }
            .phrase-card {
                padding: 12px 14px;
                gap: 10px;
            }
            .phrase-card .actions button {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .dialog-line .cn {
                font-size: 1.6rem;
            }
            .dialog-line .ru {
                font-size: 0.85rem;
            }
            .dialog-line .py {
                font-size: 0.8rem;
            }
            .dialog-card {
                padding: 14px 16px;
            }
            .dialog-card .title {
                font-size: 1.2rem;
            }
            .top-bar .title {
                font-size: 1.1rem;
            }
            .stats span {
                font-size: 0.65rem;
            }
            .tab-btn {
                font-size: 0.75rem;
                padding: 6px 12px;
            }
            .group-header .title {
                font-size: 0.95rem;
            }
            .group-header .icon {
                font-size: 1.2rem;
            }
            .group-header {
                padding: 10px 14px;
            }
            .search {
                font-size: 0.85rem;
                padding: 8px 12px;
            }
            .categories button {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
        <div class="top-bar">
            <a href="#" class="back-btn">◀ На главную</a>
            <span class="title">📕 Красная книга</span>
            <a href="#" class="notebook-link" id="notebookNav">📓 Дневник</a>
        </div>

        <!-- ===== СТАТИСТИКА ===== -->
        <div class="stats" id="statsBar">
            <span>Всего: <strong id="totalCount">0</strong></span>
            <span>Красная: <strong id="redCount">0</strong></span>
            <span>Аналоги: <strong id="analogCount">0</strong></span>
            <span>Диалогов: <strong id="dialogCount">0</strong></span>
            <span>В дневнике: <strong id="notebookCount">0</strong></span>
        </div>

        <!-- ===== ВКЛАДКИ (ГЕНЕРИРУЮТСЯ ДИНАМИЧЕСКИ) ===== -->
        <div class="tabs" id="tabsContainer"></div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ГРУППЫ (ФРАЗЫ) -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-groups">
            <input class="search" id="searchInput" placeholder="🔍 Поиск по группам и фразам..." />
            <div class="categories" id="categoryButtons"></div>
            <div class="scroll-area" id="groupsContainer"></div>
        </div>

        <!-- ========================================================== -->
        <!-- ВКЛАДКА: ДИАЛОГИ -->
        <!-- ========================================================== -->
        <div class="tab-content" id="tab-dialogues">
            <div class="scroll-area" id="dialoguesContainer"></div>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. ДАННЫЕ
        // ============================================================

        let allPhrases = [];
        let allDialogues = [];
        let notebook = JSON.parse(localStorage.getItem('chinese_redbook_notebook') || '[]');
        let collapsedGroups = JSON.parse(localStorage.getItem('chinese_collapsed_groups') || '{}');

        // Загружаем данные
        if (typeof redBookData !== 'undefined') {
            allPhrases = redBookData;
        } else if (typeof window.redBookData !== 'undefined') {
            allPhrases = window.redBookData;
        } else if (typeof allPhrases !== 'undefined') {
            // уже есть
        } else if (typeof redPhrases !== 'undefined') {
            allPhrases = redPhrases;
        }

        if (typeof redBookDialogues !== 'undefined') {
            allDialogues = redBookDialogues;
        } else if (typeof window.redBookDialogues !== 'undefined') {
            allDialogues = window.redBookDialogues;
        } else if (typeof dialogues !== 'undefined') {
            allDialogues = dialogues;
        }

        console.log('📄 Всего фраз:', allPhrases.length);
        console.log('💬 Всего диалогов:', allDialogues.length);

        // ============================================================
        // 2. ДИНАМИЧЕСКИЕ ВКЛАДКИ
        // ============================================================

        const TAB_CONFIG = [
            { id: 'groups', icon: '📚', label: 'Фразы' },
            { id: 'dialogues', icon: '💬', label: 'Диалоги' },
        ];

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            TAB_CONFIG.forEach((tab, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.dataset.tab = tab.id;
                btn.textContent = `${tab.icon} ${tab.label}`;
                btn.addEventListener('click', () => switchTab(tab.id));
                container.appendChild(btn);
            });
        }

        // ============================================================
        // 3. КАТЕГОРИИ (ДИНАМИЧЕСКИ)
        // ============================================================

        function getUniqueCategories() {
            const cats = new Set();
            allPhrases.forEach(p => {
                if (p.category) cats.add(p.category);
            });
            return ['all', ...Array.from(cats)];
        }

        function renderCategoryButtons() {
            const container = document.getElementById('categoryButtons');
            const categories = getUniqueCategories();
            const labels = {
                all: '📚 Все',
                life: '💭 Жизнь',
                food: '🍜 Еда',
                travel: '✈️ Путешествия',
                work: '💼 Работа',
                shop: '🛍️ Покупки',
                emotion: '❤️ Эмоции',
                family: '👨‍👩‍👧‍👦 Семья',
                health: '🏥 Здоровье',
                time: '⏰ Время',
                tech: '💻 Технологии',
                nature: '🌿 Природа',
                num: '🔢 Числа',
                weather: '🌤️ Погода'
            };
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.dataset.cat = cat;
                btn.textContent = labels[cat] || cat;
                if (cat === 'all') btn.classList.add('active');
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#categoryButtons button').forEach(b => b.classList.remove(
                    'active'));
                    btn.classList.add('active');
                    currentCategory = cat;
                    renderGroups();
                });
                container.appendChild(btn);
            });
        }

        // ============================================================
        // 4. ГРУППЫ (ДИНАМИЧЕСКИ)
        // ============================================================

        const groupKeywords = {
            decisions: ['决定', '选好', '想好', '同意', '反对', '答应', '保证', '确认', '安排'],
            greetings: ['你好', '怎么样', '见', '好久', '最近', '欢迎', '认识'],
            feelings: ['喜欢', '讨厌', '累', '饿', '饱', '困', '羡慕', '失望', '无聊', '烦', '开心', '难过', '担心', '生气'],
            actions: ['走', '回去', '过来', '过去', '去', '来', '开', '停车', '走路', '开车', '跑步', '游泳', '运动'],
            requests: ['帮', '忙', '送', '陪', '让', '借', '需要', '可以吗'],
            time: ['时间', '赶', '急', '等', '迟', '晚', '早', '快', '慢', '马上', '现在', '今天', '明天', '昨天', '星期', '周末', '年',
                '月', '日'
            ],
            food: ['吃', '喝', '饭', '饿', '饱', '火锅', '买单', '结账', '菜单', '点菜', '好吃', '难吃', '米饭', '面条', '饺子', '包子',
                '汤', '鱼', '鸡肉', '猪肉', '牛肉', '蔬菜', '水果', '苹果', '香蕉', '水', '茶', '咖啡', '啤酒', '果汁', '辣', '咸',
                '甜', '酸', '外卖'
            ],
            work: ['工作', '学习', '会议', '安排', '记录', '主持', '议程', '项目', '邮件', '发送', '推迟', '提前', '尽快', '准时', '公司',
                '同事', '老板', '工资', '加班', '辞职'
            ],
            weather: ['雨', '雪', '风', '天', '晴', '阴', '云', '冷', '热', '天气', '温度'],
            communication: ['说', '话', '电话', '沟通', '联系', '确认', '邮件', '发送', '微信', '抖音', '上网', '搜索', '导航', '视频'],
            travel: ['路', '机场', '火车站', '地铁', '票', '顺风', '安全', '小心', '出租车', '公交车', '飞机', '船', '护照', '签证',
                '行李箱', '登机', '酒店', '房间', '钥匙'
            ],
            emotions: ['开心', '难过', '担心', '紧张', '兴奋', '感动', '失望', '生气', '害怕', '累', '无聊', '烦', '幸福'],
            family: ['爸爸', '妈妈', '哥哥', '姐姐', '弟弟', '妹妹', '朋友', '女朋友', '男朋友', '老师', '学生', '同事', '邻居', '家人',
                '结婚', '单身', '孩子'
            ],
            health: ['生病', '感冒', '头痛', '肚子痛', '发烧', '吃药', '医生', '医院', '身体', '休息', '喝水', '健康', '运动', '跑步',
                '游泳', '健身房'
            ],
            tech: ['手机', '电脑', '网络', 'WiFi', '密码', '充电', '电池', '下载', '上传', '拍照', '视频', '打电话', '发信息', '微信',
                '抖音', '上网', '搜索', '导航', '应用', '软件', '淘宝', '京东', '快递', '评价', '退货', '付款', '收货'
            ],
            nature: ['动物', '猫', '狗', '鸟', '花', '树', '草', '山', '水', '天空', '月亮', '星星', '太阳', '海', '河', '湖', '森林',
                '公园', '花园', '大自然'
            ],
            shop: ['超市', '商店', '买东西', '卖东西', '便宜', '贵', '打折', '现金', '信用卡', '微信支付', '支付宝', '试', '尺码', '颜色',
                '红色', '蓝色', '白色', '黑色', '黄色', '绿色', '衣服', '鞋子', '包', '收据'
            ],
            numbers: ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '百', '千', '万', '块', '毛'],
        };

        const groupIcons = {
            decisions: '💭',
            greetings: '👋',
            feelings: '😊',
            actions: '🏃',
            requests: '🙏',
            time: '⏰',
            food: '🍜',
            work: '💼',
            weather: '🌤️',
            communication: '📱',
            travel: '✈️',
            emotions: '❤️',
            family: '👨‍👩‍👧‍👦',
            health: '🏥',
            tech: '💻',
            nature: '🌿',
            shop: '🛍️',
            numbers: '🔢'
        };

        const groupTitles = {
            decisions: 'Решения',
            greetings: 'Приветствия',
            feelings: 'Чувства',
            actions: 'Действия',
            requests: 'Просьбы',
            time: 'Время',
            food: 'Еда',
            work: 'Работа',
            weather: 'Погода',
            communication: 'Общение',
            travel: 'Путешествия',
            emotions: 'Эмоции',
            family: 'Семья',
            health: 'Здоровье',
            tech: 'Технологии',
            nature: 'Природа',
            shop: 'Покупки',
            numbers: 'Числа'
        };

        let searchQuery = '';
        let currentCategory = 'all';

        function getPhrasesForGroup(keywords) {
            return allPhrases.filter(p => {
                const text = p.chinese + ' ' + p.pinyin + ' ' + p.translation;
                return keywords.some(kw => text.includes(kw));
            });
        }

        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            updateStats();
            let html = '';
            let visible = 0;

            for (const [groupId, keywords] of Object.entries(groupKeywords)) {
                let phrases = getPhrasesForGroup(keywords);
                if (currentCategory !== 'all') phrases = phrases.filter(p => p.category === currentCategory);
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    phrases = phrases.filter(p =>
                        p.chinese.includes(q) || p.pinyin.toLowerCase().includes(q) ||
                        p.translation.toLowerCase().includes(q) || groupTitles[groupId].toLowerCase().includes(q)
                    );
                }
                if (phrases.length === 0) continue;
                visible++;

                const isCollapsed = collapsedGroups[groupId] || false;
                const icon = groupIcons[groupId] || '📄';
                const title = groupTitles[groupId] || groupId;

                html += `
                            <div class="group-container">
                                <div class="group-header ${isCollapsed ? 'collapsed' : ''}" data-group="${groupId}">
                                    <span class="icon">${icon}</span>
                                    <span class="title">${title}</span>
                                    <span class="count">${phrases.length}</span>
                                    <span class="arrow">▼</span>
                                </div>
                                <div class="group-phrases ${isCollapsed ? 'collapsed' : ''}">
                        `;

                for (const p of phrases) {
                    const isRed = p.red !== false;
                    const isSaved = notebook.some(n => n.char === p.chinese);
                    const safe = p.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    html += `
                                <div class="phrase-card">
                                    <div class="chinese" onclick="speakChinese('${safe}')">
                                        ${p.chinese}
                                        <span class="badge ${isRed ? 'red' : 'analog'}">${isRed ? '🔴' : '🔵'}</span>
                                    </div>
                                    <div class="info">
                                        <div class="pinyin">${p.pinyin}</div>
                                        <div class="translation">${p.translation}</div>
                                    </div>
                                    <div class="actions">
                                        <button class="audio-btn" onclick="speakChinese('${safe}')">🔊</button>
                                        <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="toggleNotebook('${safe}', '${p.pinyin}', '${p.translation}')">${isSaved ? '✓' : '📓'}</button>
                                    </div>
                                </div>
                            `;
                }

                html += `
                                </div>
                            </div>
                        `;
            }

            container.innerHTML = visible === 0 ?
                `<div class="empty"><span class="icon">🔍</span>Ничего не найдено</div>` : html;

            document.querySelectorAll('.group-header').forEach(h => {
                h.onclick = function() {
                    const id = this.dataset.group;
                    const phrases = this.nextElementSibling;
                    const isCollapsed = phrases.classList.contains('collapsed');
                    phrases.classList.toggle('collapsed');
                    this.classList.toggle('collapsed');
                    collapsedGroups[id] = !isCollapsed;
                    localStorage.setItem('chinese_collapsed_groups', JSON.stringify(collapsedGroups));
                };
            });
        }

        // ============================================================
        // 5. ДИАЛОГИ
        // ============================================================

        function renderDialogues() {
            const container = document.getElementById('dialoguesContainer');
            if (!allDialogues || allDialogues.length === 0) {
                container.innerHTML = `<div class="empty"><span class="icon">💬</span>Диалогов нет</div>`;
                return;
            }

            let html = '';
            for (const d of allDialogues) {
                let phrases = '';
                if (d.phrases) {
                    phrases = d.phrases.map(p => {
                        const isRed = allPhrases.some(fp => fp.chinese === p && fp.red !== false);
                        return `<span class="dp ${isRed ? 'red' : ''}">${p}</span>`;
                    }).join(' ');
                }

                let lines = '';
                for (const line of d.lines) {
                    const safe = line.chinese.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    lines += `
                                <div class="dialog-line">
                                    <span class="sp">${line.speaker}</span>
                                    <span class="cn" onclick="speakChinese('${safe}')">${line.chinese}</span>
                                    <span class="py">${line.pinyin}</span>
                                    <span class="ru">— ${line.russian}</span>
                                </div>
                            `;
                }

                const full = d.lines.map(l => l.chinese).join('。');
                const safeFull = full.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const category = d.category || '';

                html += `
                            <div class="dialog-card">
                                <div class="title">
                                    💬 ${d.title}
                                    ${category ? `<span class="category-tag">#${category}</span>` : ''}
                                </div>
                                ${phrases ? `<div class="phrases-list">📌 ${phrases}</div>` : ''}
                                ${lines}
                                <button class="dialog-speak-btn" onclick="speakChinese('${safeFull}')">🔊 Весь диалог</button>
                            </div>
                        `;
            }
            container.innerHTML = html;
        }

        // ============================================================
        // 6. ДНЕВНИК
        // ============================================================

        function toggleNotebook(char, pinyin, translation) {
            const idx = notebook.findIndex(n => n.char === char);
            if (idx >= 0) {
                notebook.splice(idx, 1);
                showToast(`❌ "${char}" удалён`);
            } else {
                notebook.push({ char, pinyin, translation, added: new Date().toISOString() });
                showToast(`✅ "${char}" сохранён`);
            }
            localStorage.setItem('chinese_redbook_notebook', JSON.stringify(notebook));
            renderGroups();
            updateStats();
        }

        function renderNotebook() {
            // Просто обновляем счётчик в статистике
            updateStats();
        }

        // ============================================================
        // 7. ОЗВУЧКА
        // ============================================================

        let chineseVoice = null;

        function loadChineseVoice() {
            if (!window.speechSynthesis) return;
            const voices = speechSynthesis.getVoices();
            chineseVoice = voices.find(v => v.lang.startsWith('zh')) || null;
        }
        if (window.speechSynthesis) {
            loadChineseVoice();
            speechSynthesis.onvoiceschanged = loadChineseVoice;
            setTimeout(loadChineseVoice, 500);
        }

        function speakChinese(text) {
            if (!text || !window.speechSynthesis) return;
            try { window.speechSynthesis.cancel(); } catch (e) {}
            setTimeout(() => {
                try {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'zh-CN';
                    u.rate = 0.7;
                    if (!chineseVoice) {
                        const voices = speechSynthesis.getVoices();
                        chineseVoice = voices.find(v => v.lang.startsWith('zh'));
                    }
                    if (chineseVoice) u.voice = chineseVoice;
                    window.speechSynthesis.speak(u);
                } catch (e) {}
            }, 50);
        }
        window.speakChinese = speakChinese;

        // ============================================================
        // 8. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            const target = document.getElementById('tab-' + tabName);
            if (target) target.classList.add('active');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.tab === tabName) btn.classList.add('active');
            });

            if (tabName === 'dialogues') renderDialogues();
            if (tabName === 'groups') renderGroups();
        }
        window.switchTab = switchTab;

        // ============================================================
        // 9. ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ============================================================

        function updateStats() {
            document.getElementById('totalCount').textContent = allPhrases.length;
            document.getElementById('redCount').textContent = allPhrases.filter(p => p.red !== false).length;
            document.getElementById('analogCount').textContent = allPhrases.filter(p => p.red === false).length;
            document.getElementById('dialogCount').textContent = allDialogues.length;
            document.getElementById('notebookCount').textContent = notebook.length;
        }

        // ============================================================
        // 10. ТОСТЫ
        // ============================================================

        function showToast(msg) {
            const t = document.getElementById('toastMsg');
            if (t) {
                t.textContent = msg;
                t.style.display = 'block';
                clearTimeout(t._hide);
                t._hide = setTimeout(() => t.style.display = 'none', 1800);
                return;
            }
            const el = document.createElement('div');
            el.id = 'toastMsg';
            el.style.cssText =
                'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:12px 24px;border-radius:40px;z-index:9999;font-size:1.1rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.3);max-width:90%;text-align:center;';
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1800);
        }

        // ============================================================
        // 11. СОБЫТИЯ
        // ============================================================

        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value;
            renderGroups();
        });

        document.getElementById('notebookNav').addEventListener('click', function(e) {
            e.preventDefault();
            // Показываем уведомление о дневнике
            const count = notebook.length;
            showToast(`📓 В дневнике ${count} записей`);
        });

        // ============================================================
        // 12. СТАРТ
        // ============================================================

        renderTabs();
        renderCategoryButtons();
        renderGroups();
        renderDialogues();
        updateStats();

        // Переключаем на первую вкладку
        switchTab('groups');

        console.log('✅ Приложение загружено!');
        console.log('📄 Всего фраз:', allPhrases.length);
        console.log('💬 Всего диалогов:', allDialogues.length);
        console.log('📓 В дневнике:', notebook.length);

        window.toggleNotebook = toggleNotebook;
        window.speakChinese = speakChinese;
        window.switchTab = switchTab;
    </script>
